spring-boot3 = "3.5.14"
spring-boot4 = "4.0.6"

lettuce = "6.8.2.RELEASE"
redisson = "4.3.1"

exposed = "1.2.0"

mongo-driver = "5.6.4"

hazelcast = "5.6.0"

micrometer = "1.16.4"

slf4j = "2.0.17"
logback = "1.5.32"

junit-jupiter = "6.0.3"
kluent = "1.73"
