spring:
  application:
    name: bluetape4k-leader-prometheus-dashboard
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
  endpoint:
    health:
      probes:
        enabled: true

demo:
  job:
    fixed-delay-ms: ${DEMO_JOB_FIXED_DELAY_MS:5000}
    initial-delay-ms: ${DEMO_JOB_INITIAL_DELAY_MS:1000}
  redis:
    url: ${DEMO_REDIS_URL:}

bluetape4k:
  leader:
    wait-time: 1s
    lease-time: 30s
    aop:
      lock-name-prefix: ""
      metrics:
        enabled: true
