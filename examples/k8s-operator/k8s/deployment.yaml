apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluetape4k-k8s-operator
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: bluetape4k-k8s-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bluetape4k-k8s-operator
    spec:
      serviceAccountName: bluetape4k-k8s-operator
      containers:
        - name: operator
          image: ghcr.io/bluetape4k/bluetape4k-k8s-operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DEMO_OPERATOR_LOCK_NAME
              value: cronjob-reconciler
          ports:
            - name: actuator
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: actuator
            initialDelaySeconds: 10
            periodSeconds: 10
