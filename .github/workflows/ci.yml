name: CI

permissions:
  contents: read
  actions: read
  checks: read
  statuses: read
  packages: read

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - '.gitleaks.toml'
      - 'CHANGELOG.md'
      - 'WIP.md'
      - 'LICENSE'
      - '.claude/**'
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - '.gitleaks.toml'
      - 'CHANGELOG.md'
      - 'WIP.md'
      - 'LICENSE'
      - '.claude/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 0. 시크릿 스캔 ────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_URL=$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_x64\\.tar\\.gz$")) | .browser_download_url')
          test -n "${GITLEAKS_URL}"
          curl -sSfL "${GITLEAKS_URL}" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-git --config .gitleaks.toml

  # ── 1. Gradle Wrapper 검증 ────────────────────────────────────────────────
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6

  # ── 2. 변경된 모듈 감지 ──────────────────────────────────────────────────
  changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate-wrapper
    outputs:
      leader-core: ${{ steps.filter.outputs.leader-core }}
      leader-redis: ${{ steps.filter.outputs.leader-redis }}
      leader-exposed: ${{ steps.filter.outputs.leader-exposed }}
      leader-mongodb: ${{ steps.filter.outputs.leader-mongodb }}
      leader-etcd: ${{ steps.filter.outputs.leader-etcd }}
      leader-consul: ${{ steps.filter.outputs.leader-consul }}
      leader-k8s: ${{ steps.filter.outputs.leader-k8s }}
      leader-hazelcast: ${{ steps.filter.outputs.leader-hazelcast }}
      leader-zookeeper: ${{ steps.filter.outputs.leader-zookeeper }}
      leader-dynamodb: ${{ steps.filter.outputs.leader-dynamodb }}
      leader-spring-boot: ${{ steps.filter.outputs.leader-spring-boot }}
      leader-ktor: ${{ steps.filter.outputs.leader-ktor }}
      leader-micrometer: ${{ steps.filter.outputs.leader-micrometer }}
      examples-batch-scheduler: ${{ steps.filter.outputs.examples-batch-scheduler }}
      examples-migration-gate: ${{ steps.filter.outputs.examples-migration-gate }}
      examples-webhook-poller: ${{ steps.filter.outputs.examples-webhook-poller }}
      examples-cache-warmer: ${{ steps.filter.outputs.examples-cache-warmer }}
      examples-tenant-aggregator: ${{ steps.filter.outputs.examples-tenant-aggregator }}
      examples-ktor-app: ${{ steps.filter.outputs.examples-ktor-app }}
      examples-prometheus-dashboard: ${{ steps.filter.outputs.examples-prometheus-dashboard }}
      examples-etcd-reconciler: ${{ steps.filter.outputs.examples-etcd-reconciler }}
      examples-consul-maintenance: ${{ steps.filter.outputs.examples-consul-maintenance }}
      examples-k8s-lease: ${{ steps.filter.outputs.examples-k8s-lease }}
      examples-k8s-operator: ${{ steps.filter.outputs.examples-k8s-operator }}
      examples-rate-limiter: ${{ steps.filter.outputs.examples-rate-limiter }}
      examples-strategic-election: ${{ steps.filter.outputs.examples-strategic-election }}
      benchmark: ${{ steps.filter.outputs.benchmark }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            leader-core:
              - 'leader-core/**'
            leader-redis:
              - 'leader-redis-lettuce/**'
              - 'leader-redis-redisson/**'
            leader-exposed:
              - 'leader-exposed-core/**'
              - 'leader-exposed-jdbc/**'
              - 'leader-exposed-r2dbc/**'
            leader-mongodb:
              - 'leader-mongodb/**'
            leader-etcd:
              - 'leader-etcd/**'
              - 'leader-core/**'
            leader-consul:
              - 'leader-consul/**'
              - 'leader-core/**'
            leader-k8s:
              - 'leader-k8s/**'
              - 'leader-core/**'
            leader-hazelcast:
              - 'leader-hazelcast/**'
            leader-zookeeper:
              - 'leader-zookeeper/**'
            leader-dynamodb:
              - 'leader-dynamodb/**'
              - 'leader-core/**'
            leader-spring-boot:
              - 'leader-spring-boot/**'
              - 'leader-dynamodb/**'
            leader-ktor:
              - 'leader-ktor/**'
              - 'leader-core/**'
            leader-micrometer:
              - 'leader-micrometer/**'
            examples-batch-scheduler:
              - 'examples/batch-scheduler/**'
              - 'leader-redis-lettuce/**'
            examples-migration-gate:
              - 'examples/migration-gate/**'
              - 'leader-exposed-jdbc/**'
              - 'leader-exposed-core/**'
              - 'leader-core/**'
            examples-webhook-poller:
              - 'examples/webhook-poller/**'
              - 'leader-mongodb/**'
              - 'leader-core/**'
            examples-cache-warmer:
              - 'examples/cache-warmer/**'
              - 'leader-hazelcast/**'
              - 'leader-core/**'
            examples-tenant-aggregator:
              - 'examples/tenant-aggregator/**'
              - 'leader-exposed-r2dbc/**'
              - 'leader-exposed-core/**'
              - 'leader-core/**'
            examples-ktor-app:
              - 'examples/ktor-app/**'
              - 'leader-ktor/**'
              - 'leader-redis-lettuce/**'
              - 'leader-core/**'
            examples-prometheus-dashboard:
              - 'examples/prometheus-dashboard/**'
              - 'leader-spring-boot/**'
              - 'leader-micrometer/**'
              - 'leader-redis-lettuce/**'
              - 'leader-core/**'
            examples-etcd-reconciler:
              - 'examples/etcd-reconciler/**'
              - 'leader-etcd/**'
              - 'leader-core/**'
            examples-consul-maintenance:
              - 'examples/consul-maintenance/**'
              - 'leader-consul/**'
              - 'leader-core/**'
            examples-k8s-lease:
              - 'examples/k8s-lease/**'
              - 'leader-core/**'
            examples-k8s-operator:
              - 'examples/k8s-operator/**'
              - 'leader-k8s/**'
              - 'leader-spring-boot/**'
              - 'leader-core/**'
            examples-rate-limiter:
              - 'examples/rate-limiter/**'
              - 'leader-redis-lettuce/**'
              - 'leader-core/**'
            examples-strategic-election:
              - 'examples/strategic-election/**'
              - 'leader-core/**'
            benchmark:
              - 'benchmark/**'
              - 'buildSrc/build.gradle.kts'
              - 'leader-core/**'
              - 'leader-redis-lettuce/**'
              - 'leader-redis-redisson/**'
              - 'leader-exposed-core/**'
              - 'leader-exposed-jdbc/**'
              - 'leader-exposed-r2dbc/**'
              - 'leader-mongodb/**'
              - 'leader-etcd/**'
              - 'leader-consul/**'
              - 'leader-k8s/**'
              - 'leader-hazelcast/**'
              - 'leader-zookeeper/**'
              - 'leader-dynamodb/**'

  # ── 3. 전체 빌드 (테스트 제외) ───────────────────────────────────────────
  build:
    name: Build (compile only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build (compile only)
        run: ./gradlew build -x test -x koverVerify --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

  # ── 4. leader-core 테스트 (Docker 불필요) ────────────────────────────────
  test-core:
    name: Test / leader-core
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, changes]
    if: ${{ needs.changes.outputs['leader-core'] == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test leader-core
        run: |
          for attempt in 1 2 3; do
            ./gradlew :bluetape4k-leader-core:test --no-daemon && break
            echo "Attempt $attempt failed"
            [ $attempt -lt 3 ] && sleep 10 || exit 1
          done
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :bluetape4k-leader-core:koverXmlReport --no-daemon
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-core
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── leader-micrometer 테스트 (Docker 불필요) ────────────────────────────
  test-micrometer:
    name: Test / leader-micrometer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, changes]
    if: ${{ needs.changes.outputs['leader-micrometer'] == 'true' || github.event_name == 'workflow_dispatch' }}
