  # ── 10. Coverage 집계 ─────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test-core
      - test-micrometer
      - test-redis-lettuce
      - test-redis-redisson
      - test-exposed-jdbc-h2
      - test-exposed-jdbc-postgresql
      - test-exposed-jdbc-mysql
      - test-exposed-r2dbc-h2
      - test-exposed-r2dbc-postgresql
      - test-exposed-r2dbc-mysql
      - test-spring-boot
      - test-leader-ktor
      - test-mongodb
      - test-leader-dynamodb
      - test-leader-etcd
      - test-leader-consul
      - test-leader-k8s
      - test-hazelcast
      - test-zookeeper
      - test-examples-batch-scheduler
      - test-examples-etcd-reconciler
      - test-examples-consul-maintenance
      - test-examples-k8s-lease
      - test-examples-k8s-operator
      - test-examples-rate-limiter
      - test-examples-strategic-election
      - test-examples-migration-gate
      - test-examples-webhook-poller
      - test-examples-cache-warmer
      - test-examples-tenant-aggregator
      - test-examples-ktor-app
      - test-examples-prometheus-dashboard
      - compile-benchmark
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: false
        continue-on-error: true
      - name: Aggregate Kover coverage summary
        if: always()
        run: python3 .github/scripts/aggregate-kover-coverage.py coverage-artifacts
      - name: Upload aggregated coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-all
          path: coverage-artifacts/
          retention-days: 14

  # ── 11. 결과 집계 ─────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - gitleaks
      - build
      - changes
      - test-core
      - test-micrometer
      - test-redis-lettuce
      - test-redis-redisson
      - test-exposed-jdbc-h2
      - test-exposed-jdbc-postgresql
      - test-exposed-jdbc-mysql
      - test-exposed-r2dbc-h2
      - test-exposed-r2dbc-postgresql
      - test-exposed-r2dbc-mysql
      - test-spring-boot
      - test-leader-ktor
      - test-mongodb
      - test-leader-dynamodb
      - test-leader-etcd
      - test-leader-consul
      - test-leader-k8s
      - test-hazelcast
      - test-zookeeper
      - test-examples-batch-scheduler
      - test-examples-etcd-reconciler
      - test-examples-consul-maintenance
      - test-examples-k8s-lease
      - test-examples-k8s-operator
      - test-examples-rate-limiter
      - test-examples-strategic-election
      - test-examples-migration-gate
      - test-examples-webhook-poller
      - test-examples-cache-warmer
      - test-examples-tenant-aggregator
      - test-examples-ktor-app
      - test-examples-prometheus-dashboard
      - compile-benchmark
      - coverage-report
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed (skipped jobs treated as success)"
