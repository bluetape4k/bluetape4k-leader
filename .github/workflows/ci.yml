name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - '.gitleaks.toml'
      - 'CHANGELOG.md'
      - 'WIP.md'
      - 'LICENSE'
      - '.claude/**'
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - '.gitleaks.toml'
      - 'CHANGELOG.md'
      - 'WIP.md'
      - 'LICENSE'
      - '.claude/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 0. 시크릿 스캔 ────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-git --config .gitleaks.toml

  # ── 1. Gradle Wrapper 검증 ────────────────────────────────────────────────
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  # ── 2. 전체 빌드 (테스트 제외) ───────────────────────────────────────────
  build:
    name: Build (compile only)
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build (compile only)
        run: ./gradlew build -x test -x koverVerify --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

  # ── 3. leader-core 테스트 (Docker 불필요) ────────────────────────────────
  test-core:
    name: Test / leader-core
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test leader-core
        run: ./gradlew :leader-core:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-core:koverXmlReport --no-daemon
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 4. leader-redis-lettuce 테스트 (Testcontainers) ─────────────────────
  test-redis-lettuce:
    name: Test / leader-redis-lettuce
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test leader-redis-lettuce
        run: ./gradlew :leader-redis-lettuce:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-redis-lettuce:koverXmlReport --no-daemon
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-redis-lettuce
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-redis-lettuce
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 5. leader-redis-redisson 테스트 (Testcontainers) ────────────────────
  test-redis-redisson:
    name: Test / leader-redis-redisson
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test leader-redis-redisson
        run: ./gradlew :leader-redis-redisson:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-redis-redisson:koverXmlReport --no-daemon
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-redis-redisson
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-redis-redisson
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 6. leader-exposed-jdbc 테스트 (H2 in-memory) ──────────────────────────
  test-exposed-jdbc-h2:
    name: Test / leader-exposed-jdbc (H2)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test leader-exposed-jdbc (H2)
        run: ./gradlew :leader-exposed-jdbc:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          LEADER_TEST_DB: "H2"

      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-exposed-jdbc:koverXmlReport --no-daemon
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-exposed-jdbc-h2
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-exposed-jdbc-h2
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 7. leader-exposed-jdbc 테스트 (PostgreSQL, Testcontainers) ────────────
  test-exposed-jdbc-postgresql:
    name: Test / leader-exposed-jdbc (PostgreSQL)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test leader-exposed-jdbc (PostgreSQL)
        run: ./gradlew :leader-exposed-jdbc:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"
          LEADER_TEST_DB: "POSTGRESQL"

      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-exposed-jdbc:koverXmlReport --no-daemon
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-exposed-jdbc-postgresql
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-exposed-jdbc-postgresql
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 8. leader-exposed-jdbc 테스트 (MySQL 8, Testcontainers) ──────────────
  test-exposed-jdbc-mysql:
    name: Test / leader-exposed-jdbc (MySQL 8)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test leader-exposed-jdbc (MySQL 8)
        run: ./gradlew :leader-exposed-jdbc:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"
          LEADER_TEST_DB: "MYSQL_V8"

      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-exposed-jdbc:koverXmlReport --no-daemon
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-exposed-jdbc-mysql
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-exposed-jdbc-mysql
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 9. Coverage 집계 ─────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs:
      - test-core
      - test-redis-lettuce
      - test-redis-redisson
      - test-exposed-jdbc-h2
      - test-exposed-jdbc-postgresql
      - test-exposed-jdbc-mysql
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: false
        continue-on-error: true
      - name: Aggregate Kover coverage summary
        if: always()
        run: python3 .github/scripts/aggregate-kover-coverage.py coverage-artifacts
      - name: Upload aggregated coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-all
          path: coverage-artifacts/
          retention-days: 14

  # ── 10. 결과 집계 ─────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs:
      - gitleaks
      - build
      - test-core
      - test-redis-lettuce
      - test-redis-redisson
      - test-exposed-jdbc-h2
      - test-exposed-jdbc-postgresql
      - test-exposed-jdbc-mysql
      - coverage-report
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed"
