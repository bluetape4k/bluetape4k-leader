  coverage-report:
    name: Coverage Report

    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test-core
      - test-redis-lettuce
      - test-redis-redisson
      - test-exposed-core-h2
      - test-exposed-core-postgresql
      - test-exposed-core-mysql
      - test-exposed-jdbc-h2
      - test-exposed-jdbc-postgresql
      - test-exposed-jdbc-mysql
      - test-exposed-r2dbc-h2
      - test-exposed-r2dbc-postgresql
      - test-exposed-r2dbc-mysql
      - test-mongodb
      - test-hazelcast
      - test-zookeeper
      - test-micrometer
      - test-spring-boot
      - test-leader-ktor
    if: ${{ always() && ((github.event_name == 'schedule' && github.event.schedule == '0 19 * * 0') || (github.event_name == 'workflow_dispatch' && inputs.scope == 'full')) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: false
        continue-on-error: true
      - name: Aggregate Kover coverage summary
        if: always()
        run: python3 .github/scripts/aggregate-kover-coverage.py coverage-artifacts
      - name: Upload aggregated coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-all
          path: coverage-artifacts/
          retention-days: 30

  nightly-status:
    name: Nightly Status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
      - test-core
      - test-redis-lettuce
      - test-redis-redisson
      - test-exposed-core-h2
      - test-exposed-core-postgresql
      - test-exposed-core-mysql
      - test-exposed-jdbc-h2
      - test-exposed-jdbc-postgresql
      - test-exposed-jdbc-mysql
      - test-exposed-r2dbc-h2
      - test-exposed-r2dbc-postgresql
      - test-exposed-r2dbc-mysql
      - test-mongodb
      - test-hazelcast
      - test-zookeeper
      - test-micrometer
      - test-spring-boot
      - test-leader-ktor
      - coverage-report
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Nightly results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "Nightly failed"
            exit 1
          fi
          echo "Nightly passed"
