name: Nightly

on:
  schedule:
    - cron: '0 19 * * 1-6'  # Daily smoke, UTC 19:00 (KST 04:00) Mon-Sat
    - cron: '0 19 * * 0'    # Weekly full, UTC 19:00 (KST 04:00) Sunday
  workflow_dispatch:
    inputs:
      scope:
        description: 'Nightly scope to run'
        required: true
        type: choice
        default: full
        options:
          - smoke
          - full

permissions:
  contents: read
  actions: read
  checks: read
  statuses: read
  packages: read

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6

  build:
    name: Build & Detekt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
      - name: Build (compile only)
        run: ./gradlew build -x test -x koverVerify --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Detekt static analysis
        run: ./gradlew detekt --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-report
          path: 'build/reports/detekt/*.xml'
          retention-days: 14

  # ── leader-core (Docker 불필요) ─────────────────────────────────────────────
  test-core:
    name: Test / leader-core
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Test leader-core
        run: |
          for attempt in 1 2 3; do
            ./gradlew :leader-core:test --no-daemon && break
            echo "Attempt $attempt failed"
            [ $attempt -lt 3 ] && sleep 10 || exit 1
          done
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-core:koverXmlReport --no-daemon
        continue-on-error: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 14
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-core
          path: '**/build/reports/kover/'
          retention-days: 14

  # ── leader-redis-lettuce (Testcontainers: Redis) ────────────────────────────
  test-redis-lettuce:
    name: Test / leader-redis-lettuce (Testcontainers)
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 19 * * 0') || (github.event_name == 'workflow_dispatch' && inputs.scope == 'full') }}

    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Test leader-redis-lettuce
        run: |
          for attempt in 1 2 3; do
            ./gradlew :leader-redis-lettuce:test --no-daemon && break
            echo "Attempt $attempt failed"
            [ $attempt -lt 3 ] && sleep 10 || exit 1
          done
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"
      - name: Generate Kover XML report
