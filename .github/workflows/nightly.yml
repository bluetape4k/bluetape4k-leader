      - test-redis-lettuce
      - test-redis-redisson
      - test-exposed-core-h2
      - test-exposed-core-postgresql
      - test-exposed-core-mysql
      - test-exposed-jdbc-h2
      - test-exposed-jdbc-postgresql
      - test-exposed-jdbc-mysql
      - test-mongodb
      - test-hazelcast
      - test-micrometer
      - test-spring-boot-common
      - test-spring-boot3
      - test-spring-boot4
      - coverage-report
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Nightly results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "Nightly failed"
            exit 1
          fi
          echo "Nightly passed"
