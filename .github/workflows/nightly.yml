name: Nightly

on:
  schedule:
    - cron: '0 19 * * *'  # 매일 UTC 19:00 (KST 04:00)
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: read
  statuses: read
  packages: read

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  build:
    name: Build & Detekt
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      - name: Build (compile only)
        run: ./gradlew build -x test --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Detekt static analysis
        run: ./gradlew detekt --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: 'build/reports/detekt/*.xml'
          retention-days: 14

  # ── leader-core (Docker 불필요) ─────────────────────────────────────────────
  test-core:
    name: Test / leader-core
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Test leader-core
        run: ./gradlew :leader-core:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-core:koverXmlReport --no-daemon
        continue-on-error: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 14
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: '**/build/reports/kover/'
          retention-days: 14

  # ── leader-redis-lettuce (Testcontainers: Redis) ────────────────────────────
  test-redis-lettuce:
    name: Test / leader-redis-lettuce (Testcontainers)
