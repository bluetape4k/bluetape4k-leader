name: Nightly

on:
  schedule:
    - cron: '0 19 * * *'  # 매일 UTC 19:00 (KST 04:00)
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  build:
    name: Build & Detekt
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      - name: Build (compile only)
        run: ./gradlew build -x test --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Detekt static analysis
        run: ./gradlew detekt --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: 'build/reports/detekt/*.xml'
          retention-days: 14

  test-core:
    name: Test / leader-core
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Test leader-core
        run: ./gradlew :leader-core:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-core:koverXmlReport --no-daemon
        continue-on-error: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 14
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: '**/build/reports/kover/'
          retention-days: 14

  test-redis-lettuce:
    name: Test / leader-redis-lettuce (Testcontainers)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Test leader-redis-lettuce
        run: ./gradlew :leader-redis-lettuce:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"
      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-redis-lettuce:koverXmlReport --no-daemon
        continue-on-error: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-redis-lettuce
          path: '**/build/test-results/test/*.xml'
          retention-days: 14
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-redis-lettuce
          path: '**/build/reports/kover/'
          retention-days: 14

  test-redis-redisson:
    name: Test / leader-redis-redisson (Testcontainers)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Test leader-redis-redisson
        run: ./gradlew :leader-redis-redisson:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"
      - name: Generate Kover XML report
        if: always()
        run: ./gradlew :leader-redis-redisson:koverXmlReport --no-daemon
        continue-on-error: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-redis-redisson
          path: '**/build/test-results/test/*.xml'
          retention-days: 14
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-redis-redisson
          path: '**/build/reports/kover/'
          retention-days: 14

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs:
      - test-core
      - test-redis-lettuce
      - test-redis-redisson
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: false
        continue-on-error: true
      - name: Aggregate Kover coverage summary
        if: always()
        run: python3 .github/scripts/aggregate-kover-coverage.py coverage-artifacts
      - name: Upload aggregated coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-all
          path: coverage-artifacts/
          retention-days: 30

  nightly-status:
    name: Nightly Status
    runs-on: ubuntu-latest
    needs:
      - build
      - test-core
      - test-redis-lettuce
      - test-redis-redisson
      - coverage-report
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Nightly results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "Nightly failed"
            exit 1
          fi
          echo "Nightly passed"
