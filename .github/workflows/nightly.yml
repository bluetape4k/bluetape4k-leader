  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs:
      - test-core
      - test-redis-lettuce
      - test-redis-redisson
      - test-exposed-core-h2
      - test-exposed-core-postgresql
      - test-exposed-core-mysql
      - test-exposed-jdbc-h2
      - test-exposed-jdbc-postgresql
      - test-exposed-jdbc-mysql
      - test-mongodb
      - test-hazelcast
      - test-micrometer
      - test-spring-boot-common
      - test-spring-boot3
      - test-spring-boot4
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: false
        continue-on-error: true
      - name: Aggregate Kover coverage summary
        if: always()
        run: python3 .github/scripts/aggregate-kover-coverage.py coverage-artifacts
      - name: Upload aggregated coverage
        if: always()
        uses: actions/upload-artifact@v4
