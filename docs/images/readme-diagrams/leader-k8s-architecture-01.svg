<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 900" width="1320" height="900" role="img" aria-labelledby="title desc">
  <title id="title">leader-k8s Lease architecture</title>
  <desc id="desc">Architecture diagram for the Kubernetes Lease backend showing electors, Fabric8 client, API Server, Lease resources, annotations, owner tokens, and group slot leases.</desc>
  <style>
    text { font-family: 'Architects Daughter', 'Comic Mono', 'Comic Sans MS', Arial, sans-serif; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 14px; fill: #4b5563; }
    .section { font-size: 15px; font-weight: 700; fill: #374151; }
    .card-title { font-size: 16px; font-weight: 700; fill: #111827; }
    .card-sub { font-size: 12px; fill: #4b5563; }
    .mono { font-family: 'Comic Mono', 'Architects Daughter', monospace; font-size: 12px; fill: #374151; }
    .tiny { font-size: 11px; fill: #6b7280; }
    .footer { font-size: 12px; fill: #6b7280; }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="blueArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="greenArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#059669"/>
    </marker>
    <marker id="orangeArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#ea580c"/>
    </marker>
    <marker id="purpleArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1320" height="900" fill="#f8fafc"/>
  <rect x="28" y="24" width="1264" height="820" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="52" y="66" class="title">leader-k8s Lease architecture</text>
  <text x="52" y="92" class="subtitle">Native coordination.k8s.io/v1 Lease objects provide a Kubernetes-native leader token and resourceVersion CAS boundary.</text>

  <rect x="52" y="128" width="270" height="638" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="72" y="158" class="section">Callers in a Pod</text>
  <g transform="translate(80 194)">
    <rect width="214" height="104" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.4"/>
    <text x="107" y="30" text-anchor="middle" class="card-title">Workload code</text>
    <text x="20" y="60" class="mono">runIfLeader(...)</text>
    <text x="20" y="82" class="mono">runAsyncIfLeader(...)</text>
  </g>
  <g transform="translate(80 344)">
    <rect width="214" height="104" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.4"/>
    <text x="107" y="30" text-anchor="middle" class="card-title">LeaderSlot audit</text>
    <text x="20" y="60" class="card-sub">optional leaderId becomes</text>
    <text x="20" y="80" class="card-sub">audit annotation</text>
  </g>
  <g transform="translate(80 514)">
    <rect width="214" height="104" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.4"/>
    <text x="107" y="30" text-anchor="middle" class="card-title">RBAC boundary</text>
    <text x="20" y="60" class="mono">get/list/watch</text>
    <text x="20" y="82" class="mono">create/update/patch/delete</text>
  </g>

  <rect x="374" y="128" width="454" height="638" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="394" y="158" class="section">leader-k8s module</text>
  <g transform="translate(408 194)">
    <rect width="180" height="126" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.4"/>
    <text x="90" y="30" text-anchor="middle" class="card-title">KubernetesLease</text>
    <text x="90" y="50" text-anchor="middle" class="card-title">LeaderElector</text>
    <text x="20" y="82" class="card-sub">single Lease name</text>
    <text x="20" y="104" class="card-sub">blocking + async</text>
  </g>
  <g transform="translate(614 194)">
    <rect width="180" height="126" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.4"/>
    <text x="90" y="30" text-anchor="middle" class="card-title">KubernetesLease</text>
    <text x="90" y="50" text-anchor="middle" class="card-title">SuspendLeader</text>
    <text x="20" y="82" class="card-sub">coroutine API</text>
    <text x="20" y="104" class="card-sub">NonCancellable release</text>
  </g>
  <g transform="translate(408 374)">
    <rect width="180" height="138" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.4"/>
    <text x="90" y="30" text-anchor="middle" class="card-title">KubernetesLease</text>
    <text x="90" y="50" text-anchor="middle" class="card-title">LeaderGroup</text>
    <text x="20" y="82" class="card-sub">random slot start</text>
    <text x="20" y="104" class="card-sub">one Lease per slot</text>
    <text x="20" y="124" class="mono">&lt;lock&gt;-slot-N</text>
  </g>
  <g transform="translate(614 374)">
    <rect width="180" height="138" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.4"/>
    <text x="90" y="30" text-anchor="middle" class="card-title">KubernetesLease</text>
    <text x="90" y="50" text-anchor="middle" class="card-title">SuspendGroup</text>
    <text x="20" y="82" class="card-sub">slot budget scan</text>
    <text x="20" y="104" class="card-sub">owner-conditional</text>
    <text x="20" y="124" class="card-sub">cleanup</text>
  </g>
  <g transform="translate(408 574)">
    <rect width="386" height="92" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
    <text x="193" y="30" text-anchor="middle" class="card-title">KubernetesLeaseLock</text>
    <text x="24" y="58" class="mono">ownerToken = b4k-Base58...</text>
    <text x="24" y="78" class="card-sub">tryLock / unlock / extendDetailed / state</text>
  </g>

  <rect x="880" y="128" width="360" height="638" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="900" y="158" class="section">Kubernetes API and Lease objects</text>
  <g transform="translate(912 194)">
    <rect width="296" height="98" rx="8" fill="#ffffff" stroke="#c084fc" stroke-width="1.4"/>
    <text x="148" y="30" text-anchor="middle" class="card-title">Fabric8 KubernetesClient</text>
    <text x="24" y="58" class="card-sub">client.leases().inNamespace(ns)</text>
    <text x="24" y="78" class="card-sub">caller owns client lifecycle</text>
  </g>
  <g transform="translate(912 328)">
    <rect width="296" height="110" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.4"/>
    <text x="148" y="30" text-anchor="middle" class="card-title">API Server CAS</text>
    <text x="24" y="58" class="mono">create Lease if absent</text>
    <text x="24" y="80" class="mono">update with resourceVersion</text>
    <text x="24" y="100" class="card-sub">409 Conflict means retry/contended</text>
  </g>
  <g transform="translate(912 474)">
    <rect width="296" height="146" rx="8" fill="#ffffff" stroke="#c084fc" stroke-width="1.4"/>
    <text x="148" y="30" text-anchor="middle" class="card-title">Lease spec</text>
    <text x="24" y="60" class="mono">holderIdentity = ownerToken</text>
    <text x="24" y="82" class="mono">renewTime + duration</text>
    <text x="24" y="104" class="mono">leaseTransitions++ on takeover</text>
    <text x="24" y="126" class="card-sub">expired when renewTime + leaseDuration &lt;= now</text>
  </g>
  <g transform="translate(912 650)">
    <rect width="296" height="62" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.4"/>
    <text x="24" y="24" class="mono">annotations: audit-leader-id, node-id</text>
    <text x="24" y="44" class="mono">managed-by = bluetape4k-leader</text>
  </g>

  <path d="M 294 246 L 408 246" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>
  <text x="350" y="232" text-anchor="middle" class="tiny" fill="#1d4ed8">run</text>
  <path d="M 794 620 L 850 620 L 850 244 L 912 244" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>
  <text x="838" y="428" text-anchor="middle" class="tiny" fill="#1d4ed8">Lease API</text>
  <path d="M 1058 292 L 1058 328" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#orangeArrow)"/>
  <path d="M 1058 438 L 1058 474" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
  <path d="M 588 257 L 634 257" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#purpleArrow)"/>
  <text x="690" y="262" class="tiny" fill="#6d28d9">single Lease name</text>
  <path d="M 588 437 L 634 437" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#purpleArrow)"/>
  <text x="690" y="442" class="tiny" fill="#6d28d9">slot Lease name</text>

  <g transform="translate(80 802)">
    <line x1="0" y1="10" x2="34" y2="10" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>
    <text x="44" y="15" class="tiny">client call</text>
    <line x1="154" y1="10" x2="188" y2="10" stroke="#ea580c" stroke-width="2" marker-end="url(#orangeArrow)"/>
    <text x="198" y="15" class="tiny">API update</text>
    <line x1="324" y1="10" x2="358" y2="10" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
    <text x="368" y="15" class="tiny">Lease spec</text>
    <line x1="510" y1="10" x2="544" y2="10" stroke="#7c3aed" stroke-width="2" marker-end="url(#purpleArrow)"/>
    <text x="554" y="15" class="tiny">Lease name rule</text>
  </g>

  <text x="52" y="832" class="footer">github.com/bluetape4k/bluetape4k-leader / leader-k8s - Kubernetes Lease ownership via holderIdentity and resourceVersion updates.</text>
</svg>
