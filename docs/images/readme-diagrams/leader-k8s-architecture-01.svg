<svg xmlns="http://www.w3.org/2000/svg" width="1712" height="1037" viewBox="0 0 1712 1037" role="img" aria-labelledby="title desc" data-intent="Answer a Kubernetes backend reader's question: how do blocking, coroutine, and async leader electors use a caller-owned Fabric8 KubernetesClient to create or update native Lease objects, acquire single locks or group slot leases, detect contention through holderIdentity expiry and 409 conflicts, extend renewTime while work runs, and release ownership without deleting production Lease objects?" data-evidence="leader-k8s README architecture/RBAC/configuration sections; KubernetesLeaseLeaderElector; KubernetesLeaseLeaderGroupElector; KubernetesLeaseSuspendLeaderElector; KubernetesLeaseSuspendLeaderGroupElector; KubernetesLeaseLock; KubernetesLeaseNames; KubernetesLeaseAnnotations; KubernetesLeaseStateMapper" data-source-read="leader-k8s/README.md; leader-k8s/src/main/kotlin/io/bluetape4k/leader/k8s/KubernetesLeaseLeaderElector.kt; leader-k8s/src/main/kotlin/io/bluetape4k/leader/k8s/KubernetesLeaseLeaderGroupElector.kt; leader-k8s/src/main/kotlin/io/bluetape4k/leader/k8s/KubernetesLeaseSuspendLeaderElector.kt; leader-k8s/src/main/kotlin/io/bluetape4k/leader/k8s/KubernetesLeaseSuspendLeaderGroupElector.kt; leader-k8s/src/main/kotlin/io/bluetape4k/leader/k8s/internal/KubernetesLeaseLock.kt; leader-k8s/src/main/kotlin/io/bluetape4k/leader/k8s/internal/KubernetesLeaseNames.kt; leader-k8s/src/main/kotlin/io/bluetape4k/leader/k8s/internal/KubernetesLeaseAnnotations.kt; leader-k8s/src/main/kotlin/io/bluetape4k/leader/k8s/KubernetesLeaseStateMapper.kt">
  <title id="title">Kubernetes Lease Ownership Architecture</title>
  <desc id="desc">Architecture diagram for the Kubernetes Lease backend showing caller-owned Fabric8 client lifecycle, namespace/RBAC boundary, single and group Lease electors, owner-conditional Lease updates, resourceVersion contention, holderIdentity fencing, audit annotations, and min-lease release behavior.</desc>
