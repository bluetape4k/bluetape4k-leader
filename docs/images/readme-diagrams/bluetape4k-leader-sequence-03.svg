<svg xmlns="http://www.w3.org/2000/svg" width="1910" height="1496" viewBox="0 0 1910 1496" role="img" aria-labelledby="title desc" data-intent="Answer a reader's group-election question: how does bounded leader group election differ from a single lock, how are slots tried, when is the group full, and what gets released after leader work completes?" data-evidence="README feature sections, settings module registration, SuspendLeaderElector contract, SuspendLeaderGroupElector contract" data-source-read="README.md; settings.gradle.kts; leader-core/src/main/kotlin/io/bluetape4k/leader/coroutines/SuspendLeaderElector.kt; leader-core/src/main/kotlin/io/bluetape4k/leader/coroutines/SuspendLeaderGroupElector.kt">
  <title id="title">Leader Group Slot Sequence</title>
  <desc id="desc">Sequence for group election showing slot namespace, token attempt, full-group skip branch, leader body execution, and slot release.</desc>
  <defs>
