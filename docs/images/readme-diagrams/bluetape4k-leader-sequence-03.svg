<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Multi-leader Group Slot Sequence</title>
  <desc id="desc">Source model from README.md multi-leader group section and LeaderGroupElector/SuspendLeaderGroupElector contracts.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2f7fa7" stroke="#2f7fa7" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#5b8f43" stroke="#5b8f43" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#a87332" stroke="#a87332" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-red" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#b86868" stroke="#b86868" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#8b5fb3" stroke="#8b5fb3" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>

    <style>
      text { letter-spacing: 0; }
      .canvas { fill: #fbfcf8; }
      .frame { fill: #fbfcf8; stroke: #41545d; stroke-width: 3; filter: none; }
      .title { font-family: "Architects Daughter"; font-size: 42px; font-weight: 400; fill: #263238; }
      .subtitle, .msg, .note, .footer, .small, .role, .participant-sub { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 18px; }
      .participant-title { font-family: "Architects Daughter"; font-size: 21px; font-weight: 400; fill: #1f3138; }
      .participant-sub { font-size: 13px; fill: #546a73; }
      .msg { font-family: "Comic Mono"; font-size: 14px; font-weight: 400; }
      .note { font-size: 13px; }
      .footer { font-size: 14px; fill: #60727d; }
      .header { fill: #ffffff; stroke: #546e7a; stroke-width: 2; }
      .life { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; stroke-linecap: round; }
      .activation { fill: #f3ecdf; stroke: #8f784e; stroke-width: 1.5; }
      .callBlue, .callGreen, .callAmber, .callRed, .callPurple { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .callBlue { stroke: #2f7fa7; marker-end: url(#arrow-blue); }
      .callGreen { stroke: #5b8f43; marker-end: url(#arrow-green); }
      .callAmber { stroke: #a87332; marker-end: url(#arrow-amber); }
      .callRed { stroke: #b86868; marker-end: url(#arrow-red); }
      .callPurple { stroke: #8b5fb3; marker-end: url(#arrow-purple); }
      .retBlue, .retGreen, .retAmber, .retRed, .retPurple { fill: none; stroke-width: 2.5; stroke-dasharray: 8 6; stroke-linecap: round; stroke-linejoin: round; }
      .retBlue { stroke: #2f7fa7; marker-end: url(#arrow-blue); }
      .retGreen { stroke: #5b8f43; marker-end: url(#arrow-green); }
      .retAmber { stroke: #a87332; marker-end: url(#arrow-amber); }
      .retRed { stroke: #b86868; marker-end: url(#arrow-red); }
      .retPurple { stroke: #8b5fb3; marker-end: url(#arrow-purple); }
      .branch { fill: none; stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 7; stroke-linecap: round; stroke-linejoin: round; }
      .branchDivider { stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 8; stroke-linecap: round; }
      .label { fill: #ffffff; stroke-width: 1.5; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; fill: #36464f; }
    </style>
  </defs>
  <rect class="canvas" width="1600" height="1120"/>
  <rect class="frame" x="24" y="24" width="1552" height="1072" rx="20"/>
  <text class="title" x="800" y="78" text-anchor="middle">Multi-leader Group Slot Sequence</text>
  <text class="subtitle" x="800" y="112" text-anchor="middle">Group election allows up to maxLeaders concurrent actions; callers skip only when no slot can be acquired.</text>

  <g>
    <rect class="header" x="95" y="160" width="170" height="70" rx="10"/>
    <text class="participant-title" x="180.0" y="191" text-anchor="middle">Node A</text>
    <text class="participant-sub" x="180.0" y="215" text-anchor="middle">caller</text>
  </g>
  <g>
    <rect class="header" x="345" y="160" width="170" height="70" rx="10"/>
    <text class="participant-title" x="430.0" y="191" text-anchor="middle">Node B</text>
    <text class="participant-sub" x="430.0" y="215" text-anchor="middle">peer caller</text>
  </g>
  <g>
    <rect class="header" x="620" y="160" width="280" height="70" rx="10"/>
    <text class="participant-title" x="760.0" y="191" text-anchor="middle">GroupElector</text>
    <text class="participant-sub" x="760.0" y="215" text-anchor="middle">maxLeaders</text>
  </g>
  <g>
    <rect class="header" x="955" y="160" width="250" height="70" rx="10"/>
    <text class="participant-title" x="1080.0" y="191" text-anchor="middle">Slot Namespace</text>
    <text class="participant-sub" x="1080.0" y="215" text-anchor="middle">bounded slots</text>
  </g>
  <g>
    <rect class="header" x="1305" y="160" width="170" height="70" rx="10"/>
    <text class="participant-title" x="1390.0" y="191" text-anchor="middle">Action</text>
    <text class="participant-sub" x="1390.0" y="215" text-anchor="middle">critical work</text>
  </g>
  <line class="life" x1="180" y1="230" x2="180" y2="960"/>
  <line class="life" x1="430" y1="230" x2="430" y2="960"/>
  <line class="life" x1="760" y1="230" x2="760" y2="960"/>
  <line class="life" x1="1080" y1="230" x2="1080" y2="960"/>
  <line class="life" x1="1390" y1="230" x2="1390" y2="960"/>
  <rect class="activation" x="752" y="302" width="16" height="586" rx="7"/>
  <rect class="activation" x="1072" y="370" width="16" height="360" rx="7"/>
  <rect class="activation" x="1382" y="534" width="16" height="100" rx="7"/>
  <g>
    <rect class="label" x="200.0" y="260.0" width="300" height="34" rx="17" stroke="#2f7fa7" fill="#ffffff"/>
    <circle cx="362.0" cy="277.0" r="13" fill="#fbfcf8" stroke="#2f7fa7" stroke-width="1.8"/>
    <text class="badgeText" x="362.0" y="281.0" text-anchor="middle">1</text>
    <text class="msg" x="380.0" y="282.0" text-anchor="start" fill="#2f7fa7">runIfLeader(group)</text>
  </g>
  <path class="callBlue" d="M 180 312 L 760 312"/>
  <g>
    <rect class="label" x="793.0" y="330.0" width="220" height="34" rx="17" stroke="#5b8f43" fill="#ffffff"/>
    <circle cx="915.0" cy="347.0" r="13" fill="#fbfcf8" stroke="#5b8f43" stroke-width="1.8"/>
    <text class="badgeText" x="915.0" y="351.0" text-anchor="middle">2</text>
    <text class="msg" x="933.0" y="352.0" text-anchor="start" fill="#5b8f43">try next slot</text>
  </g>
  <path class="callGreen" d="M 760 382 L 1080 382"/>
  <g>
    <rect class="label" x="796.0" y="402.0" width="220" height="34" rx="17" stroke="#5b8f43" fill="#ffffff"/>
    <circle cx="918.0" cy="419.0" r="13" fill="#fbfcf8" stroke="#5b8f43" stroke-width="1.8"/>
    <text class="badgeText" x="918.0" y="423.0" text-anchor="middle">3</text>
    <text class="msg" x="936.0" y="424.0" text-anchor="start" fill="#5b8f43">slot granted</text>
  </g>
  <path class="retGreen" d="M 1080 454 L 760 454"/>
  <rect class="branch" x="70" y="472" width="1460" height="378" rx="20"/>
  <g>
    <rect class="label" x="105.0" y="488.0" width="260" height="34" rx="17" stroke="#5b8f43" fill="#ffffff"/>
    <circle cx="157.0" cy="505.0" r="13" fill="#fbfcf8" stroke="#5b8f43" stroke-width="1.8"/>
    <text class="badgeText" x="157.0" y="509.0" text-anchor="middle">alt</text>
    <text class="msg" x="187.0" y="510.0" text-anchor="start" fill="#5b8f43">alt capacity available</text>
  </g>
  <g>
    <rect class="label" x="927.5" y="520.0" width="225" height="34" rx="17" stroke="#5b8f43" fill="#ffffff"/>
    <circle cx="1052.0" cy="537.0" r="13" fill="#fbfcf8" stroke="#5b8f43" stroke-width="1.8"/>
    <text class="badgeText" x="1052.0" y="541.0" text-anchor="middle">4</text>
    <text class="msg" x="1070.0" y="542.0" text-anchor="start" fill="#5b8f43">execute action</text>
  </g>
  <path class="callGreen" d="M 760 572 L 1390 572"/>
  <g>
    <rect class="label" x="940.0" y="596.0" width="220" height="34" rx="17" stroke="#a87332" fill="#ffffff"/>
    <circle cx="1062.0" cy="613.0" r="13" fill="#fbfcf8" stroke="#a87332" stroke-width="1.8"/>
    <text class="badgeText" x="1062.0" y="617.0" text-anchor="middle">5</text>
    <text class="msg" x="1080.0" y="618.0" text-anchor="start" fill="#a87332">group result</text>
  </g>
  <path class="retAmber" d="M 1390 648 L 760 648"/>
  <g>
    <rect class="label" x="794.5" y="670.0" width="235" height="34" rx="17" stroke="#a87332" fill="#ffffff"/>
    <circle cx="924.0" cy="687.0" r="13" fill="#fbfcf8" stroke="#a87332" stroke-width="1.8"/>
    <text class="badgeText" x="924.0" y="691.0" text-anchor="middle">6</text>
    <text class="msg" x="942.0" y="692.0" text-anchor="start" fill="#a87332">release one slot</text>
  </g>
  <path class="callAmber" d="M 760 722 L 1080 722"/>
  <g>
    <rect class="label" x="246.0" y="742.0" width="220" height="34" rx="17" stroke="#2f7fa7" fill="#ffffff"/>
    <circle cx="368.0" cy="759.0" r="13" fill="#fbfcf8" stroke="#2f7fa7" stroke-width="1.8"/>
    <text class="badgeText" x="368.0" y="763.0" text-anchor="middle">7</text>
    <text class="msg" x="386.0" y="764.0" text-anchor="start" fill="#2f7fa7">return value</text>
  </g>
  <path class="retBlue" d="M 760 794 L 180 794"/>
  <line class="branchDivider" x1="70" y1="870" x2="1530" y2="870"/>
  <g>
    <rect class="label" x="105.0" y="884.0" width="226" height="34" rx="17" stroke="#b86868" fill="#ffffff"/>
    <circle cx="157.0" cy="901.0" r="13" fill="#fbfcf8" stroke="#b86868" stroke-width="1.8"/>
    <text class="badgeText" x="157.0" y="905.0" text-anchor="middle">else</text>
    <text class="msg" x="187.0" y="906.0" text-anchor="start" fill="#b86868">else slot full</text>
  </g>
  <g>
    <rect class="label" x="480.0" y="880.0" width="190" height="34" rx="17" stroke="#2f7fa7" fill="#ffffff"/>
    <circle cx="587.0" cy="897.0" r="13" fill="#fbfcf8" stroke="#2f7fa7" stroke-width="1.8"/>
    <text class="badgeText" x="587.0" y="901.0" text-anchor="middle">8</text>
    <text class="msg" x="605.0" y="902.0" text-anchor="start" fill="#2f7fa7">peer call</text>
  </g>
  <path class="callBlue" d="M 430 932 L 760 932"/>
  <g>
    <rect class="label" x="790.0" y="916.0" width="250" height="34" rx="17" stroke="#b86868" fill="#ffffff"/>
    <circle cx="927.0" cy="933.0" r="13" fill="#fbfcf8" stroke="#b86868" stroke-width="1.8"/>
    <text class="badgeText" x="927.0" y="937.0" text-anchor="middle">9</text>
    <text class="msg" x="945.0" y="938.0" text-anchor="start" fill="#b86868">no slot acquired</text>
  </g>
  <path class="retRed" d="M 1080 968 L 760 968"/>
  <g>
    <rect class="label" x="445.0" y="982.0" width="220" height="34" rx="17" stroke="#b86868" fill="#ffffff"/>
    <circle cx="567.0" cy="999.0" r="13" fill="#fbfcf8" stroke="#b86868" stroke-width="1.8"/>
    <text class="badgeText" x="567.0" y="1003.0" text-anchor="middle">10</text>
    <text class="msg" x="585.0" y="1004.0" text-anchor="start" fill="#b86868">null / Skipped</text>
  </g>
  <path class="retRed" d="M 760 1034 L 430 1034"/>
  <rect x="100" y="1024" width="1400" height="42" rx="12" fill="#ffffff" stroke="#cfdde3" stroke-width="1.8"/>
  <text class="note" x="118" y="1050" text-anchor="start">activeCount increases during action, availableSlots decreases, and release runs even when action fails.</text>
  <text class="footer" x="800" y="1090" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader - bluetape4k-leader-sequence-03</text>
</svg>
