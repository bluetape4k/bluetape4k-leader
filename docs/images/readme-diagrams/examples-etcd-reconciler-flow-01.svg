<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1040" viewBox="0 0 1680 1040" role="img" aria-labelledby="title desc">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#263238" flood-opacity="0.14"/>
    </filter>
    <style>
      .canvas { fill: #fbfcf8; }
      .frame { fill: #ffffff; stroke: #41545d; stroke-width: 2.2; }
      .title { font-family: "Architects Daughter"; font-size: 42px; fill: #263238; }
      .subtitle, .small, .labelText, .detail, .footer, .msg, .note { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 17px; }
      .footer { font-size: 13px; fill: #60727d; }
      .band { fill: #f5f9fb; stroke: #c8d7df; stroke-width: 1.6; }
      .bandAlt { fill: #fbfdf8; stroke: #d7e0d0; stroke-width: 1.6; }
      .bandTitle { font-family: "Architects Daughter"; font-size: 22px; fill: #263238; }
      .bandHint { font-family: "Comic Mono"; font-size: 12px; fill: #60727d; }
      .card { filter: url(#softShadow); stroke-width: 2; rx: 8; }
      .cardTitle { font-family: "Architects Daughter"; font-size: 24px; fill: #1f3138; }
      .detail { font-size: 13.5px; fill: #546a73; }
      .edge { fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .edgeThin { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 10 8; }
      .pill { fill: #ffffff; stroke-width: 1.5; }
      .labelText { font-size: 12.5px; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; }
      .header { fill: #ffffff; stroke: #546e7a; stroke-width: 2.2; }
      .participant { font-family: "Architects Daughter"; font-size: 20px; fill: #1f3138; }
      .role { font-family: "Comic Mono"; font-size: 13px; fill: #546a73; }
      .lifeline { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      .activation { fill: #e6f2ec; stroke: #5b7e67; stroke-width: 1.7; }
      .branch { fill: none; stroke: #78909c; stroke-width: 2.4; stroke-dasharray: 12 8; }
    </style>
    <marker id="arrow-line" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#3f7d9c" stroke="#3f7d9c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-work" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#6e8f4f" stroke="#6e8f4f" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-return" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#9b7d54" stroke="#9b7d54" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-skip" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#b86868" stroke="#b86868" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c97831" stroke="#c97831" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c5aa6" stroke="#7c5aa6" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#78909c" stroke="#78909c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
  </defs>
  <title id="title">etcd Reconciler Flow</title>
  <desc id="desc">Flow diagram for etcd Reconciler.</desc>
  <rect width="1680" height="1040" class="canvas"/>
  <rect x="28" y="26" width="1624" height="988" rx="8" class="frame"/>
  <text x="80" y="82" class="title">etcd Reconciler Flow</text>
  <text x="82" y="114" class="subtitle">etcd follows trigger, prepare, election, protected work, and observable outcome bands.</text>

  <rect x="84" y="150" width="430" height="850" rx="8" class="band"/>
  <text x="112" y="184" class="bandTitle">Failure / Retry Lane</text>
  <text x="112" y="207" class="bandHint">errors and later attempts stay off the main lane</text>
  <rect x="552" y="150" width="576" height="850" rx="8" class="bandAlt"/>
  <text x="580" y="132" class="bandTitle">Main Scenario Lane</text>
  <text x="580" y="154" class="bandHint">vertical main path</text>
  <rect x="1166" y="150" width="430" height="850" rx="8" class="band"/>
  <text x="1194" y="184" class="bandTitle">Skipped / Next Lane</text>
  <text x="1194" y="207" class="bandHint">peer and loopback paths stay outside cards</text>
  <g>
    <rect x="630" y="164" width="420" height="76" rx="8" class="card" fill="#eef7fb" stroke="#3f7d9c"/><image data-bluetape4k-icon="etcd" data-icon-source="testcontainers/infra/etcd.svg" x="640" y="172" width="18" height="18" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/>
    <text x="840" y="198" text-anchor="middle" class="cardTitle">1. etcd</text>
    <text x="840" y="222" text-anchor="middle" class="detail">reconcile loop</text>
  </g>
  <g>
    <rect x="630" y="299" width="420" height="76" rx="8" class="card" fill="#ffffff" stroke="#78909c"/><image data-bluetape4k-icon="etcd" data-icon-source="testcontainers/infra/etcd.svg" x="640" y="307" width="18" height="18" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/>
    <text x="840" y="333" text-anchor="middle" class="cardTitle">2. Prepare Context</text>
    <text x="840" y="357" text-anchor="middle" class="detail">lease key + wait budget</text>
  </g>
  <g>
    <rect x="630" y="434" width="420" height="76" rx="8" class="card" fill="#f8fbef" stroke="#6e8f4f"/>
    <text x="840" y="468" text-anchor="middle" class="cardTitle">3. Try Leadership</text>
    <text x="840" y="492" text-anchor="middle" class="detail">attempt ownership once</text>
  </g>
  <polygon points="840,535 982,570 840,605 698,570" fill="#fff8ed" stroke="#c97831" stroke-width="2.4" filter="url(#softShadow)"/>
  <text x="840" y="566" text-anchor="middle" class="cardTitle">4. Acquired?</text>
  <text x="840" y="588" text-anchor="middle" class="detail">branch on election result</text>
  <g>
    <rect x="200" y="531" width="330" height="78" rx="8" class="card" fill="#fff5f5" stroke="#b86868"/>
    <text x="365" y="565" text-anchor="middle" class="cardTitle">Failure</text>
    <text x="365" y="589" text-anchor="middle" class="detail">record thrown error</text>
  </g>
  <g>
    <rect x="1150" y="531" width="330" height="78" rx="8" class="card" fill="#fff8ed" stroke="#c97831"/>
    <text x="1315" y="565" text-anchor="middle" class="cardTitle">Skipped Peer</text>
    <text x="1315" y="589" text-anchor="middle" class="detail">return no-op result</text>
  </g>
  <g>
    <rect x="630" y="652" width="420" height="76" rx="8" class="card" fill="#eef7f0" stroke="#6e8f4f"/>
    <text x="840" y="686" text-anchor="middle" class="cardTitle">5. Run Protected Work</text>
    <text x="840" y="710" text-anchor="middle" class="detail">only elected worker proceeds</text>
  </g>
  <g>
    <rect x="630" y="792" width="420" height="76" rx="8" class="card" fill="#fff7e8" stroke="#9b7d54"/>
    <text x="840" y="826" text-anchor="middle" class="cardTitle">6. Record Outcome</text>
    <text x="840" y="850" text-anchor="middle" class="detail">success, skipped, or failed</text>
  </g>
  <g>
    <rect x="630" y="884" width="420" height="76" rx="8" class="card" fill="#eef7fb" stroke="#3f7d9c"/>
    <text x="840" y="918" text-anchor="middle" class="cardTitle">7. Return Result</text>
    <text x="840" y="942" text-anchor="middle" class="detail">release lease and report</text>
  </g>
  <g>
    <rect x="930" y="246" width="210" height="32" rx="16" class="pill" stroke="#3f7d9c"/>
    <circle cx="952" cy="262" r="12.5" fill="#fff" stroke="#3f7d9c" stroke-width="1.6"/>
    <text x="952" y="266" text-anchor="middle" class="badgeText" fill="#3f7d9c">1</text>
    <text x="973" y="267" class="labelText" fill="#3f7d9c">request context</text>
  </g>
  <path d="M 840 240 L 840 299" class="edge" stroke="#3f7d9c" marker-end="url(#arrow-line)"/>
  <g>
    <rect x="930" y="381" width="205" height="32" rx="16" class="pill" stroke="#6e8f4f"/>
    <circle cx="952" cy="397" r="12.5" fill="#fff" stroke="#6e8f4f" stroke-width="1.6"/>
    <text x="952" y="401" text-anchor="middle" class="badgeText" fill="#6e8f4f">2</text>
    <text x="973" y="402" class="labelText" fill="#6e8f4f">lock attempt</text>
  </g>
  <path d="M 840 375 L 840 434" class="edge" stroke="#6e8f4f" marker-end="url(#arrow-work)"/>
  <path d="M 840 510 L 840 535" class="edge" stroke="#c97831" marker-end="url(#arrow-amber)"/>
  <g>
    <rect x="542" y="492" width="185" height="32" rx="16" class="pill" stroke="#b86868"/>
    <circle cx="564" cy="508" r="12.5" fill="#fff" stroke="#b86868" stroke-width="1.6"/>
    <text x="564" y="512" text-anchor="middle" class="badgeText" fill="#b86868">3</text>
    <text x="585" y="513" class="labelText" fill="#b86868">exception</text>
  </g>
  <path d="M 698 570 L 530 570" class="edge" stroke="#b86868" marker-end="url(#arrow-skip)"/>
  <g>
    <rect x="986" y="492" width="178" height="32" rx="16" class="pill" stroke="#c97831"/>
    <circle cx="1008" cy="508" r="12.5" fill="#fff" stroke="#c97831" stroke-width="1.6"/>
    <text x="1008" y="512" text-anchor="middle" class="badgeText" fill="#c97831">4</text>
    <text x="1029" y="513" class="labelText" fill="#c97831">not leader</text>
  </g>
  <path d="M 982 570 L 1150 570" class="edge" stroke="#c97831" marker-end="url(#arrow-amber)"/>
  <g>
    <rect x="930" y="612" width="178" height="32" rx="16" class="pill" stroke="#6e8f4f"/>
    <circle cx="952" cy="628" r="12.5" fill="#fff" stroke="#6e8f4f" stroke-width="1.6"/>
    <text x="952" y="632" text-anchor="middle" class="badgeText" fill="#6e8f4f">5</text>
    <text x="973" y="633" class="labelText" fill="#6e8f4f">leader only</text>
  </g>
  <path d="M 840 605 L 840 652" class="edge" stroke="#6e8f4f" marker-end="url(#arrow-work)"/>
  <path d="M 840 728 L 840 792" class="edge" stroke="#9b7d54" marker-end="url(#arrow-return)"/>
  <path d="M 840 868 L 840 884" class="edge" stroke="#3f7d9c" marker-end="url(#arrow-line)"/>
  <g>
    <rect x="1235" y="952" width="186" height="32" rx="16" class="pill" stroke="#7c5aa6"/>
    <circle cx="1257" cy="968" r="12.5" fill="#fff" stroke="#7c5aa6" stroke-width="1.6"/>
    <text x="1257" y="972" text-anchor="middle" class="badgeText" fill="#7c5aa6">6</text>
    <text x="1278" y="973" class="labelText" fill="#7c5aa6">next cycle</text>
  </g>
  <path d="M 840 960 L 840 986 Q 840 1000 854 1000 L 1530 1000 Q 1544 1000 1544 986 L 1544 140 Q 1544 126 1530 126 L 880 126 Q 840 126 840 140 L 840 164" class="edge dash" stroke="#7c5aa6"/>
  <polygon points="840,164 832,148 848,148" fill="#7c5aa6" stroke="#7c5aa6" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/>

</svg>
