<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" role="img" aria-labelledby="title desc">
  <title id="title">lettuce slot-token acquire release sequence</title>
  <desc id="desc">Sequence for LettuceSlotTokenGroup normal acquire and release, plus crash recovery by evicting expired ZSET members on the next acquire.</desc>
  <defs>
    <style>
      .title { font-family: "Architects Daughter"; font-size: 40px; fill: #263238; }
      .subtitle, .msg, .note, .footer { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 18px; }
      .participant { font-family: "Architects Daughter"; font-size: 19px; fill: #1f3138; }
      .role { font-family: "Comic Mono"; font-size: 13px; fill: #546a73; }
      .msg { font-size: 14px; }
      .note { font-size: 13px; }
      .footer { font-size: 14px; fill: #60727d; }
      .frame { fill: #fbfcf8; stroke: #41545d; stroke-width: 3; }
      .header { fill: #ffffff; stroke: #546e7a; stroke-width: 2; }
      .lifeline { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      .activation { fill: #f3ecdf; stroke: #8f784e; stroke-width: 1.5; }
      .call { fill: none; stroke: #3f7d9c; stroke-width: 3; marker-end: url(#arrowCall); }
      .slot { fill: none; stroke: #a2743d; stroke-width: 3; marker-end: url(#arrowSlot); }
      .state { fill: none; stroke: #6e8f4f; stroke-width: 3; marker-end: url(#arrowState); }
      .return { fill: none; stroke: #9b7d54; stroke-width: 2.5; stroke-dasharray: 8 6; marker-end: url(#arrowReturn); }
      .skip { fill: none; stroke: #b86868; stroke-width: 3; marker-end: url(#arrowSkip); }
      .alt { fill: none; stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 7; }
      .branchDivider { stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 8; }
      .label { fill: #ffffff; stroke: #d7e0e4; stroke-width: 1.5; }
      .label.callLabel { stroke: #9cc2d1; }
      .label.slotLabel { stroke: #d0b078; }
      .label.stateLabel { stroke: #b6c9a4; }
      .label.returnLabel { stroke: #c8b38f; }
      .label.skipLabel { stroke: #d9abab; }
      .branchOk { fill: #f8f1e6; stroke: #a2743d; stroke-width: 1.8; }
      .branchSkip { fill: #fff5f5; stroke: #b86868; stroke-width: 3; }
      .badge { stroke-width: 1.8; }
      .badge.callBadge { fill: #eaf4f8; stroke: #3f7d9c; }
      .badge.slotBadge { fill: #fff4df; stroke: #a2743d; }
      .badge.stateBadge { fill: #eef7f0; stroke: #6e8f4f; }
      .badge.returnBadge { fill: #fff7e8; stroke: #9b7d54; }
      .badge.skipBadge { fill: #fff0f0; stroke: #b86868; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; }
      .msg.callText, .badgeText.callText { fill: #2f6f8e; }
      .msg.slotText, .badgeText.slotText { fill: #855a29; }
      .msg.stateText, .badgeText.stateText { fill: #55783f; }
      .msg.returnText, .badgeText.returnText { fill: #7f6038; }
      .msg.skipText, .badgeText.skipText { fill: #9d4f4f; }

      /* bluetape4k best-practices sequence style override: matches redis-lettuce sequence family. */
      text { letter-spacing: 0; }
      text.title { font-family: "Architects Daughter"; font-size: 40px; font-weight: 400; fill: #263238; }
      text.subtitle, text.msg, text.note, text.footer, text.small, text.detail, text.mono, text.tiny, text.role, text.participant-sub { font-family: "Comic Mono"; fill: #36464f; }
      text.subtitle { font-size: 18px; }
      text.participant, text.participant-title, text.cardTitle { font-family: "Architects Daughter"; font-size: 19px; font-weight: 400; fill: #1f3138; }
      text.role, text.participant-sub, text.detail, text.small, text.tiny { font-size: 13px; fill: #546a73; }
      text.msg, text.labelText, text.label, text.mono { font-family: "Comic Mono"; font-size: 14px; font-weight: 400; }
      text.note { font-size: 13px; }
      text.footer { font-size: 14px; fill: #60727d; }
      .canvas { fill: #fbfcf8; }
      .frame { fill: #fbfcf8; stroke: #41545d; stroke-width: 3; filter: none; }
      rect.header { fill: #ffffff; stroke: #546e7a; stroke-width: 2; }
      .lifeline, .life { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      rect.activation { fill: #f3ecdf; stroke: #8f784e; stroke-width: 1.5; }
      .call, .slot, .state, .skip, .wait, .edge, .edgeThin, .blue, .green, .orange, .purple, .amber, .callBlue, .callGreen, .callAmber, .callRed { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .return, .ret { fill: none; stroke-width: 2.5; stroke-dasharray: 8 6; stroke-linecap: round; stroke-linejoin: round; }
      .alt, .branch { fill: none; stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 7; }
      .branchDivider { stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 8; }
      rect.label, rect.pill, rect.altLabel, rect.badge { fill: #ffffff; stroke-width: 1.5; }
      text.badgeText, text.num { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; }
      .branchOk, .frame-success { fill: #f8f1e6; stroke: #a2743d; stroke-width: 1.8; }
      .branchSkip, .frame-skip { fill: #fff5f5; stroke: #b86868; stroke-width: 3; }
    </style>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowCall" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#3f7d9c" stroke="#3f7d9c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowSlot" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#a2743d" stroke="#a2743d" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowState" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#6e8f4f" stroke="#6e8f4f" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowReturn" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#9b7d54" stroke="#9b7d54" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowSkip" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#b86868" stroke="#b86868" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
  </defs>

  <rect x="24" y="24" width="1552" height="1132" rx="20" class="frame"/>
  <text x="800" y="78" text-anchor="middle" class="title">Lettuce Slot-Token Acquire / Release Flow</text>
  <text x="800" y="108" text-anchor="middle" class="subtitle">A group leader is one ZSET member; every acquire removes expired slots before deciding whether capacity is available.</text>

  <g>
    <rect x="60" y="150" width="140" height="68" rx="10" class="header"/>
    <text x="130" y="179" text-anchor="middle" class="participant">Caller A</text>
    <text x="130" y="201" text-anchor="middle" class="role">job worker</text>
    <rect x="260" y="150" width="190" height="68" rx="10" class="header"/>
    <text x="355" y="179" text-anchor="middle" class="participant">GroupElector</text>
    <text x="355" y="201" text-anchor="middle" class="role">runIfLeader</text>
    <rect x="510" y="150" width="205" height="68" rx="10" class="header"/>
    <text x="612" y="179" text-anchor="middle" class="participant">SlotTokenGroup</text>
    <text x="612" y="201" text-anchor="middle" class="role">cached per lockName</text>
    <rect x="782" y="150" width="170" height="68" rx="10" class="header"/><image data-bluetape4k-icon="redis" data-icon-source="redis/redis-icon.svg" x="792" y="158" width="18" height="18" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/>
    <text x="867" y="179" text-anchor="middle" class="participant">Redis Lua</text>
    <text x="867" y="201" text-anchor="middle" class="role">server TIME</text>
    <rect x="1032" y="150" width="190" height="68" rx="10" class="header"/>
    <text x="1127" y="179" text-anchor="middle" class="participant">ZSET / Meta</text>
    <text x="1127" y="201" text-anchor="middle" class="role">lg:{name}</text>
    <rect x="1288" y="150" width="130" height="68" rx="10" class="header"/>
    <text x="1353" y="179" text-anchor="middle" class="participant">Action</text>
    <text x="1353" y="201" text-anchor="middle" class="role">chunk work</text>
    <rect x="1460" y="150" width="110" height="68" rx="10" class="header"/>
    <text x="1515" y="179" text-anchor="middle" class="participant">Caller B</text>
    <text x="1515" y="201" text-anchor="middle" class="role">next acquire</text>
  </g>

  <line x1="130" y1="218" x2="130" y2="1046" class="lifeline"/>
  <line x1="355" y1="218" x2="355" y2="1046" class="lifeline"/>
  <line x1="612" y1="218" x2="612" y2="1046" class="lifeline"/>
  <line x1="867" y1="218" x2="867" y2="1046" class="lifeline"/>
  <line x1="1127" y1="218" x2="1127" y2="1046" class="lifeline"/>
  <line x1="1353" y1="218" x2="1353" y2="1046" class="lifeline"/>
  <line x1="1515" y1="218" x2="1515" y2="1046" class="lifeline"/>
  <rect x="605" y="340" width="14" height="606" rx="6" class="activation"/>
  <rect x="860" y="442" width="14" height="294" rx="6" class="activation"/>
  <rect x="1120" y="528" width="14" height="230" rx="6" class="activation"/>
  <rect x="1346" y="654" width="14" height="80" rx="6" class="activation"/>

  <rect x="70" y="260" width="418" height="34" rx="17" class="label callLabel"/>
  <circle cx="94" cy="277" r="13" class="badge callBadge"/><text x="94" y="282" text-anchor="middle" class="badgeText callText">1</text>
  <text x="118" y="282" class="msg callText">runIfLeader(lockName, maxLeaders=N)</text>
  <path d="M 130 318 L 355 318" class="call"/>

  <rect x="330" y="326" width="350" height="34" rx="17" class="label slotLabel"/>
  <circle cx="354" cy="343" r="13" class="badge slotBadge"/><text x="354" y="348" text-anchor="middle" class="badgeText slotText">2</text>
  <text x="378" y="348" class="msg slotText">get or create LettuceSlotTokenGroup</text>
  <path d="M 355 382 L 612 382" class="slot"/>

  <rect x="70" y="420" width="1478" height="582" rx="14" class="alt"/>
  <rect x="96" y="438" width="286" height="30" rx="15" class="branchOk"/>
  <text x="118" y="458" class="note">alt capacity available</text>
  <line x1="70" y1="792" x2="1548" y2="792" class="branchDivider"/>
  <rect x="96" y="810" width="318" height="30" rx="15" class="branchSkip"/>
  <text x="118" y="830" class="note">else holder crashed before release</text>

  <rect x="646" y="448" width="395" height="34" rx="17" class="label slotLabel"/>
  <circle cx="670" cy="465" r="13" class="badge slotBadge"/><text x="670" y="470" text-anchor="middle" class="badgeText slotText">3</text>
  <text x="694" y="470" class="msg slotText">ACQUIRE Lua: TIME + evict expired members</text>
  <path d="M 612 502 L 867 502" class="slot"/>

  <rect x="850" y="532" width="425" height="34" rx="17" class="label stateLabel"/>
  <circle cx="874" cy="549" r="13" class="badge stateBadge"/><text x="874" y="554" text-anchor="middle" class="badgeText stateText">4</text>
  <text x="898" y="554" class="msg stateText">ZADD token expiryAtMs; optional HSET meta</text>
  <path d="M 867 590 L 1127 590" class="state"/>

  <rect x="660" y="620" width="410" height="34" rx="17" class="label returnLabel"/>
  <circle cx="684" cy="637" r="13" class="badge returnBadge"/><text x="684" y="642" text-anchor="middle" class="badgeText returnText">5</text>
  <text x="708" y="642" class="msg returnText">token returns; empty string means no slot</text>
  <path d="M 867 678 L 612 678" class="return"/>

  <rect x="784" y="684" width="388" height="34" rx="17" class="label callLabel"/>
  <circle cx="808" cy="701" r="13" class="badge callBadge"/><text x="808" y="706" text-anchor="middle" class="badgeText callText">6</text>
  <text x="832" y="706" class="msg callText">push handle/delegate, then run action</text>
  <path d="M 612 724 L 1353 724" class="call"/>

  <rect x="176" y="742" width="440" height="34" rx="17" class="label slotLabel"/>
  <circle cx="200" cy="759" r="13" class="badge slotBadge"/><text x="200" y="764" text-anchor="middle" class="badgeText slotText">7</text>
  <text x="224" y="764" class="msg slotText">release(0) Lua: HDEL meta and ZREM token</text>
  <path d="M 612 780 L 867 780" class="slot"/>
  <path d="M 867 784 L 1127 784" class="state"/>

  <rect x="540" y="854" width="408" height="34" rx="17" class="label skipLabel"/>
  <circle cx="564" cy="871" r="13" class="badge skipBadge"/><text x="564" y="876" text-anchor="middle" class="badgeText skipText">8</text>
  <text x="588" y="876" class="msg skipText">no release call; ZSET score expires naturally</text>
  <path d="M 612 916 L 867 916" class="skip"/>

  <rect x="1002" y="890" width="455" height="34" rx="17" class="label stateLabel"/>
  <circle cx="1026" cy="907" r="13" class="badge stateBadge"/><text x="1026" y="912" text-anchor="middle" class="badgeText stateText">9</text>
  <text x="1050" y="912" class="msg stateText">next ACQUIRE reclaims expired token first</text>
  <path d="M 1515 948 L 867 948 L 867 954 L 1127 954" class="state"/>

  <rect x="98" y="1058" width="1404" height="44" rx="12" fill="#ffffff" stroke="#ccd7da" stroke-width="2"/>
  <text x="118" y="1086" class="note">Crash recovery is lazy and automatic: the next acquire runs ZREMRANGEBYSCORE 0 nowMs before checking ZCARD against maxLeaders.</text>
  <text x="800" y="1124" text-anchor="middle" class="footer">github.com/bluetape4k/bluetape4k-leader - leader-redis-lettuce README</text>
</svg>
