<path class="inheritLine" d="M789 792 L789 742 L1110 742 L1110 708"/>
<path class="inheritLine" d="M1199 792 L1199 742 L530 742 L530 708"/>
<g transform="translate(1088,806)">
  <rect class="card" x="0" y="0" width="360" height="130" rx="18" fill="#e9f7f6" stroke="#45a7a1"/>
  <text class="smallLabel" x="28" y="48">Reading rule</text>
  <text class="mono" x="30" y="84">Triangle points to parent/interface</text>
  <text class="mono" x="30" y="112">Dashed arrow points to used type</text>
