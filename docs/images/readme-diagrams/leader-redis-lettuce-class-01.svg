  <rect class="card" x="0" y="0" width="376" height="230" rx="4" fill="#eaf7ef" stroke="#58a978"/>
  <line class="compartment" x1="0" y1="78" x2="376" y2="78" stroke="#58a978"/>
  <line class="compartment" x1="0" y1="156" x2="376" y2="156" stroke="#58a978"/>
  <text class="small" x="188" y="28" text-anchor="middle">«class»</text>
  <text class="label" x="188" y="62" text-anchor="middle">SuspendLeaderElector</text>
  <text class="mono" x="24" y="116">Item</text>
<text class="mono" x="24" y="144">&lt;&lt;interface&gt;&gt;</text>
<text class="mono" x="24" y="172">Item</text>
</g>
<g transform="translate(214,792)">
  <rect class="card" x="0" y="0" width="330" height="128" rx="4" fill="#fdecef" stroke="#dc6b82"/>
  <line class="compartment" x1="0" y1="78" x2="330" y2="78" stroke="#dc6b82"/>
  <line class="compartment" x1="0" y1="80" x2="330" y2="80" stroke="#dc6b82"/>
  <text class="small" x="165" y="28" text-anchor="middle">«class»</text>
  <text class="label" x="165" y="62" text-anchor="middle">SuspendLeaderGroupEle.</text>
  <text class="mono" x="24" y="116">Item</text>
<text class="mono" x="24" y="144">&lt;&lt;interface&gt;&gt;</text>
<text class="mono" x="24" y="172">Item</text>
</g>
<g transform="translate(624,792)">
  <rect class="card" x="0" y="0" width="330" height="128" rx="4" fill="#e9f7f6" stroke="#45a7a1"/>
  <line class="compartment" x1="0" y1="78" x2="330" y2="78" stroke="#45a7a1"/>
  <line class="compartment" x1="0" y1="80" x2="330" y2="80" stroke="#45a7a1"/>
  <text class="small" x="165" y="28" text-anchor="middle">«class»</text>
  <text class="label" x="165" y="62" text-anchor="middle">LettuceLock</text>
  <text class="mono" x="24" y="116">Item</text>
<text class="mono" x="24" y="144">+tryLock(key, value, ttl) Boolean</text>
<text class="mono" x="24" y="172">+unlock(key, value)</text>
<text class="mono" x="24" y="200">Item</text>
</g>
<g transform="translate(1034,792)">
  <rect class="card" x="0" y="0" width="330" height="128" rx="4" fill="#f1ecff" stroke="#8a72d6"/>
  <line class="compartment" x1="0" y1="78" x2="330" y2="78" stroke="#8a72d6"/>
  <line class="compartment" x1="0" y1="80" x2="330" y2="80" stroke="#8a72d6"/>
  <text class="small" x="165" y="28" text-anchor="middle">«class»</text>
  <text class="label" x="165" y="62" text-anchor="middle">LettuceSlotTokenGroup</text>
  <text class="mono" x="24" y="116">Item</text>
<text class="mono" x="24" y="144">+tryAcquire(waitTime, leaseTime).</text>
<text class="mono" x="24" y="172">+release(token, remainingMinLease.</text>
<text class="mono" x="24" y="200">+activeCount Int</text>
<text class="mono" x="24" y="228">Item</text>
</g>
<path class="implLine" d="M530 462 C590 410 690 386 800 380"/>
<text class="small" x="612" y="408">implements / extends</text>
<path class="dashed" d="M718 580 C780 580 860 580 922 580"/>
<rect x="756" y="548" width="118" height="30" rx="15" fill="#ffffff" opacity="0.94"/>
