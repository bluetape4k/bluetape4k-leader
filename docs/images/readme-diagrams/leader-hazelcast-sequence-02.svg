<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="980" viewBox="0 0 1320 980" role="img" aria-labelledby="title desc">
  <title id="title">leader-hazelcast single lock sequence</title>
  <desc id="desc">Sequence diagram for Hazelcast single leader election using IMap putIfAbsent with TTL, token guarded action execution, optional auto extension, and min lease aware release.</desc>
  <defs>
    <marker markerUnits="userSpaceOnUse" id="arrow-blue" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb" stroke="#2563eb" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-green" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#059669" stroke="#059669" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-orange" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#ea580c" stroke="#ea580c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-purple" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c3aed" stroke="#7c3aed" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <style>
      .canvas { fill: #f8fafc; }
      .title { font-family: "Architects Daughter", "Comic Mono", "Comic Mono"; font-size: 34px; fill: #0f172a; font-weight: 700; }
      .subtitle { font-family: "Comic Mono", "Architects Daughter"; font-size: 15px; fill: #475569; }
      .participant-title { font-family: "Comic Mono", "Architects Daughter"; font-size: 14px; fill: #0f172a; font-weight: 700; }
      .participant-sub { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .label { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; font-weight: 700; }
      .small { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .footer { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #64748b; }
      .participant { stroke-width: 1.8; rx: 14; }
      .caller { fill: #dbeafe; stroke: #2563eb; }
      .elector { fill: #dcfce7; stroke: #16a34a; }
      .lock { fill: #ede9fe; stroke: #7c3aed; }
      .map { fill: #ffedd5; stroke: #ea580c; }
      .action { fill: #fce7f3; stroke: #db2777; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.8; stroke-dasharray: 8 8; }
      .activation { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 4; }
      .blue { fill: none; stroke: #2563eb; stroke-width: 2.3; marker-end: url(#arrow-blue); }
      .green { fill: none; stroke: #059669; stroke-width: 2.3; marker-end: url(#arrow-green); }
      .orange { fill: none; stroke: #ea580c; stroke-width: 2.3; marker-end: url(#arrow-orange); }
      .purple { fill: none; stroke: #7c3aed; stroke-width: 2.3; marker-end: url(#arrow-purple); }
      .return { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow-blue); }
      .skip { fill: none; stroke: #ea580c; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow-orange); }
      .frame-success { fill: rgba(16, 185, 129, 0.045); stroke: #059669; stroke-width: 1.9; rx: 14; }
      .frame-skip { fill: rgba(234, 88, 12, 0.045); stroke: #ea580c; stroke-width: 3; rx: 14; }
      .note { fill: rgba(124, 58, 237, 0.045); stroke: #7c3aed; stroke-width: 1.6; stroke-dasharray: 9 7; rx: 14; }
      .badge { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 0.9; rx: 7; }
    </style>
  </defs>

  <rect class="canvas" width="1320" height="980"/>
  <text class="title" x="660" y="62" text-anchor="middle">Hazelcast IMap Single-Leader Sequence</text>
  <text class="subtitle" x="660" y="91" text-anchor="middle">Leadership is a token value stored with map-entry TTL; release only succeeds when the token still matches.</text>

  <rect class="participant caller" x="72" y="128" width="150" height="70"/>
  <text class="participant-title" x="147" y="156" text-anchor="middle">Caller</text>
  <text class="participant-sub" x="147" y="179" text-anchor="middle">job code</text>
  <line class="lifeline" x1="147" y1="198" x2="147" y2="886"/>

  <rect class="participant elector" x="304" y="128" width="176" height="70"/>
  <text class="participant-title" x="392" y="156" text-anchor="middle">Hazelcast Elector</text>
  <text class="participant-sub" x="392" y="179" text-anchor="middle">single API</text>
  <line class="lifeline" x1="392" y1="198" x2="392" y2="886"/>

  <rect class="participant lock" x="560" y="128" width="176" height="70"/>
  <text class="participant-title" x="648" y="156" text-anchor="middle">HazelcastLock</text>
  <text class="participant-sub" x="648" y="179" text-anchor="middle">Base58 token</text>
  <line class="lifeline" x1="648" y1="198" x2="648" y2="886"/>

  <rect class="participant map" x="820" y="128" width="190" height="70"/>
  <text class="participant-title" x="915" y="156" text-anchor="middle">Lock IMap</text>
  <text class="participant-sub" x="915" y="179" text-anchor="middle">bluetape4k:leader:locks</text>
  <line class="lifeline" x1="915" y1="198" x2="915" y2="886"/>

  <rect class="participant action" x="1094" y="128" width="150" height="70"/>
  <text class="participant-title" x="1169" y="156" text-anchor="middle">Leader Action</text>
  <text class="participant-sub" x="1169" y="179" text-anchor="middle">protected work</text>
  <line class="lifeline" x1="1169" y1="198" x2="1169" y2="886"/>

  <rect class="activation" x="384" y="226" width="16" height="558"/>
  <rect class="activation" x="640" y="284" width="16" height="488"/>
  <rect class="activation" x="907" y="344" width="16" height="350"/>
  <rect class="activation" x="1161" y="522" width="16" height="78"/>

  <path class="blue" d="M 147 242 L 392 242"/>
  <rect class="badge" x="216" y="217" width="118" height="22"/>
  <text class="label" x="275" y="233" fill="#1d4ed8" text-anchor="middle">1 runIfLeader</text>

  <path class="green" d="M 400 300 L 648 300"/>
  <rect class="badge" x="444" y="275" width="162" height="22"/>
  <text class="label" x="525" y="291" fill="#047857" text-anchor="middle">2 create token lock</text>

  <path class="orange" d="M 656 360 L 915 360"/>
  <rect class="badge" x="704" y="328" width="164" height="22"/>
  <text class="label" x="786" y="344" fill="#c2410c" text-anchor="middle">3 putIfAbsent</text>
  <rect class="badge" x="678" y="374" width="216" height="22"/>
  <text class="label" x="786" y="390" fill="#c2410c" text-anchor="middle">key, token, leaseTimeMs</text>

  <rect class="note" x="680" y="420" width="230" height="68"/>
  <text class="label" x="700" y="446" fill="#6d28d9">Token model</text>
  <text class="small" x="700" y="468">no thread affinity</text>

  <rect class="frame-success" x="86" y="506" width="1176" height="226"/>
  <text class="label" x="116" y="532" fill="#047857">alt acquired, previous == null</text>

  <path class="return" d="M 915 544 L 648 544"/>
  <rect class="badge" x="726" y="519" width="116" height="22"/>
  <text class="label" x="784" y="535" fill="#1d4ed8" text-anchor="middle">true</text>

  <path class="purple" d="M 392 584 L 1169 584"/>
  <rect class="badge" x="642" y="559" width="274" height="22"/>
  <text class="label" x="779" y="575" fill="#6d28d9" text-anchor="middle">4 push handle and run action</text>

  <path class="orange" d="M 648 636 L 772.83 636 Q 781.5 636 781.5 644.67 L 781.5 653.33 Q 781.5 662 790.17 662 L 915 662"/>
  <rect class="badge" x="696" y="620" width="176" height="22"/>
  <text class="label" x="784" y="636" fill="#c2410c" text-anchor="middle">optional autoExtend</text>

  <path class="green" d="M 648 704 L 915 704"/>
  <rect class="badge" x="676" y="680" width="216" height="22"/>
  <text class="label" x="784" y="696" fill="#047857" text-anchor="middle">5 remove or retain TTL</text>

  <rect class="frame-skip" x="86" y="770" width="1176" height="112"/>
  <text class="label" x="116" y="796" fill="#c2410c">else occupied, timeout, or cluster event</text>

  <path class="skip" d="M 915 820 L 648 820"/>
  <rect class="badge" x="704" y="795" width="164" height="22"/>
  <text class="label" x="786" y="811" fill="#c2410c" text-anchor="middle">existing token</text>

  <path class="skip" d="M 648 852 L 392 852"/>
  <rect class="badge" x="458" y="866" width="126" height="22"/>
  <text class="label" x="521" y="882" fill="#c2410c" text-anchor="middle">return null</text>

  <g transform="translate(92 918)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <text class="small" x="44" y="12">caller contract</text>
    <line x1="188" y1="8" x2="222" y2="8" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
    <text class="small" x="232" y="12">IMap TTL operation</text>
    <line x1="442" y1="8" x2="476" y2="8" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <text class="small" x="486" y="12">token guarded cleanup</text>
    <text class="footer" x="1128" y="12" text-anchor="end">github.com/bluetape4k/bluetape4k-leader</text>
  </g>
</svg>
