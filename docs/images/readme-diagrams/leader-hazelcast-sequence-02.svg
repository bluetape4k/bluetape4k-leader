<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="1590" viewBox="0 0 1040 1590" role="img" aria-label="Lock acquire/release sequence">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 10 5 L 1 9" fill="none" stroke="#758297" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="inherit" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 1 L 12 6 L 0 11 Z" fill="#ffffff" stroke="#758297" stroke-width="1.8"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .title{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:43px;font-weight:400;fill:#102033}
    .subtitle{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:25px;font-weight:400;fill:#102033}
    .smallLabel{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:21px;font-weight:400;fill:#102033}
    .mono{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#536273}
    .strong{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:13px;font-weight:400;fill:#102033}
    .card{stroke-width:2.1;filter:url(#shadow)}.compartment{stroke-width:1.5;fill:none}
    .line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#openArrow)}
    .plainLine{stroke:#758297;stroke-width:2.1;fill:none}
    .dashed{stroke:#758297;stroke-width:2.1;stroke-dasharray:7 6;fill:none;marker-end:url(#openArrow)}
    .inheritLine{stroke:#758297;stroke-width:2.2;fill:none;marker-end:url(#inherit)}
    .implLine{stroke:#758297;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#inherit)}
  </style>
</defs>
<rect class="canvas" width="1040" height="1590"/>
<rect class="frame" x="32" y="28" width="976" height="1534" rx="28"/>
<text class="title" x="66" y="82">Lock acquire/release sequence</text>
<text class="subtitle" x="70" y="118">Sequence messages from the original Mermaid source</text>
<rect class="card" x="35" y="166" width="210" height="72" rx="20" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="smallLabel" x="140" y="197" text-anchor="middle">Caller</text>
<line x1="140" y1="252" x2="140" y2="1530" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="415" y="166" width="210" height="72" rx="20" fill="#EAF7EF" stroke="#58A978"/>
<text class="smallLabel" x="520" y="197" text-anchor="middle">HazelcastLock</text>
<line x1="520" y1="252" x2="520" y2="1530" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="795" y="166" width="210" height="72" rx="20" fill="#FFF3D9" stroke="#D6A441"/>
<text class="smallLabel" x="900" y="197" text-anchor="middle">IMap</text>
<line x1="900" y1="252" x2="900" y2="1530" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect x="158" y="270" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="297" text-anchor="start">1. tryLock(waitTime, leaseTime)</text>
<path class="line" d="M140 310 L520 310"/>
<rect x="538" y="352" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="379" text-anchor="start">2. putIfAbsent(lockKey, token, leaseTimeMs)</text>
<path class="line" d="M520 392 L900 392"/>
<rect x="538" y="434" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="461" text-anchor="start">3. null</text>
<path class="dashed" d="M900 474 L520 474"/>
<rect x="158" y="516" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="543" text-anchor="start">4. true (acquired)</text>
<path class="dashed" d="M520 556 L140 556"/>
<rect x="538" y="598" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="625" text-anchor="start">5. existingToken</text>
<path class="dashed" d="M900 638 L520 638"/>
<rect x="538" y="680" width="190" height="62" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="707" text-anchor="start">6. sleep min(50ms,</text>
<text class="strong" x="554" y="730" text-anchor="start">remaining)</text>
<path class="line" d="M520 720 L520 720"/>
<rect x="158" y="762" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="789" text-anchor="start">7. false (timeout)</text>
<path class="dashed" d="M520 802 L140 802"/>
<rect x="158" y="844" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="871" text-anchor="start">8. isHeldByCurrentInstance()</text>
<path class="line" d="M140 884 L520 884"/>
<rect x="538" y="926" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="953" text-anchor="start">9. get(lockKey)</text>
<path class="line" d="M520 966 L900 966"/>
<rect x="538" y="1008" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="1035" text-anchor="start">10. storedToken</text>
<path class="dashed" d="M900 1048 L520 1048"/>
<rect x="158" y="1090" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="1117" text-anchor="start">11. storedToken == token</text>
<path class="dashed" d="M520 1130 L140 1130"/>
<rect x="158" y="1172" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="1199" text-anchor="start">12. unlock()</text>
<path class="line" d="M140 1212 L520 1212"/>
<rect x="538" y="1254" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="1281" text-anchor="start">13. remove(lockKey, token)</text>
<path class="line" d="M520 1294 L900 1294"/>
<rect x="538" y="1336" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="1363" text-anchor="start">14. true</text>
<path class="dashed" d="M900 1376 L520 1376"/>
<rect x="538" y="1418" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="1445" text-anchor="start">15. false</text>
<path class="dashed" d="M900 1458 L520 1458"/>
</svg>
