<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Hazelcast IMap Single-Leader Sequence</title>
  <desc id="desc">Hazelcast single leader election using IMap putIfAbsent with TTL, token guarded action execution, optional auto extension, and min lease aware release.</desc>
  <defs>
    <style>
      .title { font-family: "Architects Daughter"; font-size: 40px; fill: #263238; }
      .subtitle, .msg, .note, .footer { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 18px; }
      .participant { font-family: "Architects Daughter"; font-size: 19px; fill: #1f3138; }
      .role { font-family: "Comic Mono"; font-size: 13px; fill: #546a73; }
      .msg { font-size: 14px; }
      .note { font-size: 13px; }
      .footer { font-size: 14px; fill: #60727d; }
      .frame { fill: #fbfcf8; stroke: #41545d; stroke-width: 3; }
      .header { fill: #ffffff; stroke: #546e7a; stroke-width: 2; }
      .lifeline { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      .activation { fill: #f3ecdf; stroke: #8f784e; stroke-width: 1.5; }
      .call { fill: none; stroke: #3f7d9c; stroke-width: 3; marker-end: url(#arrowCall); stroke-linecap: round; stroke-linejoin: round; }
      .slot { fill: none; stroke: #a2743d; stroke-width: 3; marker-end: url(#arrowSlot); stroke-linecap: round; stroke-linejoin: round; }
      .state { fill: none; stroke: #6e8f4f; stroke-width: 3; marker-end: url(#arrowState); stroke-linecap: round; stroke-linejoin: round; }
      .return { fill: none; stroke: #9b7d54; stroke-width: 2.5; stroke-dasharray: 8 6; marker-end: url(#arrowReturn); stroke-linecap: round; stroke-linejoin: round; }
      .wait { fill: none; stroke: #8e6aa9; stroke-width: 3; marker-end: url(#arrowWait); stroke-linecap: round; stroke-linejoin: round; }
      .skip { fill: none; stroke: #b86868; stroke-width: 3; marker-end: url(#arrowSkip); stroke-linecap: round; stroke-linejoin: round; }
      .alt { fill: none; stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 7; }
      .branchDivider { stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 8; }
      .label { fill: #ffffff; stroke: #d7e0e4; stroke-width: 1.5; }
      .label.callLabel { stroke: #9cc2d1; }
      .label.slotLabel { stroke: #d0b078; }
      .label.stateLabel { stroke: #b6c9a4; }
      .label.returnLabel { stroke: #c8b38f; }
      .label.waitLabel { stroke: #c7abd8; }
      .label.skipLabel { stroke: #d9abab; }
      .branchOk { fill: #f8f1e6; stroke: #a2743d; stroke-width: 1.8; }
      .branchWait { fill: #f7f0fb; stroke: #8e6aa9; stroke-width: 1.8; }
      .branchSkip { fill: #fff5f5; stroke: #b86868; stroke-width: 3; }
      .badge { stroke-width: 1.8; }
      .badge.callBadge { fill: #eaf4f8; stroke: #3f7d9c; }
      .badge.slotBadge { fill: #fff4df; stroke: #a2743d; }
      .badge.stateBadge { fill: #eef7f0; stroke: #6e8f4f; }
      .badge.returnBadge { fill: #fff7e8; stroke: #9b7d54; }
      .badge.waitBadge { fill: #f7f0fb; stroke: #8e6aa9; }
      .badge.skipBadge { fill: #fff0f0; stroke: #b86868; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; }
      .msg.callText, .badgeText.callText { fill: #2f6f8e; }
      .msg.slotText, .badgeText.slotText { fill: #855a29; }
      .msg.stateText, .badgeText.stateText { fill: #55783f; }
      .msg.returnText, .badgeText.returnText { fill: #7f6038; }
      .msg.waitText, .badgeText.waitText { fill: #774f92; }
      .msg.skipText, .badgeText.skipText { fill: #9d4f4f; }
    </style>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowCall" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#3f7d9c" stroke="#3f7d9c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowSlot" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#a2743d" stroke="#a2743d" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowState" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#6e8f4f" stroke="#6e8f4f" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowReturn" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#9b7d54" stroke="#9b7d54" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowWait" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#8e6aa9" stroke="#8e6aa9" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowSkip" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#b86868" stroke="#b86868" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
  </defs>

  <rect x="24" y="24" width="1552" height="1052" rx="20" class="frame"/>
  <text x="800" y="78" text-anchor="middle" class="title">Hazelcast IMap Single-Leader Sequence</text>
  <text x="800" y="108" text-anchor="middle" class="subtitle">Leadership is a token value stored with map-entry TTL; release only succeeds when the token still matches.</text>

  <g>
    <rect x="55" y="150" width="150" height="68" rx="10" class="header"/>
    <text x="130" y="179" text-anchor="middle" class="participant">Caller</text>
    <text x="130" y="201" text-anchor="middle" class="role">job code</text>
    <rect x="285" y="150" width="210" height="68" rx="10" class="header"/>
    <text x="390" y="179" text-anchor="middle" class="participant">Hazelcast Elector</text>
    <text x="390" y="201" text-anchor="middle" class="role">single API</text>
    <rect x="550" y="150" width="200" height="68" rx="10" class="header"/>
    <text x="650" y="179" text-anchor="middle" class="participant">HazelcastLock</text>
    <text x="650" y="201" text-anchor="middle" class="role">Base58 token</text>
    <rect x="820" y="150" width="220" height="68" rx="10" class="header"/>
    <text x="930" y="179" text-anchor="middle" class="participant">Lock IMap</text>
    <text x="930" y="201" text-anchor="middle" class="role">bluetape4k:leader:locks</text>
    <rect x="1125" y="150" width="190" height="68" rx="10" class="header"/>
    <text x="1220" y="179" text-anchor="middle" class="participant">Leader Action</text>
    <text x="1220" y="201" text-anchor="middle" class="role">protected work</text>
  </g>

  <line x1="130" y1="218" x2="130" y2="966" class="lifeline"/>
  <line x1="390" y1="218" x2="390" y2="966" class="lifeline"/>
  <line x1="650" y1="218" x2="650" y2="966" class="lifeline"/>
  <line x1="930" y1="218" x2="930" y2="966" class="lifeline"/>
  <line x1="1220" y1="218" x2="1220" y2="966" class="lifeline"/>
  <rect x="123" y="290" width="14" height="70" rx="6" class="activation"/>
  <rect x="383" y="290" width="14" height="590" rx="6" class="activation"/>
  <rect x="643" y="348" width="14" height="532" rx="6" class="activation"/>
  <rect x="923" y="418" width="14" height="462" rx="6" class="activation"/>
  <rect x="1213" y="570" width="14" height="72" rx="6" class="activation"/>

  <rect x="70" y="486" width="1478" height="300" rx="14" class="alt"/>
  <line x1="70" y1="806" x2="1548" y2="806" class="branchDivider"/>
  <rect x="96" y="504" width="312" height="30" rx="15" class="branchOk"/>
  <text x="118" y="524" class="note">alt acquired, previous == null</text>
  <rect x="96" y="824" width="256" height="30" rx="15" class="branchSkip"/>
  <text x="118" y="844" class="note">else occupied / timeout</text>

  <rect x="140" y="242" width="240" height="34" rx="17" class="label callLabel"/>
  <circle cx="164" cy="259" r="13" class="badge callBadge"/><text x="164" y="264" text-anchor="middle" class="badgeText callText">1</text>
  <text x="188" y="264" class="msg callText">runIfLeader(lockName)</text>
  <path d="M 130 300 L 390 300" class="call"/>

  <rect x="416" y="310" width="208" height="34" rx="17" class="label slotLabel"/>
  <circle cx="440" cy="327" r="13" class="badge slotBadge"/><text x="440" y="332" text-anchor="middle" class="badgeText slotText">2</text>
  <text x="464" y="332" class="msg slotText">create token lock</text>
  <path d="M 390 368 L 650 368" class="slot"/>

  <rect x="610" y="380" width="360" height="34" rx="17" class="label stateLabel"/>
  <circle cx="634" cy="397" r="13" class="badge stateBadge"/><text x="634" y="402" text-anchor="middle" class="badgeText stateText">3</text>
  <text x="658" y="402" class="msg stateText">putIfAbsent(key, token, leaseTimeMs)</text>
  <path d="M 650 438 L 930 438" class="state"/>

  <rect x="638" y="458" width="304" height="34" rx="17" class="label returnLabel"/>
  <circle cx="662" cy="475" r="13" class="badge returnBadge"/><text x="662" y="480" text-anchor="middle" class="badgeText returnText">4</text>
  <text x="686" y="480" class="msg returnText">previous == null returns true</text>
  <path d="M 930 516 L 650 516" class="return"/>

  <rect x="637" y="532" width="336" height="34" rx="17" class="label callLabel"/>
  <circle cx="661" cy="549" r="13" class="badge callBadge"/><text x="661" y="554" text-anchor="middle" class="badgeText callText">5</text>
  <text x="685" y="554" class="msg callText">push handle, run protected action</text>
  <path d="M 390 590 L 1220 590" class="call"/>

  <rect x="622" y="614" width="336" height="34" rx="17" class="label stateLabel"/>
  <circle cx="646" cy="631" r="13" class="badge stateBadge"/><text x="646" y="636" text-anchor="middle" class="badgeText stateText">6</text>
  <text x="670" y="636" class="msg stateText">optional autoExtend refreshes TTL</text>
  <path d="M 650 672 L 930 672" class="state"/>

  <rect x="582" y="688" width="416" height="34" rx="17" class="label slotLabel"/>
  <circle cx="606" cy="705" r="13" class="badge slotBadge"/><text x="606" y="710" text-anchor="middle" class="badgeText slotText">7</text>
  <text x="630" y="710" class="msg slotText">release removes token or keeps minLeaseTime</text>
  <path d="M 650 746 L 930 746" class="slot"/>

  <rect x="614" y="800" width="352" height="34" rx="17" class="label skipLabel"/>
  <circle cx="638" cy="817" r="13" class="badge skipBadge"/><text x="638" y="822" text-anchor="middle" class="badgeText skipText">8</text>
  <text x="662" y="822" class="msg skipText">occupied, timeout, or cluster event</text>
  <path d="M 930 858 L 650 858" class="skip"/>

  <rect x="348" y="864" width="344" height="34" rx="17" class="label skipLabel"/>
  <circle cx="372" cy="881" r="13" class="badge skipBadge"/><text x="372" y="886" text-anchor="middle" class="badgeText skipText">9</text>
  <text x="396" y="886" class="msg skipText">return null without running action</text>
  <path d="M 650 922 L 390 922" class="skip"/>

  <rect x="98" y="986" width="1404" height="44" rx="12" fill="#ffffff" stroke="#ccd7da" stroke-width="2"/>
  <text x="118" y="1014" class="note">Hazelcast uses a stored token, not thread ownership, so cleanup is token-guarded and can survive virtual-thread execution.</text>
  <text x="800" y="1044" text-anchor="middle" class="footer">github.com/bluetape4k/bluetape4k-leader - leader-hazelcast-sequence-02</text>
</svg>
