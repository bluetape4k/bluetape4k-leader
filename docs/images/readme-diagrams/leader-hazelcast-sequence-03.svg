<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="980" viewBox="0 0 1320 980" role="img" aria-labelledby="title desc">
  <title id="title">leader-hazelcast group slot sequence</title>
  <desc id="desc">Sequence diagram for Hazelcast group leader election showing slot key probing, per-slot IMap putIfAbsent acquisition, maxLeaders bounded concurrency, and null on full groups.</desc>
  <defs>
    <marker markerUnits="userSpaceOnUse" id="arrow-blue" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb" stroke="#2563eb" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-green" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#059669" stroke="#059669" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-orange" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#ea580c" stroke="#ea580c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-purple" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c3aed" stroke="#7c3aed" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <style>
      .canvas { fill: #f8fafc; }
      .title { font-family: "Architects Daughter", "Comic Mono", "Comic Mono"; font-size: 34px; fill: #0f172a; font-weight: 700; }
      .subtitle { font-family: "Comic Mono", "Architects Daughter"; font-size: 15px; fill: #475569; }
      .participant-title { font-family: "Comic Mono", "Architects Daughter"; font-size: 14px; fill: #0f172a; font-weight: 700; }
      .participant-sub { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .label { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; font-weight: 700; }
      .small { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .footer { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #64748b; }
      .participant { stroke-width: 1.8; rx: 14; }
      .caller { fill: #dbeafe; stroke: #2563eb; }
      .elector { fill: #dcfce7; stroke: #16a34a; }
      .slot { fill: #ede9fe; stroke: #7c3aed; }
      .map { fill: #ffedd5; stroke: #ea580c; }
      .action { fill: #fce7f3; stroke: #db2777; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.8; stroke-dasharray: 8 8; }
      .activation { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 4; }
      .blue { fill: none; stroke: #2563eb; stroke-width: 2.3; marker-end: url(#arrow-blue); }
      .green { fill: none; stroke: #059669; stroke-width: 2.3; marker-end: url(#arrow-green); }
      .orange { fill: none; stroke: #ea580c; stroke-width: 2.3; marker-end: url(#arrow-orange); }
      .purple { fill: none; stroke: #7c3aed; stroke-width: 2.3; marker-end: url(#arrow-purple); }
      .return { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow-blue); }
      .skip { fill: none; stroke: #ea580c; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow-orange); }
      .frame-loop { fill: rgba(124, 58, 237, 0.04); stroke: #7c3aed; stroke-width: 1.8; stroke-dasharray: 9 7; rx: 14; }
      .frame-success { fill: rgba(16, 185, 129, 0.045); stroke: #059669; stroke-width: 1.9; rx: 14; }
      .frame-skip { fill: rgba(234, 88, 12, 0.045); stroke: #ea580c; stroke-width: 3; rx: 14; }
      .badge { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 0.9; rx: 7; }
    </style>
  </defs>

  <rect class="canvas" width="1320" height="980"/>
  <text class="title" x="660" y="62" text-anchor="middle">Hazelcast Group Slot Sequence</text>
  <text class="subtitle" x="660" y="91" text-anchor="middle">A group election is a bounded semaphore: callers probe N slot keys, and the first acquired slot runs work.</text>

  <rect class="participant caller" x="72" y="128" width="150" height="70"/>
  <text class="participant-title" x="147" y="156" text-anchor="middle">Caller</text>
  <text class="participant-sub" x="147" y="179" text-anchor="middle">worker node</text>
  <line class="lifeline" x1="147" y1="198" x2="147" y2="886"/>

  <rect class="participant elector" x="300" y="128" width="190" height="70"/>
  <text class="participant-title" x="395" y="156" text-anchor="middle">Group Elector</text>
  <text class="participant-sub" x="395" y="179" text-anchor="middle">maxLeaders=N</text>
  <line class="lifeline" x1="395" y1="198" x2="395" y2="886"/>

  <rect class="participant slot" x="566" y="128" width="184" height="70"/>
  <text class="participant-title" x="658" y="156" text-anchor="middle">Slot Lock</text>
  <text class="participant-sub" x="658" y="179" text-anchor="middle">lockName:slot:i</text>
  <line class="lifeline" x1="658" y1="198" x2="658" y2="886"/>

  <rect class="participant map" x="830" y="128" width="206" height="70"/>
  <text class="participant-title" x="933" y="156" text-anchor="middle">Group IMap</text>
  <text class="participant-sub" x="933" y="179" text-anchor="middle">leader:group:locks</text>
  <line class="lifeline" x1="933" y1="198" x2="933" y2="886"/>

  <rect class="participant action" x="1102" y="128" width="150" height="70"/>
  <text class="participant-title" x="1177" y="156" text-anchor="middle">Leader Action</text>
  <text class="participant-sub" x="1177" y="179" text-anchor="middle">partition work</text>
  <line class="lifeline" x1="1177" y1="198" x2="1177" y2="886"/>

  <rect class="activation" x="387" y="226" width="16" height="556"/>
  <rect class="activation" x="650" y="312" width="16" height="460"/>
  <rect class="activation" x="925" y="372" width="16" height="322"/>
  <rect class="activation" x="1169" y="562" width="16" height="76"/>

  <path class="blue" d="M 147 242 L 395 242"/>
  <rect class="badge" x="210" y="217" width="128" height="22"/>
  <text class="label" x="274" y="233" fill="#1d4ed8" text-anchor="middle">1 runIfLeader</text>

  <rect class="frame-loop" x="86" y="286" width="1180" height="250"/>
  <text class="label" x="116" y="314" fill="#6d28d9">loop slot 0..N-1 until one slot is acquired</text>

  <path class="purple" d="M 403 332 L 658 332"/>
  <rect class="badge" x="456" y="307" width="150" height="22"/>
  <text class="label" x="531" y="323" fill="#6d28d9" text-anchor="middle">2 build slot key</text>

  <path class="orange" d="M 666 392 L 933 392"/>
  <rect class="badge" x="718" y="360" width="164" height="22"/>
  <text class="label" x="800" y="376" fill="#c2410c" text-anchor="middle">3 putIfAbsent</text>
  <rect class="badge" x="692" y="406" width="216" height="22"/>
  <text class="label" x="800" y="422" fill="#c2410c" text-anchor="middle">slotKey, token, leaseMs</text>

  <path class="return" d="M 933 470 L 658 470"/>
  <rect class="badge" x="712" y="445" width="170" height="22"/>
  <text class="label" x="797" y="461" fill="#1d4ed8" text-anchor="middle">null means acquired</text>

  <rect class="frame-success" x="86" y="566" width="1180" height="168"/>
  <text class="label" x="116" y="592" fill="#047857">alt slot acquired</text>

  <path class="purple" d="M 395 618 L 1177 618"/>
  <rect class="badge" x="650" y="593" width="270" height="22"/>
  <text class="label" x="785" y="609" fill="#6d28d9" text-anchor="middle">4 push group handle and run action</text>

  <path class="green" d="M 658 706 L 933 706"/>
  <rect class="badge" x="694" y="682" width="204" height="22"/>
  <text class="label" x="796" y="698" fill="#047857" text-anchor="middle">5 release or minLease TTL</text>

  <rect class="frame-skip" x="86" y="772" width="1180" height="112"/>
  <text class="label" x="116" y="798" fill="#c2410c">else all N slot keys are occupied</text>

  <path class="skip" d="M 658 824 L 395 824"/>
  <rect class="badge" x="446" y="838" width="158" height="22"/>
  <text class="label" x="525" y="854" fill="#c2410c" text-anchor="middle">group returns null</text>

  <g transform="translate(92 918)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <text class="small" x="44" y="12">caller contract</text>
    <line x1="188" y1="8" x2="222" y2="8" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
    <text class="small" x="232" y="12">slot acquire</text>
    <line x1="392" y1="8" x2="426" y2="8" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <text class="small" x="436" y="12">slot cleanup</text>
    <text class="footer" x="1128" y="12" text-anchor="end">github.com/bluetape4k/bluetape4k-leader</text>
  </g>
</svg>
