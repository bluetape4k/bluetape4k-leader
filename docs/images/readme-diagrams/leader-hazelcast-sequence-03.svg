<svg xmlns="http://www.w3.org/2000/svg" width="1910" height="1496" viewBox="0 0 1910 1496" role="img" aria-labelledby="title desc" data-intent="Answer the Hazelcast reader's group-election question: how bounded slot ownership differs from a single lock, where maxLeaders is enforced, and which backend operation releases the chosen slot after work completes." data-evidence="leader-hazelcast README group slot notes and Hazelcast group elector source" data-source-read="leader-hazelcast/README.md; leader-hazelcast/README.ko.md; leader-hazelcast/src/main/kotlin/io/bluetape4k/leader/hazelcast/HazelcastLeaderGroupElector.kt">
  <title id="title">Hazelcast Group Slot Sequence</title>
