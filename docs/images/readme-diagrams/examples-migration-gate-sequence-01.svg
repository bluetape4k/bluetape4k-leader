<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc" data-source-read="examples/migration-gate/README.md; examples/migration-gate/src/main/kotlin/io/bluetape4k/leader/examples/migration/MigrationGate.kt; examples/migration-gate/src/main/kotlin/io/bluetape4k/leader/examples/migration/MigrationGateDemo.kt; examples/migration-gate/src/test/kotlin/io/bluetape4k/leader/examples/migration/MigrationGateTest.kt">
  <title id="title">Migration Gate Sequence</title>
  <desc id="desc">Concurrent pod startup sequence for MigrationGate: one pod becomes the lock owner, writes the marker, releases the lock, and follower pods confirm AlreadyApplied.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#329a74"/></marker>
    <marker id="arrow-amber" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#cf8428"/></marker>
    <marker id="arrow-purple" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#7a61c8"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .participant-text { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .label { font-size: 13px; }
      .footer { font-size: 14px; }
      .participant { stroke-width: 2.4; rx: 12; }
      .lifeline { stroke: #9aacc2; stroke-width: 2; stroke-dasharray: 8 10; }
      .activation { fill: #f3eeff; stroke: #8a65d8; stroke-width: 2; rx: 7; }
      .call { fill: none; stroke: #4f77c9; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow-blue); }
      .success { fill: none; stroke: #329a74; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow-green); }
      .skip { fill: none; stroke: #cf8428; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow-amber); }
      .release { fill: none; stroke: #7a61c8; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow-purple); }
      .return { fill: none; stroke: #329a74; stroke-width: 2.6; stroke-linecap: round; stroke-dasharray: 9 8; marker-end: url(#arrow-green); }
      .skip-return { fill: none; stroke: #cf8428; stroke-width: 2.6; stroke-linecap: round; stroke-dasharray: 9 8; marker-end: url(#arrow-amber); }
      .release-return { fill: none; stroke: #7a61c8; stroke-width: 2.6; stroke-linecap: round; stroke-dasharray: 9 8; marker-end: url(#arrow-purple); }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.5; rx: 10; }
      .num { font-family: "Comic Mono"; font-size: 12px; fill: #ffffff; }
      .alt { fill: none; stroke: #cf8428; stroke-width: 2; stroke-dasharray: 9 8; rx: 18; }
      .alt-label { fill: #fff7e8; stroke: #cf8428; stroke-width: 1.5; rx: 8; }
      .divider { stroke: #cf8428; stroke-width: 1.7; stroke-dasharray: 9 8; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="980"/>
  <rect class="frame" x="42" y="34" width="1416" height="900" rx="30"/>
  <text class="title" x="86" y="92">Migration Gate Sequence</text>
  <text class="subtitle" x="90" y="126">One pod becomes lock owner; follower pods either skip contention or confirm the marker before serving.</text>

  <g id="participants">
    <rect class="participant" x="100" y="176" width="150" height="70" fill="#eaf2ff" stroke="#6d9df0"/>
    <text class="participant-text" x="175" y="218" text-anchor="middle" font-size="24">Deploy</text>
    <rect class="participant" x="326" y="176" width="170" height="70" fill="#eaf2ff" stroke="#6d9df0"/>
    <text class="participant-text" x="411" y="218" text-anchor="middle" font-size="24">leader pod</text>
    <rect class="participant" x="560" y="176" width="180" height="70" fill="#fff0e8" stroke="#e49a72"/>
    <text class="participant-text" x="650" y="218" text-anchor="middle" font-size="24">follower pods</text>
    <rect class="participant" x="820" y="176" width="160" height="70" fill="#f0ecff" stroke="#9b7aec"/>
    <text class="participant-text" x="900" y="218" text-anchor="middle" font-size="24">DB lock</text>
    <rect class="participant" x="1058" y="176" width="180" height="70" fill="#edf9f4" stroke="#63b891"/>
    <text class="participant-text" x="1148" y="218" text-anchor="middle" font-size="24">Marker table</text>
    <rect class="participant" x="1310" y="176" width="120" height="70" fill="#f1eaff" stroke="#9b7aec"/>
    <text class="participant-text" x="1370" y="218" text-anchor="middle" font-size="24">DDL</text>
  </g>

  <line class="lifeline" x1="175" y1="246" x2="175" y2="876"/>
  <line class="lifeline" x1="411" y1="246" x2="411" y2="876"/>
  <line class="lifeline" x1="650" y1="246" x2="650" y2="876"/>
  <line class="lifeline" x1="900" y1="246" x2="900" y2="876"/>
  <line class="lifeline" x1="1148" y1="246" x2="1148" y2="876"/>
  <line class="lifeline" x1="1370" y1="246" x2="1370" y2="876"/>
  <rect class="activation" x="403" y="314" width="16" height="502"/>
  <rect class="activation" x="642" y="350" width="16" height="500"/>
  <rect class="activation" x="892" y="440" width="16" height="378"/>
  <rect class="activation" x="1140" y="400" width="16" height="456"/>
  <rect class="activation" x="1362" y="586" width="16" height="72"/>

  <path class="call" d="M175 318 L411 318"/>
  <rect class="pill" x="230" y="286" width="128" height="28"/>
  <circle cx="246" cy="300" r="13" fill="#4f77c9"/><text class="num" x="246" y="304" text-anchor="middle">1</text>
  <text class="label" x="306" y="305" text-anchor="middle">start pod</text>

  <path class="call" d="M175 360 L650 360"/>
  <rect class="pill" x="346" y="328" width="168" height="28"/>
  <circle cx="362" cy="342" r="13" fill="#4f77c9"/><text class="num" x="362" y="346" text-anchor="middle">2</text>
  <text class="label" x="444" y="347" text-anchor="middle">start followers</text>

  <path class="call" d="M411 414 L1148 414"/>
  <rect class="pill" x="698" y="382" width="180" height="28"/>
  <circle cx="714" cy="396" r="13" fill="#4f77c9"/><text class="num" x="714" y="400" text-anchor="middle">3</text>
  <text class="label" x="798" y="401" text-anchor="middle">precheck marker</text>

  <path class="call" d="M411 466 L900 466"/>
  <rect class="pill" x="574" y="434" width="190" height="28"/>
  <circle cx="590" cy="448" r="13" fill="#4f77c9"/><text class="num" x="590" y="452" text-anchor="middle">4</text>
  <text class="label" x="680" y="453" text-anchor="middle">try leader lock</text>

  <path class="return" d="M900 518 L411 518"/>
  <rect class="pill" x="582" y="486" width="158" height="28"/>
  <circle cx="598" cy="500" r="13" fill="#329a74"/><text class="num" x="598" y="504" text-anchor="middle">5</text>
  <text class="label" x="672" y="505" text-anchor="middle">token granted</text>

  <path class="success" d="M411 562 L1148 562"/>
  <rect class="pill" x="698" y="530" width="190" height="28"/>
  <circle cx="714" cy="544" r="13" fill="#329a74"/><text class="num" x="714" y="548" text-anchor="middle">6</text>
  <text class="label" x="804" y="549" text-anchor="middle">in-lock recheck</text>

  <path class="success" d="M411 618 L1370 618"/>
  <rect class="pill" x="792" y="586" width="156" height="28"/>
  <circle cx="808" cy="600" r="13" fill="#329a74"/><text class="num" x="808" y="604" text-anchor="middle">7</text>
  <text class="label" x="882" y="605" text-anchor="middle">execute DDL</text>

  <path class="success" d="M1370 676 L1148 676"/>
  <rect class="pill" x="1182" y="644" width="160" height="28"/>
  <circle cx="1198" cy="658" r="13" fill="#329a74"/><text class="num" x="1198" y="662" text-anchor="middle">8</text>
  <text class="label" x="1274" y="663" text-anchor="middle">insert marker</text>

  <path class="skip" d="M650 724 L900 724"/>
  <rect class="pill" x="700" y="702" width="122" height="28"/>
  <circle cx="716" cy="716" r="13" fill="#cf8428"/><text class="num" x="716" y="720" text-anchor="middle">9</text>
  <text class="label" x="774" y="721" text-anchor="middle">try lock</text>
  <path class="skip-return" d="M900 754 L650 754"/>
  <rect class="pill" x="690" y="732" width="168" height="28"/>
  <circle cx="706" cy="746" r="13" fill="#cf8428"/><text class="num" x="706" y="750" text-anchor="middle">10</text>
  <text class="label" x="786" y="751" text-anchor="middle">null / skipped</text>

  <path class="release" d="M411 792 L900 792"/>
  <rect class="pill" x="570" y="760" width="194" height="28"/>
  <circle cx="586" cy="774" r="13" fill="#7a61c8"/><text class="num" x="586" y="778" text-anchor="middle">11</text>
  <text class="label" x="676" y="779" text-anchor="middle">release if owner</text>

  <path class="release-return" d="M900 826 L411 826"/>
  <rect class="pill" x="570" y="804" width="180" height="28"/>
  <circle cx="586" cy="818" r="13" fill="#7a61c8"/><text class="num" x="586" y="822" text-anchor="middle">12</text>
  <text class="label" x="670" y="823" text-anchor="middle">return Migrated</text>

  <path class="return" d="M1148 860 L650 860"/>
  <rect class="pill" x="790" y="838" width="230" height="28"/>
  <circle cx="806" cy="852" r="13" fill="#329a74"/><text class="num" x="806" y="856" text-anchor="middle">13</text>
  <text class="label" x="914" y="857" text-anchor="middle">return AlreadyApplied</text>

  <text class="footer" x="750" y="912" text-anchor="middle">If marker reads throw, the gate returns Failed instead of treating unknown state as not applied. github.com/bluetape4k/bluetape4k-leader</text>
</svg>
