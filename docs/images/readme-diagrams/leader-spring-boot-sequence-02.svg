<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1000" viewBox="0 0 1320 1000" role="img" aria-labelledby="title desc">
  <title id="title">leader-spring-boot reentrant LeaderElection sequence</title>
  <desc id="desc">Sequence diagram showing reentrant LeaderElection handling: an outer leader scope creates a real lock handle, an inner matching annotation short-circuits through the existing LockIdentity, and mismatched identity triggers a separate acquire.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <marker markerUnits="userSpaceOnUse" id="arrow-blue" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#3f7d9c" stroke="#3f7d9c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-green" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#6e8f4f" stroke="#6e8f4f" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-orange" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c97831" stroke="#c97831" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-purple" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c5aa6" stroke="#7c5aa6" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-red" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#b86868" stroke="#b86868" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-return" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#9b7d54" stroke="#9b7d54" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <style>
      .canvas { fill: #fbfcf8; }
      .outer-frame { fill: #ffffff; stroke: #41545d; stroke-width: 2.2; }
      .title { font-family: "Architects Daughter", "Comic Mono"; font-size: 42px; fill: #263238; font-weight: 400; }
      .subtitle { font-family: "Comic Mono", "Architects Daughter"; font-size: 15px; fill: #36464f; }
      .participant { filter: none; }
      .participant rect { fill: #ffffff; stroke: #546e7a; stroke-width: 2.2; rx: 8; }
      .participant-title { font-family: "Architects Daughter", "Comic Mono"; font-size: 18px; fill: #1f3138; font-weight: 400; }
      .participant-sub { font-family: "Comic Mono", "Architects Daughter"; font-size: 13px; fill: #546a73; }
      .lifeline { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      .activation { fill: #e6f2ec; stroke: #5b7e67; stroke-width: 1.7; rx: 6; }
      .msg-blue, .msg-purple, .msg-green, .msg-orange, .msg-red, .return { fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .msg-blue { stroke: #3f7d9c; marker-end: url(#arrow-blue); }
      .msg-purple { stroke: #7c5aa6; marker-end: url(#arrow-purple); }
      .msg-green { stroke: #6e8f4f; marker-end: url(#arrow-green); }
      .msg-orange { stroke: #c97831; marker-end: url(#arrow-orange); }
      .msg-red { stroke: #b86868; marker-end: url(#arrow-red); }
      .return { stroke: #9b7d54; stroke-dasharray: 10 8; marker-end: url(#arrow-return); opacity: 1; }
      .frame { fill: none; stroke: #78909c; stroke-width: 2.4; stroke-dasharray: 12 8; rx: 12; }
      .frame-green, .frame-orange, .frame-red, .frame-purple { stroke: #78909c; }
      .frame-title { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; font-weight: 700; fill: #60727d; }
      .label { font-family: "Comic Mono", "Architects Daughter"; font-size: 12.5px; font-weight: 400; fill: #36464f; }
      .label-bg { fill: #ffffff; stroke: #c8d7df; stroke-width: 1.5; rx: 14; }
      .note { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; fill: #60727d; }
      .footer { font-family: "Comic Mono", "Architects Daughter"; font-size: 13px; fill: #60727d; }
    </style>
  </defs>
  <rect class="canvas" width="1320" height="1000"/>
  <rect class="outer-frame" x="28" y="26" width="1264" height="948" rx="8"/>
  <text class="title" x="660" y="66" text-anchor="middle">Reentrant @LeaderElection Sequence</text>
  <text class="subtitle" x="660" y="94" text-anchor="middle">A matching LockIdentity reuses the existing leader scope; no second backend lock is acquired.</text>

  <g class="participant" transform="translate(58 126)"><rect width="126" height="64" fill="#dbeafe" stroke="#2563eb"/><text class="participant-title" x="63" y="26" text-anchor="middle">Caller</text><text class="participant-sub" x="63" y="46" text-anchor="middle">scheduler</text></g>
  <g class="participant" transform="translate(230 126)"><rect width="144" height="64" fill="#fef3c7" stroke="#d97706"/><text class="participant-title" x="72" y="26" text-anchor="middle">Outer Aspect</text><text class="participant-sub" x="72" y="46" text-anchor="middle">first annotation</text></g>
  <g class="participant" transform="translate(420 126)"><rect width="154" height="64" fill="#f3e8ff" stroke="#7c3aed"/><text class="participant-title" x="77" y="26" text-anchor="middle">Elector + Scope</text><text class="participant-sub" x="77" y="46" text-anchor="middle">backend handle</text></g>
  <g class="participant" transform="translate(620 126)"><rect width="144" height="64" fill="#ecfdf5" stroke="#059669"/><text class="participant-title" x="72" y="26" text-anchor="middle">Outer Body</text><text class="participant-sub" x="72" y="46" text-anchor="middle">critical work</text></g>
  <g class="participant" transform="translate(808 126)"><rect width="144" height="64" fill="#fef3c7" stroke="#d97706"/><text class="participant-title" x="72" y="26" text-anchor="middle">Inner Aspect</text><text class="participant-sub" x="72" y="46" text-anchor="middle">nested call</text></g>
  <g class="participant" transform="translate(996 126)"><rect width="172" height="64" fill="#eef2ff" stroke="#4f46e5"/><text class="participant-title" x="86" y="26" text-anchor="middle">Inner Body + APIs</text><text class="participant-sub" x="86" y="46" text-anchor="middle">LockAssert / Extender</text></g>

  <line class="lifeline" x1="121" y1="190" x2="121" y2="890"/>
  <line class="lifeline" x1="302" y1="190" x2="302" y2="890"/>
  <line class="lifeline" x1="497" y1="190" x2="497" y2="890"/>
  <line class="lifeline" x1="692" y1="190" x2="692" y2="890"/>
  <line class="lifeline" x1="880" y1="190" x2="880" y2="890"/>
  <line class="lifeline" x1="1082" y1="190" x2="1082" y2="890"/>
  <rect class="activation" x="295" y="242" width="14" height="560"/>
  <rect class="activation" x="490" y="344" width="14" height="336"/>
  <rect class="activation" x="685" y="438" width="14" height="286"/>
  <rect class="activation" x="873" y="500" width="14" height="176"/>
  <rect class="activation" x="1075" y="610" width="14" height="58"/>

  <path class="msg-blue" d="M 121 244 L 302 244"/><rect class="label-bg" x="162" y="216" width="100" height="22"/><text class="label" x="212" y="232" text-anchor="middle" fill="#1d4ed8">1 outer call</text>
  <path class="msg-orange" d="M 302 292 L 497 292"/><rect class="label-bg" x="330" y="264" width="140" height="22"/><text class="label" x="400" y="280" text-anchor="middle" fill="#9a3412">2 resolve identity</text>
  <path class="msg-purple" d="M 302 348 L 497 348"/><rect class="label-bg" x="316" y="320" width="168" height="22"/><text class="label" x="400" y="336" text-anchor="middle" fill="#6d28d9">3 acquire real lock</text>
  <path class="msg-green" d="M 497 438 L 692 438"/><rect class="label-bg" x="526" y="410" width="138" height="22"/><text class="label" x="595" y="426" text-anchor="middle" fill="#047857">4 proceed outer</text>

  <rect class="frame frame-green" x="78" y="472" width="1164" height="240"/>
  <text class="frame-title" x="96" y="496" fill="#047857">alt nested annotation has same LockIdentity</text>
  <path class="msg-blue" d="M 692 526 L 880 526"/><rect class="label-bg" x="718" y="498" width="136" height="22"/><text class="label" x="786" y="514" text-anchor="middle" fill="#1d4ed8">5 inner call</text>
  <path class="msg-orange" d="M 880 562 L 497 562"/><rect class="label-bg" x="580" y="534" width="216" height="22"/><text class="label" x="688" y="550" text-anchor="middle" fill="#9a3412">6 peekSyncMatching</text>
  <path class="msg-green" d="M 497 596 L 880 596"/><rect class="label-bg" x="574" y="604" width="230" height="22"/><text class="label" x="689" y="620" text-anchor="middle" fill="#047857">Real handle matches identity</text>
  <path class="msg-green" d="M 880 634 L 1082 634"/><rect class="label-bg" x="904" y="606" width="154" height="22"/><text class="label" x="981" y="622" text-anchor="middle" fill="#047857">7 run inner body</text>
  <path class="return" d="M 1082 672 L 880 672"/><rect class="label-bg" x="926" y="680" width="110" height="22"/><text class="label" x="981" y="696" text-anchor="middle" fill="#334155">body result</text>

  <rect class="frame frame-orange" x="78" y="758" width="1164" height="86"/>
  <text class="frame-title" x="96" y="782" fill="#9a3412">else different name, annotation kind, or group params</text>
  <path class="msg-orange" d="M 880 810 L 497 810"/><rect class="label-bg" x="570" y="782" width="236" height="22"/><text class="label" x="688" y="798" text-anchor="middle" fill="#9a3412">separate backend acquire</text>

  <path class="return" d="M 692 730 L 302 730"/><rect class="label-bg" x="410" y="724" width="176" height="22"/><text class="label" x="498" y="740" text-anchor="middle" fill="#334155">outer body result</text>
  <path class="return" d="M 497 874 L 302 874"/><rect class="label-bg" x="312" y="846" width="176" height="22"/><text class="label" x="400" y="862" text-anchor="middle" fill="#334155">release outer lock</text>

  <g transform="translate(112 930)">
    <rect x="0" y="0" width="1096" height="42" rx="8" fill="#ffffff" stroke="#c8d7df" stroke-width="1.5"/>
    <text class="footer" x="548" y="17" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader / leader-spring-boot</text>
    <text class="footer" x="548" y="32" text-anchor="middle">Reentrant pass-through keeps the outer lock handle and extend delegate; mismatched identity still acquires independently.</text>
  </g>
</svg>
