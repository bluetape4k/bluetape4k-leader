<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1137" viewBox="0 0 1792 1137" role="img" aria-labelledby="title desc" data-intent="Answer an observability reader's question: which leader election execution paths emit Micrometer metrics, which recorder or decorator owns each path, what meter families are registered, where tag cardinality is controlled, and how the application-selected MeterRegistry exports to Prometheus, Datadog, OTLP, or composite registries?" data-evidence="leader-micrometer README overview/meter catalog/export/cardinality sections; InstrumentedLeaderElectors; MicrometerLeaderAopMetricsRecorder; MicrometerLeaderElectionListener; MicrometerNames; MicrometerSafeLeaderHistoryRecorder; MicrometerSuspendSafeLeaderHistoryRecorder; CounterAwareSinkDecorator" data-source-read="leader-micrometer/README.md; leader-micrometer/src/main/kotlin/io/bluetape4k/leader/micrometer/InstrumentedLeaderElectors.kt; leader-micrometer/src/main/kotlin/io/bluetape4k/leader/micrometer/MicrometerLeaderAopMetricsRecorder.kt; leader-micrometer/src/main/kotlin/io/bluetape4k/leader/micrometer/MicrometerLeaderElectionListener.kt; leader-micrometer/src/main/kotlin/io/bluetape4k/leader/micrometer/MicrometerNames.kt; leader-micrometer/src/main/kotlin/io/bluetape4k/leader/micrometer/history/MicrometerSafeLeaderHistoryRecorder.kt; leader-micrometer/src/main/kotlin/io/bluetape4k/leader/micrometer/history/MicrometerSuspendSafeLeaderHistoryRecorder.kt; leader-micrometer/src/main/kotlin/io/bluetape4k/leader/micrometer/history/internal/CounterAwareSinkDecorator.kt">
  <title id="title">Leader Metrics Instrumentation Architecture</title>
  <desc id="desc">Architecture diagram for the Micrometer module showing Spring AOP callback metrics, direct elector decorators, listener lifecycle counters, history sink counters, MeterRegistry ownership, meter families, cardinality guidance, and Prometheus or other export backends.</desc>
