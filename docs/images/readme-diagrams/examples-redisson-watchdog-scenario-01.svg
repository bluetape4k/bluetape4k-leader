<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc" data-source-read="examples/redisson-watchdog/README.md; RedissonWatchdogDemo.kt; RedissonWatchdogJobRunner.kt; RedissonWatchdogJobRunnerTest.kt">
  <title id="title">Redisson Watchdog Scenario</title>
  <desc id="desc">Two nodes contend for one Redisson lock; the leader auto-extends the lease during a long job, peers skip, and a peer can acquire after release.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c85d73"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 24px; }
      .node-sub { font-size: 13px; }
      .label { font-size: 13px; font-weight: 700; }
      .footer { font-size: 14px; }
      .node { stroke-width: 2.4; rx: 16; }
      .route { fill: none; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>
  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="42" y="34" width="1416" height="820" rx="30"/>
  <text class="title" x="86" y="92">Redisson Watchdog Scenario</text>
  <text class="subtitle" x="90" y="126">One node owns the Redisson lock while auto-extension keeps a long-running job protected.</text>

  <rect class="node" x="124" y="270" width="260" height="94" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="254" y="306" text-anchor="middle">long job trigger</text>
  <text class="node-sub" x="254" y="334" text-anchor="middle">same lockName</text>

  <rect class="node" x="506" y="214" width="260" height="94" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="636" y="250" text-anchor="middle">node-1 runner</text>
  <text class="node-sub" x="636" y="278" text-anchor="middle">starts leader body</text>

  <rect class="node" x="506" y="356" width="260" height="94" fill="#e9f7f6" stroke="#4aa7a0"/>
  <text class="node-title" x="636" y="392" text-anchor="middle">node-2 runner</text>
  <text class="node-sub" x="636" y="420" text-anchor="middle">tries while lock is held</text>

  <rect class="node" x="888" y="284" width="286" height="110" fill="#fff4de" stroke="#d59c3f"/>
  <text class="node-title" x="1031" y="324" text-anchor="middle">Redisson RLock</text>
  <text class="node-sub" x="1031" y="352" text-anchor="middle">redisson-watchdog-demo</text>
  <text class="node-sub" x="1031" y="376" text-anchor="middle">single owner at a time</text>

  <rect class="node" x="888" y="538" width="286" height="94" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1031" y="574" text-anchor="middle">long-running body</text>
  <text class="node-sub" x="1031" y="602" text-anchor="middle">lease auto-extends until release</text>

  <rect class="node" x="506" y="560" width="260" height="82" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="node-title" x="636" y="592" text-anchor="middle">peer skips</text>
  <text class="node-sub" x="636" y="618" text-anchor="middle">SKIPPED, no duplicate job</text>

  <rect class="node" x="888" y="680" width="286" height="82" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="1031" y="712" text-anchor="middle">after release</text>
  <text class="node-sub" x="1031" y="738" text-anchor="middle">node-2 can acquire next</text>

  <path class="route" d="M384 296 L506 260" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M384 338 L506 402" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M766 260 L888 324" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <path class="route dash" d="M766 402 L888 372" stroke="#c85d73" marker-end="url(#arrow-red)"/>
  <path class="route" d="M1031 394 L1031 538" stroke="#319873" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="1050" y="454" width="86" height="26"/>
  <text class="label" x="1093" y="472" text-anchor="middle">auto-extend</text>
  <path class="route dash" d="M888 600 L766 600" stroke="#c85d73" marker-end="url(#arrow-red)"/>
  <path class="route" d="M1031 632 L1031 680" stroke="#319873" marker-end="url(#arrow-green)"/>

  <text class="footer" x="750" y="820" text-anchor="middle">The watchdog protects the elected long job; contenders skip until the owner releases the lock.</text>
</svg>
