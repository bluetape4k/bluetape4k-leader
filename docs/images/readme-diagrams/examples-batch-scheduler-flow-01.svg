<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc" data-source-read="examples/batch-scheduler/README.md; examples/batch-scheduler/src/main/kotlin/io/bluetape4k/leader/examples/batch/BatchScheduler.kt; examples/batch-scheduler/src/test/kotlin/io/bluetape4k/leader/examples/batch/BatchSchedulerTest.kt">
<title id="title">Batch Scheduler Acquire Skip Release Flow</title>
<desc id="desc">Flow of a scheduled batch trigger through lock acquisition, leader execution, contention skip, release, and TTL recovery.</desc>
<defs>
  <marker id="arrow-blue" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#3F73D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-green" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#2D8F64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-orange" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#C96B2C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-purple" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#755BC6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#B9C7D6" flood-opacity="0.24"/></filter>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:2.2;filter:url(#shadow)}
    .title{font-family:"Architects Daughter";font-size:40px;fill:#21334A}.subtitle,.small,.label,.footer{font-family:"Comic Mono";fill:#4B6075}.subtitle{font-size:15px}.small{font-size:13px}.label{font-size:14px}.footer{font-size:13px}
    .step{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.8;filter:url(#shadow)}.start{fill:#FEF7E6;stroke:#E4BD67}.decision{fill:#EAF2FF;stroke:#8EB2F0}.success{fill:#EEF7F2;stroke:#8BC6A3}.skip{fill:#FFF1EA;stroke:#E8A47D}.recover{fill:#F4EEFF;stroke:#B7A3EC}
    .stepTitle{font-family:"Architects Daughter";font-size:22px;fill:#21334A}.stepText{font-family:"Comic Mono";font-size:13px;fill:#4B6075}.route{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:7 6}
  </style>
</defs>
<rect class="canvas" width="1280" height="760"/>
<rect class="frame" x="34" y="28" width="1212" height="704" rx="30"/>
<text class="title" x="72" y="84">Batch Scheduler Flow</text>
<text class="subtitle" x="76" y="116">The example treats lock contention as a normal null result and still releases the lock after success or exception.</text>

<rect class="step start" x="86" y="200" width="210" height="86" rx="18"/><text class="stepTitle" x="120" y="235">1. Trigger</text><text class="stepText" x="120" y="262">periodic batch tick</text>
<rect class="step" x="360" y="200" width="220" height="86" rx="18"/><text class="stepTitle" x="394" y="235">2. run(job)</text><text class="stepText" x="394" y="262">shared lockName</text>
<rect class="step decision" x="650" y="190" width="236" height="106" rx="18"/><text class="stepTitle" x="684" y="228">3. Try Redis lock</text><text class="stepText" x="684" y="256">waitTime bounded</text><text class="stepText" x="684" y="278">leaseTime TTL</text>
<rect class="step success" x="974" y="130" width="220" height="92" rx="18"/><text class="stepTitle" x="1008" y="166">4a. Leader</text><text class="stepText" x="1008" y="194">execute job once</text>
<rect class="step skip" x="974" y="294" width="220" height="92" rx="18"/><text class="stepTitle" x="1008" y="330">4b. Contender</text><text class="stepText" x="1008" y="358">return null skip</text>
<rect class="step success" x="650" y="470" width="236" height="92" rx="18"/><text class="stepTitle" x="684" y="506">5. Release</text><text class="stepText" x="684" y="534">success or exception</text>
<rect class="step recover" x="360" y="470" width="220" height="92" rx="18"/><text class="stepTitle" x="394" y="506">Crash path</text><text class="stepText" x="394" y="534">TTL expires lock</text>
<rect class="step" x="86" y="470" width="210" height="92" rx="18"/><text class="stepTitle" x="120" y="506">Next tick</text><text class="stepText" x="120" y="534">new election allowed</text>

<path class="route" d="M 296 243 L 360 243" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 580 243 L 650 243" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 886 236 C 924 210 934 176 974 176" stroke="#2D8F64" marker-end="url(#arrow-green)"/>
<path class="route" d="M 886 258 C 928 274 936 340 974 340" stroke="#C96B2C" marker-end="url(#arrow-orange)"/>
<path class="route" d="M 1084 222 C 1210 268 1210 516 886 516" stroke="#2D8F64" marker-end="url(#arrow-green)"/>
<path class="route dash" d="M 650 516 L 580 516" stroke="#755BC6" marker-end="url(#arrow-purple)"/>
<path class="route dash" d="M 360 516 L 296 516" stroke="#755BC6" marker-end="url(#arrow-purple)"/>
<path class="route dash" d="M 191 470 C 140 400 140 334 191 286" stroke="#755BC6" marker-end="url(#arrow-purple)"/>

<text class="label" x="916" y="190">acquired</text>
<text class="label" x="916" y="318">not acquired</text>
<text class="label" x="590" y="454">TTL fallback</text>
<text class="footer" x="640" y="710" text-anchor="middle">bluetape4k-leader/examples/batch-scheduler</text>
</svg>
