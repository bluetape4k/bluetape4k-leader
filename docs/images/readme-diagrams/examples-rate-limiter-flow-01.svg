<svg xmlns="http://www.w3.org/2000/svg" width="1776" height="1052" viewBox="0 0 1776 1052" role="img" aria-labelledby="title desc" data-intent="Answer the Rate Limiter README reader's operational-flow question: what happens after the dispatch window, where does LeaderDispatchScheduler validate or prepare the request, how does Redis Leader Elector interact with Bucket4j quota, what is the success path for call external API, and what terminal result appears when the node is not leader?" data-evidence="examples/rate-limiter README scenario/usage sections; examples/rate-limiter/src/main workflow code; examples/rate-limiter/src/test behavior checks when present" data-source-read="examples/rate-limiter/README.md; examples/rate-limiter/README.ko.md; examples/rate-limiter/src/main; examples/rate-limiter/src/test">
  <title id="title">Rate Limiter Leader Decision Flow</title>
  <desc id="desc">Flow diagram for the Rate Limiter example showing validation, leadership decision, leader-only work, skip terminal state, release, and recovery path.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#203040" flood-opacity="0.10"/></filter>
    <marker id="arrow-call" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F83BF"/></marker>
    <marker id="arrow-success" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#3E9868"/></marker>
    <marker id="arrow-skip" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#C94D68"/></marker>
    <marker id="arrow-contention" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#B9851B"/></marker>
    <marker id="arrow-release" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#755BC6"/></marker>
    <marker id="arrow-retry" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F63C7"/></marker>
    <marker id="arrow-dependency" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#2E8F89"/></marker>
    <marker id="arrow-metric" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#718A35"/></marker>
    <marker id="arrow-neutral" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#758297"/></marker>
    <style>
      .canvas{fill:#F7FAFC}
      .frame{fill:#FFFFFF;stroke:#D7E2EC;stroke-width:2}
      .title{font-family:"Architects Daughter";font-size:44px;fill:#22344A;font-weight:400}
      .subtitle{font-family:"Comic Mono";font-size:16px;fill:#536476;font-weight:400}
      .band{fill:#F3F7FB;stroke:#D7E2EC;stroke-width:2}
      .bandTitle{font-family:"Architects Daughter";font-size:24px;fill:#22344A;font-weight:400;paint-order:stroke;stroke:#F3F7FB;stroke-width:5px;stroke-linejoin:round}
      .card{filter:url(#shadow);stroke-width:2}
      .cardTitle{font-family:"Architects Daughter";font-size:23px;fill:#22344A;font-weight:400}
      .detail{font-family:"Comic Mono";font-size:13px;fill:#42556B;font-weight:400}
      .small{font-family:"Comic Mono";font-size:12px;fill:#627184;font-weight:400}
      .route{fill:none;stroke-width:2.45;stroke-linejoin:round;stroke-linecap:round}
      .seq{fill:none;stroke-width:3;stroke-linecap:round}
      .seqReturn{fill:none;stroke-width:2.7;stroke-linecap:round;stroke-dasharray:8 7}
      .lifeline{stroke:#A7B4C3;stroke-width:1.8;stroke-dasharray:8 8}
      .pill{fill:#FFFFFF;stroke:#D6E3EF;stroke-width:1.4}
      .branchBox{fill:#FFFFFF;fill-opacity:.42;stroke:#D6A441;stroke-width:1.8;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect class="canvas" width="1776" height="1052"/>
  <rect class="frame" x="32" y="28" width="1712" height="996" rx="28"/>
  <text class="title" x="66" y="82">Rate Limiter Leader Decision Flow</text>
  <text class="subtitle" x="70" y="116">The example validates inputs, attempts leadership, runs call external API only on success, and returns a visible skip otherwise.</text>
<g>
  <rect class="band" x="128" y="228" width="1500" height="205" rx="18"/>
  <text class="bandTitle" x="154" y="262">Input and ownership attempt</text>
</g>
<g>
  <rect class="band" x="128" y="468" width="1500" height="190" rx="18"/>
  <text class="bandTitle" x="154" y="502">Branch-specific work</text>
</g>
<g>
  <rect class="band" x="128" y="738" width="1500" height="190" rx="18"/>
  <text class="bandTitle" x="154" y="772">Terminal result</text>
</g>
<path class="route" data-from="start" data-to="validate" data-route-tone="call" d="M468 339 L533 339" stroke="#4F83BF" marker-end="url(#arrow-call)"/>
<path class="route" data-from="validate" data-to="attempt" data-route-tone="dependency" d="M848 339 L913 339" stroke="#2E8F89" marker-end="url(#arrow-dependency)"/>
<path class="route" data-from="attempt" data-to="decision" data-route-tone="contention" d="M1243 339 L1303 339" stroke="#B9851B" marker-end="url(#arrow-contention)"/>
<path class="route" data-from="decision" data-to="execute" data-route-tone="success" d="M1443 380 L1443 438 L1113 438 L1113 538" stroke="#3E9868" marker-end="url(#arrow-success)"/>
<path class="route" data-from="execute" data-to="release" data-route-tone="release" d="M943 582 L891 582 L891 582 L838 582" stroke="#755BC6" marker-end="url(#arrow-release)"/>
<path class="route" data-from="release" data-to="executed" data-route-tone="success" d="M668 626 L668 708 L698 708 L698 844 L673 844" stroke="#3E9868" marker-end="url(#arrow-success)"/>
<path class="route" data-from="decision" data-to="skipped" data-route-tone="skip" d="M1583 339 L1648 339 L1648 844 L1403 844" stroke="#C94D68" marker-end="url(#arrow-skip)"/>
<g id="node-start">
  <rect class="card" x="188" y="298" width="280" height="82" rx="10" fill="#E8F3FF" stroke="#5B8DEF"/>
  <text class="cardTitle" x="328" y="321" text-anchor="middle" dominant-baseline="middle">Dispatch Window</text>
  <text class="detail" x="328" y="340" text-anchor="middle" dominant-baseline="middle">build request</text>
  <text class="detail" x="328" y="359" text-anchor="middle" dominant-baseline="middle">same lock name</text>
</g>
<g id="node-validate">
  <rect class="card" x="533" y="298" width="315" height="82" rx="10" fill="#E9F7F6" stroke="#45A7A1"/>
  <text class="cardTitle" x="690.5" y="321" text-anchor="middle" dominant-baseline="middle">Validate Example Inputs</text>
  <text class="detail" x="690.5" y="340" text-anchor="middle" dominant-baseline="middle">node id / lock name</text>
  <text class="detail" x="690.5" y="359" text-anchor="middle" dominant-baseline="middle">backend options</text>
</g>
<g id="node-attempt">
  <rect class="card" x="913" y="298" width="330" height="82" rx="10" fill="#FFF3D9" stroke="#D6A441"/>
  <text class="cardTitle" x="1078" y="321" text-anchor="middle" dominant-baseline="middle">Redis Leader Elector</text>
  <text class="detail" x="1078" y="340" text-anchor="middle" dominant-baseline="middle">attempt ownership</text>
  <text class="detail" x="1078" y="359" text-anchor="middle" dominant-baseline="middle">bounded wait</text>
</g>
<g id="node-decision">
  <rect class="card" x="1303" y="298" width="280" height="82" rx="10" fill="#F1ECFF" stroke="#8A72D6"/>
  <text class="cardTitle" x="1443" y="321" text-anchor="middle" dominant-baseline="middle">Leadership Result</text>
  <text class="detail" x="1443" y="340" text-anchor="middle" dominant-baseline="middle">acquired?</text>
  <text class="detail" x="1443" y="359" text-anchor="middle" dominant-baseline="middle">skip when false</text>
</g>
<g id="node-release">
  <rect class="card" x="498" y="538" width="340" height="88" rx="10" fill="#EEF1FF" stroke="#6477D8"/>
  <text class="cardTitle" x="668" y="564" text-anchor="middle" dominant-baseline="middle">Release Or Extend</text>
  <text class="detail" x="668" y="583" text-anchor="middle" dominant-baseline="middle">finally path</text>
  <text class="detail" x="668" y="602" text-anchor="middle" dominant-baseline="middle">quota window reset</text>
</g>
<g id="node-execute">
  <rect class="card" x="943" y="538" width="340" height="88" rx="10" fill="#EAF7EF" stroke="#58A978"/>
  <text class="cardTitle" x="1113" y="564" text-anchor="middle" dominant-baseline="middle">Call External API</text>
  <text class="detail" x="1113" y="583" text-anchor="middle" dominant-baseline="middle">leader branch</text>
  <text class="detail" x="1113" y="602" text-anchor="middle" dominant-baseline="middle">body runs once</text>
</g>
<g id="node-executed">
  <rect class="card" x="353" y="803" width="320" height="82" rx="10" fill="#EAF7EF" stroke="#58A978"/>
  <text class="cardTitle" x="513" y="826" text-anchor="middle" dominant-baseline="middle">Return Executed</text>
  <text class="detail" x="513" y="845" text-anchor="middle" dominant-baseline="middle">result payload</text>
  <text class="detail" x="513" y="864" text-anchor="middle" dominant-baseline="middle">observable success</text>
</g>
<g id="node-skipped">
  <rect class="card" x="1063" y="803" width="340" height="82" rx="10" fill="#FDECEF" stroke="#DC6B82"/>
  <text class="cardTitle" x="1233" y="826" text-anchor="middle" dominant-baseline="middle">Return Skipped</text>
  <text class="detail" x="1233" y="845" text-anchor="middle" dominant-baseline="middle">null or skipped status</text>
  <text class="detail" x="1233" y="864" text-anchor="middle" dominant-baseline="middle">no duplicate work</text>
</g>
</svg>
