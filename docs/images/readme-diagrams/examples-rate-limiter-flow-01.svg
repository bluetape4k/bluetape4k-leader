<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1080" viewBox="0 0 1500 1080" role="img" aria-labelledby="title desc" data-source-read="examples/rate-limiter/README.md; RateLimiterDemo.kt; LeaderDispatchScheduler.kt; RateLimitedApiWorker.kt; RateLimiterDemoTest.kt">
  <title id="title">Rate Limiter Runtime Flow</title>
  <desc id="desc">Runtime flow showing the dispatch leader decision, shared quota decision, external API call path, and report outcomes.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c85d73"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 24px; }
      .node-sub { font-size: 13px; }
      .label { font-size: 13px; font-weight: 700; }
      .footer { font-size: 14px; }
      .node { stroke-width: 2.4; rx: 16; }
      .decision { stroke-width: 2.4; }
      .route { fill: none; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="1080"/>
  <rect class="frame" x="42" y="34" width="1416" height="1000" rx="30"/>
  <text class="title" x="86" y="92">Rate Limiter Runtime Flow</text>
  <text class="subtitle" x="90" y="126">The flow has two gates: one leader creates work, then one shared quota limits all external calls.</text>

  <rect class="node" x="170" y="198" width="280" height="86" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="310" y="232" text-anchor="middle">runScenario</text>
  <text class="node-sub" x="310" y="258" text-anchor="middle">create Redis client, lock, quota key</text>

  <rect class="node" x="610" y="198" width="280" height="86" fill="#fff4de" stroke="#d59c3f"/>
  <text class="node-title" x="750" y="232" text-anchor="middle">dispatchOnce</text>
  <text class="node-sub" x="750" y="258" text-anchor="middle">3 nodes try runIfLeader</text>

  <path class="decision" d="M750 344 L910 420 L750 496 L590 420 Z" fill="#fff7e8" stroke="#d59c3f"/>
  <text class="node-title" x="750" y="412" text-anchor="middle">lock acquired?</text>
  <text class="node-sub" x="750" y="436" text-anchor="middle">Redis rate-limiter:* key</text>

  <rect class="node" x="184" y="364" width="292" height="112" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="node-title" x="330" y="406" text-anchor="middle">dispatch rejected</text>
  <text class="node-sub" x="330" y="434" text-anchor="middle">empty scheduledItems</text>
  <text class="node-sub" x="330" y="458" text-anchor="middle">reported as REJECTED</text>

  <rect class="node" x="1024" y="364" width="292" height="112" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1170" y="406" text-anchor="middle">scheduled work</text>
  <text class="node-sub" x="1170" y="434" text-anchor="middle">45 item ids</text>
  <text class="node-sub" x="1170" y="458" text-anchor="middle">3 sec x 15 attempts</text>

  <rect class="node" x="610" y="570" width="280" height="86" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="750" y="604" text-anchor="middle">workers call items</text>
  <text class="node-sub" x="750" y="630" text-anchor="middle">node-1..3 round-robin</text>

  <path class="decision" d="M750 716 L910 792 L750 868 L590 792 Z" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="750" y="784" text-anchor="middle">token consumed?</text>
  <text class="node-sub" x="750" y="808" text-anchor="middle">Bucket4j quotaKey, 10/sec</text>

  <rect class="node" x="184" y="736" width="292" height="112" fill="#fff5ec" stroke="#e49a72"/>
  <text class="node-title" x="330" y="778" text-anchor="middle">quota rejected</text>
  <text class="node-sub" x="330" y="806" text-anchor="middle">no external API call</text>
  <text class="node-sub" x="330" y="830" text-anchor="middle">15 rejected attempts</text>

  <rect class="node" x="1024" y="736" width="292" height="112" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1170" y="778" text-anchor="middle">ExternalApiProbe</text>
  <text class="node-sub" x="1170" y="806" text-anchor="middle">callCount increments once</text>
  <text class="node-sub" x="1170" y="830" text-anchor="middle">counts consumed calls</text>

  <path class="route" d="M450 241 L610 241" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M750 284 L750 344" stroke="#cf8428" marker-end="url(#arrow-amber)"/>

  <path class="route" d="M590 420 L476 420" stroke="#c85d73" marker-end="url(#arrow-red)"/>
  <rect class="pill" x="512" y="390" width="58" height="26"/>
  <text class="label" x="541" y="408" text-anchor="middle">no</text>
  <path class="route" d="M910 420 L1024 420" stroke="#319873" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="930" y="390" width="62" height="26"/>
  <text class="label" x="961" y="408" text-anchor="middle">yes</text>

  <path class="route" d="M1170 476 L1170 526 L750 526 L750 570" stroke="#319873" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="948" y="494" width="64" height="26"/>
  <text class="label" x="980" y="512" text-anchor="middle">items</text>
  <path class="route" d="M750 656 L750 716" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>

  <path class="route" d="M590 792 L476 792" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="512" y="762" width="58" height="26"/>
  <text class="label" x="541" y="780" text-anchor="middle">no</text>
  <path class="route" d="M910 792 L1024 792" stroke="#319873" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="930" y="762" width="62" height="26"/>
  <text class="label" x="961" y="780" text-anchor="middle">yes</text>

  <text class="footer" x="750" y="1024" text-anchor="middle">Rejected dispatch means no duplicate scheduled work; rejected quota means no external API call.</text>
</svg>
