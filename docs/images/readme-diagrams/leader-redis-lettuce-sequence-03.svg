<svg xmlns="http://www.w3.org/2000/svg" width="1288" height="1756" viewBox="0 0 1288 1756" role="img" aria-label="Scenario 2 — minLeaseTime delegated to backend TTL">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 10 5 L 1 9" fill="none" stroke="#758297" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="inherit" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 1 L 12 6 L 0 11 Z" fill="#ffffff" stroke="#758297" stroke-width="1.8"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .title{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:43px;font-weight:400;fill:#102033}
    .subtitle{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:25px;font-weight:400;fill:#102033}
    .smallLabel{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:21px;font-weight:400;fill:#102033}
    .mono{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#536273}
    .strong{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:13px;font-weight:400;fill:#102033}
    .card{stroke-width:2.1;filter:url(#shadow)}.compartment{stroke-width:1.5;fill:none}
    .line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#openArrow)}
    .plainLine{stroke:#758297;stroke-width:2.1;fill:none}
    .dashed{stroke:#758297;stroke-width:2.1;stroke-dasharray:7 6;fill:none;marker-end:url(#openArrow)}
    .inheritLine{stroke:#758297;stroke-width:2.2;fill:none;marker-end:url(#inherit)}
    .implLine{stroke:#758297;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#inherit)}
  </style>
</defs>
<rect class="canvas" width="1288" height="1756"/>
<rect class="frame" x="32" y="28" width="1224" height="1700" rx="28"/>
<text class="title" x="66" y="82">Scenario 2 — minLeaseTime delegated to backe.</text>
<text class="subtitle" x="70" y="118">Sequence messages from the original Mermaid source</text>
<rect class="card" x="-10" y="166" width="300" height="72" rx="20" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="smallLabel" x="140" y="209" text-anchor="middle">ClientA</text>
<line class="lifeline" x1="140" y1="252" x2="140" y2="1696" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="494" y="166" width="300" height="72" rx="20" fill="#EAF7EF" stroke="#58A978"/>
<text class="smallLabel" x="644" y="209" text-anchor="middle">ClientB</text>
<line class="lifeline" x1="644" y1="252" x2="644" y2="1696" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="998" y="166" width="300" height="72" rx="20" fill="#FFF3D9" stroke="#D6A441"/>
<text class="smallLabel" x="1148" y="198.5" text-anchor="middle">Redis</text>
<text class="smallLabel" x="1148" y="219.5" text-anchor="middle">(lg:{lockName}</text>
<line class="lifeline" x1="1148" y1="252" x2="1148" y2="1696" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect x="539" y="286" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="557" y="313" text-anchor="start">1. ACQUIRE token=A1</text>
<path class="line" d="M140 344 L1148 344"/>
<rect x="539" y="396" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="557" y="423" text-anchor="start">2. token A1</text>
<path class="dashed" d="M1148 454 L140 454"/>
<rect x="83" y="506" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="101" y="533" text-anchor="start">3. action() runs 50ms</text>
<path class="line" d="M140 564 C204 564 204 598 140 598"/>
<rect x="464.5" y="636" width="359" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="482.5" y="663" text-anchor="start">4. RELEASE (A1, remainingMinLeaseMs=250)</text>
<path class="line" d="M140 694 L1148 694"/>
<rect x="829" y="746" width="399" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="847" y="773" text-anchor="start">5. TIME -&gt; nowMs ZADD XX score=(nowMs+250) A1</text>
<path class="line" d="M1148 804 C1212 804 1212 838 1148 838"/>
<rect x="539" y="876" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="557" y="903" text-anchor="start">6. 1</text>
<path class="dashed" d="M1148 934 L140 934"/>
<rect x="769" y="986" width="254" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="787" y="1013" text-anchor="start">7. ACQUIRE (waitTime=100ms)</text>
<path class="line" d="M644 1044 L1148 1044"/>
<rect x="700" y="1096" width="528" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="718" y="1123" text-anchor="start">8. ZREMRANGEBYSCORE -&gt; A1 not yet expired ZCARD == maxLeaders</text>
<path class="line" d="M1148 1154 C1212 1154 1212 1188 1148 1188"/>
<rect x="791" y="1226" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="809" y="1253" text-anchor="start">9. (failed)</text>
<path class="dashed" d="M1148 1284 L644 1284"/>
<rect x="791" y="1336" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="809" y="1363" text-anchor="start">10. ACQUIRE</text>
<path class="line" d="M644 1394 L1148 1394"/>
<rect x="917" y="1446" width="311" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="935" y="1473" text-anchor="start">11. ZREMRANGEBYSCORE -&gt; A1 evicted</text>
<path class="line" d="M1148 1504 C1212 1504 1212 1538 1148 1538"/>
<rect x="789" y="1576" width="214" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="807" y="1603" text-anchor="start">12. token B1 (success)</text>
<path class="dashed" d="M1148 1634 L644 1634"/>
</svg>
