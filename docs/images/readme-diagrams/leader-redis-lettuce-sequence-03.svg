<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="1344" viewBox="0 0 1040 1344" role="img" aria-label="Scenario 2 — minLeaseTime delegated to backend TTL">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 10 5 L 1 9" fill="none" stroke="#758297" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="inherit" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 1 L 12 6 L 0 11 Z" fill="#ffffff" stroke="#758297" stroke-width="1.8"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .title{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:43px;font-weight:400;fill:#102033}
    .subtitle{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:25px;font-weight:400;fill:#102033}
    .smallLabel{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:21px;font-weight:400;fill:#102033}
    .mono{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#536273}
    .strong{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:13px;font-weight:400;fill:#102033}
    .card{stroke-width:2.1;filter:url(#shadow)}.compartment{stroke-width:1.5;fill:none}
    .line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#openArrow)}
    .plainLine{stroke:#758297;stroke-width:2.1;fill:none}
    .dashed{stroke:#758297;stroke-width:2.1;stroke-dasharray:7 6;fill:none;marker-end:url(#openArrow)}
    .inheritLine{stroke:#758297;stroke-width:2.2;fill:none;marker-end:url(#inherit)}
    .implLine{stroke:#758297;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#inherit)}
  </style>
</defs>
<rect class="canvas" width="1040" height="1344"/>
<rect class="frame" x="32" y="28" width="976" height="1288" rx="28"/>
<text class="title" x="66" y="82">Scenario 2 — minLeaseTime delegate.</text>
<text class="subtitle" x="70" y="118">Sequence messages from the original Mermaid source</text>
<rect class="card" x="35" y="166" width="210" height="72" rx="20" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="smallLabel" x="140" y="197" text-anchor="middle">ClientA</text>
<line x1="140" y1="252" x2="140" y2="1284" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="415" y="166" width="210" height="72" rx="20" fill="#EAF7EF" stroke="#58A978"/>
<text class="smallLabel" x="520" y="197" text-anchor="middle">ClientB</text>
<line x1="520" y1="252" x2="520" y2="1284" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="795" y="166" width="210" height="72" rx="20" fill="#FFF3D9" stroke="#D6A441"/>
<text class="smallLabel" x="900" y="187" text-anchor="middle">Redis</text>
<text class="smallLabel" x="900" y="208" text-anchor="middle">(lg:{lockName}</text>
<line x1="900" y1="252" x2="900" y2="1284" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect x="158" y="270" width="724" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="297" text-anchor="start">1. ACQUIRE token=A1</text>
<path class="line" d="M140 310 L900 310"/>
<rect x="158" y="352" width="724" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="379" text-anchor="start">2. token A1</text>
<path class="dashed" d="M900 392 L140 392"/>
<rect x="158" y="434" width="190" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="461" text-anchor="start">3. action() runs 50ms</text>
<path class="line" d="M140 474 L140 474"/>
<rect x="158" y="516" width="724" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="543" text-anchor="start">4. RELEASE (A1, remainingMinLeaseMs=250)</text>
<path class="line" d="M140 556 L900 556"/>
<rect x="918" y="598" width="190" height="62" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="934" y="625" text-anchor="start">5. TIME -&gt; nowMs ZADD</text>
<text class="strong" x="934" y="648" text-anchor="start">XX score=(nowMs+250)</text>
<path class="line" d="M900 638 L900 638"/>
<rect x="158" y="680" width="724" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="707" text-anchor="start">6. 1</text>
<path class="dashed" d="M900 720 L140 720"/>
<rect x="538" y="762" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="789" text-anchor="start">7. ACQUIRE (waitTime=100ms)</text>
<path class="line" d="M520 802 L900 802"/>
<rect x="918" y="844" width="190" height="62" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="934" y="871" text-anchor="start">8. ZREMRANGEBYSCORE -&gt;</text>
<text class="strong" x="934" y="894" text-anchor="start">A1 not yet expired</text>
<path class="line" d="M900 884 L900 884"/>
<rect x="538" y="926" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="953" text-anchor="start">9. (failed)</text>
<path class="dashed" d="M900 966 L520 966"/>
<rect x="538" y="1008" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="1035" text-anchor="start">10. ACQUIRE</text>
<path class="line" d="M520 1048 L900 1048"/>
<rect x="918" y="1090" width="190" height="62" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="934" y="1117" text-anchor="start">11. ZREMRANGEBYSCORE</text>
<text class="strong" x="934" y="1140" text-anchor="start">-&gt; A1 evicted</text>
<path class="line" d="M900 1130 L900 1130"/>
<rect x="538" y="1172" width="344" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="554" y="1199" text-anchor="start">12. token B1 (success)</text>
<path class="dashed" d="M900 1212 L520 1212"/>
</svg>
