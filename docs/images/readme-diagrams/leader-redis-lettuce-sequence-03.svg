<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1160" viewBox="0 0 1600 1160" role="img" aria-labelledby="title desc">
  <title id="title">lettuce minLeaseTime backend TTL sequence</title>
  <desc id="desc">Sequence showing Lettuce group minLeaseTime delegation: release updates the ZSET score when work finishes too quickly instead of parking the caller.</desc>
  <defs>
    <style>
      .title { font-family: "Architects Daughter"; font-size: 40px; fill: #263238; }
      .subtitle, .msg, .note, .footer { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 18px; }
      .participant { font-family: "Architects Daughter"; font-size: 19px; fill: #1f3138; }
      .role { font-family: "Comic Mono"; font-size: 13px; fill: #546a73; }
      .msg { font-size: 14px; }
      .note { font-size: 13px; }
      .footer { font-size: 14px; fill: #60727d; }
      .frame { fill: #fbfcf8; stroke: #41545d; stroke-width: 3; }
      .header { fill: #ffffff; stroke: #546e7a; stroke-width: 2; }
      .lifeline { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      .activation { fill: #f3ecdf; stroke: #8f784e; stroke-width: 1.5; }
      .call { fill: none; stroke: #3f7d9c; stroke-width: 3; marker-end: url(#arrowCall); }
      .slot { fill: none; stroke: #a2743d; stroke-width: 3; marker-end: url(#arrowSlot); }
      .state { fill: none; stroke: #6e8f4f; stroke-width: 3; marker-end: url(#arrowState); }
      .return { fill: none; stroke: #9b7d54; stroke-width: 2.5; stroke-dasharray: 8 6; marker-end: url(#arrowReturn); }
      .wait { fill: none; stroke: #8e6aa9; stroke-width: 3; marker-end: url(#arrowWait); }
      .skip { fill: none; stroke: #b86868; stroke-width: 3; marker-end: url(#arrowSkip); }
      .alt { fill: none; stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 7; }
      .branchDivider { stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 8; }
      .label { fill: #ffffff; stroke: #d7e0e4; stroke-width: 1.5; }
      .label.callLabel { stroke: #9cc2d1; }
      .label.slotLabel { stroke: #d0b078; }
      .label.stateLabel { stroke: #b6c9a4; }
      .label.returnLabel { stroke: #c8b38f; }
      .label.waitLabel { stroke: #c7abd8; }
      .label.skipLabel { stroke: #d9abab; }
      .branchOk { fill: #f8f1e6; stroke: #a2743d; stroke-width: 1.8; }
      .branchWait { fill: #f7f0fb; stroke: #8e6aa9; stroke-width: 1.8; }
      .badge { stroke-width: 1.8; }
      .badge.callBadge { fill: #eaf4f8; stroke: #3f7d9c; }
      .badge.slotBadge { fill: #fff4df; stroke: #a2743d; }
      .badge.stateBadge { fill: #eef7f0; stroke: #6e8f4f; }
      .badge.returnBadge { fill: #fff7e8; stroke: #9b7d54; }
      .badge.waitBadge { fill: #f7f0fb; stroke: #8e6aa9; }
      .badge.skipBadge { fill: #fff0f0; stroke: #b86868; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; }
      .msg.callText, .badgeText.callText { fill: #2f6f8e; }
      .msg.slotText, .badgeText.slotText { fill: #855a29; }
      .msg.stateText, .badgeText.stateText { fill: #55783f; }
      .msg.returnText, .badgeText.returnText { fill: #7f6038; }
      .msg.waitText, .badgeText.waitText { fill: #774f92; }
      .msg.skipText, .badgeText.skipText { fill: #9d4f4f; }
    </style>
    <marker id="arrowCall" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#3f7d9c"/></marker>
    <marker id="arrowSlot" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#a2743d"/></marker>
    <marker id="arrowState" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#6e8f4f"/></marker>
    <marker id="arrowReturn" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#9b7d54"/></marker>
    <marker id="arrowWait" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#8e6aa9"/></marker>
    <marker id="arrowSkip" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#b86868"/></marker>
  </defs>

  <rect x="24" y="24" width="1552" height="1112" rx="20" class="frame"/>
  <text x="800" y="78" text-anchor="middle" class="title">minLeaseTime Delegated to Redis TTL</text>
  <text x="800" y="108" text-anchor="middle" class="subtitle">Fast group actions return immediately; release keeps the slot alive by extending the ZSET score with Redis server time.</text>

  <g>
    <rect x="64" y="150" width="138" height="68" rx="10" class="header"/>
    <text x="133" y="179" text-anchor="middle" class="participant">Caller</text>
    <text x="133" y="201" text-anchor="middle" class="role">fast action</text>
    <rect x="262" y="150" width="190" height="68" rx="10" class="header"/>
    <text x="357" y="179" text-anchor="middle" class="participant">GroupElector</text>
    <text x="357" y="201" text-anchor="middle" class="role">remainingMinLease</text>
    <rect x="518" y="150" width="205" height="68" rx="10" class="header"/>
    <text x="620" y="179" text-anchor="middle" class="participant">SlotTokenGroup</text>
    <text x="620" y="201" text-anchor="middle" class="role">release(token, ms)</text>
    <rect x="792" y="150" width="170" height="68" rx="10" class="header"/>
    <text x="877" y="179" text-anchor="middle" class="participant">Release Lua</text>
    <text x="877" y="201" text-anchor="middle" class="role">TIME + ZSCORE</text>
    <rect x="1036" y="150" width="184" height="68" rx="10" class="header"/>
    <text x="1128" y="179" text-anchor="middle" class="participant">Redis ZSET</text>
    <text x="1128" y="201" text-anchor="middle" class="role">score = expiry</text>
    <rect x="1280" y="150" width="150" height="68" rx="10" class="header"/>
    <text x="1355" y="179" text-anchor="middle" class="participant">Contender</text>
    <text x="1355" y="201" text-anchor="middle" class="role">waitTime path</text>
    <rect x="1460" y="150" width="110" height="68" rx="10" class="header"/>
    <text x="1515" y="179" text-anchor="middle" class="participant">Status</text>
    <text x="1515" y="201" text-anchor="middle" class="role">active slots</text>
  </g>

  <line x1="133" y1="218" x2="133" y2="1026" class="lifeline"/>
  <line x1="357" y1="218" x2="357" y2="1026" class="lifeline"/>
  <line x1="620" y1="218" x2="620" y2="1026" class="lifeline"/>
  <line x1="877" y1="218" x2="877" y2="1026" class="lifeline"/>
  <line x1="1128" y1="218" x2="1128" y2="1026" class="lifeline"/>
  <line x1="1355" y1="218" x2="1355" y2="1026" class="lifeline"/>
  <line x1="1515" y1="218" x2="1515" y2="1026" class="lifeline"/>
  <rect x="350" y="300" width="14" height="492" rx="6" class="activation"/>
  <rect x="613" y="360" width="14" height="520" rx="6" class="activation"/>
  <rect x="870" y="550" width="14" height="234" rx="6" class="activation"/>
  <rect x="1121" y="610" width="14" height="230" rx="6" class="activation"/>

  <rect x="72" y="260" width="430" height="34" rx="17" class="label callLabel"/>
  <circle cx="96" cy="277" r="13" class="badge callBadge"/><text x="96" y="282" text-anchor="middle" class="badgeText callText">1</text>
  <text x="120" y="282" class="msg callText">runIfLeader(minLeaseTime=1s) acquires token</text>
  <path d="M 133 318 L 620 318" class="call"/>

  <rect x="666" y="326" width="385" height="34" rx="17" class="label stateLabel"/>
  <circle cx="690" cy="343" r="13" class="badge stateBadge"/><text x="690" y="348" text-anchor="middle" class="badgeText stateText">2</text>
  <text x="714" y="348" class="msg stateText">ZADD token with initial leaseTime score</text>
  <path d="M 620 382 L 1128 382" class="state"/>

  <rect x="516" y="426" width="438" height="34" rx="17" class="label callLabel"/>
  <circle cx="540" cy="443" r="13" class="badge callBadge"/><text x="540" y="448" text-anchor="middle" class="badgeText callText">3</text>
  <text x="564" y="448" class="msg callText">action finishes before minLeaseTime elapses</text>
  <path d="M 620 500 L 133 500" class="return"/>

  <rect x="70" y="526" width="1478" height="398" rx="14" class="alt"/>
  <rect x="96" y="544" width="320" height="30" rx="15" class="branchOk"/>
  <text x="118" y="564" class="note">alt remainingMinLeaseMs &gt; 0</text>
  <line x1="70" y1="772" x2="1548" y2="772" class="branchDivider"/>
  <rect x="96" y="790" width="292" height="30" rx="15" class="branchWait"/>
  <text x="118" y="810" class="note">else TTL still blocks contenders</text>

  <rect x="426" y="548" width="394" height="34" rx="17" class="label slotLabel"/>
  <circle cx="450" cy="565" r="13" class="badge slotBadge"/><text x="450" y="570" text-anchor="middle" class="badgeText slotText">4</text>
  <text x="474" y="570" class="msg slotText">compute remainingMinLeaseMs after acquire</text>
  <path d="M 357 606 L 620 606" class="slot"/>

  <rect x="650" y="618" width="418" height="34" rx="17" class="label slotLabel"/>
  <circle cx="674" cy="635" r="13" class="badge slotBadge"/><text x="674" y="640" text-anchor="middle" class="badgeText slotText">5</text>
  <text x="698" y="640" class="msg slotText">release(token, remainingMs) calls Lua</text>
  <path d="M 620 688 L 877 688" class="slot"/>

  <rect x="832" y="704" width="410" height="34" rx="17" class="label stateLabel"/>
  <circle cx="856" cy="721" r="13" class="badge stateBadge"/><text x="856" y="726" text-anchor="middle" class="badgeText stateText">6</text>
  <text x="880" y="726" class="msg stateText">if ZSCORE &gt; nowMs, ZADD XX now+remaining</text>
  <path d="M 877 758 L 1128 758" class="state"/>

  <rect x="1020" y="804" width="420" height="34" rx="17" class="label waitLabel"/>
  <circle cx="1044" cy="821" r="13" class="badge waitBadge"/><text x="1044" y="826" text-anchor="middle" class="badgeText waitText">7</text>
  <text x="1068" y="826" class="msg waitText">contender sees active slot until score expires</text>
  <path d="M 1355 862 L 1128 862" class="wait"/>

  <rect x="540" y="864" width="490" height="34" rx="17" class="label returnLabel"/>
  <circle cx="564" cy="881" r="13" class="badge returnBadge"/><text x="564" y="886" text-anchor="middle" class="badgeText returnText">8</text>
  <text x="588" y="886" class="msg returnText">caller already returned; Redis carries the wait</text>
  <path d="M 620 916 L 133 916" class="return"/>

  <rect x="1044" y="944" width="355" height="34" rx="17" class="label stateLabel"/>
  <circle cx="1068" cy="961" r="13" class="badge stateBadge"/><text x="1068" y="966" text-anchor="middle" class="badgeText stateText">9</text>
  <text x="1092" y="966" class="msg stateText">STATUS prunes expired slots before counting</text>
  <path d="M 1515 996 L 1128 996" class="state"/>

  <rect x="98" y="1038" width="1404" height="44" rx="12" fill="#ffffff" stroke="#ccd7da" stroke-width="2"/>
  <text x="118" y="1066" class="note">This is lockAtLeastFor semantics without caller parking: RELEASE extends a live ZSET member; expired tokens are never resurrected.</text>
  <text x="800" y="1104" text-anchor="middle" class="footer">github.com/bluetape4k/bluetape4k-leader - leader-redis-lettuce README</text>
</svg>
