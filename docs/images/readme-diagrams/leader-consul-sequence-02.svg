<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1080" viewBox="0 0 1320 1080" role="img" aria-labelledby="title desc">
  <title id="title">leader-consul acquire release sequence</title>
  <desc id="desc">Sequence diagram showing Consul session creation, KV acquire contention, leader action execution, session renewal, release, session destroy, and TTL recovery.</desc>
  <defs>
    <marker markerUnits="userSpaceOnUse" id="arrow-blue" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb" stroke="#2563eb" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-orange" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#ea580c" stroke="#ea580c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-green" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#059669" stroke="#059669" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-purple" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c3aed" stroke="#7c3aed" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <style>
      .canvas { fill: #f8fafc; }
      .title { font-family: "Architects Daughter", "Comic Mono", "Comic Mono"; font-size: 34px; fill: #0f172a; font-weight: 700; }
      .subtitle { font-family: "Comic Mono", "Architects Daughter"; font-size: 15px; fill: #475569; }
      .participant-title { font-family: "Comic Mono", "Architects Daughter"; font-size: 14px; fill: #0f172a; font-weight: 700; }
      .participant-sub { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .label { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; font-weight: 700; }
      .frame-label { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; font-weight: 700; }
      .small { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .footer { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .participant { stroke-width: 1.8; rx: 14; }
      .caller { fill: #dbeafe; stroke: #2563eb; }
      .elector { fill: #fef3c7; stroke: #d97706; }
      .client { fill: #fce7f3; stroke: #db2777; }
      .session { fill: #dcfce7; stroke: #16a34a; }
      .kv { fill: #d1fae5; stroke: #059669; }
      .action { fill: #eef2ff; stroke: #4f46e5; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.8; stroke-dasharray: 8 8; }
      .activation { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 4; }
      .blue { fill: none; stroke: #2563eb; stroke-width: 2.3; marker-end: url(#arrow-blue); }
      .orange { fill: none; stroke: #ea580c; stroke-width: 2.3; marker-end: url(#arrow-orange); }
      .green { fill: none; stroke: #059669; stroke-width: 2.3; marker-end: url(#arrow-green); }
      .purple { fill: none; stroke: #7c3aed; stroke-width: 2.3; marker-end: url(#arrow-purple); }
      .return { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow-blue); }
      .frame-success { fill: rgba(16, 185, 129, 0.04); stroke: #059669; stroke-width: 1.8; rx: 14; }
      .frame-skip { fill: rgba(234, 88, 12, 0.04); stroke: #ea580c; stroke-width: 3; rx: 14; }
      .frame-recovery { fill: rgba(124, 58, 237, 0.04); stroke: #7c3aed; stroke-width: 1.8; stroke-dasharray: 9 7; rx: 14; }
      .badge { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 0.9; rx: 7; }
    </style>
  </defs>

  <rect class="canvas" width="1320" height="1080"/>
  <text class="title" x="660" y="62" text-anchor="middle">Consul Session + KV Lock Sequence</text>
  <text class="subtitle" x="660" y="90" text-anchor="middle">A short-lived Consul session owns the KV key; normal contention returns null, while TTL releases abandoned ownership.</text>

  <g>
    <rect class="participant caller" x="68" y="126" width="144" height="70"/>
    <text class="participant-title" x="140" y="154" text-anchor="middle">Caller</text>
    <text class="participant-sub" x="140" y="177" text-anchor="middle">job code</text>
    <line class="lifeline" x1="140" y1="196" x2="140" y2="984"/>

    <rect class="participant elector" x="272" y="126" width="176" height="70"/>
    <text class="participant-title" x="360" y="154" text-anchor="middle">Consul Elector</text>
    <text class="participant-sub" x="360" y="177" text-anchor="middle">single or group</text>
    <line class="lifeline" x1="360" y1="196" x2="360" y2="984"/>

    <rect class="participant client" x="514" y="126" width="178" height="70"/>
    <text class="participant-title" x="603" y="154" text-anchor="middle">Lock Client</text>
    <text class="participant-sub" x="603" y="177" text-anchor="middle">HTTP boundary</text>
    <line class="lifeline" x1="603" y1="196" x2="603" y2="984"/>

    <rect class="participant session" x="760" y="126" width="164" height="70"/><image data-bluetape4k-icon="consul" data-icon-source="testcontainers/infra/consul.svg" x="770" y="134" width="18" height="18" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/>
    <text class="participant-title" x="842" y="154" text-anchor="middle">Session API</text>
    <text class="participant-sub" x="842" y="177" text-anchor="middle">create / renew</text>
    <line class="lifeline" x1="842" y1="196" x2="842" y2="984"/>

    <rect class="participant kv" x="988" y="126" width="154" height="70"/>
    <text class="participant-title" x="1065" y="154" text-anchor="middle">KV API</text>
    <text class="participant-sub" x="1065" y="177" text-anchor="middle">acquire / release</text>
    <line class="lifeline" x1="1065" y1="196" x2="1065" y2="984"/>

    <rect class="participant action" x="1188" y="126" width="104" height="70"/>
    <text class="participant-title" x="1240" y="154" text-anchor="middle">Action</text>
    <text class="participant-sub" x="1240" y="177" text-anchor="middle">work</text>
    <line class="lifeline" x1="1240" y1="196" x2="1240" y2="984"/>
  </g>

  <rect class="activation" x="352" y="222" width="16" height="628"/>
  <rect class="activation" x="595" y="272" width="16" height="548"/>
  <rect class="activation" x="1057" y="352" width="16" height="332"/>
  <rect class="activation" x="1232" y="506" width="16" height="70"/>

  <path class="blue" d="M 140 236 L 360 236"/>
  <rect class="badge" x="188" y="211" width="124" height="22"/>
  <text class="label" x="250" y="227" text-anchor="middle" fill="#1d4ed8">1 runIfLeader</text>

  <path class="orange" d="M 368 286 L 603 286"/>
  <rect class="badge" x="413" y="261" width="146" height="22"/>
  <text class="label" x="486" y="277" text-anchor="middle" fill="#c2410c">2 create session</text>

  <path class="orange" d="M 611 316 L 842 316"/>
  <rect class="badge" x="650" y="291" width="156" height="22"/>
  <text class="label" x="728" y="307" text-anchor="middle" fill="#c2410c">Behavior=release</text>

  <path class="green" d="M 368 366 L 603 366"/>
  <rect class="badge" x="415" y="341" width="142" height="22"/>
  <text class="label" x="486" y="357" text-anchor="middle" fill="#047857">3 build lock key</text>

  <path class="green" d="M 611 398 L 1065 398"/>
  <rect class="badge" x="744" y="373" width="190" height="22"/>
  <text class="label" x="839" y="389" text-anchor="middle" fill="#047857">4 acquire with session</text>

  <rect class="frame-success" x="92" y="448" width="1180" height="284"/>
  <text class="frame-label" x="118" y="474" fill="#047857">alt acquired</text>

  <path class="purple" d="M 360 506 L 1240 506"/>
  <rect class="badge" x="665" y="481" width="270" height="22"/>
  <text class="label" x="800" y="497" text-anchor="middle" fill="#6d28d9">5 push LeaderLockHandle and run action</text>

  <path class="orange" d="M 603 550 L 842 550"/>
  <rect class="badge" x="648" y="525" width="150" height="22"/>
  <text class="label" x="723" y="541" text-anchor="middle" fill="#c2410c">optional renew</text>

  <path class="return" d="M 1240 590 L 360 590"/>
  <rect class="badge" x="716" y="598" width="168" height="22"/>
  <text class="label" x="800" y="614" text-anchor="middle" fill="#475569">action result</text>

  <path class="green" d="M 603 660 L 1065 660"/>
  <rect class="badge" x="734" y="635" width="210" height="22"/>
  <text class="label" x="839" y="651" text-anchor="middle" fill="#047857">release KV key</text>
  <path class="orange" d="M 603 700 L 842 700"/>
  <rect class="badge" x="642" y="669" width="162" height="22"/>
  <text class="label" x="723" y="685" text-anchor="middle" fill="#c2410c">destroy session</text>

  <rect class="frame-skip" x="92" y="760" width="1180" height="112"/>
  <text class="frame-label" x="118" y="787" fill="#c2410c">else contention</text>

  <path class="orange" d="M 603 816 L 842 816"/>
  <rect class="badge" x="646" y="791" width="154" height="22"/>
  <text class="label" x="723" y="807" text-anchor="middle" fill="#c2410c">destroy session</text>
  <path class="return" d="M 360 846 L 140 846"/>
  <rect class="badge" x="206" y="854" width="88" height="22"/>
  <text class="label" x="250" y="870" text-anchor="middle" fill="#475569">null</text>

  <rect class="frame-recovery" x="562" y="906" width="612" height="72"/>
  <text class="frame-label" x="588" y="934" fill="#6d28d9">crash or network loss</text>
  <path class="purple" d="M 842 956 L 1065 956"/>
  <rect class="badge" x="884" y="931" width="140" height="22"/>
  <text class="label" x="954" y="947" text-anchor="middle" fill="#6d28d9">TTL releases key</text>
  <text class="small" x="868" y="970" text-anchor="middle">lockDelay=0: fast reacquire; add idempotency or fencing for unsafe overlap.</text>

  <g transform="translate(166 1014)">
    <rect x="0" y="0" width="988" height="42" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="footer" x="494" y="18" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader / leader-consul</text>
    <text class="small" x="494" y="34" text-anchor="middle">Single locks use keyPrefix/single/{encodedLockName}; group locks scan keyPrefix/group/{encodedLockName}/slot-N.</text>
  </g>
</svg>
