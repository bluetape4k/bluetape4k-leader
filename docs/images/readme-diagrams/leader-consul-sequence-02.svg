<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1320" viewBox="0 0 1600 1320" role="img" aria-labelledby="title desc">
  <title id="title">leader-consul acquire release sequence</title>
  <desc id="desc">Sequence showing Consul session creation, KV acquire contention, leader action execution, optional renewal, release, session destroy, and TTL recovery.</desc>
  <defs>
    <style>
      .title { font-family: "Architects Daughter"; font-size: 40px; fill: #263238; }
      .subtitle, .msg, .note, .footer { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 18px; }
      .participant { font-family: "Architects Daughter"; font-size: 20px; fill: #1f3138; }
      .role { font-family: "Comic Mono"; font-size: 13px; fill: #546a73; }
      .msg { font-size: 14px; }
      .note { font-size: 13px; }
      .footer { font-size: 14px; fill: #60727d; }
      .frame { fill: #fbfcf8; stroke: #41545d; stroke-width: 3; }
      .header { fill: #ffffff; stroke: #546e7a; stroke-width: 2; }
      .lifeline { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      .activation { fill: #e6f2ec; stroke: #5b7e67; stroke-width: 1.5; }
      .call { fill: none; stroke: #3f7d9c; stroke-width: 3; marker-end: url(#arrowCall); }
      .work { fill: none; stroke: #6e8f4f; stroke-width: 3; marker-end: url(#arrowWork); }
      .return { fill: none; stroke: #9b7d54; stroke-width: 2.5; stroke-dasharray: 8 6; marker-end: url(#arrowReturn); }
      .skip { fill: none; stroke: #b86868; stroke-width: 3; marker-end: url(#arrowSkip); }
      .alt { fill: none; stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 7; }
      .branchDivider { stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 8; }
      .label { fill: #ffffff; stroke: #d7e0e4; stroke-width: 1.5; }
      .label.callLabel { stroke: #9cc2d1; }
      .label.workLabel { stroke: #b6c9a4; }
      .label.returnLabel { stroke: #c8b38f; }
      .label.skipLabel { stroke: #d9abab; }
      .branchOk { fill: #eef7f0; stroke: #6e8f4f; stroke-width: 1.8; }
      .branchSkip { fill: #fff5f5; stroke: #b86868; stroke-width: 3; }
      .branchRecover { fill: #f7f1ff; stroke: #7d66a8; stroke-width: 1.8; }
      .badge { stroke-width: 1.8; }
      .badge.callBadge { fill: #eaf4f8; stroke: #3f7d9c; }
      .badge.workBadge { fill: #eef7f0; stroke: #6e8f4f; }
      .badge.returnBadge { fill: #fff7e8; stroke: #9b7d54; }
      .badge.skipBadge { fill: #fff0f0; stroke: #b86868; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; fill: #ffffff; font-weight: 700; }
      .msg.callText, .badgeText.callText { fill: #2f6f8e; }
      .msg.workText, .badgeText.workText { fill: #55783f; }
      .msg.returnText, .badgeText.returnText { fill: #7f6038; }
      .msg.skipText, .badgeText.skipText { fill: #9d4f4f; }

      /* bluetape4k best-practices sequence style override: matches redis-lettuce sequence family. */
      text { letter-spacing: 0; }
      text.title { font-family: "Architects Daughter"; font-size: 40px; font-weight: 400; fill: #263238; }
      text.subtitle, text.msg, text.note, text.footer, text.small, text.detail, text.mono, text.tiny, text.role, text.participant-sub { font-family: "Comic Mono"; fill: #36464f; }
      text.subtitle { font-size: 18px; }
      text.participant, text.participant-title, text.cardTitle { font-family: "Architects Daughter"; font-size: 19px; font-weight: 400; fill: #1f3138; }
      text.role, text.participant-sub, text.detail, text.small, text.tiny { font-size: 13px; fill: #546a73; }
      text.msg, text.labelText, text.label, text.mono { font-family: "Comic Mono"; font-size: 14px; font-weight: 400; }
      text.note { font-size: 13px; }
      text.footer { font-size: 14px; fill: #60727d; }
      .canvas { fill: #fbfcf8; }
      .frame { fill: #fbfcf8; stroke: #41545d; stroke-width: 3; filter: none; }
      rect.header { fill: #ffffff; stroke: #546e7a; stroke-width: 2; }
      .lifeline, .life { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      rect.activation { fill: #f3ecdf; stroke: #8f784e; stroke-width: 1.5; }
      .call, .slot, .state, .skip, .wait, .edge, .edgeThin, .blue, .green, .orange, .purple, .amber, .callBlue, .callGreen, .callAmber, .callRed { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .return, .ret { fill: none; stroke-width: 2.5; stroke-dasharray: 8 6; stroke-linecap: round; stroke-linejoin: round; }
      .alt, .branch { fill: none; stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 7; }
      .branchDivider { stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 8; }
      rect.label, rect.pill, rect.altLabel, rect.badge { fill: #ffffff; stroke-width: 1.5; }
      text.badgeText, text.num { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; }
      .branchOk, .frame-success { fill: #f8f1e6; stroke: #a2743d; stroke-width: 1.8; }
      .branchSkip, .frame-skip { fill: #fff5f5; stroke: #b86868; stroke-width: 3; }
    </style>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowCall" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#3f7d9c" stroke="#3f7d9c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowWork" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#6e8f4f" stroke="#6e8f4f" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowReturn" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#9b7d54" stroke="#9b7d54" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowSkip" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#b86868" stroke="#b86868" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
  </defs>

  <rect x="24" y="24" width="1552" height="1272" rx="20" class="frame"/>
  <text x="800" y="78" text-anchor="middle" class="title">Consul Session + KV Lock Sequence</text>
  <text x="800" y="108" text-anchor="middle" class="subtitle">A short-lived Consul session owns the KV key; contention skips the action, while TTL releases abandoned ownership.</text>

  <g>
    <rect x="75" y="150" width="160" height="68" rx="10" class="header"/>
    <text x="155" y="179" text-anchor="middle" class="participant">Caller</text>
    <text x="155" y="201" text-anchor="middle" class="role">job code</text>
    <rect x="300" y="150" width="190" height="68" rx="10" class="header"/>
    <text x="395" y="179" text-anchor="middle" class="participant">ConsulElector</text>
    <text x="395" y="201" text-anchor="middle" class="role">single or group</text>
    <rect x="570" y="150" width="190" height="68" rx="10" class="header"/>
    <text x="665" y="179" text-anchor="middle" class="participant">LockClient</text>
    <text x="665" y="201" text-anchor="middle" class="role">HTTP boundary</text>
    <rect x="842" y="150" width="190" height="68" rx="10" class="header"/><image data-bluetape4k-icon="consul" data-icon-source="testcontainers/infra/consul.svg" x="852" y="158" width="18" height="18" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/>
    <text x="937" y="179" text-anchor="middle" class="participant">Session API</text>
    <text x="937" y="201" text-anchor="middle" class="role">create / renew</text>
    <rect x="1110" y="150" width="160" height="68" rx="10" class="header"/>
    <text x="1190" y="179" text-anchor="middle" class="participant">KV API</text>
    <text x="1190" y="201" text-anchor="middle" class="role">acquire / release</text>
    <rect x="1360" y="150" width="160" height="68" rx="10" class="header"/>
    <text x="1440" y="179" text-anchor="middle" class="participant">Action</text>
    <text x="1440" y="201" text-anchor="middle" class="role">user work</text>
  </g>

  <line x1="155" y1="218" x2="155" y2="1174" class="lifeline"/>
  <line x1="395" y1="218" x2="395" y2="1174" class="lifeline"/>
  <line x1="665" y1="218" x2="665" y2="1174" class="lifeline"/>
  <line x1="937" y1="218" x2="937" y2="1174" class="lifeline"/>
  <line x1="1190" y1="218" x2="1190" y2="1174" class="lifeline"/>
  <line x1="1440" y1="218" x2="1440" y2="1174" class="lifeline"/>
  <rect x="388" y="300" width="14" height="824" rx="6" class="activation"/>
  <rect x="658" y="360" width="14" height="642" rx="6" class="activation"/>
  <rect x="1183" y="448" width="14" height="496" rx="6" class="activation"/>
  <rect x="1433" y="636" width="14" height="84" rx="6" class="activation"/>

  <rect x="84" y="260" width="266" height="34" rx="17" class="label callLabel"/>
  <circle cx="108" cy="277" r="13" class="badge callBadge"/><text x="108" y="282" text-anchor="middle" class="badgeText callText">1</text>
  <text x="132" y="282" class="msg callText">runIfLeader(lockName)</text>
  <path d="M 155 318 L 395 318" class="call"/>

  <rect x="420" y="324" width="282" height="34" rx="17" class="label callLabel"/>
  <circle cx="444" cy="341" r="13" class="badge callBadge"/><text x="444" y="346" text-anchor="middle" class="badgeText callText">2</text>
  <text x="468" y="346" class="msg callText">create session with TTL</text>
  <path d="M 402 382 L 937 382" class="call"/>

  <rect x="615" y="388" width="270" height="34" rx="17" class="label callLabel"/>
  <circle cx="639" cy="405" r="13" class="badge callBadge"/><text x="639" y="410" text-anchor="middle" class="badgeText callText">3</text>
  <text x="663" y="410" class="msg callText">Behavior=release session</text>
  <path d="M 672 446 L 937 446" class="call"/>

  <rect x="448" y="454" width="278" height="34" rx="17" class="label workLabel"/>
  <circle cx="472" cy="471" r="13" class="badge workBadge"/><text x="472" y="476" text-anchor="middle" class="badgeText workText">4</text>
  <text x="496" y="476" class="msg workText">build encoded lock key</text>
  <path d="M 402 494 L 665 494" class="work"/>

  <rect x="78" y="510" width="1420" height="620" rx="14" class="alt"/>
  <rect x="102" y="528" width="222" height="30" rx="15" class="branchOk"/>
  <text x="123" y="548" class="note">alt acquired</text>
  <line x1="78" y1="1018" x2="1498" y2="1018" class="branchDivider"/>
  <rect x="102" y="1036" width="276" height="30" rx="15" class="branchSkip"/>
  <text x="123" y="1056" class="note">else contention / acquire failed</text>

  <rect x="830" y="568" width="332" height="34" rx="17" class="label workLabel"/>
  <circle cx="854" cy="585" r="13" class="badge workBadge"/><text x="854" y="590" text-anchor="middle" class="badgeText workText">5</text>
  <text x="878" y="590" class="msg workText">KV acquire with session id</text>
  <path d="M 672 626 L 1190 626" class="work"/>

  <rect x="890" y="636" width="442" height="34" rx="17" class="label workLabel"/>
  <circle cx="914" cy="653" r="13" class="badge workBadge"/><text x="914" y="658" text-anchor="middle" class="badgeText workText">6</text>
  <text x="938" y="658" class="msg workText">push LeaderLockHandle and run action</text>
  <path d="M 395 700 L 1440 700" class="work"/>

  <rect x="430" y="746" width="244" height="34" rx="17" class="label callLabel"/>
  <circle cx="454" cy="763" r="13" class="badge callBadge"/><text x="454" y="768" text-anchor="middle" class="badgeText callText">7</text>
  <text x="478" y="768" class="msg callText">optional renew loop</text>
  <path d="M 672 808 L 937 808" class="call"/>

  <rect x="606" y="822" width="300" height="34" rx="17" class="label returnLabel"/>
  <circle cx="630" cy="839" r="13" class="badge returnBadge"/><text x="630" y="844" text-anchor="middle" class="badgeText returnText">8</text>
  <text x="654" y="844" class="msg returnText">action result or failure</text>
  <path d="M 1440 874 L 395 874" class="return"/>

  <rect x="790" y="884" width="286" height="34" rx="17" class="label returnLabel"/>
  <circle cx="814" cy="901" r="13" class="badge returnBadge"/><text x="814" y="906" text-anchor="middle" class="badgeText returnText">9</text>
  <text x="838" y="906" class="msg returnText">release KV key</text>
  <path d="M 665 936 L 1190 936" class="return"/>

  <rect x="572" y="948" width="306" height="34" rx="17" class="label returnLabel"/>
  <circle cx="596" cy="965" r="13" class="badge returnBadge"/><text x="596" y="970" text-anchor="middle" class="badgeText returnText">10</text>
  <text x="620" y="970" class="msg returnText">destroy session</text>
  <path d="M 665 998 L 937 998" class="return"/>

  <rect x="620" y="1070" width="312" height="34" rx="17" class="label skipLabel"/>
  <circle cx="644" cy="1087" r="13" class="badge skipBadge"/><text x="644" y="1092" text-anchor="middle" class="badgeText skipText">6</text>
  <text x="668" y="1092" class="msg skipText">destroy session; action is not run</text>
  <path d="M 665 1124 L 937 1124" class="skip"/>

  <rect x="220" y="1104" width="224" height="34" rx="17" class="label returnLabel"/>
  <circle cx="244" cy="1121" r="13" class="badge returnBadge"/><text x="244" y="1126" text-anchor="middle" class="badgeText returnText">7</text>
  <text x="268" y="1126" class="msg returnText">return null</text>
  <path d="M 395 1156 L 155 1156" class="return"/>

  <rect x="862" y="1174" width="320" height="34" rx="17" class="branchRecover"/>
  <text x="884" y="1194" class="note">crash or network loss: session TTL expires</text>
  <rect x="910" y="1212" width="300" height="34" rx="17" class="label returnLabel"/>
  <circle cx="934" cy="1229" r="13" class="badge returnBadge"/><text x="934" y="1234" text-anchor="middle" class="badgeText returnText">11</text>
  <text x="958" y="1234" class="msg returnText">Consul releases abandoned KV key</text>
  <path d="M 937 1268 L 1190 1268" class="return"/>

  <rect x="98" y="1222" width="618" height="44" rx="12" fill="#ffffff" stroke="#ccd7da" stroke-width="2"/>
  <text x="118" y="1250" class="note">lockDelay=0 permits fast reacquire; unsafe overlap still needs idempotency or fencing.</text>
  <text x="800" y="1288" text-anchor="middle" class="footer">github.com/bluetape4k/bluetape4k-leader - leader-consul README</text>
</svg>
