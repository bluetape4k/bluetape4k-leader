<svg xmlns="http://www.w3.org/2000/svg" width="1078" height="1482" viewBox="0 0 1078 1482" role="img" aria-label="Single-leader: lock acquire/release">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 10 5 L 1 9" fill="none" stroke="#758297" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="inherit" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 1 L 12 6 L 0 11 Z" fill="#ffffff" stroke="#758297" stroke-width="1.8"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .title{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:43px;font-weight:400;fill:#102033}
    .subtitle{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:25px;font-weight:400;fill:#102033}
    .smallLabel{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:21px;font-weight:400;fill:#102033}
    .mono{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#536273}
    .strong{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:13px;font-weight:400;fill:#102033}
    .card{stroke-width:2.1;filter:url(#shadow)}.compartment{stroke-width:1.5;fill:none}
    .line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#openArrow)}
    .plainLine{stroke:#758297;stroke-width:2.1;fill:none}
    .dashed{stroke:#758297;stroke-width:2.1;stroke-dasharray:7 6;fill:none;marker-end:url(#openArrow)}
    .inheritLine{stroke:#758297;stroke-width:2.2;fill:none;marker-end:url(#inherit)}
    .implLine{stroke:#758297;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#inherit)}
  </style>
</defs>
<rect class="canvas" width="1078" height="1482"/>
<rect class="frame" x="32" y="28" width="1014" height="1426" rx="28"/>
<text class="title" x="66" y="82">Single-leader: lock acquire/release</text>
<text class="subtitle" x="70" y="118">Sequence messages from the original Mermaid source</text>
<rect class="card" x="25" y="166" width="230" height="72" rx="20" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="smallLabel" x="140" y="209" text-anchor="middle">Caller</text>
<line class="lifeline" x1="140" y1="252" x2="140" y2="1422" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="424" y="166" width="230" height="72" rx="20" fill="#EAF7EF" stroke="#58A978"/>
<text class="smallLabel" x="539" y="209" text-anchor="middle">LeaderElector</text>
<line class="lifeline" x1="539" y1="252" x2="539" y2="1422" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="823" y="166" width="230" height="72" rx="20" fill="#FFF3D9" stroke="#D6A441"/>
<text class="smallLabel" x="938" y="209" text-anchor="middle">LockStore</text>
<line class="lifeline" x1="938" y1="252" x2="938" y2="1422" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect x="192.5" y="286" width="294" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="210.5" y="313" text-anchor="start">1. runIfLeader(lockName, action)</text>
<path class="line" d="M140 344 L539 344"/>
<rect x="555" y="396" width="367" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="573" y="423" text-anchor="start">2. tryLock(lockName, waitTime, leaseTime)</text>
<path class="line" d="M539 454 L938 454"/>
<rect x="70" y="506" width="938" height="40" rx="16" fill="#F7F1E7" stroke="#B88A44" stroke-width="1.6" opacity="0.96"/>
<text class="strong" x="92" y="533" text-anchor="start">ALT: lock acquired</text>
<rect x="633.5" y="574" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="651.5" y="601" text-anchor="start">4. true</text>
<path class="dashed" d="M938 632 L539 632"/>
<rect x="234.5" y="684" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="252.5" y="711" text-anchor="start">5. action()</text>
<path class="line" d="M539 742 L140 742"/>
<rect x="234.5" y="794" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="252.5" y="821" text-anchor="start">6. result</text>
<path class="dashed" d="M140 852 L539 852"/>
<rect x="633.5" y="904" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="651.5" y="931" text-anchor="start">7. unlock(lockName)</text>
<path class="line" d="M539 962 L938 962"/>
<rect x="234.5" y="1014" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="252.5" y="1041" text-anchor="start">8. result (T)</text>
<path class="dashed" d="M539 1072 L140 1072"/>
<rect x="70" y="1124" width="938" height="40" rx="16" fill="#F7F1E7" stroke="#B88A44" stroke-width="1.6" opacity="0.96"/>
<text class="strong" x="92" y="1151" text-anchor="start">ELSE: not acquired within waitTime</text>
<rect x="633.5" y="1192" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="651.5" y="1219" text-anchor="start">10. false</text>
<path class="dashed" d="M938 1250 L539 1250"/>
<rect x="234.5" y="1302" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="252.5" y="1329" text-anchor="start">11. null</text>
<path class="dashed" d="M539 1360 L140 1360"/>
</svg>
