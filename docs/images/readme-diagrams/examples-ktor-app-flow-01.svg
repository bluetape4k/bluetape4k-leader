<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" width="1600" height="980" role="img" aria-label="Ktor App Flow">
<defs>
<marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#334155" stroke-dasharray="none"/></marker>
<marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#1d4ed8" stroke-dasharray="none"/></marker>
<marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#047857" stroke-dasharray="none"/></marker>
<marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 12 6 L 0 12 Z" fill="#b91c1c" stroke-dasharray="none"/></marker>
<filter id="soft" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.14"/></filter>
</defs>
<style>.bg{fill:#f8fafc}.title{font:700 34px 'Architects Daughter','Comic Mono',sans-serif;fill:#0f172a}.subtitle{font:400 17px 'Comic Mono','Architects Daughter',sans-serif;fill:#475569}.groupLabel{font:700 18px 'Comic Mono','Architects Daughter',sans-serif;fill:#334155}.cardTitle{font:700 18px 'Comic Mono','Architects Daughter',sans-serif;fill:#0f172a}.cardText{font:400 14px 'Comic Mono','Architects Daughter',sans-serif;fill:#475569}.small{font:400 13px 'Comic Mono','Architects Daughter',sans-serif;fill:#475569}.label{font:700 13px 'Comic Mono','Architects Daughter',sans-serif;fill:#334155}.line{fill:none;stroke:#334155;stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.lineBlue{fill:none;stroke:#1d4ed8;stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowBlue)}.lineGreen{fill:none;stroke:#047857;stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowGreen)}.lineRed{fill:none;stroke:#b91c1c;stroke-width:3.8;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowRed);stroke-dasharray:10 8}.lifeline{stroke:#cbd5e1;stroke-width:2.5;stroke-dasharray:8 8}.alt{fill:#eff6ff;stroke:#2563eb;stroke-width:2.4;stroke-dasharray:10 7;opacity:.55}.else{fill:#fff7ed;stroke:#ea580c;stroke-width:2.4;stroke-dasharray:10 7;opacity:.55}</style>
<rect class="bg" width="1600" height="980"/>
<path d="M80 104 H1520" stroke="#e2e8f0" stroke-width="2"/>
<text x="80" y="58" class="title">Ktor App Flow</text>
<text x="80" y="88" class="subtitle">Leader decision, selected work, and skip path kept in separate corridors</text>
<rect x="70" y="135" width="1460" height="735" rx="20" fill="#ffffff" stroke="#ea580c" stroke-width="2.2" stroke-dasharray="12 8" opacity="0.95"/>
<text x="94" y="169" class="groupLabel">One cycle execution flow</text><rect x="110" y="230" width="200" height="100" rx="14" fill="#eef2ff" stroke="#ea580c" stroke-width="2.4" filter="url(#soft)"/>
<text x="210" y="261" class="cardTitle" text-anchor="middle">Application start</text>
<text x="210" y="287" class="cardText" text-anchor="middle">cycle input</text><rect x="380" y="230" width="220" height="100" rx="14" fill="#f8fafc" stroke="#64748b" stroke-width="2.4" filter="url(#soft)"/>
<text x="490" y="261" class="cardTitle" text-anchor="middle">Install plugin</text>
<text x="490" y="287" class="cardText" text-anchor="middle">prepare runtime</text>
<text x="490" y="305" class="cardText" text-anchor="middle">context</text><rect x="690" y="220" width="220" height="120" rx="14" fill="#ecfeff" stroke="#2563eb" stroke-width="2.4" filter="url(#soft)"/>
<text x="800" y="251" class="cardTitle" text-anchor="middle">Schedule period</text>
<text x="800" y="277" class="cardText" text-anchor="middle">backend lease</text>
<text x="800" y="295" class="cardText" text-anchor="middle">boundary</text><path d="M1110 210 L1240 280 L1110 350 L980 280 Z" fill="#fff7ed" stroke="#f97316" stroke-width="2.6" filter="url(#soft)"/>
<text x="1110" y="274" class="cardTitle" text-anchor="middle">runIfLeader lock</text>
<text x="1110" y="298" class="cardText" text-anchor="middle">leader?</text><rect x="1040" y="465" width="250" height="105" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.4" filter="url(#soft)"/>
<text x="1165" y="496" class="cardTitle" text-anchor="middle">aggregate()</text>
<text x="1165" y="522" class="cardText" text-anchor="middle">selected branch only</text><rect x="1040" y="685" width="250" height="105" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="2.4" filter="url(#soft)"/>
<text x="1165" y="716" class="cardTitle" text-anchor="middle">Skip duplicate</text>
<text x="1165" y="742" class="cardText" text-anchor="middle">no domain work</text><rect x="1330" y="555" width="155" height="120" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2.4" filter="url(#soft)"/>
<text x="1407.5" y="586" class="cardTitle" text-anchor="middle">GET /stats</text>
<text x="1407.5" y="612" class="cardText" text-anchor="middle">pause or visible</text>
<text x="1407.5" y="630" class="cardText" text-anchor="middle">result</text><path d="M310 280 L380 280" class="lineBlue"/><path d="M600 280 L690 280" class="lineBlue"/><path d="M910 280 L980 280" class="lineBlue"/><rect x="900" y="242" width="88" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="944" y="258" class="label" text-anchor="middle" fill="#334155">try</text><path d="M1110 350 L1110 465" class="lineGreen"/><rect x="1110" y="394" width="88" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="1154" y="410" class="label" text-anchor="middle" fill="#334155">yes</text><path d="M1240 280 L1370 280 L1370 555" class="lineRed"/><rect x="1290" y="242" width="88" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="1334" y="258" class="label" text-anchor="middle" fill="#334155">no</text><path d="M1290 518 L1330 600" class="lineGreen"/><path d="M1290 738 L1330 640" class="lineRed"/><path d="M1408 675 L1408 830 L210 830 L210 330" class="line"/><rect x="723.5" y="794" width="93" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="770" y="810" class="label" text-anchor="middle" fill="#334155">next cycle</text></svg>
