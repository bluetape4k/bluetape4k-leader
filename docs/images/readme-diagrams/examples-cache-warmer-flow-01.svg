<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc" data-source-read="examples/cache-warmer/README.md; examples/cache-warmer/src/main/kotlin/io/bluetape4k/leader/examples/warmer/CachePartitionWarmer.kt; examples/cache-warmer/src/test/kotlin/io/bluetape4k/leader/examples/warmer/CachePartitionWarmerTest.kt">
<title id="title">Cache Warmer Flow</title>
<desc id="desc">warmAll processes partitions one by one, records warmed/skipped/failed outcomes, and rethrows cancellation.</desc>
<defs>
  <marker id="arrow-blue" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#3F73D8"/></marker>
  <marker id="arrow-green" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#2D8F64"/></marker>
  <marker id="arrow-orange" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#C96B2C"/></marker>
  <marker id="arrow-red" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#B94A5A"/></marker>
  <marker id="arrow-purple" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#755BC6"/></marker>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#B9C7D6" flood-opacity="0.24"/></filter>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:2.2;filter:url(#shadow)}
    .title{font-family:"Architects Daughter";font-size:40px;fill:#21334A}.subtitle,.label,.footer{font-family:"Comic Mono";fill:#4B6075}.subtitle{font-size:15px}.label{font-size:14px}.footer{font-size:13px}
    .step{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.8;filter:url(#shadow)}.start{fill:#FEF7E6;stroke:#E4BD67}.decision{fill:#EAF2FF;stroke:#8EB2F0}.success{fill:#EEF7F2;stroke:#8BC6A3}.skip{fill:#FFF1EA;stroke:#E8A47D}.fail{fill:#FDECEF;stroke:#DC8A98}.done{fill:#F4EEFF;stroke:#B7A3EC}
    .stepTitle{font-family:"Architects Daughter";font-size:22px;fill:#21334A}.stepText{font-family:"Comic Mono";font-size:13px;fill:#4B6075}.route{fill:none;stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:7 6}
  </style>
</defs>
<rect class="canvas" width="1280" height="760"/>
<rect class="frame" x="34" y="28" width="1212" height="704" rx="30"/>
<text class="title" x="72" y="84">Cache Warmer Flow</text>
<text class="subtitle" x="76" y="116">Each partition is handled independently; failures are recorded and cancellation is rethrown.</text>

<rect class="step start" x="78" y="198" width="224" height="88" rx="18"/>
<text class="stepTitle" x="112" y="234">1. Start warmAll</text>
<text class="stepText" x="112" y="262">empty result buckets</text>

<rect class="step" x="376" y="198" width="230" height="88" rx="18"/>
<text class="stepTitle" x="410" y="234">2. Pick partition</text>
<text class="stepText" x="410" y="262">sequential forEach</text>

<rect class="step decision" x="650" y="176" width="230" height="112" rx="18"/>
<text class="stepTitle" x="684" y="214">3. Elect leader</text>
<text class="stepText" x="684" y="242">lock = prefix-partition</text>
<text class="stepText" x="684" y="264">runIfLeader(lock)</text>

<rect class="step success" x="1000" y="150" width="202" height="88" rx="18"/>
<text class="stepTitle" x="1030" y="186">4a. Acquired</text>
<text class="stepText" x="1030" y="214">warmFunction(partition)</text>
<text class="stepText" x="1030" y="232">then continue</text>
<rect class="step skip" x="1000" y="284" width="202" height="88" rx="18"/>
<text class="stepTitle" x="1030" y="320">4b. Not leader</text>
<text class="stepText" x="1030" y="348">record skipped</text>
<text class="stepText" x="1030" y="366">then continue</text>
<rect class="step fail" x="1000" y="418" width="202" height="88" rx="18"/>
<text class="stepTitle" x="1030" y="454">4c. Exception</text>
<text class="stepText" x="1030" y="482">record failed message</text>
<text class="stepText" x="1030" y="500">then continue</text>

<rect class="step fail" x="650" y="438" width="230" height="88" rx="18"/>
<text class="stepTitle" x="684" y="474">Cancellation</text>
<text class="stepText" x="684" y="502">rethrow immediately</text>

<rect class="step done" x="376" y="566" width="230" height="88" rx="18"/>
<text class="stepTitle" x="410" y="602">5. Next partition</text>
<text class="stepText" x="410" y="630">continue loop</text>
<rect class="step done" x="650" y="566" width="230" height="88" rx="18"/>
<text class="stepTitle" x="684" y="602">6. Return result</text>
<text class="stepText" x="684" y="630">warmed/skipped/failed</text>

<path class="route" d="M 302 242 L 376 242" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 606 242 L 650 242" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 880 206 L 944 206 L 944 194 L 1000 194" stroke="#2D8F64" marker-end="url(#arrow-green)"/>
<path class="route" d="M 880 252 L 952 252 L 952 328 L 1000 328" stroke="#C96B2C" marker-end="url(#arrow-orange)"/>
<path class="route" d="M 840 288 L 840 398 L 968 398 L 968 462 L 1000 462" stroke="#B94A5A" marker-end="url(#arrow-red)"/>
<path class="route dash" d="M 765 288 L 765 438" stroke="#B94A5A" marker-end="url(#arrow-red)"/>
<path class="route dash" d="M 376 610 C 254 610 190 442 190 286" stroke="#755BC6" marker-end="url(#arrow-purple)"/>
<path class="route" d="M 606 610 L 650 610" stroke="#755BC6" marker-end="url(#arrow-purple)"/>

<text class="label" x="214" y="590">more partitions</text>
<text class="footer" x="640" y="710" text-anchor="middle">bluetape4k-leader/examples/cache-warmer</text>
</svg>
