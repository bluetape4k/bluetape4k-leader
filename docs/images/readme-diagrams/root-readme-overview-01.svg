<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Bluetape4k Leader Repository Overview</title>
  <desc id="desc">Repository overview: core contracts, backend adapters, integrations, benchmark, and runnable examples.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#5278c9"/>
    </marker>
    <marker id="arrow-green" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#3d8f7b"/>
    </marker>
    <style>
      .canvas { fill: #f7fafc; }
      .frame { fill: #ffffff; stroke: #8aa4c8; stroke-width: 3; }
      .title { font-family: "Architects Daughter"; font-size: 42px; fill: #2f4564; }
      .subtitle, .footer, .detail { font-family: "Comic Mono"; fill: #536477; }
      .subtitle { font-size: 17px; }
      .footer { font-size: 14px; }
      .band-title { font-family: "Architects Daughter"; font-size: 23px; fill: #334766; }
      .band-note { font-family: "Comic Mono"; font-size: 13px; fill: #5f6f82; }
      .chip { stroke-width: 2; rx: 16; }
      .chip-label { font-family: "Architects Daughter"; font-size: 18px; fill: #2f3f55; }
      .chip-detail { font-family: "Comic Mono"; font-size: 12px; fill: #596879; }
      .route { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .route-label { font-family: "Comic Mono"; font-size: 13px; fill: #476082; }
      .legend { font-family: "Comic Mono"; font-size: 13px; fill: #596879; }
    </style>
  </defs>

  <rect class="canvas" width="1400" height="900"/>
  <rect class="frame" x="44" y="36" width="1312" height="828" rx="28"/>

  <text class="title" x="700" y="92" text-anchor="middle">Bluetape4k Leader Repository Overview</text>
  <text class="subtitle" x="700" y="124" text-anchor="middle">One adoption path: application code calls core contracts, then chooses a distributed backend, integration, and example pattern.</text>

  <rect x="92" y="162" width="1216" height="128" rx="20" fill="#eaf2ff" stroke="#bed0ee" stroke-width="2"/>
  <text class="band-title" x="126" y="204">Core contracts</text>
  <text class="band-note" x="126" y="260">Primary APIs that application code calls before choosing a backend.</text>
  <g>
    <rect class="chip" x="360" y="186" width="145" height="58" fill="#ffffff" stroke="#9fb9df"/>
    <text class="chip-label" x="432.5" y="213" text-anchor="middle">Blocking</text>
    <text class="chip-detail" x="432.5" y="234" text-anchor="middle">LeaderElector</text>
    <rect class="chip" x="532" y="186" width="145" height="58" fill="#ffffff" stroke="#9fb9df"/>
    <text class="chip-label" x="604.5" y="213" text-anchor="middle">Async</text>
    <text class="chip-detail" x="604.5" y="234" text-anchor="middle">CompletableFuture</text>
    <rect class="chip" x="704" y="186" width="145" height="58" fill="#ffffff" stroke="#9fb9df"/>
    <text class="chip-label" x="776.5" y="213" text-anchor="middle">Suspend</text>
    <text class="chip-detail" x="776.5" y="234" text-anchor="middle">coroutines</text>
    <rect class="chip" x="876" y="186" width="145" height="58" fill="#ffffff" stroke="#9fb9df"/>
    <text class="chip-label" x="948.5" y="213" text-anchor="middle">Virtual thread</text>
    <text class="chip-detail" x="948.5" y="234" text-anchor="middle">JVM 21</text>
    <rect class="chip" x="1048" y="186" width="145" height="58" fill="#ffffff" stroke="#9fb9df"/>
    <text class="chip-label" x="1120.5" y="213" text-anchor="middle">Group slots</text>
    <text class="chip-detail" x="1120.5" y="234" text-anchor="middle">N leaders</text>
  </g>

  <rect x="92" y="332" width="1216" height="188" rx="20" fill="#edf8f3" stroke="#abd6c6" stroke-width="2"/>
  <text class="band-title" x="126" y="374">Distributed backend families</text>
  <text class="band-note" x="126" y="399">Backend modules translate the same core contract to different ownership primitives.</text>
  <g>
    <rect class="chip" x="270" y="420" width="168" height="64" fill="#ffffff" stroke="#8dc7b5"/>
    <text class="chip-label" x="354" y="448" text-anchor="middle">Redis</text>
    <text class="chip-detail" x="354" y="470" text-anchor="middle">Lettuce, Redisson</text>
    <rect class="chip" x="466" y="420" width="168" height="64" fill="#ffffff" stroke="#8dc7b5"/>
    <text class="chip-label" x="550" y="448" text-anchor="middle">SQL/R2DBC</text>
    <text class="chip-detail" x="550" y="470" text-anchor="middle">Exposed backends</text>
    <rect class="chip" x="662" y="420" width="168" height="64" fill="#ffffff" stroke="#8dc7b5"/>
    <text class="chip-label" x="746" y="448" text-anchor="middle">Document/Cloud</text>
    <text class="chip-detail" x="746" y="470" text-anchor="middle">MongoDB, DynamoDB</text>
    <rect class="chip" x="858" y="420" width="168" height="64" fill="#ffffff" stroke="#8dc7b5"/>
    <text class="chip-label" x="942" y="448" text-anchor="middle">Coordination</text>
    <text class="chip-detail" x="942" y="470" text-anchor="middle">etcd, Consul, K8s</text>
    <rect class="chip" x="1054" y="420" width="168" height="64" fill="#ffffff" stroke="#8dc7b5"/>
    <text class="chip-label" x="1138" y="448" text-anchor="middle">Cluster recipes</text>
    <text class="chip-detail" x="1138" y="470" text-anchor="middle">Hazelcast, ZooKeeper</text>
  </g>

  <rect x="92" y="562" width="588" height="156" rx="20" fill="#fff7e8" stroke="#e7c988" stroke-width="2"/>
  <text class="band-title" x="126" y="604">Application integrations</text>
  <text class="band-note" x="126" y="629">Framework modules add service-level entry points.</text>
  <rect class="chip" x="162" y="660" width="142" height="44" fill="#ffffff" stroke="#d9b76e"/>
  <text class="chip-label" x="233" y="687" text-anchor="middle">Spring Boot</text>
  <rect class="chip" x="326" y="660" width="142" height="44" fill="#ffffff" stroke="#d9b76e"/>
  <text class="chip-label" x="397" y="687" text-anchor="middle">Ktor 3.x</text>
  <rect class="chip" x="490" y="660" width="142" height="44" fill="#ffffff" stroke="#d9b76e"/>
  <text class="chip-label" x="561" y="687" text-anchor="middle">Micrometer</text>

  <rect x="720" y="562" width="588" height="156" rx="20" fill="#f6efff" stroke="#c9b3ee" stroke-width="2"/>
  <text class="band-title" x="754" y="604">Examples and measurement</text>
  <text class="band-note" x="754" y="629">Examples and benchmarks show scenario and backend behavior.</text>
  <rect class="chip" x="790" y="660" width="166" height="44" fill="#ffffff" stroke="#b99de0"/>
  <text class="chip-label" x="873" y="687" text-anchor="middle">17 examples</text>
  <rect class="chip" x="982" y="660" width="142" height="44" fill="#ffffff" stroke="#b99de0"/>
  <text class="chip-label" x="1053" y="687" text-anchor="middle">Benchmark</text>
  <rect class="chip" x="1150" y="660" width="118" height="44" fill="#ffffff" stroke="#b99de0"/>
  <text class="chip-label" x="1209" y="687" text-anchor="middle">BOM</text>

  <path class="route" d="M700 290 L700 332" stroke="#5278c9" marker-end="url(#arrow-blue)"/>
  <text class="route-label" x="720" y="318">choose backend</text>
  <path class="route" d="M386 562 L386 520" stroke="#3d8f7b" marker-end="url(#arrow-green)"/>
  <text class="route-label" x="406" y="546">wire core</text>
  <path class="route" d="M1014 562 L1014 520" stroke="#3d8f7b" marker-end="url(#arrow-green)"/>
  <text class="route-label" x="1034" y="546">prove scenarios</text>

  <rect x="110" y="762" width="1180" height="54" rx="18" fill="#f8fbff" stroke="#d4deeb" stroke-width="2"/>
  <text class="footer" x="700" y="786" text-anchor="middle">Start with leader-core contracts, pick one backend adapter, then add Spring/Ktor/Micrometer or copy a runnable example.</text>
  <text class="footer" x="700" y="808" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader</text>
</svg>
