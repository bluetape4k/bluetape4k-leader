<g id="start">
  <rect class="card" x="80" y="155" width="260" height="90" rx="14" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="label" x="210" y="194.5" text-anchor="middle" dominant-baseline="middle">Scheduled tick</text>
<text class="detail" x="210" y="213.5" text-anchor="middle" dominant-baseline="middle">build SchedulerRunId</text>
</g>
<g id="config">
  <rect class="card" x="410" y="155" width="300" height="90" rx="14" fill="#E9F7F6" stroke="#45A7A1"/>
<text class="label" x="560" y="185" text-anchor="middle" dominant-baseline="middle">Validate inputs</text>
<text class="detail" x="560" y="204" text-anchor="middle" dominant-baseline="middle">nodeId, lockName</text>
<text class="detail" x="560" y="223" text-anchor="middle" dominant-baseline="middle">basePath, scheduleId</text>
</g>
<g id="elect">
  <rect class="card" x="780" y="155" width="300" height="90" rx="14" fill="#F1ECFF" stroke="#8A72D6"/>
<text class="label" x="930" y="185" text-anchor="middle" dominant-baseline="middle">runIfLeader</text>
<text class="detail" x="930" y="204" text-anchor="middle" dominant-baseline="middle">ZooKeeperLeaderElector</text>
<text class="detail" x="930" y="223" text-anchor="middle" dominant-baseline="middle">waitTime window</text>
</g>
<g id="decision">
  <path class="card" d="M1215 140 L1290 200 L1215 260 L1140 200 Z" fill="#FFF3D9" stroke="#D6A441"/>
<text class="label" x="1215" y="194.5" text-anchor="middle" dominant-baseline="middle">Leadership?</text>
<text class="detail" x="1215" y="213.5" text-anchor="middle" dominant-baseline="middle">lock acquired</text>
</g>
<g id="execute">
  <rect class="card" x="910" y="355" width="300" height="90" rx="14" fill="#EAF7EF" stroke="#58A978"/>
<text class="label" x="1060" y="394.5" text-anchor="middle" dominant-baseline="middle">Execute job body</text>
<text class="detail" x="1060" y="413.5" text-anchor="middle" dominant-baseline="middle">legacy work runs once</text>
</g>
<g id="steps">
  <rect class="card" x="570" y="355" width="300" height="90" rx="14" fill="#E9F7F6" stroke="#45A7A1"/>
<text class="label" x="720" y="394.5" text-anchor="middle" dominant-baseline="middle">Validate completed steps</text>
<text class="detail" x="720" y="413.5" text-anchor="middle" dominant-baseline="middle">requireNotBlank</text>
</g>
<g id="executed">
  <rect class="card" x="260" y="545" width="300" height="90" rx="14" fill="#EAF7EF" stroke="#58A978"/>
<text class="label" x="410" y="584.5" text-anchor="middle" dominant-baseline="middle">Return EXECUTED</text>
<text class="detail" x="410" y="603.5" text-anchor="middle" dominant-baseline="middle">steps + elapsed time</text>
</g>
<g id="skipped">
  <rect class="card" x="940" y="545" width="300" height="90" rx="14" fill="#FDECEF" stroke="#DC6B82"/>
<text class="label" x="1090" y="575" text-anchor="middle" dominant-baseline="middle">Return SKIPPED</text>
<text class="detail" x="1090" y="594" text-anchor="middle" dominant-baseline="middle">empty steps</text>
<text class="detail" x="1090" y="613" text-anchor="middle" dominant-baseline="middle">body not invoked</text>
</g>
