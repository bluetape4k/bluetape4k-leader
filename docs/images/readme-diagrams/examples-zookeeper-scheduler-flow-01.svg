  <rect class="card" x="360" y="630" width="320" height="90" rx="14" fill="#EAF7EF" stroke="#58A978"/>
<text class="label" x="520" y="669.5" text-anchor="middle" dominant-baseline="middle">Return EXECUTED</text>
<text class="detail" x="520" y="688.5" text-anchor="middle" dominant-baseline="middle">steps + elapsed time</text>
</g>
