  <rect class="card" x="930" y="415" width="320" height="90" rx="14" fill="#EAF7EF" stroke="#58A978"/>
<text class="label" x="1090" y="454.5" text-anchor="middle" dominant-baseline="middle">Execute job body</text>
<text class="detail" x="1090" y="473.5" text-anchor="middle" dominant-baseline="middle">legacy work runs once</text>
</g>
