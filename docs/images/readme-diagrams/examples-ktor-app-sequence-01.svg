<svg xmlns="http://www.w3.org/2000/svg" width="1660" height="1262" viewBox="0 0 1660 1262" role="img" aria-label="ktor app Sequence Flow">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 10 5 L 1 9" fill="none" stroke="#758297" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="inherit" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 1 L 12 6 L 0 11 Z" fill="#ffffff" stroke="#758297" stroke-width="1.8"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .title{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:43px;font-weight:400;fill:#102033}
    .subtitle{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:25px;font-weight:400;fill:#102033}
    .smallLabel{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:21px;font-weight:400;fill:#102033}
    .mono{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#536273}
    .strong{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:13px;font-weight:400;fill:#102033}
    .card{stroke-width:2.1;filter:url(#shadow)}.compartment{stroke-width:1.5;fill:none}
    .line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#openArrow)}
    .plainLine{stroke:#758297;stroke-width:2.1;fill:none}
    .dashed{stroke:#758297;stroke-width:2.1;stroke-dasharray:7 6;fill:none;marker-end:url(#openArrow)}
    .inheritLine{stroke:#758297;stroke-width:2.2;fill:none;marker-end:url(#inherit)}
    .implLine{stroke:#758297;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#inherit)}
  </style>
</defs>
<rect class="canvas" width="1660" height="1262"/>
<rect class="frame" x="32" y="28" width="1596" height="1206" rx="28"/>
<text class="title" x="66" y="82">ktor app Sequence Flow</text>
<text class="subtitle" x="70" y="118">Sequence messages from the original Mermaid source</text>
<rect class="card" x="35" y="166" width="210" height="72" rx="20" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="smallLabel" x="140" y="209" text-anchor="middle">Client</text>
<line x1="140" y1="252" x2="140" y2="1202" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="311" y="166" width="210" height="72" rx="20" fill="#EAF7EF" stroke="#58A978"/>
<text class="smallLabel" x="416" y="209" text-anchor="middle">Ktor Node-1</text>
<line x1="416" y1="252" x2="416" y2="1202" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="587" y="166" width="210" height="72" rx="20" fill="#FFF3D9" stroke="#D6A441"/>
<text class="smallLabel" x="692" y="209" text-anchor="middle">Ktor Node-2</text>
<line x1="692" y1="252" x2="692" y2="1202" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="863" y="166" width="210" height="72" rx="20" fill="#FDECEF" stroke="#DC6B82"/>
<text class="smallLabel" x="968" y="198.5" text-anchor="middle">Leader Election</text>
<text class="smallLabel" x="968" y="219.5" text-anchor="middle">Plugin</text>
<line x1="968" y1="252" x2="968" y2="1202" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="1139" y="166" width="210" height="72" rx="20" fill="#E9F7F6" stroke="#45A7A1"/>
<text class="smallLabel" x="1244" y="209" text-anchor="middle">StatsAggregator</text>
<line x1="1244" y1="252" x2="1244" y2="1202" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="1415" y="166" width="210" height="72" rx="20" fill="#F1ECFF" stroke="#8A72D6"/>
<text class="smallLabel" x="1520" y="209" text-anchor="middle">Redis</text>
<line x1="1520" y1="252" x2="1520" y2="1202" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect x="434" y="270" width="516" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="450" y="297" text-anchor="start">1. install + leaderScheduled(hourly-stats-aggregation, 1h)</text>
<path class="line" d="M416 310 L968 310"/>
<rect x="710" y="352" width="240" height="62" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="726" y="379" text-anchor="start">2. install + leader</text>
<text class="strong" x="726" y="402" text-anchor="start">Scheduled(hourly-stats-aggregation, 1h)</text>
<path class="line" d="M692 392 L968 392"/>
<rect x="434" y="434" width="1068" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="450" y="461" text-anchor="start">3. SET hourly-stats-aggregation NX EX 60s</text>
<path class="line" d="M416 474 L1520 474"/>
<rect x="710" y="516" width="792" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="726" y="543" text-anchor="start">4. SET hourly-stats-aggregation NX EX 60s</text>
<path class="line" d="M692 556 L1520 556"/>
<rect x="434" y="598" width="1068" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="450" y="625" text-anchor="start">5. OK (leader)</text>
<path class="dashed" d="M1520 638 L416 638"/>
<rect x="710" y="680" width="792" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="726" y="707" text-anchor="start">6. nil (skip)</text>
<path class="dashed" d="M1520 720 L692 720"/>
<rect x="434" y="762" width="792" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="450" y="789" text-anchor="start">7. aggregate()</text>
<path class="line" d="M416 802 L1244 802"/>
<rect x="158" y="844" width="240" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="871" text-anchor="start">8. GET /stats</text>
<path class="line" d="M140 884 L416 884"/>
<rect x="158" y="926" width="240" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="953" text-anchor="start">9. {runCount, lastRunAt}</text>
<path class="dashed" d="M416 966 L140 966"/>
<rect x="158" y="1008" width="516" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="1035" text-anchor="start">10. GET /health</text>
<path class="line" d="M140 1048 L692 1048"/>
<rect x="158" y="1090" width="516" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="1117" text-anchor="start">11. {status: UP}</text>
<path class="dashed" d="M692 1130 L140 1130"/>
</svg>
