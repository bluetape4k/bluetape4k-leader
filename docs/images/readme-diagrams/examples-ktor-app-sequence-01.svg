<path class="line" d="M140 1250 L543.2 1250"/>
<rect x="222.60000000000002" y="1302" width="238" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="240.60000000000002" y="1329" text-anchor="start">11. {runCount, lastRunAt}</text>
<path class="dashed" d="M543.2 1360 L140 1360"/>
<rect x="438.20000000000005" y="1412" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="456.20000000000005" y="1439" text-anchor="start">12. GET /health</text>
<path class="line" d="M140 1470 L946.4 1470"/>
<rect x="438.20000000000005" y="1522" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
