<rect x="694.4" y="286" width="504" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="712.4" y="313" text-anchor="start">1. install + leaderScheduled(hourly-stats-aggregation, 1h)</text>
<path class="line" d="M543.2 344 L1349.6 344"/>
<rect x="896" y="396" width="504" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="914" y="423" text-anchor="start">2. install + leaderScheduled(hourly-stats-aggregation, 1h)</text>
<path class="line" d="M946.4 454 L1349.6 454"/>
<rect x="70" y="506" width="2156" height="40" rx="16" fill="#F7F1E7" stroke="#B88A44" stroke-width="1.6" opacity="0.96"/>
<text class="strong" x="92" y="533" text-anchor="start">PAR: Cycle 1</text>
<rect x="1166.1" y="574" width="367" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="1184.1" y="601" text-anchor="start">4. SET hourly-stats-aggregation NX EX 60s</text>
<path class="line" d="M543.2 632 L2156 632"/>
<rect x="70" y="684" width="2156" height="40" rx="16" fill="#F7F1E7" stroke="#B88A44" stroke-width="1.6" opacity="0.96"/>
