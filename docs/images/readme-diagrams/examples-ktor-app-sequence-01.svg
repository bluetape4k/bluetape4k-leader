<text class="strong" x="1464.2" y="999" text-anchor="start">8. nil (skip)</text>
<path class="dashed" d="M2156 1030 L946.4 1030"/>
<rect x="1043" y="1082" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="1061" y="1109" text-anchor="start">9. aggregate()</text>
