<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" width="1600" height="980" role="img" aria-label="Ktor App Sequence">
<defs>
<marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#334155" stroke-dasharray="none"/></marker>
<marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#1d4ed8" stroke-dasharray="none"/></marker>
<marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#047857" stroke-dasharray="none"/></marker>
<marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 12 6 L 0 12 Z" fill="#b91c1c" stroke-dasharray="none"/></marker>
<filter id="soft" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.14"/></filter>
</defs>
<style>.bg{fill:#f8fafc}.title{font:700 34px 'Architects Daughter','Comic Mono',sans-serif;fill:#0f172a}.subtitle{font:400 17px 'Comic Mono','Architects Daughter',sans-serif;fill:#475569}.groupLabel{font:700 18px 'Comic Mono','Architects Daughter',sans-serif;fill:#334155}.cardTitle{font:700 18px 'Comic Mono','Architects Daughter',sans-serif;fill:#0f172a}.cardText{font:400 14px 'Comic Mono','Architects Daughter',sans-serif;fill:#475569}.small{font:400 13px 'Comic Mono','Architects Daughter',sans-serif;fill:#475569}.label{font:700 13px 'Comic Mono','Architects Daughter',sans-serif;fill:#334155}.line{fill:none;stroke:#334155;stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.lineBlue{fill:none;stroke:#1d4ed8;stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowBlue)}.lineGreen{fill:none;stroke:#047857;stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowGreen)}.lineRed{fill:none;stroke:#b91c1c;stroke-width:3.8;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowRed);stroke-dasharray:10 8}.lifeline{stroke:#cbd5e1;stroke-width:2.5;stroke-dasharray:8 8}.alt{fill:#eff6ff;stroke:#2563eb;stroke-width:2.4;stroke-dasharray:10 7;opacity:.55}.else{fill:#fff7ed;stroke:#ea580c;stroke-width:2.4;stroke-dasharray:10 7;opacity:.55}</style>
<rect class="bg" width="1600" height="980"/>
<path d="M80 104 H1520" stroke="#e2e8f0" stroke-width="2"/>
<text x="80" y="58" class="title">Ktor App Sequence</text>
<text x="80" y="88" class="subtitle">Redis / Lettuce selected and skipped branches</text>
<rect x="75" y="145" width="210" height="70" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2.4" filter="url(#soft)"/>
<text x="180" y="176" class="cardTitle" text-anchor="middle">Ktor Replica A</text>

<path d="M180 215 L180 855" class="lifeline"/>
<rect x="375" y="145" width="210" height="70" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2.4" filter="url(#soft)"/>
<text x="480" y="176" class="cardTitle" text-anchor="middle">Ktor Replica B</text>

<path d="M480 215 L480 855" class="lifeline"/>
<rect x="675" y="145" width="210" height="70" rx="14" fill="#ffffff" stroke="#ea580c" stroke-width="2.4" filter="url(#soft)"/>
<text x="780" y="176" class="cardTitle" text-anchor="middle">Redis Lock</text>

<path d="M780 215 L780 855" class="lifeline"/>
<rect x="975" y="145" width="210" height="70" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2.4" filter="url(#soft)"/>
<text x="1080" y="176" class="cardTitle" text-anchor="middle">StatsAggregator</text>

<path d="M1080 215 L1080 855" class="lifeline"/>
<rect x="1275" y="145" width="210" height="70" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2.4" filter="url(#soft)"/>
<text x="1380" y="176" class="cardTitle" text-anchor="middle">HTTP Client</text>

<path d="M1380 215 L1380 855" class="lifeline"/>
<path d="M204 285 L756 285" class="lineBlue"/><rect x="392.25" y="252" width="175.5" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="480" y="268" class="label" text-anchor="middle" fill="#1d4ed8">leaderScheduled(lock)</text><rect x="125" y="340" width="1340" height="245" rx="16" class="alt"/>
<text x="150" y="368" class="label" fill="#1d4ed8">alt selected leader</text><path d="M804 425 L1056 425" class="lineGreen"/><rect x="816" y="392" width="228" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="930" y="408" class="label" text-anchor="middle" fill="#047857">aggregate() increments count</text><path d="M1104 505 L1356 505" class="lineGreen"/><rect x="1127.25" y="472" width="205.5" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="1230" y="488" class="label" text-anchor="middle" fill="#047857">/stats sees updated state</text><rect x="125" y="625" width="1340" height="160" rx="16" class="else"/>
<text x="150" y="653" class="label" fill="#ea580c">else contender / standby</text><path d="M504 695 L756 695" class="lineRed"/><rect x="564.75" y="662" width="130.5" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="630" y="678" class="label" text-anchor="middle" fill="#b91c1c">same Redis lock</text><path d="M804 755 L1356 755" class="lineRed"/><rect x="973.5" y="722" width="213" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="1080" y="738" class="label" text-anchor="middle" fill="#b91c1c">null -&gt; no duplicate cycle</text><rect x="260" y="850" width="1080" height="66" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2.4" filter="url(#soft)"/>
<text x="800" y="881" class="cardTitle" text-anchor="middle">Branch rule</text>
<text x="800" y="907" class="cardText" text-anchor="middle">Selected work and skipped behavior use separate translucent regions, so lifelines and labels stay</text>
<text x="800" y="925" class="cardText" text-anchor="middle">readable.</text></svg>
