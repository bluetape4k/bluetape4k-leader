<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc" data-source-read="examples/prometheus-dashboard/README.md; examples/prometheus-dashboard/src/main/kotlin/io/bluetape4k/leader/examples/prometheus/PrometheusDashboardApp.kt; examples/prometheus-dashboard/src/main/resources/application.yml; examples/prometheus-dashboard/docker-compose.yml">
  <title id="title">Prometheus Dashboard Architecture</title>
  <desc id="desc">Static architecture showing Spring scheduling, AOP leader election, Lettuce Redis locking, Micrometer registration, Actuator scrape exposure, Prometheus, and Grafana.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#329a74"/></marker>
    <marker id="arrow-amber" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#cf8428"/></marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .card-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .card-sub, .label, .band-title, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .band-title { font-size: 15px; font-weight: 700; }
      .card-title { font-size: 25px; }
      .card-sub { font-size: 13px; }
      .label { font-size: 13px; }
      .footer { font-size: 14px; }
      .band { stroke-width: 2.2; rx: 24; }
      .card { stroke-width: 2.4; rx: 16; }
      .route { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="980"/>
  <rect class="frame" x="42" y="34" width="1416" height="900" rx="30"/>
  <text class="title" x="86" y="92">Prometheus Dashboard Architecture</text>
  <text class="subtitle" x="90" y="126">The example keeps the scheduling proxy boundary explicit and turns leader AOP decisions into scrapeable metrics.</text>

  <rect class="band" x="90" y="178" width="902" height="536" fill="#eef5ff" stroke="#c4d5e8"/>
  <text class="band-title" x="126" y="214">Spring Boot application boundary</text>

  <rect class="card" x="132" y="268" width="250" height="104" fill="#ffffff" stroke="#6d9df0"/>
  <text class="card-title" x="257" y="302" text-anchor="middle">Scheduled</text>
  <text class="card-title" x="257" y="330" text-anchor="middle">trigger</text>
  <text class="card-sub" x="257" y="356" text-anchor="middle">fixed delay bean</text>

  <rect class="card" x="486" y="250" width="312" height="140" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="card-title" x="642" y="286" text-anchor="middle">LeaderScheduledJob</text>
  <text class="card-title" x="642" y="314" text-anchor="middle">AOP proxy</text>
  <text class="card-sub" x="642" y="340" text-anchor="middle">@LeaderElection dashboard-job</text>
  <text class="card-sub" x="642" y="364" text-anchor="middle">dispatchBatch sleeps 100ms</text>

  <rect class="card" x="486" y="494" width="312" height="126" fill="#edf9f4" stroke="#63b891"/>
  <text class="card-title" x="642" y="538" text-anchor="middle">Micrometer recorder</text>
  <text class="card-sub" x="642" y="566" text-anchor="middle">registerMetricsFor dashboard-job</text>
  <text class="card-sub" x="642" y="590" text-anchor="middle">attempts, acquired, active</text>

  <rect class="card" x="132" y="494" width="250" height="126" fill="#fff4de" stroke="#d59c3f"/>
  <text class="card-title" x="257" y="538" text-anchor="middle">PreRegistrar</text>
  <text class="card-sub" x="257" y="566" text-anchor="middle">ApplicationReadyEvent</text>
  <text class="card-sub" x="257" y="590" text-anchor="middle">static meter series</text>

  <rect class="card" x="486" y="650" width="312" height="54" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="card-sub" x="642" y="682" text-anchor="middle">MeterRegistry + /actuator/prometheus</text>

  <rect class="band" x="1062" y="178" width="346" height="260" fill="#fff7e8" stroke="#e6c374"/>
  <text class="band-title" x="1098" y="214">Leader backend</text>
  <rect class="card" x="1104" y="266" width="262" height="104" fill="#fff4de" stroke="#d59c3f"/>
  <text class="card-title" x="1235" y="306" text-anchor="middle">Redis via Lettuce</text>
  <text class="card-sub" x="1235" y="334" text-anchor="middle">DEMO_REDIS_URL or Testcontainers</text>

  <rect class="band" x="1062" y="486" width="346" height="228" fill="#fbf6ff" stroke="#d4c6f3"/>
  <text class="band-title" x="1098" y="522">Observability stack</text>
  <rect class="card" x="1104" y="558" width="262" height="66" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="card-title" x="1235" y="598" text-anchor="middle">Prometheus</text>
  <rect class="card" x="1104" y="646" width="262" height="54" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="card-title" x="1235" y="682" text-anchor="middle">Grafana dashboard</text>

  <path class="route" d="M382 320 L486 320" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <rect class="pill" x="406" y="290" width="58" height="26"/>
  <text class="label" x="435" y="308" text-anchor="middle">calls</text>

  <path class="route" d="M798 320 L930 320 L930 318 L1104 318" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="928" y="288" width="106" height="26"/>
  <text class="label" x="981" y="306" text-anchor="middle">lock factory</text>

  <path class="route" d="M642 390 L642 494" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="662" y="426" width="84" height="26"/>
  <text class="label" x="704" y="444" text-anchor="middle">records</text>

  <path class="route dash" d="M382 557 L486 557" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="402" y="526" width="78" height="26"/>
  <text class="label" x="441" y="544" text-anchor="middle">primes</text>

  <path class="route" d="M642 620 L642 650" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <path class="route" d="M798 677 L1030 677 L1030 591 L1104 591" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <rect class="pill" x="910" y="646" width="78" height="26"/>
  <text class="label" x="949" y="664" text-anchor="middle">scrape</text>

  <path class="route" d="M1235 624 L1235 646" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>

  <rect class="card" x="196" y="784" width="1108" height="58" fill="#f8fbff" stroke="#d2deeb"/>
  <text class="card-sub" x="750" y="820" text-anchor="middle">Actuator exposes only prometheus, health, and info; compose binds app, Prometheus, and Grafana to 127.0.0.1.</text>

  <text class="footer" x="750" y="902" text-anchor="middle">The explicit proxied job bean is the important Spring boundary; self-invocation would bypass the leader AOP advice.</text>
</svg>
