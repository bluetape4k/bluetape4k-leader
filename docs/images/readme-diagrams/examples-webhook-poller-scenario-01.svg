<svg xmlns="http://www.w3.org/2000/svg" width="1756" height="1172" viewBox="0 0 1756 1172" role="img" aria-labelledby="title desc" data-intent="Answer the Webhook Poller README reader's scenario question: when more than one instance observes the same poll loop, which candidates race, which shared backend object arbitrates leadership, which node runs claim webhook event, how do non-leaders return without duplicate work, and how does claim timeout recovery make the next cycle safe?" data-evidence="examples/webhook-poller README scenario/demo sections; examples/webhook-poller/src/main example implementation; examples/webhook-poller/src/test concurrency or behavior examples when present" data-source-read="examples/webhook-poller/README.md; examples/webhook-poller/README.ko.md; examples/webhook-poller/src/main; examples/webhook-poller/src/test">
  <title id="title">Webhook Poller Replica Race Scenario</title>
  <desc id="desc">Scenario diagram for the Webhook Poller example showing concurrent candidates, shared backend ownership, one elected leader, skipped peers, and recovery semantics.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#203040" flood-opacity="0.10"/></filter>
    <marker id="arrow-call" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F83BF"/></marker>
    <marker id="arrow-success" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#3E9868"/></marker>
    <marker id="arrow-skip" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#C94D68"/></marker>
    <marker id="arrow-contention" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#B9851B"/></marker>
    <marker id="arrow-release" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#755BC6"/></marker>
    <marker id="arrow-retry" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F63C7"/></marker>
    <marker id="arrow-dependency" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#2E8F89"/></marker>
    <marker id="arrow-metric" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#718A35"/></marker>
    <marker id="arrow-neutral" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#758297"/></marker>
    <style>
      .canvas{fill:#F7FAFC}
      .frame{fill:#FFFFFF;stroke:#D7E2EC;stroke-width:2}
      .title{font-family:"Architects Daughter";font-size:44px;fill:#22344A;font-weight:400}
      .subtitle{font-family:"Comic Mono";font-size:16px;fill:#536476;font-weight:400}
      .band{fill:#F3F7FB;stroke:#D7E2EC;stroke-width:2}
      .bandTitle{font-family:"Architects Daughter";font-size:24px;fill:#22344A;font-weight:400;paint-order:stroke;stroke:#F3F7FB;stroke-width:5px;stroke-linejoin:round}
      .card{filter:url(#shadow);stroke-width:2}
      .cardTitle{font-family:"Architects Daughter";font-size:23px;fill:#22344A;font-weight:400}
      .detail{font-family:"Comic Mono";font-size:13px;fill:#42556B;font-weight:400}
      .small{font-family:"Comic Mono";font-size:12px;fill:#627184;font-weight:400}
      .route{fill:none;stroke-width:2.45;stroke-linejoin:round;stroke-linecap:round}
      .seq{fill:none;stroke-width:3;stroke-linecap:round}
      .seqReturn{fill:none;stroke-width:2.7;stroke-linecap:round;stroke-dasharray:8 7}
      .lifeline{stroke:#A7B4C3;stroke-width:1.8;stroke-dasharray:8 8}
      .pill{fill:#FFFFFF;stroke:#D6E3EF;stroke-width:1.4}
      .branchBox{fill:#FFFFFF;fill-opacity:.42;stroke:#D6A441;stroke-width:1.8;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect class="canvas" width="1756" height="1172"/>
  <rect class="frame" x="32" y="28" width="1692" height="1116" rx="28"/>
  <text class="title" x="66" y="82">Webhook Poller Replica Race Scenario</text>
  <text class="subtitle" x="70" y="116">Multiple candidates see the same poll loop; Mongo lock document allows one leader and makes peers skip cleanly.</text>
<g>
  <rect class="band" x="128" y="228" width="1500" height="190" rx="18"/>
  <text class="bandTitle" x="154" y="262">Shared trigger</text>
</g>
<g>
  <rect class="band" x="128" y="468" width="1500" height="370" rx="18"/>
  <text class="bandTitle" x="154" y="502">Replica race</text>
</g>
<g>
  <rect class="band" x="128" y="858" width="1500" height="190" rx="18"/>
  <text class="bandTitle" x="154" y="892">Outcome and handoff</text>
</g>
<path class="route" data-from="tick" data-to="nodeA" data-route-tone="call" d="M418 381 L418 433 L748 433 L748 528" stroke="#4F83BF" marker-end="url(#arrow-call)"/>
<path class="route" data-from="tick" data-to="nodeB" data-route-tone="call" d="M418 381 L418 448 L568 448 L568 662 L598 662" stroke="#4F83BF" marker-end="url(#arrow-call)"/>
<path class="route" data-from="tick" data-to="nodeC" data-route-tone="call" d="M418 381 L418 463 L558 463 L558 757 L598 757" stroke="#4F83BF" marker-end="url(#arrow-call)"/>
<path class="route" data-from="nodeA" data-to="backend" data-route-tone="contention" d="M898 567 L978 567 L978 645 L1058 645" stroke="#B9851B" marker-end="url(#arrow-contention)"/>
<path class="route" data-from="nodeB" data-to="backend" data-route-tone="contention" d="M898 662 L1058 662" stroke="#B9851B" marker-end="url(#arrow-contention)"/>
<path class="route" data-from="nodeC" data-to="backend" data-route-tone="contention" d="M898 757 L978 757 L978 689 L1058 689" stroke="#B9851B" marker-end="url(#arrow-contention)"/>
<path class="route" data-from="backend" data-to="leader" data-route-tone="success" d="M1408 667 L1508 667 L1508 967 L1463 967" stroke="#3E9868" marker-end="url(#arrow-success)"/>
<path class="route" data-from="backend" data-to="skipped" data-route-tone="skip" d="M1233 711 L1233 828 L858 828 L858 928" stroke="#C94D68" marker-end="url(#arrow-skip)"/>
<path class="route" data-from="backend" data-to="recovery" data-route-tone="release" d="M1233 711 L1233 828 L608 828 L608 967 L578 967" stroke="#755BC6" marker-end="url(#arrow-release)"/>
<g id="node-tick">
  <rect class="card" x="258" y="303" width="320" height="78" rx="10" fill="#E8F3FF" stroke="#5B8DEF"/>
  <text class="cardTitle" x="418" y="324" text-anchor="middle" dominant-baseline="middle">Poll Loop</text>
  <text class="detail" x="418" y="343" text-anchor="middle" dominant-baseline="middle">one logical event</text>
  <text class="detail" x="418" y="362" text-anchor="middle" dominant-baseline="middle">seen by all nodes</text>
</g>
<g id="node-nodeA">
  <rect class="card" x="598" y="528" width="300" height="78" rx="10" fill="#EAF7EF" stroke="#58A978"/>
  <text class="cardTitle" x="748" y="549" text-anchor="middle" dominant-baseline="middle">Candidate A</text>
  <text class="detail" x="748" y="568" text-anchor="middle" dominant-baseline="middle">WebhookPoller</text>
  <text class="detail" x="748" y="587" text-anchor="middle" dominant-baseline="middle">attempts lock</text>
</g>
<g id="node-nodeB">
  <rect class="card" x="598" y="623" width="300" height="78" rx="10" fill="#E9F7F6" stroke="#45A7A1"/>
  <text class="cardTitle" x="748" y="644" text-anchor="middle" dominant-baseline="middle">Candidate B</text>
  <text class="detail" x="748" y="663" text-anchor="middle" dominant-baseline="middle">WebhookPoller</text>
  <text class="detail" x="748" y="682" text-anchor="middle" dominant-baseline="middle">same lock name</text>
</g>
<g id="node-nodeC">
  <rect class="card" x="598" y="718" width="300" height="78" rx="10" fill="#F1ECFF" stroke="#8A72D6"/>
  <text class="cardTitle" x="748" y="739" text-anchor="middle" dominant-baseline="middle">Candidate C</text>
  <text class="detail" x="748" y="758" text-anchor="middle" dominant-baseline="middle">WebhookPoller</text>
  <text class="detail" x="748" y="777" text-anchor="middle" dominant-baseline="middle">standby on miss</text>
</g>
<g id="node-backend">
  <rect class="card" x="1058" y="623" width="350" height="88" rx="10" fill="#FFF3D9" stroke="#D6A441"/>
  <text class="cardTitle" x="1233" y="649" text-anchor="middle" dominant-baseline="middle">Mongo lock document</text>
  <text class="detail" x="1233" y="668" text-anchor="middle" dominant-baseline="middle">single owner wins</text>
  <text class="detail" x="1233" y="687" text-anchor="middle" dominant-baseline="middle">contention is explicit</text>
</g>
<g id="node-recovery">
  <rect class="card" x="238" y="928" width="340" height="78" rx="10" fill="#EEF1FF" stroke="#6477D8"/>
  <text class="cardTitle" x="408" y="949" text-anchor="middle" dominant-baseline="middle">Claim Timeout Recovery</text>
  <text class="detail" x="408" y="968" text-anchor="middle" dominant-baseline="middle">release or expiry</text>
  <text class="detail" x="408" y="987" text-anchor="middle" dominant-baseline="middle">next cycle safe</text>
</g>
<g id="node-skipped">
  <rect class="card" x="688" y="928" width="340" height="78" rx="10" fill="#FDECEF" stroke="#DC6B82"/>
  <text class="cardTitle" x="858" y="949" text-anchor="middle" dominant-baseline="middle">Peers Skip</text>
  <text class="detail" x="858" y="968" text-anchor="middle" dominant-baseline="middle">no duplicate body</text>
  <text class="detail" x="858" y="987" text-anchor="middle" dominant-baseline="middle">visible skipped result</text>
</g>
<g id="node-leader">
  <rect class="card" x="1113" y="928" width="350" height="78" rx="10" fill="#EAF7EF" stroke="#58A978"/>
  <text class="cardTitle" x="1288" y="949" text-anchor="middle" dominant-baseline="middle">One Leader Runs</text>
  <text class="detail" x="1288" y="968" text-anchor="middle" dominant-baseline="middle">Claim Webhook Event</text>
  <text class="detail" x="1288" y="987" text-anchor="middle" dominant-baseline="middle">exactly once</text>
</g>
</svg>
