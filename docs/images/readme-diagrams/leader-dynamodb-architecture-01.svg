<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">leader-dynamodb runtime architecture</title>
  <desc id="desc">Architecture diagram for the DynamoDB leader backend showing application APIs, electors, lock client operations, caller-owned DynamoDB table rows, and the distinction between leaseExpiry correctness and ttl cleanup.</desc>
  <defs>
    <marker markerUnits="userSpaceOnUse" id="arrow-blue" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb" stroke="#2563eb" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-green" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#059669" stroke="#059669" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-orange" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#ea580c" stroke="#ea580c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-purple" viewBox="0 0 10 10" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c3aed" stroke="#7c3aed" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <style>
      .canvas { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; rx: 24; }
      .title { font-family: "Architects Daughter", "Comic Mono", "Comic Mono"; font-size: 36px; fill: #0f172a; font-weight: 700; }
      .subtitle { font-family: "Comic Mono", "Architects Daughter"; font-size: 15px; fill: #475569; }
      .section-title { font-family: "Architects Daughter", "Comic Mono"; font-size: 22px; fill: #0f172a; font-weight: 700; }
      .card-title { font-family: "Comic Mono", "Architects Daughter"; font-size: 15px; fill: #0f172a; font-weight: 700; }
      .card-sub { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; fill: #475569; }
      .tiny { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .label { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; font-weight: 700; }
      .footer { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #64748b; }
      .zone { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 20; }
      .zone-blue { fill: #eff6ff; stroke: #93c5fd; }
      .zone-green { fill: #ecfdf5; stroke: #86efac; }
      .zone-orange { fill: #fff7ed; stroke: #fdba74; }
      .zone-purple { fill: #faf5ff; stroke: #c4b5fd; }
      .card { stroke-width: 1.8; rx: 12; }
      .card-blue { fill: #dbeafe; stroke: #2563eb; }
      .card-green { fill: #dcfce7; stroke: #16a34a; }
      .card-orange { fill: #ffedd5; stroke: #ea580c; }
      .card-purple { fill: #ede9fe; stroke: #7c3aed; }
      .card-slate { fill: #f8fafc; stroke: #94a3b8; }
      .blue { fill: none; stroke: #2563eb; stroke-width: 2.2; marker-end: url(#arrow-blue); }
      .green { fill: none; stroke: #059669; stroke-width: 2.2; marker-end: url(#arrow-green); }
      .orange { fill: none; stroke: #ea580c; stroke-width: 2.2; marker-end: url(#arrow-orange); }
      .purple { fill: none; stroke: #7c3aed; stroke-width: 2.2; marker-end: url(#arrow-purple); }
      .dashed { stroke-dasharray: 7 6; }
      .table-line { stroke: #cbd5e1; stroke-width: 1.1; }
      .schema-head { fill: #312e81; }
      .schema-body { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 1.5; rx: 12; }
      .schema-title { font-family: "Comic Mono", "Architects Daughter"; font-size: 14px; fill: #ffffff; font-weight: 700; }
      .schema-text { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; fill: #312e81; }
    </style>
  </defs>

  <rect class="canvas" width="1280" height="820"/>
  <rect class="frame" x="32" y="30" width="1216" height="754"/>

  <text class="title" x="640" y="78" text-anchor="middle">DynamoDB Leader Backend Architecture</text>
  <text class="subtitle" x="640" y="107" text-anchor="middle">Conditional writes guard ownership; logical leaseExpiry decides correctness while ttl only schedules cleanup.</text>

  <rect class="zone zone-blue" x="72" y="148" width="300" height="448"/>
  <text class="section-title" x="96" y="184">Application-facing APIs</text>

  <rect class="card card-blue" x="98" y="212" width="248" height="72"/>
  <text class="card-title" x="222" y="239" text-anchor="middle">Blocking / Async</text>
  <text class="card-sub" x="222" y="262" text-anchor="middle">DynamoDbLeaderElector</text>

  <rect class="card card-blue" x="98" y="304" width="248" height="72"/>
  <text class="card-title" x="222" y="331" text-anchor="middle">Coroutine</text>
  <text class="card-sub" x="222" y="354" text-anchor="middle">DynamoDbSuspendLeaderElector</text>

  <rect class="card card-blue" x="98" y="396" width="248" height="72"/>
  <text class="card-title" x="222" y="423" text-anchor="middle">Virtual Thread</text>
  <text class="card-sub" x="222" y="446" text-anchor="middle">adapter over blocking elector</text>

  <rect class="card card-blue" x="98" y="488" width="248" height="74"/>
  <text class="card-title" x="222" y="515" text-anchor="middle">Group Election</text>
  <text class="card-sub" x="222" y="538" text-anchor="middle">random slot probe, maxLeaders</text>

  <rect class="zone zone-green" x="430" y="148" width="360" height="448"/>
  <text class="section-title" x="454" y="184">leader-dynamodb module</text>

  <rect class="card card-green" x="462" y="216" width="296" height="86"/>
  <text class="card-title" x="610" y="244" text-anchor="middle">Election contract</text>
  <text class="card-sub" x="610" y="268" text-anchor="middle">runIfLeader returns result or null</text>
  <text class="card-sub" x="610" y="288" text-anchor="middle">AWS/client failures propagate</text>

  <rect class="card card-green" x="462" y="336" width="296" height="104"/>
  <text class="card-title" x="610" y="364" text-anchor="middle">DynamoDbLockClient</text>
  <text class="card-sub" x="610" y="388" text-anchor="middle">PutItem / UpdateItem / DeleteItem</text>
  <text class="card-sub" x="610" y="408" text-anchor="middle">Consistent GetItem for state</text>
  <text class="card-sub" x="610" y="428" text-anchor="middle">Scan only for group diagnostics</text>

  <rect class="card card-green" x="462" y="474" width="296" height="82"/>
  <text class="card-title" x="610" y="502" text-anchor="middle">LeaderLockHandle</text>
  <text class="card-sub" x="610" y="526" text-anchor="middle">explicit LockExtender delegate</text>
  <text class="card-sub" x="610" y="546" text-anchor="middle">autoExtend for single leader</text>

  <rect class="zone zone-orange" x="852" y="148" width="356" height="448"/>
  <text class="section-title" x="876" y="184">Caller-owned DynamoDB table</text>

  <rect class="schema-body" x="884" y="220" width="292" height="208"/>
  <rect class="schema-head" x="884" y="220" width="292" height="38" rx="12"/>
  <text class="schema-title" x="1030" y="245" text-anchor="middle">bluetape4k_leader_locks</text>
  <line class="table-line" x1="884" y1="258" x2="1176" y2="258"/>
  <text class="schema-text" x="906" y="286">PK lockName (S)</text>
  <text class="schema-text" x="906" y="314">ownerId (S)</text>
  <text class="schema-text" x="906" y="342">auditLeaderId (S)</text>
  <text class="schema-text" x="906" y="370">nodeId (S)</text>
  <text class="schema-text" x="906" y="398">leaseExpiry (N, millis)</text>
  <text class="schema-text" x="906" y="420">ttl (N, epoch seconds)</text>

  <rect class="card card-orange" x="884" y="462" width="292" height="100"/>
  <text class="card-title" x="1030" y="490" text-anchor="middle">Key shapes</text>
  <text class="card-sub" x="1030" y="516" text-anchor="middle">leader/single/{lockName}</text>
  <text class="card-sub" x="1030" y="538" text-anchor="middle">leader/group/{lockName}#slot-N</text>

  <path class="blue" d="M 346 248 L 462 248"/>
  <path class="blue" d="M 346 340 L 386 340 Q 404 340 404 322 L 404 274 Q 404 256 422 256 L 462 256"/>
  <path class="blue" d="M 346 432 L 386 432 Q 404 432 404 414 L 404 292 Q 404 274 422 274 L 462 274"/>
  <path class="blue" d="M 346 526 L 462 526"/>
  <text class="label" x="390" y="223" fill="#1d4ed8">API calls</text>

  <path class="green" d="M 758 388 L 884 388"/>
  <text class="label" x="806" y="363" fill="#047857">conditional writes</text>

  <path class="orange dashed" d="M 758 526 L 815 526 Q 821 526 821 520 L 821 518 Q 821 512 827 512 L 884 512"/>
  <text class="label" x="799" y="548" fill="#c2410c">lease context</text>

  <rect class="zone zone-purple" x="72" y="628" width="1136" height="112"/>
  <text class="section-title" x="96" y="666">Correctness boundary</text>

  <rect class="card card-purple" x="322" y="650" width="258" height="64"/>
  <text class="card-title" x="451" y="675" text-anchor="middle">Acquire</text>
  <text class="card-sub" x="451" y="697" text-anchor="middle">row missing OR leaseExpiry &lt; safeNow</text>

  <rect class="card card-purple" x="612" y="650" width="246" height="64"/>
  <text class="card-title" x="735" y="675" text-anchor="middle">Release / retain</text>
  <text class="card-sub" x="735" y="697" text-anchor="middle">ownerId guard, minLeaseTime aware</text>

  <rect class="card card-slate" x="890" y="650" width="276" height="64"/>
  <text class="card-title" x="1028" y="675" text-anchor="middle">TTL cleanup</text>
  <text class="card-sub" x="1028" y="697" text-anchor="middle">ttl = leaseExpiry + padding, not lock truth</text>

  <path class="purple" d="M 580 682 L 612 682"/>
  <path class="purple" d="M 858 682 L 890 682"/>

  <g transform="translate(94 746)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <text class="tiny" x="44" y="12">API dependency</text>
    <line x1="182" y1="8" x2="216" y2="8" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <text class="tiny" x="226" y="12">DynamoDB operation</text>
    <line x1="428" y1="8" x2="462" y2="8" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow-orange)"/>
    <text class="tiny" x="472" y="12">lease handle context</text>
  </g>

  <text class="footer" x="1188" y="760" text-anchor="end">github.com/bluetape4k/bluetape4k-leader</text>
</svg>
