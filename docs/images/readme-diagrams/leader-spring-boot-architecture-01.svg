  <rect class="card" x="0" y="0" width="300" height="118" rx="14" fill="#fff3d9" stroke="#d6a441"/>
  <text class="smallLabel" x="150" y="54" text-anchor="middle">LeaderAopFactoryAutoCon.</text>
  <text class="small" x="150" y="84" text-anchor="middle">integration</text>
</g>
<path class="line" d="M772 309 L782 309"/>
<g transform="translate(1132,250)">
  <rect class="card" x="0" y="0" width="300" height="118" rx="14" fill="#fdecef" stroke="#dc6b82"/>
  <text class="smallLabel" x="150" y="54" text-anchor="middle">LeaderMicrometerAutoCon.</text>
  <text class="small" x="150" y="84" text-anchor="middle">storage</text>
