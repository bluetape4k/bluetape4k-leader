<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1080" viewBox="0 0 1320 1080" role="img" aria-labelledby="title desc">
  <title id="title">leader-spring-boot architecture</title>
  <desc id="desc">Architecture diagram for Spring Boot auto-configuration, backend factory registration, AspectJ compile-time woven advice, metrics, observability, and actuator integration.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-18%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker markerUnits="userSpaceOnUse" id="arrow-blue" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb" stroke="#2563eb" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-green" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#059669" stroke="#059669" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-orange" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#ea580c" stroke="#ea580c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-purple" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c3aed" stroke="#7c3aed" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <style>
      .canvas{fill:#f8fafc}.title{font-family:"Architects Daughter","Comic Mono";font-size:34px;font-weight:700;fill:#0f172a}.subtitle,.small,.footer{font-family:"Comic Mono","Architects Daughter";fill:#475569}.subtitle{font-size:15px}.small{font-size:11px}.footer{font-size:11px}.band-title{font-family:"Comic Mono","Architects Daughter";font-size:14px;font-weight:700;fill:#334155}.card-title{font-family:"Comic Mono","Architects Daughter";font-size:15px;font-weight:700;fill:#0f172a}.card-sub{font-family:"Comic Mono","Architects Daughter";font-size:11.5px;fill:#475569}.label{font-family:"Comic Mono","Architects Daughter";font-size:11.5px;font-weight:700}.band{fill:#fff;stroke:#cbd5e1;stroke-width:1.4;rx:18}.card{stroke-width:1.8;rx:14;filter:url(#shadow)}.app{fill:#dbeafe;stroke:#2563eb}.config{fill:#ecfdf5;stroke:#059669}.aop{fill:#fef3c7;stroke:#d97706}.backend{fill:#f3e8ff;stroke:#7c3aed}.obs{fill:#fce7f3;stroke:#db2777}.runtime{fill:#eef2ff;stroke:#4f46e5}.primary{fill:none;stroke:#2563eb;stroke-width:2.5;marker-end:url(#arrow-blue)}.state{fill:none;stroke:#059669;stroke-width:2.5;marker-end:url(#arrow-green)}.control{fill:none;stroke:#ea580c;stroke-width:2.5;marker-end:url(#arrow-orange)}.data{fill:none;stroke:#7c3aed;stroke-width:2.5;marker-end:url(#arrow-purple)}.tap{fill:none;stroke:#64748b;stroke-width:2.5;stroke-dasharray:7 5}.label-bg{fill:#f8fafc;stroke:#e2e8f0;stroke-width:.8;rx:6}
    </style>
  </defs>
  <rect class="canvas" width="1320" height="1080"/>
  <text class="title" x="660" y="68" text-anchor="middle">leader-spring-boot Architecture</text>
  <text class="subtitle" x="660" y="96" text-anchor="middle">Spring Boot registers backend factories first, then AspectJ-woven advice guards annotated methods with core leader electors.</text>

  <rect class="band" x="58" y="128" width="360" height="278"/>
  <text class="band-title" x="84" y="158">Application surface</text>
  <rect class="card app" x="92" y="188" width="286" height="86"/>
  <text class="card-title" x="235" y="216" text-anchor="middle">Annotated jobs</text>
  <text class="card-sub" x="235" y="240" text-anchor="middle">@LeaderElection / @LeaderGroupElection</text>
  <text class="small" x="235" y="260" text-anchor="middle">called by scheduler, service, or startup code</text>
  <rect class="card app" x="92" y="298" width="286" height="70"/>
  <text class="card-title" x="235" y="326" text-anchor="middle">@LeaderElectionBackend</text>
  <text class="card-sub" x="235" y="350" text-anchor="middle">method, class, or package selection</text>

  <rect class="band" x="468" y="128" width="384" height="590"/>
  <text class="band-title" x="494" y="158">Auto-configuration chain</text>
  <rect class="card config" x="504" y="188" width="312" height="72"/>
  <text class="card-title" x="660" y="216" text-anchor="middle">LeaderElectionAutoConfiguration</text>
  <text class="card-sub" x="660" y="240" text-anchor="middle">properties + backend sub-config imports</text>
  <rect class="card backend" x="504" y="292" width="312" height="88"/>
  <text class="card-title" x="660" y="320" text-anchor="middle">LeaderAopFactoryAutoConfiguration</text>
  <text class="card-sub" x="660" y="344" text-anchor="middle">sync, suspend, and group factories</text>
  <text class="small" x="660" y="364" text-anchor="middle">local fallback plus conditional backend beans</text>
  <rect class="card obs" x="504" y="412" width="312" height="70"/>
  <text class="card-title" x="660" y="440" text-anchor="middle">LeaderMicrometerAutoConfiguration</text>
  <text class="card-sub" x="660" y="464" text-anchor="middle">optional LeaderAopMetricsRecorder</text>
  <rect class="card aop" x="504" y="514" width="312" height="110"/>
  <text class="card-title" x="660" y="542" text-anchor="middle">LeaderAopAutoConfiguration</text>
  <text class="card-sub" x="660" y="566" text-anchor="middle">LeaderElectionAspect + Group Aspect</text>
  <text class="card-sub" x="660" y="586" text-anchor="middle">SpEL evaluator, bean selector</text>
  <text class="small" x="660" y="606" text-anchor="middle">validator warns or fails invalid annotated methods</text>
  <rect class="card obs" x="504" y="656" width="312" height="72"/><image data-bluetape4k-icon="springBoot" data-icon-source="spring/spring-boot.svg" x="514" y="664" width="18" height="18" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/>
  <text class="card-title" x="660" y="684" text-anchor="middle">Observability + Actuator</text>
  <text class="card-sub" x="660" y="708" text-anchor="middle">status registry, event publisher, endpoint</text>

  <rect class="band" x="902" y="128" width="360" height="278"/>
  <text class="band-title" x="928" y="158">Backend candidates</text>
  <rect class="card backend" x="936" y="188" width="286" height="158"/>
  <text class="card-title" x="1079" y="216" text-anchor="middle">LeaderElector factories</text>
  <text class="card-sub" x="1079" y="240" text-anchor="middle">Local, Lettuce, Redisson</text>
  <text class="card-sub" x="1079" y="260" text-anchor="middle">Exposed JDBC / R2DBC</text>
  <text class="card-sub" x="1079" y="280" text-anchor="middle">MongoDB, Hazelcast</text>
  <text class="card-sub" x="1079" y="300" text-anchor="middle">etcd, Consul, DynamoDB</text>
  <text class="small" x="1079" y="324" text-anchor="middle">explicit bean, backend annotation,</text>
  <text class="small" x="1079" y="340" text-anchor="middle">single bean, or @Primary selection</text>

  <rect class="band" x="58" y="760" width="1204" height="196"/>
  <text class="band-title" x="84" y="790">Runtime path after AspectJ compile-time weaving</text>
  <rect class="card runtime" x="96" y="832" width="222" height="82"/>
  <text class="card-title" x="207" y="860" text-anchor="middle">Woven join point</text>
  <text class="card-sub" x="207" y="884" text-anchor="middle">no runtime proxy required</text>
  <rect class="card aop" x="374" y="832" width="222" height="82"/>
  <text class="card-title" x="485" y="860" text-anchor="middle">LeaderElectionAspect</text>
  <text class="card-sub" x="485" y="884" text-anchor="middle">name, options, identity</text>
  <rect class="card backend" x="652" y="832" width="222" height="82"/>
  <text class="card-title" x="763" y="860" text-anchor="middle">Selected elector</text>
  <text class="card-sub" x="763" y="884" text-anchor="middle">runIfLeaderResult</text>
  <rect class="card runtime" x="930" y="832" width="222" height="82"/>
  <text class="card-title" x="1041" y="860" text-anchor="middle">Leader scope</text>
  <text class="card-sub" x="1041" y="884" text-anchor="middle">ThreadLocal / coroutine / Reactor</text>

  <path class="control" d="M 378 230 L 468 230 Q 486 230 486 224 L 504 224"/>
  <rect class="label-bg" x="404" y="205" width="70" height="22"/><text class="label" x="439" y="221" text-anchor="middle" fill="#9a3412">bind</text>
  <path class="state" d="M 660 260 L 660 292"/>
  <path class="state" d="M 660 380 L 660 412"/>
  <path class="state" d="M 660 482 L 660 514"/>
  <path class="state" d="M 660 624 L 660 656"/>
  <path class="data" d="M 816 336 L 876 336 Q 894 336 894 318 L 894 278 Q 894 260 912 260 L 936 260"/>
  <rect class="label-bg" x="846" y="278" width="64" height="22"/><text class="label" x="878" y="294" text-anchor="middle" fill="#6d28d9">create</text>
  <path class="primary" d="M 318 873 L 374 873"/>
  <path class="primary" d="M 596 873 L 652 873"/>
  <path class="primary" d="M 874 873 L 930 873"/>
  <path class="tap" d="M 485 832 L 544.5 832 Q 562.5 832 562.5 814 L 562.5 730 Q 562.5 712 580.5 712 L 640 712"/>
  <path class="tap" d="M 763 914 L 930 914"/>

  <g transform="translate(112 990)">
    <rect x="0" y="0" width="1096" height="74" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <line x1="34" y1="22" x2="84" y2="22" class="primary"/><text class="small" x="98" y="26">guarded method execution</text>
    <line x1="304" y1="22" x2="354" y2="22" class="state"/><text class="small" x="368" y="26">auto-config order</text>
    <line x1="546" y1="22" x2="596" y2="22" class="data"/><text class="small" x="610" y="26">factory/backend binding</text>
    <line x1="820" y1="22" x2="870" y2="22" class="tap"/><text class="small" x="884" y="26">metrics or status side path</text>
    <text class="footer" x="548" y="56" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader / leader-spring-boot</text>
  </g>
</svg>
