  <rect class="card" x="0" y="0" width="300" height="118" rx="14" fill="#e9f7f6" stroke="#45a7a1"/>
  <text class="smallLabel" x="150" y="54" text-anchor="middle">LeaderAopAutoConfigurat.</text>
  <text class="small" x="150" y="84" text-anchor="middle">runtime</text>
</g>
<g transform="translate(464,456)">
  <rect class="card" x="0" y="0" width="300" height="118" rx="14" fill="#f1ecff" stroke="#8a72d6"/>
  <text class="smallLabel" x="150" y="54" text-anchor="middle">LeaderBeanSelector</text>
  <text class="small" x="150" y="84" text-anchor="middle">support</text>
</g>
<path class="line" d="M438 515 L448 515"/>
<g transform="translate(798,456)">
  <rect class="card" x="0" y="0" width="300" height="118" rx="14" fill="#e8f3ff" stroke="#5b8def"/>
  <text class="smallLabel" x="150" y="54" text-anchor="middle">SpelExpressionEvaluator</text>
  <text class="small" x="150" y="84" text-anchor="middle">example</text>
</g>
<path class="line" d="M772 515 L782 515"/>
<g transform="translate(1132,456)">
  <rect class="card" x="0" y="0" width="300" height="118" rx="14" fill="#eaf7ef" stroke="#58a978"/>
  <text class="smallLabel" x="150" y="54" text-anchor="middle">LeaderElectionAspect /.</text>
  <text class="small" x="150" y="84" text-anchor="middle">tooling</text>
</g>
<path class="line" d="M1106 515 L1116 515"/>
<g transform="translate(130,662)">
  <rect class="card" x="0" y="0" width="300" height="118" rx="14" fill="#fff3d9" stroke="#d6a441"/>
  <text class="smallLabel" x="150" y="54" text-anchor="middle">LeaderElectorFactory /.</text>
  <text class="small" x="150" y="84" text-anchor="middle">extension</text>
</g>
<g transform="translate(180,860)">
  <rect class="card" x="0" y="0" width="1240" height="92" rx="18" fill="#f7fbff" stroke="#d8e0ea"/>
  <text class="smallLabel" x="28" y="42">Reading rule</text>
  <text class="mono" x="260" y="39">Pastel cards summarize the Mermaid graph as grouped README architecture blocks.</text>
  <text class="small" x="260" y="66">Detailed Mermaid source remains represented by the generated SVG asset next to this PNG.</text>
</g>
</svg>