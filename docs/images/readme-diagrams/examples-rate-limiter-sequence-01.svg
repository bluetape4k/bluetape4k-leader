<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1100" viewBox="0 0 1500 1100" role="img" aria-labelledby="title desc" data-source-read="examples/rate-limiter/README.md; RateLimiterDemo.kt; LeaderDispatchScheduler.kt; RateLimitedApiWorker.kt; ExternalApiProbe.kt; RateLimiterDemoTest.kt">
  <title id="title">Rate Limiter Sequence</title>
  <desc id="desc">Sequence diagram showing dispatch election, scheduled work creation, shared quota consumption, external API calls, quota rejections, and final report assertions.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c85d73"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .part-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .part-sub, .msg, .region, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .part-title { font-size: 20px; }
      .part-sub { font-size: 12px; }
      .msg { font-size: 12px; font-weight: 700; }
      .region { font-size: 12px; font-weight: 700; }
      .footer { font-size: 14px; }
      .participant { stroke-width: 2.2; rx: 12; }
      .lifeline { stroke: #c5d4e3; stroke-width: 2; stroke-dasharray: 8 8; }
      .call { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .return { fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 9 8; }
      .region-box { fill: #f7f2ff; fill-opacity: .34; stroke: #b69bf0; stroke-width: 2.2; rx: 16; }
      .divider { stroke: #d8c8fa; stroke-width: 2; stroke-dasharray: 9 8; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="1100"/>
  <rect class="frame" x="42" y="34" width="1416" height="1020" rx="30"/>
  <text class="title" x="86" y="92">Rate Limiter Sequence</text>
  <text class="subtitle" x="90" y="126">Time order: elect one dispatcher, then let workers share one quota before any external API call.</text>

  <g id="participants">
    <rect class="participant" x="88" y="174" width="154" height="68" fill="#eaf2ff" stroke="#6d9df0"/>
    <text class="part-title" x="165" y="202" text-anchor="middle">Demo</text>
    <text class="part-sub" x="165" y="224" text-anchor="middle">runScenario</text>

    <rect class="participant" x="292" y="174" width="178" height="68" fill="#fff4de" stroke="#d59c3f"/>
    <text class="part-title" x="381" y="202" text-anchor="middle">Dispatch pool</text>
    <text class="part-sub" x="381" y="224" text-anchor="middle">3 schedulers</text>

    <rect class="participant" x="520" y="174" width="166" height="68" fill="#fff9ea" stroke="#d59c3f"/>
    <text class="part-title" x="603" y="202" text-anchor="middle">Redis lock</text>
    <text class="part-sub" x="603" y="224" text-anchor="middle">rate-limiter:*</text>

    <rect class="participant" x="736" y="174" width="166" height="68" fill="#edf9f4" stroke="#63b891"/>
    <text class="part-title" x="819" y="202" text-anchor="middle">Workers</text>
    <text class="part-sub" x="819" y="224" text-anchor="middle">node-1..3</text>

    <rect class="participant" x="952" y="174" width="176" height="68" fill="#f0ecff" stroke="#9b7aec"/>
    <text class="part-title" x="1040" y="202" text-anchor="middle">Bucket4j</text>
    <text class="part-sub" x="1040" y="224" text-anchor="middle">Redis quota</text>

    <rect class="participant" x="1178" y="174" width="166" height="68" fill="#fff0f5" stroke="#de7f9e"/>
    <text class="part-title" x="1261" y="202" text-anchor="middle">API probe</text>
    <text class="part-sub" x="1261" y="224" text-anchor="middle">callCount</text>
  </g>

  <line class="lifeline" x1="165" y1="242" x2="165" y2="986"/>
  <line class="lifeline" x1="381" y1="242" x2="381" y2="986"/>
  <line class="lifeline" x1="603" y1="242" x2="603" y2="986"/>
  <line class="lifeline" x1="819" y1="242" x2="819" y2="986"/>
  <line class="lifeline" x1="1040" y1="242" x2="1040" y2="986"/>
  <line class="lifeline" x1="1261" y1="242" x2="1261" y2="986"/>

  <path class="call" d="M165 300 L381 300" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="msg" x="273" y="286" text-anchor="middle" fill="#315fbd">1. submit 3 dispatch attempts</text>

  <path class="call" d="M381 360 L603 360" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <text class="msg" x="492" y="346" text-anchor="middle" fill="#9b651c">2. runIfLeader(lockName)</text>

  <rect class="region-box" x="78" y="400" width="1276" height="268"/>
  <text class="region" x="104" y="430">alt Redis lock result</text>
  <line class="divider" x1="92" y1="548" x2="1340" y2="548"/>
  <text class="region" x="104" y="578">else not leader</text>

  <path class="return" d="M603 474 L381 474" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="msg" x="492" y="458" text-anchor="middle" fill="#24785a">3a. acquired</text>
  <path class="call" d="M381 514 L819 514" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="msg" x="600" y="500" text-anchor="middle" fill="#24785a">4a. winner creates 45 scheduled items</text>

  <path class="return" d="M603 608 L381 608" stroke="#c85d73" marker-end="url(#arrow-red)"/>
  <text class="msg" x="492" y="592" text-anchor="middle" fill="#a7465d">3b. not acquired</text>
  <path class="call" d="M381 640 L165 640" stroke="#c85d73" marker-end="url(#arrow-red)"/>
  <text class="msg" x="273" y="626" text-anchor="middle" fill="#a7465d">4b. dispatch report REJECTED</text>

  <path class="call" d="M165 714 L1040 714" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <text class="msg" x="602" y="700" text-anchor="middle" fill="#6245bd">5. build shared Redis Bucket4j limiter</text>

  <rect class="region-box" x="78" y="748" width="1276" height="214"/>
  <text class="region" x="104" y="778">loop 3 one-second windows, 15 attempts per second</text>
  <line class="divider" x1="92" y1="910" x2="1340" y2="910"/>
  <text class="region" x="104" y="940">else quota rejects</text>

  <path class="call" d="M819 824 L1040 824" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <text class="msg" x="930" y="810" text-anchor="middle" fill="#6245bd">6. consume(quotaKey, 1)</text>
  <path class="return" d="M1040 852 L819 852" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="msg" x="930" y="838" text-anchor="middle" fill="#24785a">7a. token consumed</text>
  <path class="call" d="M819 874 L1261 874" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="msg" x="1040" y="892" text-anchor="middle" fill="#24785a">8a. call external API once</text>

  <path class="return" d="M1040 956 L819 956" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <text class="msg" x="930" y="942" text-anchor="middle" fill="#9b651c">7b. rejected, no API call</text>

  <path class="call" d="M1261 1000 L165 1000" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="msg" x="713" y="984" text-anchor="middle" fill="#315fbd">9. aggregate report counts dispatch and quota outcomes</text>

  <text class="footer" x="750" y="1030" text-anchor="middle">Reports count scheduler outcomes and consumed API calls; rejected quota attempts stop before the probe.</text>
</svg>
