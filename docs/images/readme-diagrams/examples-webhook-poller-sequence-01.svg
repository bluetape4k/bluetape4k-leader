<svg xmlns="http://www.w3.org/2000/svg" width="1430" height="1344" viewBox="0 0 1430 1344" role="img" aria-label="webhook poller Sequence Flow">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 10 5 L 1 9" fill="none" stroke="#758297" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="inherit" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 1 L 12 6 L 0 11 Z" fill="#ffffff" stroke="#758297" stroke-width="1.8"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .title{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:43px;font-weight:400;fill:#102033}
    .subtitle{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:25px;font-weight:400;fill:#102033}
    .smallLabel{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:21px;font-weight:400;fill:#102033}
    .mono{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#536273}
    .strong{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:13px;font-weight:400;fill:#102033}
    .card{stroke-width:2.1;filter:url(#shadow)}.compartment{stroke-width:1.5;fill:none}
    .line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#openArrow)}
    .plainLine{stroke:#758297;stroke-width:2.1;fill:none}
    .dashed{stroke:#758297;stroke-width:2.1;stroke-dasharray:7 6;fill:none;marker-end:url(#openArrow)}
    .inheritLine{stroke:#758297;stroke-width:2.2;fill:none;marker-end:url(#inherit)}
    .implLine{stroke:#758297;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#inherit)}
  </style>
</defs>
<rect class="canvas" width="1430" height="1344"/>
<rect class="frame" x="32" y="28" width="1366" height="1288" rx="28"/>
<text class="title" x="66" y="82">webhook poller Sequence Flow</text>
<text class="subtitle" x="70" y="118">Sequence messages from the original Mermaid source</text>
<rect class="card" x="35" y="166" width="210" height="72" rx="20" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="smallLabel" x="140" y="209" text-anchor="middle">poller-1 (leader)</text>
<line x1="140" y1="252" x2="140" y2="1284" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="322.5" y="166" width="210" height="72" rx="20" fill="#EAF7EF" stroke="#58A978"/>
<text class="smallLabel" x="427.5" y="209" text-anchor="middle">poller-2</text>
<line x1="427.5" y1="252" x2="427.5" y2="1284" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="610" y="166" width="210" height="72" rx="20" fill="#FFF3D9" stroke="#D6A441"/>
<text class="smallLabel" x="715" y="209" text-anchor="middle">poller-3</text>
<line x1="715" y1="252" x2="715" y2="1284" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="897.5" y="166" width="210" height="72" rx="20" fill="#FDECEF" stroke="#DC6B82"/>
<text class="smallLabel" x="1002.5" y="198.5" text-anchor="middle">Mongo</text>
<text class="smallLabel" x="1002.5" y="219.5" text-anchor="middle">lockCollection</text>
<line x1="1002.5" y1="252" x2="1002.5" y2="1284" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="1185" y="166" width="210" height="72" rx="20" fill="#E9F7F6" stroke="#45A7A1"/>
<text class="smallLabel" x="1290" y="198.5" text-anchor="middle">Mongo</text>
<text class="smallLabel" x="1290" y="219.5" text-anchor="middle">eventCollection</text>
<line x1="1290" y1="252" x2="1290" y2="1284" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect x="158" y="270" width="826.5" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="297" text-anchor="start">1. runIfLeader(webhook-poller)</text>
<path class="line" d="M140 310 L1002.5 310"/>
<rect x="445.5" y="352" width="539" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="461.5" y="379" text-anchor="start">2. runIfLeader(webhook-poller)</text>
<path class="line" d="M427.5 392 L1002.5 392"/>
<rect x="733" y="434" width="251.5" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="749" y="461" text-anchor="start">3. runIfLeader(webhook-poller)</text>
<path class="line" d="M715 474 L1002.5 474"/>
<rect x="158" y="516" width="826.5" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="543" text-anchor="start">4. granted</text>
<path class="dashed" d="M1002.5 556 L140 556"/>
<rect x="445.5" y="598" width="539" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="461.5" y="625" text-anchor="start">5. null (skip)</text>
<path class="dashed" d="M1002.5 638 L427.5 638"/>
<rect x="733" y="680" width="251.5" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="749" y="707" text-anchor="start">6. null (skip)</text>
<path class="dashed" d="M1002.5 720 L715 720"/>
<rect x="158" y="762" width="1114" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="789" text-anchor="start">7. findOneAndUpdate (atomic claim) filter: attempts &lt; maxAttempts AND (PENDING OR (CLAIMED AND expired)) update: CLAIMED, claimedBy, attempts++</text>
<path class="line" d="M140 802 L1290 802"/>
<rect x="158" y="844" width="1114" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="871" text-anchor="start">8. claimed event</text>
<path class="dashed" d="M1290 884 L140 884"/>
<rect x="158" y="926" width="190" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="953" text-anchor="start">9. handler(event)</text>
<path class="line" d="M140 966 C196 966 196 996 140 996"/>
<rect x="158" y="1008" width="1114" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="1035" text-anchor="start">10. status = DONE</text>
<path class="line" d="M140 1048 L1290 1048"/>
<rect x="158" y="1090" width="1114" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="1117" text-anchor="start">11. status = FAILED, lastError</text>
<path class="line" d="M140 1130 L1290 1130"/>
<rect x="158" y="1172" width="1114" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="1199" text-anchor="start">12. status = PENDING, lastError (re-claimable)</text>
<path class="line" d="M140 1212 L1290 1212"/>
</svg>
