<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc" data-source-read="examples/strategic-election/README.md; StrategicElectionDemo.kt; StrategicElectionDemoTest.kt">
  <title id="title">Strategic Election Scenario</title>
  <desc id="desc">Three node profiles are scored by readiness, success rate, and idle time. Node-b wins and runs the maintenance body; node-a and node-c skip.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#319873"/></marker>
    <marker id="arrow-red" markerWidth="11" markerHeight="11" refX="10" refY="5.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 11 5.5 L 0 11 Z" fill="#c65b55"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c5d5e6; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer, .score { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 24px; }
      .node-sub { font-size: 13px; }
      .label { font-size: 13px; font-weight: 700; }
      .score { font-size: 15px; font-weight: 700; }
      .footer { font-size: 14px; }
      .node { stroke-width: 2.5; rx: 16; }
      .route { fill: none; stroke-width: 4.4; stroke-linecap: round; stroke-linejoin: round; }
      .skip { stroke-dasharray: 10 9; }
      .panel { fill: #f8fbff; stroke: #d3dfec; stroke-width: 2.2; rx: 18; }
    </style>
  </defs>
  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="46" y="38" width="1408" height="820" rx="30"/>
  <text class="title" x="92" y="98">Strategic Election Scenario</text>
  <text class="subtitle" x="96" y="132">Weighted suitability decides the leader before any maintenance work starts.</text>

  <rect class="panel" x="100" y="190" width="380" height="520"/>
  <text class="label" x="132" y="224">candidate facts</text>
  <rect class="node" x="148" y="260" width="284" height="94" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="290" y="294" text-anchor="middle">node-a</text>
  <text class="node-sub" x="290" y="322" text-anchor="middle">health 92, capacity 35</text>
  <text class="score" x="290" y="346" text-anchor="middle">SKIPPED</text>
  <rect class="node" x="148" y="410" width="284" height="94" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="290" y="444" text-anchor="middle">node-b</text>
  <text class="node-sub" x="290" y="472" text-anchor="middle">balanced winner facts</text>
  <text class="score" x="290" y="496" text-anchor="middle">SELECTED</text>
  <rect class="node" x="148" y="560" width="284" height="94" fill="#fff1ee" stroke="#db8f89"/>
  <text class="node-title" x="290" y="594" text-anchor="middle">node-c</text>
  <text class="node-sub" x="290" y="622" text-anchor="middle">low success history</text>
  <text class="score" x="290" y="646" text-anchor="middle">SKIPPED</text>

  <rect class="node" x="600" y="318" width="300" height="224" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="750" y="362" text-anchor="middle">WeightedScorer</text>
  <text class="node-sub" x="750" y="398" text-anchor="middle">readiness 50%</text>
  <text class="node-sub" x="750" y="426" text-anchor="middle">success rate 35%</text>
  <text class="node-sub" x="750" y="454" text-anchor="middle">idle time 15%</text>
  <text class="score" x="750" y="494" text-anchor="middle">node-b has top score</text>

  <rect class="node" x="1040" y="260" width="300" height="112" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1190" y="302" text-anchor="middle">Leader Body</text>
  <text class="node-sub" x="1190" y="334" text-anchor="middle">node-b runs once</text>
  <rect class="node" x="1040" y="528" width="300" height="112" fill="#fff1ee" stroke="#db8f89"/>
  <text class="node-title" x="1190" y="570" text-anchor="middle">Skip Reports</text>
  <text class="node-sub" x="1190" y="602" text-anchor="middle">node-a and node-c</text>

  <path class="route" d="M432 307 L600 382" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M432 457 L600 430" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M432 607 L600 478" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M900 382 L1040 316" stroke="#319873" marker-end="url(#arrow-green)"/>
  <path class="route skip" d="M900 478 L1040 584" stroke="#c65b55" marker-end="url(#arrow-red)"/>

  <text class="footer" x="750" y="810" text-anchor="middle">This example explains suitability-based leadership: the chosen node runs, and every non-winner returns SKIPPED.</text>
</svg>
