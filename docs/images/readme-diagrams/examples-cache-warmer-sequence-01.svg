<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc" data-source-read="examples/cache-warmer/README.md; examples/cache-warmer/src/main/kotlin/io/bluetape4k/leader/examples/warmer/CachePartitionWarmer.kt; examples/cache-warmer/src/main/kotlin/io/bluetape4k/leader/examples/warmer/WarmResult.kt; examples/cache-warmer/src/test/kotlin/io/bluetape4k/leader/examples/warmer/CachePartitionWarmerTest.kt">
  <title id="title">Cache Warmer Sequence</title>
  <desc id="desc">Sequence for one partition inside warmAll: create backend elector, run only on leadership, classify warmed, skipped, failed, and rethrow cancellation.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#329a74"/></marker>
    <marker id="arrow-amber" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#cf8428"/></marker>
    <marker id="arrow-pink" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#bd4e64"/></marker>
    <marker id="arrow-purple" markerWidth="4.5" markerHeight="4.5" refX="4.05" refY="2.25" orient="auto" markerUnits="strokeWidth"><path d="M 0.45 0.45 L 4.05 2.25 L 0.45 4.05 Z" fill="#7a61c8"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .participant-text { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .label { font-size: 13px; }
      .footer { font-size: 14px; }
      .participant { stroke-width: 2.4; rx: 12; }
      .lifeline { stroke: #9aacc2; stroke-width: 2; stroke-dasharray: 8 10; }
      .activation { fill: #f3eeff; stroke: #8a65d8; stroke-width: 2; rx: 7; }
      .call { fill: none; stroke: #4f77c9; stroke-width: 2.8; stroke-linecap: round; marker-end: url(#arrow-blue); }
      .success { fill: none; stroke: #329a74; stroke-width: 2.8; stroke-linecap: round; marker-end: url(#arrow-green); }
      .skip { fill: none; stroke: #cf8428; stroke-width: 2.8; stroke-linecap: round; marker-end: url(#arrow-amber); }
      .failure { fill: none; stroke: #bd4e64; stroke-width: 2.8; stroke-linecap: round; marker-end: url(#arrow-pink); }
      .return { fill: none; stroke: #329a74; stroke-width: 2.4; stroke-linecap: round; stroke-dasharray: 9 8; marker-end: url(#arrow-green); }
      .skip-return { fill: none; stroke: #cf8428; stroke-width: 2.4; stroke-linecap: round; stroke-dasharray: 9 8; marker-end: url(#arrow-amber); }
      .cancel-return { fill: none; stroke: #7a61c8; stroke-width: 2.4; stroke-linecap: round; stroke-dasharray: 9 8; marker-end: url(#arrow-purple); }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.5; rx: 10; }
      .num { font-family: "Comic Mono"; font-size: 12px; fill: #ffffff; }
      .alt { fill: none; stroke: #cf8428; stroke-width: 2; stroke-dasharray: 9 8; rx: 18; }
      .alt-label { fill: #fff7e8; stroke: #cf8428; stroke-width: 1.5; rx: 8; }
      .divider { stroke: #cf8428; stroke-width: 1.7; stroke-dasharray: 9 8; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="42" y="34" width="1416" height="820" rx="30"/>
  <text class="title" x="86" y="92">Cache Warmer Sequence</text>
  <text class="subtitle" x="90" y="126">One partition iteration creates a backend elector, runs only on leadership, and classifies the local result.</text>

  <g id="participants">
    <rect class="participant" x="106" y="176" width="160" height="70" fill="#eaf2ff" stroke="#6d9df0"/>
    <text class="participant-text" x="186" y="218" text-anchor="middle" font-size="24">Caller</text>
    <rect class="participant" x="340" y="176" width="190" height="70" fill="#f1eaff" stroke="#9b7aec"/>
    <text class="participant-text" x="435" y="218" text-anchor="middle" font-size="24">Warmer</text>
    <rect class="participant" x="610" y="176" width="230" height="70" fill="#fff4de" stroke="#d59c3f"/>
    <text class="participant-text" x="725" y="218" text-anchor="middle" font-size="24">electorFactory</text>
    <rect class="participant" x="914" y="176" width="230" height="70" fill="#f1eaff" stroke="#9b7aec"/>
    <text class="participant-text" x="1029" y="218" text-anchor="middle" font-size="24">LeaderElector</text>
    <rect class="participant" x="1200" y="176" width="150" height="70" fill="#edf9f4" stroke="#63b891"/>
    <text class="participant-text" x="1275" y="218" text-anchor="middle" font-size="24">Cache</text>
    <rect class="participant" x="1364" y="176" width="80" height="70" fill="#fff0f5" stroke="#de7f9e"/>
    <text class="participant-text" x="1404" y="218" text-anchor="middle" font-size="22">Result</text>
  </g>

  <line class="lifeline" x1="186" y1="246" x2="186" y2="736"/>
  <line class="lifeline" x1="435" y1="246" x2="435" y2="736"/>
  <line class="lifeline" x1="725" y1="246" x2="725" y2="736"/>
  <line class="lifeline" x1="1029" y1="246" x2="1029" y2="736"/>
  <line class="lifeline" x1="1275" y1="246" x2="1275" y2="736"/>
  <line class="lifeline" x1="1404" y1="246" x2="1404" y2="736"/>
  <rect class="activation" x="427" y="314" width="16" height="360"/>
  <rect class="activation" x="717" y="362" width="16" height="80"/>
  <rect class="activation" x="1021" y="440" width="16" height="170"/>
  <rect class="activation" x="1267" y="512" width="16" height="64"/>

  <path class="call" d="M186 318 L435 318"/>
  <rect class="pill" x="250" y="286" width="136" height="28"/>
  <circle cx="266" cy="300" r="13" fill="#4f77c9"/><text class="num" x="266" y="304" text-anchor="middle">1</text>
  <text class="label" x="328" y="305" text-anchor="middle">warmAll()</text>

  <path class="call" d="M435 388 L725 388"/>
  <rect class="pill" x="506" y="356" width="180" height="28"/>
  <circle cx="522" cy="370" r="13" fill="#4f77c9"/><text class="num" x="522" y="374" text-anchor="middle">2</text>
  <text class="label" x="604" y="375" text-anchor="middle">create elector</text>

  <path class="return" d="M725 438 L435 438"/>
  <rect class="pill" x="510" y="406" width="168" height="28"/>
  <circle cx="526" cy="420" r="13" fill="#329a74"/><text class="num" x="526" y="424" text-anchor="middle">3</text>
  <text class="label" x="602" y="425" text-anchor="middle">elector ready</text>

  <path class="call" d="M435 490 L1029 490"/>
  <rect class="pill" x="650" y="458" width="214" height="28"/>
  <circle cx="666" cy="472" r="13" fill="#4f77c9"/><text class="num" x="666" y="476" text-anchor="middle">4</text>
  <text class="label" x="762" y="477" text-anchor="middle">runIfLeader(lock)</text>

  <rect class="alt" x="374" y="514" width="1040" height="186"/>
  <rect class="alt-label" x="398" y="498" width="230" height="28"/>
  <text class="label" x="513" y="517" text-anchor="middle">partition election result</text>
  <line class="divider" x1="374" y1="588" x2="1414" y2="588"/>
  <line class="divider" x1="374" y1="642" x2="1414" y2="642"/>

  <path class="success" d="M1029 554 L1275 554"/>
  <rect class="pill" x="1086" y="522" width="166" height="28"/>
  <circle cx="1102" cy="536" r="13" fill="#329a74"/><text class="num" x="1102" y="540" text-anchor="middle">5</text>
  <text class="label" x="1182" y="541" text-anchor="middle">warmFunction</text>

  <path class="skip-return" d="M1029 614 L1404 614"/>
  <rect class="pill" x="1132" y="592" width="166" height="28"/>
  <circle cx="1148" cy="606" r="13" fill="#cf8428"/><text class="num" x="1148" y="610" text-anchor="middle">6</text>
  <text class="label" x="1226" y="611" text-anchor="middle">record skipped</text>

  <path class="failure" d="M1275 670 L435 670"/>
  <rect class="pill" x="770" y="648" width="142" height="28"/>
  <circle cx="786" cy="662" r="13" fill="#bd4e64"/><text class="num" x="786" y="666" text-anchor="middle">7</text>
  <text class="label" x="852" y="667" text-anchor="middle">throw error</text>

  <path class="failure" d="M435 724 L1404 724"/>
  <rect class="pill" x="836" y="692" width="152" height="28"/>
  <circle cx="852" cy="706" r="13" fill="#bd4e64"/><text class="num" x="852" y="710" text-anchor="middle">8</text>
  <text class="label" x="924" y="711" text-anchor="middle">record failed</text>

  <path class="cancel-return" d="M1029 760 L186 760"/>
  <rect class="pill" x="532" y="728" width="230" height="28"/>
  <circle cx="548" cy="742" r="13" fill="#7a61c8"/><text class="num" x="548" y="746" text-anchor="middle">9</text>
  <text class="label" x="656" y="747" text-anchor="middle">cancellation rethrow</text>

  <path class="call" d="M435 804 L1404 804" stroke="#7a61c8" marker-end="url(#arrow-purple)"/>
  <rect class="pill" x="836" y="772" width="174" height="28"/>
  <circle cx="852" cy="786" r="13" fill="#7a61c8"/><text class="num" x="852" y="790" text-anchor="middle">10</text>
  <text class="label" x="936" y="791" text-anchor="middle">return result</text>

  <text class="footer" x="750" y="832" text-anchor="middle">Each partition has its own lock name, so local results are classified as warmed, skipped, failed, or cancelled. github.com/bluetape4k/bluetape4k-leader</text>
</svg>
