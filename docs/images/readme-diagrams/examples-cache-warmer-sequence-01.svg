<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="900" viewBox="0 0 1360 900" role="img" aria-labelledby="title desc" data-source-read="examples/cache-warmer/README.md; examples/cache-warmer/src/main/kotlin/io/bluetape4k/leader/examples/warmer/CachePartitionWarmer.kt; examples/cache-warmer/src/main/kotlin/io/bluetape4k/leader/examples/warmer/WarmResult.kt; examples/cache-warmer/src/test/kotlin/io/bluetape4k/leader/examples/warmer/CachePartitionWarmerTest.kt">
<title id="title">Cache Warmer Sequence</title>
<desc id="desc">Sequence for one partition inside warmAll: create backend elector, run if leader, classify warmed/skipped/failed, and rethrow cancellation.</desc>
<defs>
  <marker id="seq-blue" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#3F73D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="seq-green" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#2D8F64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="seq-orange" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#C96B2C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="seq-red" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#B94A5A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="seq-purple" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#755BC6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#B9C7D6" flood-opacity="0.24"/></filter>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:2.2;filter:url(#shadow)}
    .title{font-family:"Architects Daughter";font-size:40px;fill:#21334A}.subtitle,.msg,.small,.footer{font-family:"Comic Mono";fill:#4B6075}.subtitle{font-size:15px}.msg{font-size:13px}.small{font-size:12px}.footer{font-size:13px}
    .participant{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.8;filter:url(#shadow)}.ptext{font-family:"Architects Daughter";font-size:21px;fill:#21334A}.life{stroke:#BFD1E2;stroke-width:1.3;stroke-dasharray:8 8}.route{fill:none;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:7 6}.loop{fill:#EAF2FF;fill-opacity:.22;stroke:#8EB2F0;stroke-width:1.6}.alt{fill:#FFF8EA;fill-opacity:.62;stroke:#E3BE69;stroke-width:1.6}.else{stroke:#E3BE69;stroke-width:1.4;stroke-dasharray:8 6}.pill{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1}.blueMsg{fill:#2F5FB8}.greenMsg{fill:#1E7550}.orangeMsg{fill:#A95720}.redMsg{fill:#9A3948}.purpleMsg{fill:#5D49A8}
  </style>
</defs>
<rect class="canvas" width="1360" height="900"/>
<rect class="frame" x="34" y="28" width="1292" height="844" rx="30"/>
<text class="title" x="72" y="84">Cache Warmer Sequence</text>
<text class="subtitle" x="76" y="116">One partition iteration creates a backend elector, runs only on leadership, and classifies the local result.</text>

<rect class="participant" x="72" y="154" width="150" height="54" rx="14"/><text class="ptext" x="114" y="188">Caller</text>
<rect class="participant" x="286" y="154" width="190" height="54" rx="14"/><text class="ptext" x="316" y="188">Warmer</text>
<rect class="participant" x="548" y="154" width="190" height="54" rx="14"/><text class="ptext" x="574" y="188">electorFactory</text>
<rect class="participant" x="802" y="154" width="190" height="54" rx="14"/><text class="ptext" x="830" y="188">LeaderElector</text>
<rect class="participant" x="1046" y="154" width="150" height="54" rx="14"/><text class="ptext" x="1088" y="188">Cache</text>
<rect class="participant" x="1210" y="154" width="110" height="54" rx="14"/><text class="ptext" x="1232" y="188">Result</text>

<line class="life" x1="147" y1="208" x2="147" y2="812"/>
<line class="life" x1="381" y1="208" x2="381" y2="812"/>
<line class="life" x1="643" y1="208" x2="643" y2="812"/>
<line class="life" x1="897" y1="208" x2="897" y2="812"/>
<line class="life" x1="1121" y1="208" x2="1121" y2="812"/>
<line class="life" x1="1265" y1="208" x2="1265" y2="812"/>

<path class="route" d="M 147 250 L 381 250" stroke="#3F73D8" marker-end="url(#seq-blue)"/><rect class="pill" x="226" y="228" width="104" height="22" rx="8"/><text class="msg blueMsg" x="236" y="244">1 warmAll()</text>
<rect class="loop" x="254" y="286" width="1018" height="446" rx="16"/>
<text class="small" x="278" y="312">loop: for each partitionId</text>
<path class="route" d="M 381 344 L 643 344" stroke="#3F73D8" marker-end="url(#seq-blue)"/><rect class="pill" x="438" y="322" width="150" height="22" rx="8"/><text class="msg blueMsg" x="448" y="338">2 create elector</text>
<path class="route dash" d="M 643 382 L 381 382" stroke="#3F73D8" marker-end="url(#seq-blue)"/><rect class="pill" x="430" y="360" width="150" height="22" rx="8"/><text class="msg blueMsg" x="440" y="376">3 elector ready</text>
<path class="route" d="M 381 430 L 897 430" stroke="#3F73D8" marker-end="url(#seq-blue)"/><rect class="pill" x="550" y="408" width="176" height="22" rx="8"/><text class="msg blueMsg" x="560" y="424">4 runIfLeader(lock)</text>

<rect class="alt" x="330" y="466" width="884" height="222" rx="16"/>
<text class="small" x="354" y="492">alt: partition election result</text>
<line class="else" x1="330" y1="546" x2="1214" y2="546"/>
<line class="else" x1="330" y1="614" x2="1214" y2="614"/>
<path class="route" d="M 897 522 L 1121 522" stroke="#2D8F64" marker-end="url(#seq-green)"/><rect class="pill" x="952" y="500" width="126" height="22" rx="8"/><text class="msg greenMsg" x="962" y="516">5 warmFunction</text>
<path class="route" d="M 381 574 L 1265 574" stroke="#C96B2C" marker-end="url(#seq-orange)"/><rect class="pill" x="704" y="552" width="138" height="22" rx="8"/><text class="msg orangeMsg" x="714" y="568">6 record skipped</text>
<path class="route" d="M 1121 642 L 381 642" stroke="#B94A5A" marker-end="url(#seq-red)"/><rect class="pill" x="690" y="620" width="128" height="22" rx="8"/><text class="msg redMsg" x="700" y="636">7 throw error</text>
<path class="route" d="M 381 670 L 1265 670" stroke="#B94A5A" marker-end="url(#seq-red)"/><rect class="pill" x="706" y="648" width="130" height="22" rx="8"/><text class="msg redMsg" x="716" y="664">8 record failed</text>

<path class="route dash" d="M 897 726 L 147 726" stroke="#755BC6" marker-end="url(#seq-purple)"/><rect class="pill" x="458" y="704" width="192" height="22" rx="8"/><text class="msg purpleMsg" x="468" y="720">9 cancellation rethrow</text>
<path class="route" d="M 381 778 L 1265 778" stroke="#755BC6" marker-end="url(#seq-purple)"/><rect class="pill" x="730" y="756" width="142" height="22" rx="8"/><text class="msg purpleMsg" x="740" y="772">10 return result</text>

<text class="footer" x="680" y="850" text-anchor="middle">bluetape4k-leader/examples/cache-warmer</text>
</svg>
