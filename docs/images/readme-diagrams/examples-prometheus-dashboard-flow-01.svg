<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc" data-source-read="examples/prometheus-dashboard/README.md; examples/prometheus-dashboard/src/main/kotlin/io/bluetape4k/leader/examples/prometheus/PrometheusDashboardApp.kt; examples/prometheus-dashboard/src/test/kotlin/io/bluetape4k/leader/examples/prometheus/PrometheusScrapeTest.kt">
  <title id="title">Prometheus Dashboard Flow</title>
  <desc id="desc">Runtime flow for pre-registering metrics, scheduled leader election, leader execution, non-leader skip metrics, actuator scrape, and dashboard queries.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#329a74"/></marker>
    <marker id="arrow-amber" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#cf8428"/></marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#bd4e64"/></marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 24px; }
      .node-sub { font-size: 13px; }
      .label { font-size: 13px; }
      .footer { font-size: 14px; }
      .node { stroke-width: 2.4; rx: 16; }
      .decision { stroke-width: 2.4; }
      .route { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="980"/>
  <rect class="frame" x="42" y="34" width="1416" height="900" rx="30"/>
  <text class="title" x="86" y="92">Prometheus Dashboard Runtime Flow</text>
  <text class="subtitle" x="90" y="126">The first visible dashboard series are registered at startup; later scheduled ticks add leader outcome samples.</text>

  <rect class="node" x="142" y="182" width="324" height="86" fill="#fff4de" stroke="#d59c3f"/>
  <text class="node-title" x="304" y="216" text-anchor="middle">ApplicationReadyEvent</text>
  <text class="node-sub" x="304" y="242" text-anchor="middle">pre-register dashboard-job meters</text>

  <rect class="node" x="588" y="182" width="324" height="86" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="750" y="216" text-anchor="middle">@Scheduled tick</text>
  <text class="node-sub" x="750" y="242" text-anchor="middle">fixed delay calls proxied bean</text>

  <path class="decision" d="M750 330 L930 416 L750 502 L570 416 Z" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="750" y="408" text-anchor="middle">AOP acquire?</text>
  <text class="node-sub" x="750" y="432" text-anchor="middle">Redis dashboard-job lock</text>

  <rect class="node" x="1028" y="360" width="302" height="112" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1179" y="402" text-anchor="middle">leader path</text>
  <text class="node-sub" x="1179" y="430" text-anchor="middle">active gauge on</text>
  <text class="node-sub" x="1179" y="454" text-anchor="middle">dispatchBatch executes</text>

  <rect class="node" x="174" y="360" width="302" height="112" fill="#fff5ec" stroke="#e49a72"/>
  <text class="node-title" x="325" y="402" text-anchor="middle">skip path</text>
  <text class="node-sub" x="325" y="430" text-anchor="middle">lock not acquired</text>
  <text class="node-sub" x="325" y="454" text-anchor="middle">reason tagged counter</text>

  <rect class="node" x="1028" y="580" width="302" height="104" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1179" y="622" text-anchor="middle">record leader samples</text>
  <text class="node-sub" x="1179" y="650" text-anchor="middle">acquired + duration + active off</text>

  <rect class="node" x="174" y="580" width="302" height="104" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="node-title" x="325" y="622" text-anchor="middle">return without work</text>
  <text class="node-sub" x="325" y="650" text-anchor="middle">next tick can try again</text>

  <rect class="node" x="588" y="728" width="324" height="86" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="node-title" x="750" y="762" text-anchor="middle">/actuator/prometheus</text>
  <text class="node-sub" x="750" y="788" text-anchor="middle">Prometheus scrapes leader_aop_*</text>

  <rect class="node" x="1032" y="728" width="298" height="86" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="node-title" x="1181" y="762" text-anchor="middle">Grafana panels</text>
  <text class="node-sub" x="1181" y="788" text-anchor="middle">rates, active gauge, latency</text>

  <path class="route" d="M466 225 L588 225" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="496" y="195" width="70" height="26"/>
  <text class="label" x="531" y="213" text-anchor="middle">primes</text>

  <path class="route" d="M750 268 L750 330" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M930 416 L1028 416" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="956" y="386" width="62" height="26"/>
  <text class="label" x="987" y="404" text-anchor="middle">yes</text>
  <path class="route" d="M570 416 L476 416" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="498" y="386" width="58" height="26"/>
  <text class="label" x="527" y="404" text-anchor="middle">no</text>

  <path class="route" d="M1179 472 L1179 580" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="1198" y="512" width="72" height="26"/>
  <text class="label" x="1234" y="530" text-anchor="middle">finally</text>
  <path class="route" d="M325 472 L325 580" stroke="#cf8428" marker-end="url(#arrow-amber)"/>

  <path class="route" d="M1028 632 L900 632 L900 704 L750 704 L750 728" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <path class="route dash" d="M476 632 L588 771" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="508" y="686" width="94" height="26"/>
  <text class="label" x="555" y="704" text-anchor="middle">also visible</text>

  <path class="route" d="M912 771 L1032 771" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <rect class="pill" x="946" y="740" width="72" height="26"/>
  <text class="label" x="982" y="758" text-anchor="middle">queries</text>

  <text class="footer" x="750" y="906" text-anchor="middle">The test proves the job bean is proxied and that attempts, acquired, and active meters appear for dashboard-job.</text>
</svg>
