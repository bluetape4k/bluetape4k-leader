<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="900" viewBox="0 0 1320 900" role="img" aria-labelledby="title desc">
  <title id="title">leader-ktor component architecture</title>
  <desc id="desc">Component architecture for leader-ktor showing Ktor application ownership, the leader-ktor integration components, leader-core coroutine contract, and backend implementations.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-18%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <style>
      .canvas { fill: #f8fafc; }
      .title { font-family: "Architects Daughter", "Comic Mono", "Comic Sans MS", cursive; font-size: 34px; fill: #0f172a; font-weight: 700; }
      .subtitle { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 15px; fill: #475569; }
      .zone-title { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 14px; fill: #334155; font-weight: 700; }
      .card-title { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 15px; fill: #0f172a; font-weight: 700; }
      .card-sub { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 11.5px; fill: #475569; }
      .small { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 11px; fill: #475569; }
      .footer { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 11px; fill: #475569; }
      .tag { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 10.5px; font-weight: 700; }
      .zone { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .app-zone { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; rx: 18; }
      .module-zone { fill: #fffaf0; stroke: #f59e0b; stroke-width: 1.5; rx: 18; }
      .core-zone { fill: #faf5ff; stroke: #c084fc; stroke-width: 1.5; rx: 18; }
      .backend-zone { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 18; }
      .card { stroke-width: 1.8; rx: 14; filter: url(#shadow); }
      .app { fill: #dbeafe; stroke: #2563eb; }
      .plugin { fill: #ecfdf5; stroke: #059669; }
      .scheduler { fill: #fef3c7; stroke: #d97706; }
      .management { fill: #fce7f3; stroke: #db2777; }
      .store { fill: #eef2ff; stroke: #4f46e5; }
      .core { fill: #f3e8ff; stroke: #7c3aed; }
      .backend { fill: #e2e8f0; stroke: #64748b; }
      .solid-link { fill: none; stroke: #64748b; stroke-width: 2; stroke-linecap: round; }
      .dependency { fill: none; stroke: #7c3aed; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 8 6; }
      .ownership { fill: none; stroke: #2563eb; stroke-width: 2; stroke-linecap: round; }
      .port { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.4; }
    </style>
  </defs>

  <rect class="canvas" width="1320" height="900"/>
  <text class="title" x="660" y="68" text-anchor="middle">leader-ktor Component Architecture</text>
  <text class="subtitle" x="660" y="96" text-anchor="middle">Ktor owns application lifecycle; leader-ktor contributes plugin state, scheduled job binding, and an optional management endpoint.</text>

  <rect class="zone" x="70" y="136" width="1180" height="592"/>
  <text class="zone-title" x="100" y="166">Ktor application process</text>

  <rect class="app-zone" x="118" y="194" width="470" height="168"/>
  <text class="zone-title" x="146" y="224">Application code</text>
  <rect class="card app" x="154" y="254" width="398" height="74"/>
  <text class="card-title" x="353" y="282" text-anchor="middle">Application.module</text>
  <text class="card-sub" x="353" y="306" text-anchor="middle">install(LeaderElectionPlugin) + leaderScheduled(...)</text>

  <rect class="module-zone" x="118" y="398" width="720" height="282"/>
  <text class="zone-title" x="146" y="428">leader-ktor integration layer</text>

  <rect class="card plugin" x="154" y="470" width="236" height="82"/>
  <text class="card-title" x="272" y="499" text-anchor="middle">LeaderElectionPlugin</text>
  <text class="card-sub" x="272" y="523" text-anchor="middle">requires SuspendLeaderElector</text>

  <rect class="card store" x="432" y="462" width="254" height="98"/>
  <text class="card-title" x="559" y="491" text-anchor="middle">PluginConfig store</text>
  <text class="card-sub" x="559" y="515" text-anchor="middle">Application.attributes</text>
  <text class="card-sub" x="559" y="535" text-anchor="middle">LeaderElectionConfigKey</text>

  <rect class="card scheduler" x="154" y="590" width="236" height="62"/>
  <text class="card-title" x="272" y="618" text-anchor="middle">leaderScheduled</text>
  <text class="card-sub" x="272" y="640" text-anchor="middle">Application coroutine Job helper</text>

  <rect class="card management" x="432" y="590" width="254" height="62"/>
  <text class="card-title" x="559" y="618" text-anchor="middle">Management route</text>
  <text class="card-sub" x="559" y="640" text-anchor="middle">GET /management/leaderElection</text>

  <rect class="core-zone" x="892" y="220" width="282" height="220"/>
  <text class="zone-title" x="920" y="250">leader-core API</text>
  <rect class="card core" x="930" y="292" width="206" height="102"/>
  <text class="card-title" x="1033" y="321" text-anchor="middle">SuspendLeaderElector</text>
  <text class="card-sub" x="1033" y="346" text-anchor="middle">runIfLeader(lockName)</text>
  <text class="card-sub" x="1033" y="368" text-anchor="middle">state(lockName)</text>

  <rect class="backend-zone" x="892" y="496" width="282" height="156"/>
  <text class="zone-title" x="920" y="526">backend implementations</text>
  <rect class="card backend" x="930" y="558" width="206" height="58"/>
  <text class="card-title" x="1033" y="584" text-anchor="middle">Redis / MongoDB / etcd</text>
  <text class="card-sub" x="1033" y="606" text-anchor="middle">K8s / local / others</text>

  <!-- Ownership and dependency relationships are deliberately static, not flow steps. -->
  <path class="ownership" d="M 353 328 L 353 398"/>
  <circle class="port" cx="353" cy="398" r="6"/>

  <path class="solid-link" d="M 390 511 L 432 511"/>
  <path class="solid-link" d="M 559 560 L 559 590"/>
  <path class="solid-link" d="M 272 552 L 272 590"/>

  <path class="dependency" d="M 272 652 L 272 666 L 808 666 L 808 344 L 930 344"/>
  <path class="dependency" d="M 559 652 L 559 666"/>
  <circle class="port" cx="272" cy="652" r="5"/>
  <circle class="port" cx="559" cy="652" r="5"/>
  <circle class="port" cx="808" cy="666" r="5"/>
  <circle class="port" cx="808" cy="344" r="5"/>
  <path class="dependency" d="M 1033 394 L 1033 558"/>
  <circle class="port" cx="1033" cy="394" r="5"/>
  <circle class="port" cx="1033" cy="558" r="5"/>

  <g transform="translate(128 746)">
    <rect x="0" y="0" width="1064" height="82" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="tag" x="34" y="28" fill="#1d4ed8">Ownership</text>
    <line x1="126" y1="24" x2="182" y2="24" class="ownership"/>
    <text class="small" x="204" y="28">application module creates plugin state and scheduled jobs</text>
    <text class="tag" x="34" y="56" fill="#6d28d9">Dependency</text>
    <line x1="126" y1="52" x2="182" y2="52" class="dependency"/>
    <text class="small" x="204" y="56">integration components depend on the leader-core coroutine API</text>
    <text class="footer" x="790" y="56" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader / leader-ktor</text>
  </g>
</svg>
