<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 980" width="1320" height="980" role="img" aria-labelledby="title desc">
  <title id="title">leader-k8s acquire and release sequence</title>
  <desc id="desc">Sequence diagram showing Kubernetes Lease acquisition, contention, action execution, auto extension, owner conditional release, minimum lease time, and expired takeover behavior.</desc>
  <style>
    text { font-family: 'Architects Daughter', 'Comic Mono', 'Comic Sans MS', Arial, sans-serif; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 14px; fill: #4b5563; }
    .participant { font-size: 15px; font-weight: 700; fill: #111827; }
    .small { font-size: 12px; fill: #4b5563; }
    .label-blue { font-size: 12px; fill: #1d4ed8; font-weight: 700; }
    .label-green { font-size: 12px; fill: #047857; font-weight: 700; }
    .label-orange { font-size: 12px; fill: #c2410c; font-weight: 700; }
    .label-purple { font-size: 12px; fill: #6d28d9; font-weight: 700; }
    .frame-label { font-size: 12px; font-weight: 700; fill: #374151; }
    .mono { font-family: 'Comic Mono', 'Architects Daughter', monospace; font-size: 12px; fill: #374151; }
    .tiny { font-size: 11px; fill: #6b7280; }
    .footer { font-size: 12px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="blueArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="greenArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#059669"/>
    </marker>
    <marker id="orangeArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#ea580c"/>
    </marker>
    <marker id="purpleArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1320" height="980" fill="#f8fafc"/>
  <rect x="28" y="24" width="1264" height="902" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="52" y="66" class="title">leader-k8s acquire and release sequence</text>
  <text x="52" y="92" class="subtitle">Lease ownership is granted by holderIdentity plus resourceVersion update success; release is also owner-conditional.</text>

  <g id="participants">
    <g transform="translate(86 126)">
      <rect width="154" height="54" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
      <text x="77" y="33" text-anchor="middle" class="participant">Caller</text>
    </g>
    <g transform="translate(318 126)">
      <rect width="190" height="54" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.4"/>
      <text x="95" y="25" text-anchor="middle" class="participant">K8s Elector</text>
      <text x="95" y="43" text-anchor="middle" class="tiny">single or group slot</text>
    </g>
    <g transform="translate(594 126)">
      <rect width="178" height="54" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.4"/>
      <text x="89" y="25" text-anchor="middle" class="participant">LeaseLock</text>
      <text x="89" y="43" text-anchor="middle" class="tiny">ownerToken</text>
    </g>
    <g transform="translate(858 126)">
      <rect width="178" height="54" rx="8" fill="#faf5ff" stroke="#c084fc" stroke-width="1.4"/>
      <text x="89" y="25" text-anchor="middle" class="participant">API Server</text>
      <text x="89" y="43" text-anchor="middle" class="tiny">resourceVersion CAS</text>
    </g>
    <g transform="translate(1112 126)">
      <rect width="142" height="54" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.4"/>
      <text x="71" y="25" text-anchor="middle" class="participant">Lease</text>
      <text x="71" y="43" text-anchor="middle" class="tiny">spec + metadata</text>
    </g>
  </g>

  <g stroke="#d1d5db" stroke-width="1.3" stroke-dasharray="6 6">
    <line x1="163" y1="180" x2="163" y2="874"/>
    <line x1="413" y1="180" x2="413" y2="874"/>
    <line x1="683" y1="180" x2="683" y2="874"/>
    <line x1="947" y1="180" x2="947" y2="874"/>
    <line x1="1183" y1="180" x2="1183" y2="874"/>
  </g>

  <rect x="402" y="218" width="22" height="574" rx="5" fill="#dcfce7" stroke="#22c55e"/>
  <rect x="672" y="252" width="22" height="506" rx="5" fill="#ffedd5" stroke="#fb923c"/>
  <rect x="936" y="288" width="22" height="382" rx="5" fill="#f3e8ff" stroke="#a855f7"/>

  <g id="messages" fill="none">
    <path d="M 163 224 L 402 224" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>
    <text x="282" y="211" text-anchor="middle" class="label-blue">1. runIfLeader(lockName)</text>

    <path d="M 424 258 L 672 258" stroke="#ea580c" stroke-width="2" marker-end="url(#orangeArrow)"/>
    <text x="548" y="245" text-anchor="middle" class="label-orange">2. new ownerToken</text>

    <path d="M 694 296 L 936 296" stroke="#ea580c" stroke-width="2" marker-end="url(#orangeArrow)"/>
    <text x="815" y="283" text-anchor="middle" class="label-orange">3. GET Lease</text>
    <path d="M 958 330 L 1183 330" stroke="#ea580c" stroke-width="2" marker-end="url(#orangeArrow)"/>
    <text x="1070" y="317" text-anchor="middle" class="label-orange">4. create or update</text>

    <path d="M 1183 368 L 958 368" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
    <text x="1070" y="355" text-anchor="middle" class="label-green">5. success with resourceVersion</text>
    <path d="M 936 404 L 694 404" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
    <text x="815" y="391" text-anchor="middle" class="label-green">6. Acquired</text>

    <path d="M 672 448 L 424 448" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
    <text x="548" y="435" text-anchor="middle" class="label-green">7. LeaderLockHandle(token)</text>
    <path d="M 424 490 L 163 490" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>
    <text x="292" y="477" text-anchor="middle" class="label-blue">8. execute action</text>

    <path d="M 424 552 L 672 552" stroke="#7c3aed" stroke-width="2" marker-end="url(#purpleArrow)"/>
    <text x="548" y="539" text-anchor="middle" class="label-purple">9. optional autoExtend</text>
    <path d="M 694 590 L 936 590" stroke="#7c3aed" stroke-width="2" marker-end="url(#purpleArrow)"/>
    <text x="815" y="577" text-anchor="middle" class="label-purple">10. holderIdentity matches</text>
    <path d="M 958 628 L 1183 628" stroke="#7c3aed" stroke-width="2" marker-end="url(#purpleArrow)"/>
    <text x="1070" y="615" text-anchor="middle" class="label-purple">11. renewTime + duration</text>

    <path d="M 424 696 L 672 696" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
    <text x="548" y="683" text-anchor="middle" class="label-green">12. release in finally</text>
    <path d="M 694 734 L 936 734" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
    <text x="815" y="721" text-anchor="middle" class="label-green">13. owner-conditional update</text>
    <path d="M 958 772 L 1183 772" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
    <text x="1070" y="759" text-anchor="middle" class="label-green">14. clear holder or keep minLeaseTime</text>
  </g>

  <g id="frames">
    <rect x="54" y="274" width="1206" height="154" rx="10" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.65"/>
    <rect x="70" y="286" width="106" height="24" rx="7" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="123" y="303" text-anchor="middle" class="frame-label">acquire path</text>

    <rect x="54" y="526" width="1206" height="126" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.65"/>
    <rect x="70" y="538" width="130" height="24" rx="7" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="135" y="555" text-anchor="middle" class="frame-label">extension path</text>

    <rect x="54" y="676" width="1206" height="126" rx="10" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.65"/>
    <rect x="70" y="688" width="118" height="24" rx="7" fill="#ecfdf5" stroke="#10b981"/>
    <text x="129" y="705" text-anchor="middle" class="frame-label">release path</text>
  </g>

  <g transform="translate(80 832)">
    <rect width="560" height="42" rx="8" fill="#f8fafc" stroke="#d1d5db"/>
    <text x="20" y="26" class="mono">Group election repeats the same sequence against &lt;lockName&gt;-slot-N Lease objects.</text>
  </g>

  <text x="52" y="908" class="footer">github.com/bluetape4k/bluetape4k-leader / leader-k8s - Lease holderIdentity, resourceVersion updates, and owner-conditional release.</text>
</svg>
