<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc" data-source-read="examples/migration-gate/README.md; examples/migration-gate/src/main/kotlin/io/bluetape4k/leader/examples/migration/MigrationGate.kt; examples/migration-gate/src/main/kotlin/io/bluetape4k/leader/examples/migration/MigrationGateOptions.kt; examples/migration-gate/src/main/kotlin/io/bluetape4k/leader/examples/migration/Outcome.kt">
  <title id="title">Migration Gate Architecture</title>
  <desc id="desc">MigrationGate wraps ExposedJdbcLeaderElector so only one rolling-deploy pod runs a schema migration, while all pods verify the schema marker before serving.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#329a74"/></marker>
    <marker id="arrow-amber" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#cf8428"/></marker>
    <marker id="arrow-purple" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#7a61c8"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .card-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .layer-label, .card-sub, .route-label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .layer-label { font-size: 15px; font-weight: 700; }
      .card-title { font-size: 26px; }
      .card-sub { font-size: 14px; }
      .route-label { font-size: 13px; }
      .footer { font-size: 14px; }
      .layer { stroke-width: 2.2; rx: 24; }
      .card { stroke-width: 2.4; rx: 16; }
      .route { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 9; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="42" y="34" width="1416" height="820" rx="30"/>
  <text class="title" x="86" y="92">Migration Gate Architecture</text>
  <text class="subtitle" x="90" y="126">The example separates boot-time gate orchestration, Exposed JDBC locking, schema marker checks, and user migration SQL.</text>

  <rect class="layer" x="92" y="164" width="1316" height="158" fill="#eef5ff" stroke="#d2e1f3"/>
  <text class="layer-label" x="124" y="198">Rolling deploy callers</text>
  <rect class="card" x="138" y="220" width="250" height="76" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="card-title" x="263" y="254" text-anchor="middle">new pod set</text>
  <text class="card-sub" x="263" y="276" text-anchor="middle">pod-1 / pod-2 / pod-3</text>
  <rect class="card" x="520" y="220" width="300" height="76" fill="#fff4de" stroke="#d59c3f"/>
  <text class="card-title" x="670" y="254" text-anchor="middle">MigrationGateOptions</text>
  <text class="card-sub" x="670" y="276" text-anchor="middle">nodeId, lockName, waitTime, leaseTime</text>
  <rect class="card" x="982" y="220" width="314" height="76" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="card-title" x="1139" y="254" text-anchor="middle">outcome handling</text>
  <text class="card-sub" x="1139" y="276" text-anchor="middle">Migrated / AlreadyApplied / Skipped / Failed</text>

  <rect class="layer" x="92" y="360" width="1316" height="208" fill="#fffaf1" stroke="#e6c57c"/>
  <text class="layer-label" x="124" y="394">Example module boundary</text>
  <rect class="card" x="158" y="432" width="332" height="98" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="card-title" x="324" y="466" text-anchor="middle">MigrationGate</text>
  <text class="card-sub" x="324" y="490" text-anchor="middle">runMigration(migrationId)</text>
  <text class="card-sub" x="324" y="512" text-anchor="middle">precheck / in-lock / post-skip</text>
  <rect class="card" x="602" y="432" width="318" height="98" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="card-title" x="761" y="466" text-anchor="middle">ExposedJdbcLeaderElector</text>
  <text class="card-sub" x="761" y="490" text-anchor="middle">runIfLeader(lockName)</text>
  <text class="card-sub" x="761" y="512" text-anchor="middle">releases on success or failure</text>
  <rect class="card" x="1032" y="432" width="290" height="98" fill="#edf9f4" stroke="#63b891"/>
  <text class="card-title" x="1177" y="466" text-anchor="middle">migration lambda</text>
  <text class="card-sub" x="1177" y="490" text-anchor="middle">idempotent DDL</text>
  <text class="card-sub" x="1177" y="512" text-anchor="middle">marker insert in same tx</text>

  <rect class="layer" x="92" y="624" width="1316" height="150" fill="#effaf4" stroke="#9dcfaf"/>
  <text class="layer-label" x="124" y="658">Shared database state</text>
  <rect class="card" x="242" y="684" width="300" height="64" fill="#edf9f4" stroke="#63b891"/>
  <text class="card-title" x="392" y="720" text-anchor="middle">LeaderLockTable</text>
  <text class="card-sub" x="392" y="740" text-anchor="middle">lockOwner + lockedUntil</text>
  <rect class="card" x="810" y="684" width="330" height="64" fill="#e7f8f7" stroke="#66bebc"/>
  <text class="card-title" x="975" y="720" text-anchor="middle">MigrationMarkerTable</text>
  <text class="card-sub" x="975" y="740" text-anchor="middle">migrationId proves schema applied</text>

  <path class="route" d="M388 258 L520 258" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M820 258 L982 258" stroke="#7a61c8" marker-end="url(#arrow-purple)"/>
  <path class="route" d="M324 296 L324 432" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M490 480 L602 480" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <rect class="pill" x="512" y="452" width="78" height="24"/>
  <text class="route-label" x="551" y="469" text-anchor="middle">delegates</text>
  <path class="route" d="M920 480 L1032 480" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <path class="route" d="M761 530 L761 612 L392 612 L392 684" stroke="#7a61c8" marker-end="url(#arrow-purple)"/>
  <rect class="pill" x="454" y="624" width="126" height="24"/>
  <text class="route-label" x="517" y="641" text-anchor="middle">lock row TTL</text>
  <path class="route dash" d="M1177 530 L1177 642 L975 642 L975 684" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="1040" y="614" width="112" height="24"/>
  <text class="route-label" x="1096" y="631" text-anchor="middle">write marker</text>
  <path class="route dash" d="M324 530 L324 574 L975 574 L975 684" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="596" y="540" width="156" height="24"/>
  <text class="route-label" x="674" y="557" text-anchor="middle">read marker 3 times</text>

  <text class="footer" x="750" y="826" text-anchor="middle">Set leaseTime longer than worst-case migration duration because this backend does not auto-extend the lease. github.com/bluetape4k/bluetape4k-leader</text>
</svg>
