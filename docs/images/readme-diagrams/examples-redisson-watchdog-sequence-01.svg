<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1080" viewBox="0 0 1500 1080" role="img" aria-labelledby="title desc" data-source-read="examples/redisson-watchdog/README.md; RedissonWatchdogDemo.kt; RedissonWatchdogJobRunner.kt; RedissonWatchdogJobRunnerTest.kt">
  <title id="title">Redisson Watchdog Sequence</title>
  <desc id="desc">Time ordered sequence for node-1 acquiring leadership, watchdog renewal protecting the long job, node-2 skipping during ownership, and node-2 acquiring after release.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c85d73"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .part-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .part-sub, .msg, .region, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .part-title { font-size: 19px; }
      .part-sub { font-size: 12px; }
      .msg { font-size: 12px; font-weight: 700; }
      .region { font-size: 12px; font-weight: 700; }
      .footer { font-size: 14px; }
      .participant { stroke-width: 2.2; rx: 12; }
      .lifeline { stroke: #c5d4e3; stroke-width: 2; stroke-dasharray: 8 8; }
      .call { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .return { fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 9 8; }
      .region-box { fill: #f7f2ff; fill-opacity: .34; stroke: #b69bf0; stroke-width: 2.2; rx: 16; }
      .divider { stroke: #d8c8fa; stroke-width: 2; stroke-dasharray: 9 8; }
    </style>
  </defs>
  <rect class="canvas" width="1500" height="1080"/>
  <rect class="frame" x="42" y="34" width="1416" height="1020" rx="30"/>
  <text class="title" x="86" y="92">Redisson Watchdog Sequence</text>
  <text class="subtitle" x="90" y="126">Time order: node-1 acquires, auto-extension protects the long body, node-2 skips, then acquires after release.</text>

  <rect class="participant" x="90" y="174" width="154" height="68" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="part-title" x="167" y="202" text-anchor="middle">Demo</text>
  <text class="part-sub" x="167" y="224" text-anchor="middle">main/test</text>
  <rect class="participant" x="310" y="174" width="168" height="68" fill="#edf9f4" stroke="#63b891"/>
  <text class="part-title" x="394" y="202" text-anchor="middle">node-1</text>
  <text class="part-sub" x="394" y="224" text-anchor="middle">leader runner</text>
  <rect class="participant" x="544" y="174" width="168" height="68" fill="#e9f7f6" stroke="#4aa7a0"/>
  <text class="part-title" x="628" y="202" text-anchor="middle">node-2</text>
  <text class="part-sub" x="628" y="224" text-anchor="middle">contender</text>
  <rect class="participant" x="778" y="174" width="178" height="68" fill="#fff4de" stroke="#d59c3f"/>
  <text class="part-title" x="867" y="202" text-anchor="middle">LeaderElector</text>
  <text class="part-sub" x="867" y="224" text-anchor="middle">Redisson</text>
  <rect class="participant" x="1022" y="174" width="166" height="68" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="part-title" x="1105" y="202" text-anchor="middle">RLock</text>
  <text class="part-sub" x="1105" y="224" text-anchor="middle">lease state</text>
  <rect class="participant" x="1254" y="174" width="166" height="68" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="part-title" x="1337" y="202" text-anchor="middle">Job body</text>
  <text class="part-sub" x="1337" y="224" text-anchor="middle">long wait</text>

  <line class="lifeline" x1="167" y1="242" x2="167" y2="990"/>
  <line class="lifeline" x1="394" y1="242" x2="394" y2="990"/>
  <line class="lifeline" x1="628" y1="242" x2="628" y2="990"/>
  <line class="lifeline" x1="867" y1="242" x2="867" y2="990"/>
  <line class="lifeline" x1="1105" y1="242" x2="1105" y2="990"/>
  <line class="lifeline" x1="1337" y1="242" x2="1337" y2="990"/>

  <path class="call" d="M167 304 L394 304" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="msg" x="280" y="290" text-anchor="middle" fill="#315fbd">1. start node-1 runJob</text>
  <path class="call" d="M394 360 L867 360" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <text class="msg" x="630" y="346" text-anchor="middle" fill="#9b651c">2. runIfLeader(lockName)</text>
  <path class="call" d="M867 416 L1105 416" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <text class="msg" x="986" y="402" text-anchor="middle" fill="#9b651c">3. acquire RLock with lease</text>
  <path class="return" d="M1105 470 L867 470" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="msg" x="986" y="456" text-anchor="middle" fill="#24785a">4. owner accepted</text>
  <path class="call" d="M394 524 L1337 524" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="msg" x="866" y="510" text-anchor="middle" fill="#24785a">5. leader body starts and blocks until released</text>

  <rect class="region-box" x="78" y="558" width="1296" height="196"/>
  <text class="region" x="104" y="586">while node-1 body is active</text>
  <path class="call" d="M867 626 L1105 626" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <text class="msg" x="986" y="612" text-anchor="middle" fill="#6245bd">6. renew lease</text>
  <path class="call" d="M167 680 L628 680" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="msg" x="398" y="666" text-anchor="middle" fill="#315fbd">7. node-2 tries during long job</text>
  <path class="return" d="M867 724 L628 724" stroke="#c85d73" marker-end="url(#arrow-red)"/>
  <text class="msg" x="748" y="710" text-anchor="middle" fill="#a7465d">8. lock held, return SKIPPED</text>

  <path class="return" d="M1337 802 L394 802" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="msg" x="866" y="788" text-anchor="middle" fill="#24785a">9. releaseLeader lets node-1 body finish</text>
  <path class="call" d="M867 858 L1105 858" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <text class="msg" x="986" y="844" text-anchor="middle" fill="#6245bd">10. release lock and stop extension</text>
  <path class="call" d="M167 914 L628 914" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="msg" x="398" y="900" text-anchor="middle" fill="#315fbd">11. node-2 tries after release</text>
  <path class="call" d="M628 958 L867 958" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="msg" x="748" y="944" text-anchor="middle" fill="#24785a">12. acquires next cycle</text>

  <text class="footer" x="750" y="1030" text-anchor="middle">The observable reports are ELECTED, SKIPPED during ownership, then ELECTED after release.</text>
</svg>
