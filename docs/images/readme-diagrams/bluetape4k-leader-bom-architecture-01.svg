<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="760" viewBox="0 0 1240 760" role="img" aria-labelledby="title desc">
  <title id="title">bluetape4k-leader-bom architecture</title>
  <desc id="desc">The leader BOM is a Gradle java-platform publication that exports dependencyManagement constraints for every leader module so Gradle and Maven consumers can omit individual module versions.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-16%" width="124%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#64748b" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb" stroke="#2563eb" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#059669" stroke="#059669" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428" stroke="#cf8428" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
  </defs>
  <style>
    text { font-family: "Comic Mono"; fill: #263244; letter-spacing: 0; }
    .title { font-family: "Architects Daughter"; font-size: 34px; fill: #172033; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .section { font-family: "Architects Daughter"; font-size: 19px; fill: #1f2937; }
    .card-title { font-family: "Architects Daughter"; font-size: 18px; fill: #172033; }
    .mono { font-size: 12px; fill: #475569; }
    .small { font-size: 11px; fill: #64748b; }
    .footer { font-size: 11px; fill: #64748b; }
    .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
    .band { fill: #f8fafc; stroke: #dbe4f0; stroke-width: 1.3; }
    .source { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; }
    .bom { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.7; }
    .publish { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; }
    .consumer { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 1.5; }
    .module { fill: #ffffff; stroke-width: 1.3; }
    .core { stroke: #60a5fa; }
    .backend { stroke: #34d399; }
    .integration { stroke: #f59e0b; }
    .arrow { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .import { stroke: #2563eb; marker-end: url(#arrowBlue); }
    .constraint { stroke: #059669; stroke-dasharray: 7 5; marker-end: url(#arrowGreen); }
    .publishLine { stroke: #b45309; stroke-dasharray: 7 5; marker-end: url(#arrowAmber); }
  </style>

  <rect width="1240" height="760" fill="#f6f8fb"/>
  <rect class="frame" x="38" y="30" width="1164" height="690" rx="18"/>
  <text class="title" x="620" y="74" text-anchor="middle">bluetape4k-leader-bom Architecture</text>
  <text class="subtitle" x="620" y="102" text-anchor="middle">A java-platform publication that exports version constraints; it has no runtime classes.</text>

  <rect class="band" x="78" y="140" width="1084" height="455" rx="15"/>
  <text class="section" x="108" y="178">Version coordination path</text>

  <g transform="translate(106 214)">
    <rect class="source" width="236" height="164" rx="10"/>
    <text class="card-title" x="118" y="34" text-anchor="middle">Gradle source</text>
    <line x1="0" y1="52" x2="236" y2="52" stroke="#bfdbfe"/>
    <text class="mono" x="18" y="78">plugins: java-platform</text>
    <text class="mono" x="18" y="100">allowDependencies()</text>
    <text class="mono" x="18" y="122">constraints { api(project(...)) }</text>
    <text class="small" x="18" y="146">bluetape4k-leader-bom/build.gradle.kts</text>
  </g>

  <g transform="translate(438 196)">
    <rect class="bom" width="310" height="202" rx="12"/>
    <text class="card-title" x="155" y="34" text-anchor="middle">BOM publication</text>
    <line x1="0" y1="54" x2="310" y2="54" stroke="#bbf7d0"/>
    <text class="mono" x="20" y="80">artifact: bluetape4k-leader-bom</text>
    <text class="mono" x="20" y="103">packaging: pom</text>
    <text class="mono" x="20" y="126">publishes dependencyManagement only</text>
    <text class="mono" x="20" y="149">no runtime bytecode or beans</text>
    <rect x="20" y="166" width="270" height="22" rx="11" fill="#dcfce7"/>
    <text class="small" x="155" y="182" text-anchor="middle">one version controls the leader stack</text>
  </g>

  <g transform="translate(846 214)">
    <rect class="consumer" width="250" height="164" rx="10"/>
    <text class="card-title" x="125" y="34" text-anchor="middle">Consumers</text>
    <line x1="0" y1="52" x2="250" y2="52" stroke="#ddd6fe"/>
    <text class="mono" x="18" y="78">Gradle platform(...)</text>
    <text class="mono" x="18" y="100">Spring dependencyManagement</text>
    <text class="mono" x="18" y="122">Maven dependencyManagement</text>
    <text class="small" x="18" y="146">module dependencies omit versions</text>
  </g>

  <path class="arrow publishLine" d="M 342 296 L 438 296"/>
  <text class="small" x="390" y="282" text-anchor="middle" fill="#b45309">publishes</text>
  <path class="arrow import" d="M 748 296 L 846 296"/>
  <text class="small" x="797" y="282" text-anchor="middle" fill="#2563eb">import</text>

  <g transform="translate(116 430)">
    <rect class="module core" width="234" height="98" rx="8"/>
    <text class="card-title" x="117" y="28" text-anchor="middle">Core API</text>
    <text class="mono" x="18" y="55">bluetape4k-leader-core</text>
    <text class="small" x="18" y="77">blocking / async / coroutine / VT</text>
  </g>
  <g transform="translate(378 430)">
    <rect class="module backend" width="360" height="98" rx="8"/>
    <text class="card-title" x="180" y="28" text-anchor="middle">Backends</text>
    <text class="mono" x="18" y="55">Redis, Exposed, MongoDB, Hazelcast</text>
    <text class="mono" x="18" y="76">ZooKeeper, etcd, Consul, DynamoDB, K8s</text>
  </g>
  <g transform="translate(766 430)">
    <rect class="module integration" width="312" height="98" rx="8"/>
    <text class="card-title" x="156" y="28" text-anchor="middle">Integrations</text>
    <text class="mono" x="18" y="55">Spring Boot, Ktor, Micrometer</text>
    <text class="small" x="18" y="77">AOP, scheduler plugin, metrics decorators</text>
  </g>

  <path class="arrow constraint" d="M 593 398 L 423.67 398 Q 413 398 413 408.67 L 413 419.33 Q 413 430 402.33 430 L 233 430"/>
  <path class="arrow constraint" d="M 593 398 L 593 430"/>
  <path class="arrow constraint" d="M 593 398 L 746.83 398 Q 757.5 398 757.5 408.67 L 757.5 419.33 Q 757.5 430 768.17 430 L 922 430"/>
  <text class="small" x="635" y="418" fill="#059669">constraints</text>

  <g transform="translate(118 620)">
    <rect fill="#f8fafc" stroke="#dbe4f0" width="1004" height="58" rx="12"/>
    <text class="footer" x="502" y="24" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader / bluetape4k-leader-bom</text>
    <text class="footer" x="502" y="43" text-anchor="middle">Import the BOM once, then choose the core, backend, and integration modules without repeating versions.</text>
  </g>
</svg>
