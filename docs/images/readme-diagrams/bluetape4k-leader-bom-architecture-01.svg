<svg xmlns="http://www.w3.org/2000/svg" width="1692" height="982" viewBox="0 0 1692 982" role="img" aria-labelledby="title desc" data-intent="Answer a dependency-management reader's question: what does the bluetape4k-leader BOM publish, how do Gradle and Maven consumers import it, which leader module families receive aligned versions, and why this artifact contains dependency constraints rather than runtime classes?" data-evidence="bluetape4k-leader-bom README architecture/usage sections; build.gradle.kts java-platform constraints; bluetape4k-dependencies aggregation note" data-source-read="bluetape4k-leader-bom/README.md; bluetape4k-leader-bom/build.gradle.kts">
  <title id="title">Leader BOM Constraint Architecture</title>
  <desc id="desc">Architecture diagram for the bluetape4k-leader BOM module showing Gradle java-platform constraints, published dependencyManagement, consumer imports, managed module families, and the upstream bluetape4k-dependencies aggregation boundary.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#203040" flood-opacity="0.10"/></filter>
    <marker id="arrow-call" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F83BF"/></marker>
    <marker id="arrow-success" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#3E9868"/></marker>
    <marker id="arrow-skip" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#C94D68"/></marker>
    <marker id="arrow-contention" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#B9851B"/></marker>
    <marker id="arrow-release" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#755BC6"/></marker>
    <marker id="arrow-retry" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F63C7"/></marker>
    <marker id="arrow-dependency" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#2E8F89"/></marker>
    <marker id="arrow-metric" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#718A35"/></marker>
    <marker id="arrow-neutral" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#758297"/></marker>
    <style>
      .canvas{fill:#F7FAFC}
      .frame{fill:#FFFFFF;stroke:#D7E2EC;stroke-width:2}
      .title{font-family:"Architects Daughter";font-size:44px;fill:#22344A;font-weight:400}
      .subtitle{font-family:"Comic Mono";font-size:16px;fill:#536476;font-weight:400}
      .band{fill:#F3F7FB;stroke:#D7E2EC;stroke-width:2}
      .bandTitle{font-family:"Architects Daughter";font-size:24px;fill:#22344A;font-weight:400;paint-order:stroke;stroke:#F3F7FB;stroke-width:5px;stroke-linejoin:round}
      .card{filter:url(#shadow);stroke-width:2}
      .cardTitle{font-family:"Architects Daughter";font-size:23px;fill:#22344A;font-weight:400}
      .detail{font-family:"Comic Mono";font-size:13px;fill:#42556B;font-weight:400}
      .small{font-family:"Comic Mono";font-size:12px;fill:#627184;font-weight:400}
      .route{fill:none;stroke-width:2.45;stroke-linejoin:round;stroke-linecap:round}
      .seq{fill:none;stroke-width:3;stroke-linecap:round}
      .seqReturn{fill:none;stroke-width:2.7;stroke-linecap:round;stroke-dasharray:8 7}
      .lifeline{stroke:#A7B4C3;stroke-width:1.8;stroke-dasharray:8 8}
      .pill{fill:#FFFFFF;stroke:#D6E3EF;stroke-width:1.4}
      .branchBox{fill:#FFFFFF;fill-opacity:.42;stroke:#D6A441;stroke-width:1.8;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect class="canvas" width="1692" height="982"/>
  <rect class="frame" x="32" y="28" width="1628" height="926" rx="28"/>
  <text class="title" x="66" y="82">Leader BOM Constraint Architecture</text>
  <text class="subtitle" x="70" y="116">The BOM publishes dependency-management constraints only, so consumers can align leader modules without version pins.</text>
<g>
  <rect class="band" x="152" y="228" width="1412" height="190" rx="18"/>
  <text class="bandTitle" x="178" y="262">Source and publication</text>
</g>
<g>
  <rect class="band" x="152" y="433" width="1412" height="190" rx="18"/>
  <text class="bandTitle" x="178" y="467">Consumer import boundary</text>
</g>
<g>
  <rect class="band" x="152" y="688" width="1412" height="170" rx="18"/>
  <text class="bandTitle" x="178" y="722">Managed leader module families</text>
</g>
<path class="route" data-from="gradlePlatform" data-to="bomPom" data-route-tone="dependency" d="M508 319 L668 319" stroke="#2E8F89" marker-end="url(#arrow-dependency)"/>
<path class="route" data-from="bomPom" data-to="gradleImport" data-route-tone="call" d="M668 326 L598 326 L598 527 L568 527" stroke="#4F83BF" marker-end="url(#arrow-call)"/>
<path class="route" data-from="bomPom" data-to="mavenImport" data-route-tone="call" d="M858 374 L858 483" stroke="#4F83BF" marker-end="url(#arrow-call)"/>
<path class="route" data-from="bomPom" data-to="constraintOnly" data-route-tone="dependency" d="M858 374 L858 408 L1318 408 L1318 483" stroke="#2E8F89" marker-end="url(#arrow-dependency)"/>
<path class="route" data-from="gradleImport" data-to="core" data-route-tone="success" d="M398 571 L398 663 L128 663 L128 784 L198 784" stroke="#3E9868" marker-end="url(#arrow-success)"/>
<path class="route" data-from="mavenImport" data-to="backends" data-route-tone="success" d="M838 571 L838 663 L778 663 L778 743" stroke="#3E9868" marker-end="url(#arrow-success)"/>
<path class="route" data-from="constraintOnly" data-to="integrations" data-route-tone="success" d="M1318 571 L1318 663 L1223 663 L1223 743" stroke="#3E9868" marker-end="url(#arrow-success)"/>
<path class="route" data-from="umbrellaBom" data-to="bomPom" data-route-tone="metric" d="M1188 319 L1048 319" stroke="#718A35" marker-end="url(#arrow-metric)"/>
<g id="node-gradlePlatform">
