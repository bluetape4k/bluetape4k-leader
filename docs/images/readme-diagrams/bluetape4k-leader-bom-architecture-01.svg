  <text class="cardTitle" x="1318" y="509" text-anchor="middle" dominant-baseline="middle">Constraint-Only Artifact</text>
  <text class="detail" x="1318" y="528" text-anchor="middle" dominant-baseline="middle">publishes version constraints</text>
