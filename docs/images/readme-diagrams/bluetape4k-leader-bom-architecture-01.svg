  <text class="cardTitle" x="353" y="301" text-anchor="middle" dominant-baseline="middle">Gradle java-platform</text>
  <text class="detail" x="353" y="320" text-anchor="middle" dominant-baseline="middle">allowDependencies()</text>
  <text class="detail" x="353" y="339" text-anchor="middle" dominant-baseline="middle">api(project(...)) constraints</text>
</g>
