  <text class="detail" x="858" y="327" text-anchor="middle" dominant-baseline="middle">pom dependencyManagement</text>
  <text class="detail" x="858" y="346" text-anchor="middle" dominant-baseline="middle">no runtime classes</text>
</g>
<g id="node-umbrellaBom">
  <rect class="card" x="1188" y="278" width="320" height="82" rx="10" fill="#EEF6D9" stroke="#8BA84D"/>
  <text class="cardTitle" x="1348" y="301" text-anchor="middle" dominant-baseline="middle">bluetape4k-dependencies</text>
  <text class="detail" x="1348" y="320" text-anchor="middle" dominant-baseline="middle">aggregates leader BOM</text>
  <text class="detail" x="1348" y="339" text-anchor="middle" dominant-baseline="middle">cross-ecosystem alignment</text>
</g>
<g id="node-gradleImport">
  <rect class="card" x="228" y="483" width="340" height="88" rx="10" fill="#EAF7EF" stroke="#58A978"/>
  <text class="cardTitle" x="398" y="509" text-anchor="middle" dominant-baseline="middle">Gradle Consumers</text>
  <text class="detail" x="398" y="528" text-anchor="middle" dominant-baseline="middle">platform(...) or mavenBom(...)</text>
  <text class="detail" x="398" y="547" text-anchor="middle" dominant-baseline="middle">dependencies omit versions</text>
</g>
<g id="node-mavenImport">
  <rect class="card" x="688" y="483" width="300" height="88" rx="10" fill="#E9F7F6" stroke="#45A7A1"/>
