<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="900" viewBox="0 0 1240 900" role="img" aria-labelledby="title desc">
  <title id="title">leader-redis-redisson Class Structure</title>
  <desc id="desc">Source-derived UML-style structure for Redisson single leader, group leader, factories, and Redis primitives.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#64748b" flood-opacity="0.14"/>
    </filter>
    <marker id="useArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#2563eb"/>
    </marker>
    <marker id="hollowTri" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 8 4 L 1 7 Z" fill="#ffffff" stroke="#374151" stroke-width="1.1"/>
    </marker>
  </defs>
  <style>
    text { font-family: "Comic Mono", monospace; fill: #243041; }
    .title { font-family: "Architects Daughter", cursive; font-size: 34px; fill: #172033; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .panel-label { font-family: "Architects Daughter", cursive; font-size: 18px; fill: #334155; }
    .class-name { font-family: "Architects Daughter", cursive; font-size: 16px; fill: #172033; }
    .stereo { font-size: 10px; fill: #64748b; }
    .member { font-size: 11px; fill: #475569; }
    .small { font-size: 10px; fill: #64748b; }
    .footer { font-size: 11px; fill: #64748b; }
    .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; filter: url(#shadow); }
    .panel { fill: #f8fafc; stroke: #dbe4f0; stroke-width: 1.2; }
    .single { fill: #eff6ff; stroke: #93c5fd; }
    .group { fill: #f0fdf4; stroke: #86efac; }
    .factory { fill: #fff7ed; stroke: #fdba74; }
    .redis { fill: #fdf2f8; stroke: #f9a8d4; }
    .divider { stroke: rgba(100,116,139,0.35); stroke-width: 1; }
    .realize { stroke: #374151; stroke-width: 1.25; fill: none; marker-end: url(#hollowTri); }
    .use { stroke: #2563eb; stroke-width: 1.35; fill: none; marker-end: url(#useArrow); }
    .muted { stroke: #94a3b8; stroke-width: 1.15; fill: none; stroke-dasharray: 5 5; marker-end: url(#useArrow); }
  </style>

  <rect width="1240" height="900" fill="#f6f8fb"/>
  <rect class="frame" x="34" y="30" width="1172" height="830" rx="18"/>
  <text class="title" x="620" y="78" text-anchor="middle">leader-redis-redisson Class Structure</text>
  <text class="subtitle" x="620" y="105" text-anchor="middle">Redisson RLock and RPermitExpirableSemaphore adapters implement leader-core contracts.</text>

  <rect class="panel" x="62" y="138" width="340" height="606" rx="14"/>
  <rect class="panel" x="450" y="138" width="352" height="606" rx="14"/>
  <rect class="panel" x="850" y="138" width="300" height="606" rx="14"/>
  <text class="panel-label" x="232" y="168" text-anchor="middle">Single leader locks</text>
  <text class="panel-label" x="626" y="168" text-anchor="middle">Group leader permits</text>
  <text class="panel-label" x="1000" y="168" text-anchor="middle">Factories and Redis primitives</text>

  <!-- Single leader family -->
  <g id="LeaderElector" transform="translate(92 198)">
    <rect class="single" width="132" height="78" rx="5"/>
    <text class="stereo" x="66" y="19" text-anchor="middle">&lt;&lt;interface&gt;&gt;</text>
    <text class="class-name" x="66" y="42" text-anchor="middle">LeaderElector</text>
    <line class="divider" x1="0" y1="54" x2="132" y2="54"/>
    <text class="member" x="12" y="70">+ runIfLeader()</text>
  </g>
  <g id="SuspendLeaderElector" transform="translate(240 198)">
    <rect class="single" width="132" height="86" rx="5"/>
    <text class="stereo" x="66" y="19" text-anchor="middle">&lt;&lt;interface&gt;&gt;</text>
    <text class="class-name" x="66" y="38" text-anchor="middle">Suspend</text>
    <text class="class-name" x="66" y="54" text-anchor="middle">LeaderElector</text>
    <line class="divider" x1="0" y1="62" x2="132" y2="62"/>
    <text class="member" x="12" y="78">+ runIfLeader()</text>
  </g>
  <g id="RedissonLeaderElector" transform="translate(92 332)">
    <rect class="single" width="132" height="116" rx="5"/>
    <text class="class-name" x="66" y="27" text-anchor="middle">RedissonLeader</text>
    <text class="class-name" x="66" y="44" text-anchor="middle">Elector</text>
    <line class="divider" x1="0" y1="57" x2="132" y2="57"/>
    <text class="member" x="12" y="75">- RedissonClient</text>
    <text class="member" x="12" y="93">- options</text>
    <line class="divider" x1="0" y1="94" x2="132" y2="94"/>
    <text class="member" x="12" y="110">+ tryLock()</text>
  </g>
  <g id="RedissonSuspendLeaderElector" transform="translate(240 332)">
    <rect class="single" width="132" height="116" rx="5"/>
    <text class="class-name" x="66" y="27" text-anchor="middle">RedissonSuspend</text>
    <text class="class-name" x="66" y="44" text-anchor="middle">LeaderElector</text>
    <line class="divider" x1="0" y1="57" x2="132" y2="57"/>
    <text class="member" x="12" y="75">- mini Snowflake ID</text>
    <text class="member" x="12" y="93">- options</text>
    <line class="divider" x1="0" y1="101" x2="132" y2="101"/>
    <text class="member" x="12" y="113">+ tryLockAsync()</text>
  </g>
  <g id="LockDelegate" transform="translate(108 520)">
    <rect class="redis" width="248" height="94" rx="5"/>
    <text class="class-name" x="124" y="28" text-anchor="middle">RedissonLockExtendDelegate</text>
    <line class="divider" x1="0" y1="45" x2="248" y2="45"/>
    <text class="member" x="14" y="64">+ extend(): RKeys.expire(lock)</text>
    <text class="member" x="14" y="82">+ lastExtendDeadline for watchdog skip</text>
  </g>
  <g id="RLock" transform="translate(150 648)">
    <rect class="redis" width="164" height="58" rx="5"/>
    <text class="class-name" x="82" y="25" text-anchor="middle">Redisson RLock</text>
    <text class="member" x="82" y="44" text-anchor="middle">explicit leaseTime</text>
  </g>

  <!-- Group leader family -->
  <g id="LeaderGroupElector" transform="translate(480 198)">
    <rect class="group" width="132" height="86" rx="5"/>
    <text class="stereo" x="66" y="19" text-anchor="middle">&lt;&lt;interface&gt;&gt;</text>
    <text class="class-name" x="66" y="38" text-anchor="middle">LeaderGroup</text>
    <text class="class-name" x="66" y="54" text-anchor="middle">Elector</text>
    <line class="divider" x1="0" y1="62" x2="132" y2="62"/>
    <text class="member" x="12" y="78">+ maxLeaders</text>
  </g>
  <g id="SuspendLeaderGroupElector" transform="translate(630 198)">
    <rect class="group" width="142" height="86" rx="5"/>
    <text class="stereo" x="71" y="19" text-anchor="middle">&lt;&lt;interface&gt;&gt;</text>
    <text class="class-name" x="71" y="38" text-anchor="middle">SuspendLeader</text>
    <text class="class-name" x="71" y="54" text-anchor="middle">GroupElector</text>
    <line class="divider" x1="0" y1="62" x2="142" y2="62"/>
    <text class="member" x="12" y="78">+ runIfLeader()</text>
  </g>
  <g id="RedissonLeaderGroupElector" transform="translate(480 332)">
    <rect class="group" width="132" height="116" rx="5"/>
    <text class="class-name" x="66" y="27" text-anchor="middle">RedissonLeader</text>
    <text class="class-name" x="66" y="44" text-anchor="middle">GroupElector</text>
    <line class="divider" x1="0" y1="57" x2="132" y2="57"/>
    <text class="member" x="12" y="75">- maxLeaders</text>
    <text class="member" x="12" y="93">- wait/lease time</text>
    <line class="divider" x1="0" y1="101" x2="132" y2="101"/>
    <text class="member" x="12" y="113">+ tryAcquire()</text>
  </g>
  <g id="RedissonSuspendLeaderGroupElector" transform="translate(630 332)">
    <rect class="group" width="142" height="126" rx="5"/>
    <text class="class-name" x="71" y="24" text-anchor="middle">RedissonSuspend</text>
    <text class="class-name" x="71" y="41" text-anchor="middle">LeaderGroup</text>
    <text class="class-name" x="71" y="58" text-anchor="middle">Elector</text>
    <line class="divider" x1="0" y1="70" x2="142" y2="70"/>
    <text class="member" x="12" y="88">- async semaphore</text>
    <text class="member" x="12" y="106">- NonCancellable final</text>
    <line class="divider" x1="0" y1="114" x2="142" y2="114"/>
    <text class="member" x="12" y="122">+ tryAcquireAsync()</text>
  </g>
  <g id="SemaphoreDelegate" transform="translate(510 520)">
    <rect class="redis" width="232" height="94" rx="5"/>
    <text class="class-name" x="116" y="26" text-anchor="middle">Semaphore Extend Delegates</text>
    <line class="divider" x1="0" y1="43" x2="232" y2="43"/>
    <text class="member" x="14" y="62">sync: updateLeaseTime()</text>
    <text class="member" x="14" y="80">suspend: updateLeaseTimeAsync()</text>
  </g>
  <g id="PermitSemaphore" transform="translate(490 648)">
    <rect class="redis" width="272" height="58" rx="5"/>
    <text class="class-name" x="136" y="25" text-anchor="middle">RPermitExpirableSemaphore</text>
    <text class="member" x="136" y="44" text-anchor="middle">key lg:{lockName}, permitId slots</text>
  </g>

  <!-- Factories and primitives -->
  <g transform="translate(890 198)">
    <rect class="factory" width="220" height="150" rx="6"/>
    <text class="class-name" x="110" y="28" text-anchor="middle">Factory adapters</text>
    <line class="divider" x1="0" y1="45" x2="220" y2="45"/>
    <text class="member" x="14" y="66">LeaderElectorFactory</text>
    <text class="member" x="14" y="86">LeaderGroupElectorFactory</text>
    <text class="member" x="14" y="106">SuspendLeaderElectorFactory</text>
    <text class="member" x="14" y="126">SuspendLeaderGroupElectorFactory</text>
  </g>
  <g transform="translate(890 390)">
    <rect class="redis" width="220" height="116" rx="6"/>
    <text class="class-name" x="110" y="28" text-anchor="middle">Redis audit map</text>
    <line class="divider" x1="0" y1="45" x2="220" y2="45"/>
    <text class="member" x="14" y="67">RMap lg:{lockName}:audit</text>
    <text class="member" x="14" y="87">HSET permitId -> leaderId</text>
    <text class="member" x="14" y="105">HDEL on release/finally</text>
  </g>
  <g transform="translate(890 548)">
    <rect class="factory" width="220" height="116" rx="6"/>
    <text class="class-name" x="110" y="28" text-anchor="middle">Strategic election</text>
    <line class="divider" x1="0" y1="45" x2="220" y2="45"/>
    <text class="member" x="14" y="67">RedissonCandidateRegistry</text>
    <text class="member" x="14" y="87">RMapCache candidate TTL</text>
    <text class="member" x="14" y="105">result update by winner</text>
  </g>

  <!-- Relationships -->
  <path class="realize" d="M 158 332 L 158 286 L 158 276"/>
  <path class="realize" d="M 306 332 L 306 292 L 306 284"/>
  <path class="realize" d="M 546 332 L 546 292 L 546 284"/>
  <path class="realize" d="M 701 332 L 701 292 L 701 284"/>
  <path class="use" d="M 158 448 L 158 486 L 232 486 L 232 520"/>
  <path class="use" d="M 306 448 L 306 486 L 232 486 L 232 520"/>
  <path class="use" d="M 232 614 L 232 648"/>
  <path class="use" d="M 546 448 L 546 486 L 626 486 L 626 520"/>
  <path class="use" d="M 701 458 L 701 486 L 626 486 L 626 520"/>
  <path class="use" d="M 626 614 L 626 648"/>
  <path class="muted" d="M 890 272 L 802 272 L 802 390 L 772 390"/>
  <path class="muted" d="M 890 448 L 802 448 L 802 565 L 742 565"/>

  <g transform="translate(82 774)">
    <rect fill="#f8fafc" stroke="#dbe4f0" width="1076" height="58" rx="12"/>
    <text class="footer" x="538" y="24" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader / leader-redis-redisson</text>
    <text class="footer" x="538" y="43" text-anchor="middle">Single locks use RLock with explicit leaseTime; groups use RPermitExpirableSemaphore permitId slots.</text>
  </g>
</svg>
