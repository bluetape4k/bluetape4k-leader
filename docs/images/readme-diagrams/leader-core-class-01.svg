<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1180" viewBox="0 0 1700 1180" role="img" aria-labelledby="title desc">
  <title id="title">leader-core contract map</title>
  <desc id="desc">UML-style map of leader-core API families, local implementations, and shared result, state, lease, listener, and option contracts.</desc>
  <defs>
    <style>
      .title { font-family: "Architects Daughter"; font-size: 42px; fill: #263238; }
      .subtitle, .small, .member, .footer, .route { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 18px; }
      .lane-title { font-family: "Architects Daughter"; font-size: 24px; fill: #263238; }
      .box-title { font-family: "Architects Daughter"; font-size: 20px; fill: #1d2d35; }
      .member { font-size: 14px; }
      .small { font-size: 13px; }
      .footer { font-size: 14px; fill: #60727d; }
      .route { font-size: 12px; fill: #455a64; }
      .frame { fill: #fbfcf8; stroke: #41545d; stroke-width: 3; }
      .lane { fill: #f2f7f2; stroke: #b7c8bb; stroke-width: 2; }
      .lane2 { fill: #f7f4ed; stroke: #d0c4ad; stroke-width: 2; }
      .lane3 { fill: #eef6f8; stroke: #b1c9cf; stroke-width: 2; }
      .contract { fill: #ffffff; stroke: #4f6c77; stroke-width: 2; }
      .abstract { fill: #fffdf7; stroke: #7c6a45; stroke-width: 2; }
      .impl { fill: #fdfefe; stroke: #5d7b63; stroke-width: 2; }
      .support { fill: #fffaf2; stroke: #b28b52; stroke-width: 2; }
      .result { fill: #f7fbff; stroke: #6c86a1; stroke-width: 2; }
      .sep { stroke: #d6dee2; stroke-width: 1.5; }
      .realize { fill: none; stroke: #455a64; stroke-width: 1.7; }
      .extends { fill: none; stroke: #263238; stroke-width: 1.9; }
      .uses { fill: none; stroke: #4b74a5; stroke-width: 1.8; stroke-dasharray: 7 5; }
      .obs { fill: none; stroke: #8e6aa9; stroke-width: 2.2; }
    </style>
    <marker id="arrowBlue" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11" fill="none" stroke="#4b74a5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11" fill="none" stroke="#8e6aa9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="hollow" viewBox="0 0 18 16" markerWidth="16" markerHeight="14" refX="16" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 16 8 L 1 15 Z" fill="#fbfcf8" stroke="#263238" stroke-width="1.7"/>
    </marker>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#22333b" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="1652" height="1132" rx="20" class="frame"/>
  <text x="850" y="78" text-anchor="middle" class="title">leader-core Contract Map</text>
  <text x="850" y="108" text-anchor="middle" class="subtitle">API families choose a local implementation; shared contracts make skip, failure, lease, state, and lifecycle semantics explicit.</text>

  <rect x="66" y="145" width="1000" height="820" rx="16" class="lane"/>
  <text x="90" y="184" class="lane-title">Execution API Families and Local Implementations</text>

  <rect x="110" y="215" width="278" height="696" rx="14" class="lane3"/>
  <text x="249" y="252" text-anchor="middle" class="lane-title">Single Leader</text>

  <rect x="155" y="285" width="188" height="76" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="249" y="314" text-anchor="middle" class="box-title">AsyncLeaderElector</text>
  <line x1="155" y1="329" x2="343" y2="329" class="sep"/>
  <text x="171" y="351" class="member">+ CompletableFuture&lt;T?&gt;</text>

  <rect x="138" y="404" width="222" height="92" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="249" y="432" text-anchor="middle" class="box-title">LeaderElector</text>
  <line x1="138" y1="447" x2="360" y2="447" class="sep"/>
  <text x="154" y="469" class="member">+ runIfLeader(): T?</text>
  <text x="154" y="489" class="member">+ runIfLeaderResult()</text>

  <rect x="138" y="548" width="222" height="88" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="249" y="576" text-anchor="middle" class="box-title">VirtualThread</text>
  <text x="249" y="600" text-anchor="middle" class="box-title">LeaderElector</text>
  <line x1="138" y1="615" x2="360" y2="615" class="sep"/>
  <text x="154" y="628" class="member">+ VirtualFuture&lt;T?&gt;</text>

  <rect x="138" y="688" width="222" height="88" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="249" y="716" text-anchor="middle" class="box-title">SuspendLeaderElector</text>
  <line x1="138" y1="731" x2="360" y2="731" class="sep"/>
  <text x="154" y="753" class="member">+ suspend runIfLeader()</text>

  <rect x="132" y="820" width="232" height="62" rx="5" class="abstract" filter="url(#softShadow)"/>
  <text x="248" y="846" text-anchor="middle" class="box-title">AbstractLocalLeader</text>
  <line x1="132" y1="858" x2="364" y2="858" class="sep"/>
  <text x="150" y="878" class="member">ReentrantLock + state registry</text>

  <rect x="430" y="215" width="278" height="696" rx="14" class="lane2"/>
  <text x="569" y="252" text-anchor="middle" class="lane-title">Group Leaders</text>

  <rect x="466" y="285" width="206" height="76" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="569" y="314" text-anchor="middle" class="box-title">AsyncLeaderGroup</text>
  <line x1="466" y1="329" x2="672" y2="329" class="sep"/>
  <text x="482" y="351" class="member">+ CompletableFuture&lt;T?&gt;</text>

  <rect x="450" y="404" width="238" height="96" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="569" y="432" text-anchor="middle" class="box-title">LeaderGroupElector</text>
  <line x1="450" y1="447" x2="688" y2="447" class="sep"/>
  <text x="466" y="469" class="member">+ maxLeaders</text>
  <text x="466" y="489" class="member">+ activeCount(), slots()</text>

  <rect x="450" y="548" width="238" height="88" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="569" y="576" text-anchor="middle" class="box-title">VirtualThread Group</text>
  <line x1="450" y1="591" x2="688" y2="591" class="sep"/>
  <text x="466" y="604" class="member">+ VirtualFuture&lt;T?&gt;</text>

  <rect x="450" y="688" width="238" height="88" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="569" y="716" text-anchor="middle" class="box-title">SuspendLeaderGroup</text>
  <line x1="450" y1="731" x2="688" y2="731" class="sep"/>
  <text x="466" y="753" class="member">+ suspend runIfLeader()</text>

  <rect x="444" y="820" width="250" height="62" rx="5" class="abstract" filter="url(#softShadow)"/>
  <text x="569" y="846" text-anchor="middle" class="box-title">AbstractLocalGroup</text>
  <line x1="444" y1="858" x2="694" y2="858" class="sep"/>
  <text x="462" y="878" class="member">Semaphore(maxLeaders) + state</text>

  <rect x="750" y="215" width="278" height="696" rx="14" class="lane"/>
  <text x="889" y="252" text-anchor="middle" class="lane-title">Strategy Election</text>

  <rect x="787" y="286" width="204" height="96" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="889" y="314" text-anchor="middle" class="box-title">StrategicLeader</text>
  <text x="889" y="338" text-anchor="middle" class="box-title">Elector</text>
  <line x1="787" y1="353" x2="991" y2="353" class="sep"/>
  <text x="803" y="375" class="member">register, list, elect</text>

  <rect x="786" y="429" width="206" height="96" rx="5" class="contract" filter="url(#softShadow)"/>
  <text x="889" y="457" text-anchor="middle" class="box-title">ElectionStrategy</text>
  <line x1="786" y1="472" x2="992" y2="472" class="sep"/>
  <text x="802" y="494" class="member">Fifo, Random, Scored</text>
  <text x="802" y="514" class="member">Weighted scorers</text>

  <rect x="787" y="572" width="204" height="92" rx="5" class="impl" filter="url(#softShadow)"/>
  <text x="889" y="600" text-anchor="middle" class="box-title">LocalStrategic</text>
  <text x="889" y="624" text-anchor="middle" class="box-title">LeaderElector</text>
  <line x1="787" y1="639" x2="991" y2="639" class="sep"/>
  <text x="803" y="661" class="member">candidate map + lock</text>

  <rect x="787" y="718" width="204" height="92" rx="5" class="impl" filter="url(#softShadow)"/>
  <text x="889" y="746" text-anchor="middle" class="box-title">LocalStrategic</text>
  <text x="889" y="770" text-anchor="middle" class="box-title">SuspendElector</text>
  <line x1="787" y1="785" x2="991" y2="785" class="sep"/>
  <text x="803" y="807" class="member">candidate map + Mutex</text>

  <rect x="1110" y="145" width="524" height="820" rx="16" class="lane3"/>
  <text x="1135" y="184" class="lane-title">Shared Contracts Seen by Callers</text>

  <rect x="1150" y="220" width="210" height="128" rx="5" class="result" filter="url(#softShadow)"/>
  <text x="1255" y="249" text-anchor="middle" class="box-title">LeaderRunResult</text>
  <line x1="1150" y1="264" x2="1360" y2="264" class="sep"/>
  <text x="1168" y="287" class="member">Elected(value, leaderId?)</text>
  <text x="1168" y="309" class="member">Skipped</text>
  <text x="1168" y="331" class="member">ActionFailed(cause)</text>

  <rect x="1390" y="220" width="202" height="128" rx="5" class="support" filter="url(#softShadow)"/>
  <text x="1491" y="249" text-anchor="middle" class="box-title">Options</text>
  <line x1="1390" y1="264" x2="1592" y2="264" class="sep"/>
  <text x="1408" y="287" class="member">waitTime, leaseTime</text>
  <text x="1408" y="309" class="member">minLeaseTime</text>
  <text x="1408" y="331" class="member">maxLeaders / autoExtend</text>

  <rect x="1150" y="405" width="210" height="132" rx="5" class="support" filter="url(#softShadow)"/>
  <text x="1255" y="434" text-anchor="middle" class="box-title">LeaderLease</text>
  <line x1="1150" y1="449" x2="1360" y2="449" class="sep"/>
  <text x="1168" y="472" class="member">leaderId / auditLeaderId</text>
  <text x="1168" y="494" class="member">leaseUntil metadata</text>
  <text x="1168" y="516" class="member">slot for group leaders</text>

  <rect x="1390" y="405" width="202" height="132" rx="5" class="support" filter="url(#softShadow)"/>
  <text x="1491" y="434" text-anchor="middle" class="box-title">State Snapshots</text>
  <line x1="1390" y1="449" x2="1592" y2="449" class="sep"/>
  <text x="1408" y="472" class="member">LeaderState</text>
  <text x="1408" y="494" class="member">LeaderGroupState</text>
  <text x="1408" y="516" class="member">diagnostics, not acquire</text>

  <rect x="1150" y="594" width="210" height="138" rx="5" class="support" filter="url(#softShadow)"/>
  <text x="1255" y="623" text-anchor="middle" class="box-title">Lifecycle Events</text>
  <line x1="1150" y1="638" x2="1360" y2="638" class="sep"/>
  <text x="1168" y="661" class="member">onElected(lease?)</text>
  <text x="1168" y="683" class="member">onRevoked()</text>
  <text x="1168" y="705" class="member">onSkipped()</text>

  <rect x="1390" y="594" width="202" height="138" rx="5" class="support" filter="url(#softShadow)"/>
  <text x="1491" y="623" text-anchor="middle" class="box-title">LeaderSlot</text>
  <line x1="1390" y1="638" x2="1592" y2="638" class="sep"/>
  <text x="1408" y="661" class="member">lockName + leaderId</text>
  <text x="1408" y="683" class="member">audit identity</text>
  <text x="1408" y="705" class="member">must be stamped by impl</text>

  <rect x="1150" y="790" width="442" height="88" rx="5" class="result" filter="url(#softShadow)"/>
  <text x="1371" y="819" text-anchor="middle" class="box-title">Reader Contract</text>
  <line x1="1150" y1="834" x2="1592" y2="834" class="sep"/>
  <text x="1170" y="856" class="member">Acquire path decides ownership.</text>
  <text x="1170" y="876" class="member">State and lease are observability snapshots.</text>

  <rect x="90" y="1000" width="1520" height="86" rx="14" fill="#ffffff" stroke="#c6d2d5" stroke-width="2"/>
  <text x="120" y="1032" class="lane-title">Local primitive boundary</text>
  <text x="120" y="1062" class="small">Single leader uses ReentrantLock or coroutine Mutex. Group leader uses Semaphore(maxLeaders) or coroutine Semaphore. Strategic election uses candidate lists plus deterministic ElectionStrategy.</text>

  <!-- UML inheritance / realization lines -->
  <path d="M 249 404 L 249 361" class="extends" marker-end="url(#hollow)"/>
  <path d="M 249 820 L 249 776" class="realize" marker-end="url(#hollow)"/>
  <path d="M 569 404 L 569 361" class="extends" marker-end="url(#hollow)"/>
  <path d="M 569 820 L 569 776" class="realize" marker-end="url(#hollow)"/>
  <path d="M 889 572 L 889 552 L 760 552 L 760 404 L 889 404 L 889 382" class="realize" marker-end="url(#hollow)"/>
  <path d="M 889 572 L 889 525" class="uses" marker-end="url(#arrowBlue)"/>
  <path d="M 889 718 L 889 665" class="realize" marker-end="url(#hollow)"/>

  <!-- Shared contract usage lanes kept outside class boxes. -->
  <path d="M 1066 285 L 1138 285" class="uses" marker-end="url(#arrowBlue)"/>
  <path d="M 1066 470 L 1138 470" class="uses" marker-end="url(#arrowBlue)"/>
  <path d="M 1066 663 L 1138 663" class="obs" marker-end="url(#arrowPurple)"/>
  <path d="M 1066 835 L 1138 835" class="uses" marker-end="url(#arrowBlue)"/>

  <rect x="1030" y="240" width="105" height="24" rx="12" fill="#ffffff" stroke="#d7e0e4"/>
  <text x="1082" y="257" text-anchor="middle" class="route">outcome</text>
  <rect x="1038" y="427" width="90" height="24" rx="12" fill="#ffffff" stroke="#d7e0e4"/>
  <text x="1083" y="444" text-anchor="middle" class="route">lease</text>
  <rect x="1034" y="620" width="92" height="24" rx="12" fill="#ffffff" stroke="#d7e0e4"/>
  <text x="1080" y="637" text-anchor="middle" class="route">events</text>
  <rect x="1026" y="790" width="112" height="24" rx="12" fill="#ffffff" stroke="#d7e0e4"/>
  <text x="1082" y="807" text-anchor="middle" class="route">snapshot</text>

  <text x="850" y="1122" text-anchor="middle" class="footer">github.com/bluetape4k/bluetape4k-leader - leader-core README</text>
</svg>
