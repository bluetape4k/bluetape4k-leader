<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="980" viewBox="0 0 1320 980" role="img" aria-labelledby="title desc">
  <title id="title">leader-dynamodb conditional lease sequence</title>
  <desc id="desc">Sequence diagram showing DynamoDB conditional PutItem acquisition, logical leaseExpiry correctness, ttl cleanup metadata, action execution, auto extension, release, minLease retention, and contention skip behavior.</desc>
  <defs>
    <marker markerUnits="userSpaceOnUse" id="arrow-blue" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb" stroke="#2563eb" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-green" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#059669" stroke="#059669" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-orange" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#ea580c" stroke="#ea580c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker markerUnits="userSpaceOnUse" id="arrow-purple" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c3aed" stroke="#7c3aed" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <style>
      .canvas { fill: #f8fafc; }
      .title { font-family: "Architects Daughter", "Comic Mono", "Comic Mono"; font-size: 34px; fill: #0f172a; font-weight: 700; }
      .subtitle { font-family: "Comic Mono", "Architects Daughter"; font-size: 15px; fill: #475569; }
      .participant-title { font-family: "Comic Mono", "Architects Daughter"; font-size: 14px; fill: #0f172a; font-weight: 700; }
      .participant-sub { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .label { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; font-weight: 700; }
      .note-title { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; fill: #0f172a; font-weight: 700; }
      .note { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #475569; }
      .frame-label { font-family: "Comic Mono", "Architects Daughter"; font-size: 12px; font-weight: 700; }
      .footer { font-family: "Comic Mono", "Architects Daughter"; font-size: 11px; fill: #64748b; }
      .participant { stroke-width: 1.8; rx: 14; }
      .caller { fill: #dbeafe; stroke: #2563eb; }
      .elector { fill: #dcfce7; stroke: #16a34a; }
      .client { fill: #ede9fe; stroke: #7c3aed; }
      .table { fill: #ffedd5; stroke: #ea580c; }
      .action { fill: #fce7f3; stroke: #db2777; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.8; stroke-dasharray: 8 8; }
      .activation { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 4; }
      .blue { fill: none; stroke: #2563eb; stroke-width: 2.3; marker-end: url(#arrow-blue); }
      .green { fill: none; stroke: #059669; stroke-width: 2.3; marker-end: url(#arrow-green); }
      .orange { fill: none; stroke: #ea580c; stroke-width: 2.3; marker-end: url(#arrow-orange); }
      .purple { fill: none; stroke: #7c3aed; stroke-width: 2.3; marker-end: url(#arrow-purple); }
      .return { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow-blue); }
      .skip-return { fill: none; stroke: #ea580c; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow-orange); }
      .frame-success { fill: rgba(16, 185, 129, 0.045); stroke: #059669; stroke-width: 1.9; rx: 14; }
      .frame-skip { fill: rgba(234, 88, 12, 0.045); stroke: #ea580c; stroke-width: 3; rx: 14; }
      .frame-note { fill: rgba(124, 58, 237, 0.045); stroke: #7c3aed; stroke-width: 1.6; stroke-dasharray: 9 7; rx: 14; }
      .badge { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 0.9; rx: 7; }
    </style>
  </defs>

  <rect class="canvas" width="1320" height="980"/>
  <text class="title" x="660" y="62" text-anchor="middle">DynamoDB Conditional Lease Sequence</text>
  <text class="subtitle" x="660" y="91" text-anchor="middle">A conditional row write owns leadership; leaseExpiry controls takeover even when DynamoDB TTL cleanup is delayed.</text>

  <g>
    <rect class="participant caller" x="78" y="128" width="148" height="70"/>
    <text class="participant-title" x="152" y="156" text-anchor="middle">Caller</text>
    <text class="participant-sub" x="152" y="179" text-anchor="middle">job code</text>
    <line class="lifeline" x1="152" y1="198" x2="152" y2="888"/>

    <rect class="participant elector" x="306" y="128" width="174" height="70"/>
    <text class="participant-title" x="393" y="156" text-anchor="middle">DynamoDb Elector</text>
    <text class="participant-sub" x="393" y="179" text-anchor="middle">single or group</text>
    <line class="lifeline" x1="393" y1="198" x2="393" y2="888"/>

    <rect class="participant client" x="560" y="128" width="176" height="70"/>
    <text class="participant-title" x="648" y="156" text-anchor="middle">Lock Client</text>
    <text class="participant-sub" x="648" y="179" text-anchor="middle">request builder</text>
    <line class="lifeline" x1="648" y1="198" x2="648" y2="888"/>

    <rect class="participant table" x="816" y="128" width="190" height="70"/><image data-bluetape4k-icon="dynamodb" data-icon-source="testcontainers/aws/amazon-dynamodb.svg" x="826" y="136" width="18" height="18" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/>
    <text class="participant-title" x="911" y="156" text-anchor="middle">DynamoDB Table</text>
    <text class="participant-sub" x="911" y="179" text-anchor="middle">lockName partition key</text>
    <line class="lifeline" x1="911" y1="198" x2="911" y2="888"/>

    <rect class="participant action" x="1094" y="128" width="142" height="70"/>
    <text class="participant-title" x="1165" y="156" text-anchor="middle">Leader Action</text>
    <text class="participant-sub" x="1165" y="179" text-anchor="middle">protected work</text>
    <line class="lifeline" x1="1165" y1="198" x2="1165" y2="888"/>
  </g>

  <rect class="activation" x="385" y="222" width="16" height="560"/>
  <rect class="activation" x="640" y="270" width="16" height="480"/>
  <rect class="activation" x="903" y="330" width="16" height="362"/>
  <rect class="activation" x="1157" y="500" width="16" height="74"/>

  <path class="blue" d="M 152 238 L 393 238"/>
  <rect class="badge" x="216" y="213" width="116" height="22"/>
  <text class="label" x="274" y="229" text-anchor="middle" fill="#1d4ed8">1 runIfLeader</text>

  <path class="green" d="M 401 286 L 648 286"/>
  <rect class="badge" x="454" y="261" width="142" height="22"/>
  <text class="label" x="525" y="277" text-anchor="middle" fill="#047857">2 derive key</text>

  <path class="orange" d="M 656 344 L 911 344"/>
  <rect class="badge" x="702" y="312" width="164" height="22"/>
  <text class="label" x="784" y="328" text-anchor="middle" fill="#c2410c">3 conditional PutItem</text>
  <rect class="badge" x="674" y="358" width="220" height="22"/>
  <text class="label" x="784" y="374" text-anchor="middle" fill="#c2410c">missing OR leaseExpiry &lt; safeNow</text>

  <rect class="frame-note" x="684" y="398" width="206" height="70"/>
  <text class="note-title" x="706" y="424">Row fields</text>
  <text class="note" x="706" y="444">ownerId, nodeId</text>
  <text class="note" x="706" y="462">leaseExpiry + ttl</text>

  <rect class="frame-success" x="88" y="486" width="1170" height="232"/>
  <text class="frame-label" x="116" y="512" fill="#047857">alt acquired</text>

  <path class="return" d="M 911 520 L 648 520"/>
  <rect class="badge" x="718" y="495" width="124" height="22"/>
  <text class="label" x="780" y="511" text-anchor="middle" fill="#1d4ed8">AcquiredLock</text>

  <path class="purple" d="M 393 552 L 1165 552"/>
  <rect class="badge" x="646" y="527" width="266" height="22"/>
  <text class="label" x="779" y="543" text-anchor="middle" fill="#6d28d9">4 push handle and run action</text>

  <path class="orange" d="M 648 604 L 769.5 604 Q 779.5 604 779.5 614 L 779.5 624 Q 779.5 634 789.5 634 L 911 634"/>
  <rect class="badge" x="698" y="590" width="166" height="22"/>
  <text class="label" x="781" y="606" text-anchor="middle" fill="#c2410c">optional autoExtend</text>

  <path class="return" d="M 1165 674 L 393 674"/>
  <rect class="badge" x="678" y="649" width="202" height="22"/>
  <text class="label" x="779" y="665" text-anchor="middle" fill="#1d4ed8">5 return action result</text>

  <path class="green" d="M 648 704 L 911 704"/>
  <rect class="badge" x="674" y="680" width="212" height="22"/>
  <text class="label" x="780" y="696" text-anchor="middle" fill="#047857">6 DeleteItem or retain row</text>

  <rect class="frame-skip" x="88" y="748" width="1170" height="116"/>
  <text class="frame-label" x="116" y="774" fill="#c2410c">else contention / timeout</text>

  <path class="skip-return" d="M 911 796 L 648 796"/>
  <rect class="badge" x="686" y="771" width="188" height="22"/>
  <text class="label" x="780" y="787" text-anchor="middle" fill="#c2410c">ConditionalCheckFailed</text>

  <path class="orange" d="M 648 830 L 393 830"/>
  <rect class="badge" x="454" y="846" width="134" height="22"/>
  <text class="label" x="521" y="862" text-anchor="middle" fill="#c2410c">retry or return null</text>

  <path class="skip-return" d="M 393 878 L 152 878"/>
  <rect class="badge" x="218" y="853" width="108" height="22"/>
  <text class="label" x="272" y="869" text-anchor="middle" fill="#c2410c">skipped null</text>

  <g transform="translate(96 916)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <text class="note" x="44" y="12">caller contract</text>
    <line x1="190" y1="8" x2="224" y2="8" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
    <text class="note" x="234" y="12">DynamoDB condition</text>
    <line x1="442" y1="8" x2="476" y2="8" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <text class="note" x="486" y="12">release or retain</text>
    <text class="footer" x="1128" y="12" text-anchor="end">github.com/bluetape4k/bluetape4k-leader</text>
  </g>
</svg>
