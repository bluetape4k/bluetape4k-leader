<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Redisson Group Lock Flow</title>
  <desc id="desc">Normal Redisson group permit acquire and release plus crash recovery by permit TTL.</desc>
  <defs>
    <style>
      .title { font-family: "Architects Daughter"; font-size: 40px; fill: #263238; }
      .subtitle, .msg, .note, .footer { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 18px; }
      .participant { font-family: "Architects Daughter"; font-size: 19px; fill: #1f3138; }
      .role { font-family: "Comic Mono"; font-size: 13px; fill: #546a73; }
      .msg { font-size: 14px; }
      .note { font-size: 13px; }
      .footer { font-size: 14px; fill: #60727d; }
      .frame { fill: #fbfcf8; stroke: #41545d; stroke-width: 3; }
      .header { fill: #ffffff; stroke: #546e7a; stroke-width: 2; }
      .lifeline { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      .activation { fill: #f3ecdf; stroke: #8f784e; stroke-width: 1.5; }
      .call { fill: none; stroke: #3f7d9c; stroke-width: 3; marker-end: url(#arrowCall); stroke-linecap: round; stroke-linejoin: round; }
      .slot { fill: none; stroke: #a2743d; stroke-width: 3; marker-end: url(#arrowSlot); stroke-linecap: round; stroke-linejoin: round; }
      .state { fill: none; stroke: #6e8f4f; stroke-width: 3; marker-end: url(#arrowState); stroke-linecap: round; stroke-linejoin: round; }
      .return { fill: none; stroke: #9b7d54; stroke-width: 2.5; stroke-dasharray: 8 6; marker-end: url(#arrowReturn); stroke-linecap: round; stroke-linejoin: round; }
      .wait { fill: none; stroke: #8e6aa9; stroke-width: 3; marker-end: url(#arrowWait); stroke-linecap: round; stroke-linejoin: round; }
      .skip { fill: none; stroke: #b86868; stroke-width: 3; marker-end: url(#arrowSkip); stroke-linecap: round; stroke-linejoin: round; }
      .alt { fill: none; stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 7; }
      .branchDivider { stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 8; }
      .label { fill: #ffffff; stroke: #d7e0e4; stroke-width: 1.5; }
      .label.callLabel { stroke: #9cc2d1; }
      .label.slotLabel { stroke: #d0b078; }
      .label.stateLabel { stroke: #b6c9a4; }
      .label.returnLabel { stroke: #c8b38f; }
      .label.waitLabel { stroke: #c7abd8; }
      .label.skipLabel { stroke: #d9abab; }
      .branchOk { fill: #f8f1e6; stroke: #a2743d; stroke-width: 1.8; }
      .branchWait { fill: #f7f0fb; stroke: #8e6aa9; stroke-width: 1.8; }
      .branchSkip { fill: #fff5f5; stroke: #b86868; stroke-width: 3; }
      .badge { stroke-width: 1.8; }
      .badge.callBadge { fill: #eaf4f8; stroke: #3f7d9c; }
      .badge.slotBadge { fill: #fff4df; stroke: #a2743d; }
      .badge.stateBadge { fill: #eef7f0; stroke: #6e8f4f; }
      .badge.returnBadge { fill: #fff7e8; stroke: #9b7d54; }
      .badge.waitBadge { fill: #f7f0fb; stroke: #8e6aa9; }
      .badge.skipBadge { fill: #fff0f0; stroke: #b86868; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; }
      .msg.callText, .badgeText.callText { fill: #2f6f8e; }
      .msg.slotText, .badgeText.slotText { fill: #855a29; }
      .msg.stateText, .badgeText.stateText { fill: #55783f; }
      .msg.returnText, .badgeText.returnText { fill: #7f6038; }
      .msg.waitText, .badgeText.waitText { fill: #774f92; }
      .msg.skipText, .badgeText.skipText { fill: #9d4f4f; }
    </style>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowCall" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#3f7d9c" stroke="#3f7d9c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowSlot" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#a2743d" stroke="#a2743d" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowState" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#6e8f4f" stroke="#6e8f4f" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowReturn" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#9b7d54" stroke="#9b7d54" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowWait" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#8e6aa9" stroke="#8e6aa9" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowSkip" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#b86868" stroke="#b86868" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
  </defs>

  <rect x="24" y="24" width="1552" height="1072" rx="20" class="frame"/>
  <text x="800" y="78" text-anchor="middle" class="title">Redisson Group Lock Flow</text>
  <text x="800" y="108" text-anchor="middle" class="subtitle">RPermitExpirableSemaphore gives each leader slot a permit id; crash recovery is the permit TTL expiring.</text>

  <g>
    <rect x="55" y="150" width="150" height="68" rx="10" class="header"/>
    <text x="130" y="179" text-anchor="middle" class="participant">Caller</text>
    <text x="130" y="201" text-anchor="middle" class="role">runIfLeader</text>
    <rect x="305" y="150" width="210" height="68" rx="10" class="header"/>
    <text x="410" y="179" text-anchor="middle" class="participant">RedissonLeader</text>
    <text x="410" y="201" text-anchor="middle" class="role">GroupElector</text>
    <rect x="605" y="150" width="230" height="68" rx="10" class="header"/>
    <text x="720" y="179" text-anchor="middle" class="participant">Permit Semaphore</text>
    <text x="720" y="201" text-anchor="middle" class="role">lg:{lockName}</text>
    <rect x="950" y="150" width="160" height="68" rx="10" class="header"/>
    <text x="1030" y="179" text-anchor="middle" class="participant">Action</text>
    <text x="1030" y="201" text-anchor="middle" class="role">protected work</text>
    <rect x="1240" y="150" width="160" height="68" rx="10" class="header"/>
    <text x="1320" y="179" text-anchor="middle" class="participant">Next Caller</text>
    <text x="1320" y="201" text-anchor="middle" class="role">after TTL</text>
  </g>

  <line x1="130" y1="218" x2="130" y2="986" class="lifeline"/>
  <line x1="410" y1="218" x2="410" y2="986" class="lifeline"/>
  <line x1="720" y1="218" x2="720" y2="986" class="lifeline"/>
  <line x1="1030" y1="218" x2="1030" y2="986" class="lifeline"/>
  <line x1="1320" y1="218" x2="1320" y2="986" class="lifeline"/>
  <rect x="123" y="290" width="14" height="70" rx="6" class="activation"/>
  <rect x="403" y="290" width="14" height="610" rx="6" class="activation"/>
  <rect x="713" y="350" width="14" height="550" rx="6" class="activation"/>
  <rect x="1023" y="566" width="14" height="292" rx="6" class="activation"/>
  <rect x="1313" y="930" width="14" height="70" rx="6" class="activation"/>

  <rect x="70" y="276" width="1478" height="420" rx="14" class="alt"/>
  <line x1="70" y1="742" x2="1548" y2="742" class="branchDivider"/>
  <rect x="96" y="294" width="264" height="30" rx="15" class="branchOk"/>
  <text x="118" y="314" class="note">normal acquire / release</text>
  <rect x="96" y="760" width="224" height="30" rx="15" class="branchSkip"/>
  <text x="118" y="780" class="note">crash recovery path</text>

  <rect x="182" y="242" width="176" height="34" rx="17" class="label callLabel"/>
  <circle cx="206" cy="259" r="13" class="badge callBadge"/><text x="206" y="264" text-anchor="middle" class="badgeText callText">1</text>
  <text x="230" y="264" class="msg callText">runIfLeader()</text>
  <path d="M 130 300 L 410 300" class="call"/>

  <rect x="429" y="312" width="272" height="34" rx="17" class="label slotLabel"/>
  <circle cx="453" cy="329" r="13" class="badge slotBadge"/><text x="453" y="334" text-anchor="middle" class="badgeText slotText">2</text>
  <text x="477" y="334" class="msg slotText">trySetPermits(maxLeaders)</text>
  <path d="M 410 370 L 720 370" class="slot"/>

  <rect x="405" y="382" width="320" height="34" rx="17" class="label stateLabel"/>
  <circle cx="429" cy="399" r="13" class="badge stateBadge"/><text x="429" y="404" text-anchor="middle" class="badgeText stateText">3</text>
  <text x="453" y="404" class="msg stateText">tryAcquire(waitTime, leaseTime)</text>
  <path d="M 410 440 L 720 440" class="state"/>

  <rect x="480" y="452" width="170" height="34" rx="17" class="label returnLabel"/>
  <circle cx="504" cy="469" r="13" class="badge returnBadge"/><text x="504" y="474" text-anchor="middle" class="badgeText returnText">4</text>
  <text x="528" y="474" class="msg returnText">permitId</text>
  <path d="M 720 510 L 410 510" class="return"/>

  <rect x="596" y="528" width="248" height="34" rx="17" class="label callLabel"/>
  <circle cx="620" cy="545" r="13" class="badge callBadge"/><text x="620" y="550" text-anchor="middle" class="badgeText callText">5</text>
  <text x="644" y="550" class="msg callText">run action with handle</text>
  <path d="M 410 586 L 1030 586" class="call"/>

  <rect x="461" y="604" width="208" height="34" rx="17" class="label slotLabel"/>
  <circle cx="485" cy="621" r="13" class="badge slotBadge"/><text x="485" y="626" text-anchor="middle" class="badgeText slotText">6</text>
  <text x="509" y="626" class="msg slotText">release(permitId)</text>
  <path d="M 410 662 L 720 662" class="slot"/>

  <rect x="731" y="748" width="288" height="34" rx="17" class="label skipLabel"/>
  <circle cx="755" cy="765" r="13" class="badge skipBadge"/><text x="755" y="770" text-anchor="middle" class="badgeText skipText">7</text>
  <text x="779" y="770" class="msg skipText">holder dies with no release</text>
  <path d="M 1030 806 L 720 806" class="skip"/>

  <rect x="457" y="820" width="216" height="34" rx="17" class="label returnLabel"/>
  <circle cx="481" cy="837" r="13" class="badge returnBadge"/><text x="481" y="842" text-anchor="middle" class="badgeText returnText">8</text>
  <text x="505" y="842" class="msg returnText">permit TTL expires</text>
  <path d="M 720 878 L 410 878" class="return"/>

  <rect x="868" y="892" width="304" height="34" rx="17" class="label stateLabel"/>
  <circle cx="892" cy="909" r="13" class="badge stateBadge"/><text x="892" y="914" text-anchor="middle" class="badgeText stateText">9</text>
  <text x="916" y="914" class="msg stateText">next acquire reuses free slot</text>
  <path d="M 1320 950 L 720 950" class="state"/>

  <rect x="98" y="1014" width="1404" height="44" rx="12" fill="#ffffff" stroke="#ccd7da" stroke-width="2"/>
  <text x="118" y="1042" class="note">Redisson cleanup is permit-id based: a crashed holder is recovered by the semaphore permit TTL, not by caller-side cleanup.</text>
  <text x="800" y="1064" text-anchor="middle" class="footer">github.com/bluetape4k/bluetape4k-leader - leader-redis-redisson-sequence-02</text>
</svg>
