<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Redisson Group Lock Flow - Acquire, Release, Crash Recovery</title>
  <desc id="desc">Sequence diagram for normal Redisson group permit acquire and release plus crash recovery by permit TTL.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#64748b" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#d97706"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <style>
    text { font-family: "Comic Mono", monospace; fill: #243041; }
    .title { font-family: "Architects Daughter", cursive; font-size: 31px; fill: #172033; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .participant { font-family: "Architects Daughter", cursive; font-size: 16px; fill: #172033; }
    .label { font-size: 12px; fill: #334155; }
    .num { font-size: 11px; fill: #ffffff; font-weight: 700; }
    .small { font-size: 10px; fill: #64748b; }
    .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; filter: url(#shadow); }
    .header { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.3; }
    .life { stroke: #94a3b8; stroke-width: 1.2; stroke-dasharray: 7 7; }
    .callBlue { stroke: #2563eb; stroke-width: 1.7; marker-end: url(#arrowBlue); }
    .callGreen { stroke: #16a34a; stroke-width: 1.7; marker-end: url(#arrowGreen); }
    .callAmber { stroke: #d97706; stroke-width: 1.7; marker-end: url(#arrowAmber); }
    .callRed { stroke: #dc2626; stroke-width: 1.7; marker-end: url(#arrowRed); }
    .ret { stroke-dasharray: 6 5; }
    .badgeBlue { fill: #2563eb; }
    .badgeGreen { fill: #16a34a; }
    .badgeAmber { fill: #d97706; }
    .badgeRed { fill: #dc2626; }
    .pill { fill: #ffffff; stroke: #dbe4f0; stroke-width: 1; }
    .alt { fill: none; stroke: #94a3b8; stroke-width: 1.4; stroke-dasharray: 8 6; }
    .altLabel { fill: #f8fafc; stroke: #cbd5e1; }
    .footer { font-size: 11px; fill: #64748b; }
  </style>
  <rect width="1180" height="760" fill="#f6f8fb"/>
  <rect class="frame" x="34" y="30" width="1112" height="690" rx="18"/>
  <text class="title" x="590" y="76" text-anchor="middle">Redisson Group Lock Flow</text>
  <text class="subtitle" x="590" y="103" text-anchor="middle">Normal acquire/release and crash recovery through RPermitExpirableSemaphore permit TTL.</text>

  <g transform="translate(86 134)">
    <rect class="header" x="0" y="0" width="150" height="62" rx="9"/>
    <text class="participant" x="75" y="37" text-anchor="middle">Caller</text>
  </g>
  <g transform="translate(312 134)">
    <rect class="header" x="0" y="0" width="198" height="62" rx="9"/>
    <text class="participant" x="99" y="30" text-anchor="middle">RedissonLeader</text>
    <text class="participant" x="99" y="48" text-anchor="middle">GroupElector</text>
  </g>
  <g transform="translate(610 134)">
    <rect class="header" x="0" y="0" width="230" height="62" rx="9"/>
    <text class="participant" x="115" y="30" text-anchor="middle">RPermitExpirableSemaphore</text>
    <text class="small" x="115" y="48" text-anchor="middle">lg:{lockName}</text>
  </g>
  <g transform="translate(934 134)">
    <rect class="header" x="0" y="0" width="150" height="62" rx="9"/>
    <text class="participant" x="75" y="37" text-anchor="middle">Action</text>
  </g>

  <line class="life" x1="161" y1="196" x2="161" y2="635"/>
  <line class="life" x1="411" y1="196" x2="411" y2="635"/>
  <line class="life" x1="725" y1="196" x2="725" y2="635"/>
  <line class="life" x1="1009" y1="196" x2="1009" y2="635"/>

  <rect class="alt" x="70" y="224" width="1040" height="270" rx="10"/>
  <rect class="altLabel" x="88" y="211" width="230" height="28" rx="6"/>
  <text class="small" x="203" y="230" text-anchor="middle">normal acquire / release</text>

  <line class="callBlue" x1="161" y1="258" x2="405" y2="258"/>
  <rect class="pill" x="206" y="234" width="154" height="28" rx="14"/>
  <circle class="badgeBlue" cx="222" cy="248" r="11"/><text class="num" x="222" y="252" text-anchor="middle">1</text>
  <text class="label" x="242" y="252">runIfLeader()</text>

  <line class="callBlue" x1="411" y1="316" x2="719" y2="316"/>
  <rect class="pill" x="478" y="292" width="174" height="28" rx="14"/>
  <circle class="badgeBlue" cx="494" cy="306" r="11"/><text class="num" x="494" y="310" text-anchor="middle">2</text>
  <text class="label" x="514" y="310">trySetPermits(max)</text>

  <line class="callGreen" x1="411" y1="374" x2="719" y2="374"/>
  <rect class="pill" x="476" y="350" width="178" height="28" rx="14"/>
  <circle class="badgeGreen" cx="492" cy="364" r="11"/><text class="num" x="492" y="368" text-anchor="middle">3</text>
  <text class="label" x="512" y="368">tryAcquire(wait, lease)</text>

  <line class="callGreen ret" x1="725" y1="420" x2="417" y2="420"/>
  <rect class="pill" x="529" y="396" width="112" height="28" rx="14"/>
  <circle class="badgeGreen" cx="545" cy="410" r="11"/><text class="num" x="545" y="414" text-anchor="middle">4</text>
  <text class="label" x="565" y="414">permitId</text>

  <line class="callBlue" x1="411" y1="462" x2="1003" y2="462"/>
  <rect class="pill" x="615" y="438" width="184" height="28" rx="14"/>
  <circle class="badgeBlue" cx="631" cy="452" r="11"/><text class="num" x="631" y="456" text-anchor="middle">5</text>
  <text class="label" x="651" y="456">run action with handle</text>

  <line class="callGreen" x1="411" y1="520" x2="719" y2="520"/>
  <rect class="pill" x="515" y="496" width="94" height="28" rx="14"/>
  <circle class="badgeGreen" cx="531" cy="510" r="11"/><text class="num" x="531" y="514" text-anchor="middle">6</text>
  <text class="label" x="551" y="514">release()</text>

  <rect class="alt" x="70" y="538" width="1040" height="98" rx="10"/>
  <rect class="altLabel" x="88" y="525" width="214" height="28" rx="6"/>
  <text class="small" x="195" y="544" text-anchor="middle">crash recovery path</text>
  <line class="callRed" x1="1009" y1="584" x2="731" y2="584"/>
  <rect class="pill" x="780" y="560" width="184" height="28" rx="14"/>
  <circle class="badgeRed" cx="796" cy="574" r="11"/><text class="num" x="796" y="578" text-anchor="middle">7</text>
  <text class="label" x="816" y="578">holder dies: no release</text>
  <line class="callAmber ret" x1="725" y1="616" x2="417" y2="616"/>
  <rect class="pill" x="493" y="592" width="156" height="28" rx="14"/>
  <circle class="badgeAmber" cx="509" cy="606" r="11"/><text class="num" x="509" y="610" text-anchor="middle">8</text>
  <text class="label" x="529" y="610">TTL expires, slot free</text>

  <rect fill="#f8fafc" stroke="#dbe4f0" x="84" y="662" width="1012" height="34" rx="10"/>
  <text class="footer" x="590" y="684" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader / leader-redis-redisson</text>
</svg>
