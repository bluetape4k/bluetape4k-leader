<svg xmlns="http://www.w3.org/2000/svg" width="1288" height="2046" viewBox="0 0 1288 2046" role="img" aria-label="Scenario 1 — Normal acquire/release plus crash recovery">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 10 5 L 1 9" fill="none" stroke="#758297" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="inherit" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 1 L 12 6 L 0 11 Z" fill="#ffffff" stroke="#758297" stroke-width="1.8"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .title{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:43px;font-weight:400;fill:#102033}
    .subtitle{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:25px;font-weight:400;fill:#102033}
    .smallLabel{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:21px;font-weight:400;fill:#102033}
    .mono{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#536273}
    .strong{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:13px;font-weight:400;fill:#102033}
    .card{stroke-width:2.1;filter:url(#shadow)}.compartment{stroke-width:1.5;fill:none}
    .line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#openArrow)}
    .plainLine{stroke:#758297;stroke-width:2.1;fill:none}
    .dashed{stroke:#758297;stroke-width:2.1;stroke-dasharray:7 6;fill:none;marker-end:url(#openArrow)}
    .inheritLine{stroke:#758297;stroke-width:2.2;fill:none;marker-end:url(#inherit)}
    .implLine{stroke:#758297;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#inherit)}
  </style>
</defs>
<rect class="canvas" width="1288" height="2046"/>
<rect class="frame" x="32" y="28" width="1224" height="1990" rx="28"/>
<text class="title" x="66" y="82">Scenario 1 — Normal acquire/release plus cra.</text>
<text class="subtitle" x="70" y="118">Sequence messages from the original Mermaid source</text>
<rect class="card" x="-10" y="166" width="300" height="72" rx="20" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="smallLabel" x="140" y="209" text-anchor="middle">ClientA</text>
<line class="lifeline" x1="140" y1="252" x2="140" y2="1986" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="494" y="166" width="300" height="72" rx="20" fill="#EAF7EF" stroke="#58A978"/>
<text class="smallLabel" x="644" y="209" text-anchor="middle">ClientB</text>
<line class="lifeline" x1="644" y1="252" x2="644" y2="1986" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="998" y="166" width="300" height="72" rx="20" fill="#FFF3D9" stroke="#D6A441"/>
<text class="smallLabel" x="1148" y="198.5" text-anchor="middle">Redis (RPermit</text>
<text class="smallLabel" x="1148" y="219.5" text-anchor="middle">Expirable</text>
<line class="lifeline" x1="1148" y1="252" x2="1148" y2="1986" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect x="444.5" y="286" width="399" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="462.5" y="313" text-anchor="start">1. getPermitExpirableSemaphore(lg:{lockName})</text>
<path class="line" d="M140 344 L1148 344"/>
<rect x="505" y="396" width="278" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="523" y="423" text-anchor="start">2. trySetPermits(maxLeaders=2)</text>
<path class="line" d="M140 454 L1148 454"/>
<rect x="539" y="506" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="557" y="533" text-anchor="start">3. ok</text>
<path class="dashed" d="M1148 564 L140 564"/>
<rect x="505" y="616" width="278" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="523" y="643" text-anchor="start">4. tryAcquire(waitMs, leaseMs)</text>
<path class="line" d="M140 674 L1148 674"/>
<rect x="539" y="726" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="557" y="753" text-anchor="start">5. permitId A1</text>
<path class="dashed" d="M1148 784 L140 784"/>
<rect x="83" y="836" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="101" y="863" text-anchor="start">6. action()</text>
<path class="line" d="M140 894 C204 894 204 928 140 928"/>
<rect x="791" y="966" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="809" y="993" text-anchor="start">7. tryAcquire(...)</text>
<path class="line" d="M644 1024 L1148 1024"/>
<rect x="791" y="1076" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="809" y="1103" text-anchor="start">8. permitId B1</text>
<path class="dashed" d="M1148 1134 L644 1134"/>
<rect x="539" y="1186" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="557" y="1213" text-anchor="start">9. release(A1)</text>
<path class="line" d="M140 1244 L1148 1244"/>
<rect x="539" y="1296" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="557" y="1323" text-anchor="start">10. ok</text>
<path class="dashed" d="M1148 1354 L140 1354"/>
<rect x="525" y="1406" width="238" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="543" y="1433" text-anchor="start">11. tryAcquire (lease=2s)</text>
<path class="line" d="M140 1464 L1148 1464"/>
<rect x="539" y="1516" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="557" y="1543" text-anchor="start">12. permitId A2</text>
<path class="dashed" d="M1148 1574 L140 1574"/>
<rect x="83" y="1626" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="101" y="1653" text-anchor="start">13. crash</text>
<path class="line" d="M140 1684 C204 1684 204 1718 140 1718"/>
<rect x="791" y="1756" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="809" y="1783" text-anchor="start">14. tryAcquire</text>
<path class="line" d="M644 1814 L1148 1814"/>
<rect x="749" y="1866" width="294" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="767" y="1893" text-anchor="start">15. permitId B3 (auto-recovered)</text>
<path class="dashed" d="M1148 1924 L644 1924"/>
</svg>
