<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc" data-source-read="examples/rate-limiter/README.md; RateLimiterDemo.kt; LeaderDispatchScheduler.kt; RateLimitedApiWorker.kt; ExternalApiProbe.kt; RateLimiterDemoTest.kt">
  <title id="title">Rate Limiter Scenario</title>
  <desc id="desc">Scenario diagram showing a compact main path from three app nodes through Redis leader election, one scheduled dispatcher, shared Redis Bucket4j quota, and external API calls.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c85d73"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer, .tag { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 24px; }
      .node-sub { font-size: 13px; }
      .label { font-size: 13px; font-weight: 700; }
      .tag { font-size: 12px; font-weight: 700; }
      .footer { font-size: 14px; }
      .group { fill: #edf4fd; stroke: #cbd9e7; stroke-width: 2.4; }
      .node { stroke-width: 2.4; rx: 16; }
      .route { fill: none; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="42" y="34" width="1416" height="820" rx="30"/>
  <text class="title" x="86" y="92">Rate Limiter Scenario: Dispatch Gate + Quota Gate</text>
  <text class="subtitle" x="90" y="126">Redis leader election creates work once; Redis Bucket4j caps the external API calls shared by all workers.</text>

  <rect class="group" x="108" y="236" width="300" height="260" rx="22"/>
  <text class="tag" x="140" y="272">three app nodes</text>
  <rect class="node" x="150" y="306" width="216" height="52" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="258" y="340" text-anchor="middle">node-1</text>
  <rect class="node" x="150" y="372" width="216" height="52" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="258" y="406" text-anchor="middle">node-2</text>
  <rect class="node" x="150" y="438" width="216" height="52" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="258" y="472" text-anchor="middle">node-3</text>

  <rect class="node" x="518" y="292" width="280" height="112" fill="#fff4de" stroke="#d59c3f"/>
  <text class="node-title" x="658" y="334" text-anchor="middle">Redis leader lock</text>
  <text class="node-sub" x="658" y="362" text-anchor="middle">rate-limiter:* lockName</text>
  <text class="node-sub" x="658" y="386" text-anchor="middle">exactly one scheduler wins</text>

  <rect class="node" x="518" y="552" width="280" height="88" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="node-title" x="658" y="586" text-anchor="middle">other nodes</text>
  <text class="node-sub" x="658" y="614" text-anchor="middle">REJECTED, no work items</text>

  <rect class="node" x="908" y="292" width="280" height="112" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1048" y="334" text-anchor="middle">single dispatcher</text>
  <text class="node-sub" x="1048" y="362" text-anchor="middle">SCHEDULED creates 45 items</text>
  <text class="node-sub" x="1048" y="386" text-anchor="middle">workers consume the item list</text>

  <rect class="node" x="908" y="512" width="280" height="112" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="1048" y="554" text-anchor="middle">shared Redis Bucket4j</text>
  <text class="node-sub" x="1048" y="582" text-anchor="middle">10 tokens per second</text>
  <text class="node-sub" x="1048" y="606" text-anchor="middle">one quotaKey for all nodes</text>

  <rect class="node" x="1228" y="526" width="190" height="84" fill="#fff5ec" stroke="#e49a72"/>
  <text class="node-title" x="1323" y="558" text-anchor="middle">quota rejected</text>
  <text class="node-sub" x="1323" y="584" text-anchor="middle">no API call</text>

  <rect class="node" x="908" y="700" width="280" height="84" fill="#fff5ec" stroke="#e49a72"/>
  <text class="node-title" x="1048" y="732" text-anchor="middle">external API probe</text>
  <text class="node-sub" x="1048" y="758" text-anchor="middle">called only after token</text>

  <path class="route" d="M408 366 L518 366" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <rect class="pill" x="432" y="332" width="62" height="26"/>
  <text class="label" x="463" y="350" text-anchor="middle">race</text>

  <path class="route" d="M798 348 L908 348" stroke="#319873" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="826" y="314" width="74" height="26"/>
  <text class="label" x="863" y="332" text-anchor="middle">winner</text>

  <path class="route dash" d="M658 404 L658 552" stroke="#c85d73" marker-end="url(#arrow-red)"/>
  <rect class="pill" x="684" y="466" width="68" height="26"/>
  <text class="label" x="718" y="484" text-anchor="middle">losers</text>

  <path class="route" d="M1048 404 L1048 512" stroke="#319873" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="1074" y="446" width="64" height="26"/>
  <text class="label" x="1106" y="464" text-anchor="middle">work</text>

  <path class="route" d="M1048 624 L1048 700" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="1074" y="650" width="84" height="26"/>
  <text class="label" x="1116" y="668" text-anchor="middle">consume</text>
  <path class="route dash" d="M1188 568 L1228 568" stroke="#c85d73" marker-end="url(#arrow-red)"/>

  <text class="footer" x="750" y="826" text-anchor="middle">Dispatch losers create no work; quota losers never reach the external API.</text>
</svg>
