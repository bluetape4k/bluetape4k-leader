<svg xmlns="http://www.w3.org/2000/svg" width="1544" height="782" viewBox="0 0 1544 782" role="img" aria-labelledby="title desc" data-intent="Answer the documentation reader's question: how should the root README tables be read together so module rows, backend capability rows, examples, and benchmark rows do not look like unrelated inventories?" data-evidence="README feature sections, settings module registration, SuspendLeaderElector contract, SuspendLeaderGroupElector contract" data-source-read="README.md; settings.gradle.kts; leader-core/src/main/kotlin/io/bluetape4k/leader/coroutines/SuspendLeaderElector.kt; leader-core/src/main/kotlin/io/bluetape4k/leader/coroutines/SuspendLeaderGroupElector.kt">
  <title id="title">README Table Relationship Map</title>
  <desc id="desc">Relationship map for root README tables showing how table rows point readers to modules, examples, backend capabilities, and benchmark/chart evidence.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#203040" flood-opacity="0.10"/></filter>
    <marker id="arrow-call" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F83BF"/></marker>
    <marker id="arrow-success" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#3E9868"/></marker>
    <marker id="arrow-skip" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#C94D68"/></marker>
    <marker id="arrow-contention" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#B9851B"/></marker>
    <marker id="arrow-release" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#755BC6"/></marker>
    <marker id="arrow-retry" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F63C7"/></marker>
    <marker id="arrow-dependency" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#2E8F89"/></marker>
    <marker id="arrow-metric" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#718A35"/></marker>
    <marker id="arrow-neutral" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#758297"/></marker>
    <style>
      .canvas{fill:#F7FAFC}
      .frame{fill:#FFFFFF;stroke:#D7E2EC;stroke-width:2}
      .title{font-family:"Architects Daughter";font-size:44px;fill:#22344A;font-weight:400}
      .subtitle{font-family:"Comic Mono";font-size:16px;fill:#536476;font-weight:400}
      .band{fill:#F3F7FB;stroke:#D7E2EC;stroke-width:2}
      .bandTitle{font-family:"Architects Daughter";font-size:24px;fill:#22344A;font-weight:400;paint-order:stroke;stroke:#F3F7FB;stroke-width:5px;stroke-linejoin:round}
      .card{filter:url(#shadow);stroke-width:2}
      .cardTitle{font-family:"Architects Daughter";font-size:23px;fill:#22344A;font-weight:400}
      .detail{font-family:"Comic Mono";font-size:13px;fill:#42556B;font-weight:400}
      .small{font-family:"Comic Mono";font-size:12px;fill:#627184;font-weight:400}
      .route{fill:none;stroke-width:2.45;stroke-linejoin:round;stroke-linecap:round}
      .seq{fill:none;stroke-width:3;stroke-linecap:round}
      .seqReturn{fill:none;stroke-width:2.7;stroke-linecap:round;stroke-dasharray:8 7}
      .lifeline{stroke:#A7B4C3;stroke-width:1.8;stroke-dasharray:8 8}
      .pill{fill:#FFFFFF;stroke:#D6E3EF;stroke-width:1.4}
      .branchBox{fill:#FFFFFF;fill-opacity:.42;stroke:#D6A441;stroke-width:1.8;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect class="canvas" width="1544" height="782"/>
  <rect class="frame" x="32" y="28" width="1480" height="726" rx="28"/>
  <text class="title" x="66" y="82">README Table Relationship Map</text>
  <text class="subtitle" x="70" y="116">Root README tables describe module families, backends, examples, and benchmark evidence.</text>
<g>
  <rect class="band" x="128" y="228" width="1288" height="430" rx="18"/>
  <text class="bandTitle" x="154" y="262">README table relationships</text>
</g>
<path class="route" data-from="modules" data-to="backends" data-route-tone="dependency" d="M467 360 L525 360 L525 340 L582 340" stroke="#2E8F89" marker-end="url(#arrow-dependency)"/>
<path class="route" data-from="backends" data-to="examples" data-route-tone="call" d="M892 340 L952 340 L952 360 L1012 360" stroke="#4F83BF" marker-end="url(#arrow-call)"/>
<path class="route" data-from="modules" data-to="benchmarks" data-route-tone="metric" d="M332 402 L332 453 L542 453 L542 503" stroke="#718A35" marker-end="url(#arrow-metric)"/>
<path class="route" data-from="benchmarks" data-to="assets" data-route-tone="metric" d="M697 545 L842 545" stroke="#718A35" marker-end="url(#arrow-metric)"/>
<path class="route" data-from="examples" data-to="assets" data-route-tone="success" d="M1147 402 L1147 453 L1007 453 L1007 503" stroke="#3E9868" marker-end="url(#arrow-success)"/>
<path class="route" data-from="backends" data-to="assets" data-route-tone="dependency" d="M737 382 L737 453 L1007 453 L1007 503" stroke="#2E8F89" marker-end="url(#arrow-dependency)"/>
<g id="node-modules">
  <rect class="card" x="197" y="318" width="270" height="84" rx="10" fill="#E8F3FF" stroke="#5B8DEF"/>
  <text class="cardTitle" x="332" y="342" text-anchor="middle" dominant-baseline="middle">Module table</text>
  <text class="detail" x="332" y="361" text-anchor="middle" dominant-baseline="middle">core, backend</text>
  <text class="detail" x="332" y="380" text-anchor="middle" dominant-baseline="middle">integration families</text>
</g>
<g id="node-backends">
  <rect class="card" x="582" y="298" width="310" height="84" rx="10" fill="#FFF3D9" stroke="#D6A441"/>
  <text class="cardTitle" x="737" y="322" text-anchor="middle" dominant-baseline="middle">Backend capability table</text>
  <text class="detail" x="737" y="341" text-anchor="middle" dominant-baseline="middle">primitive type</text>
  <text class="detail" x="737" y="360" text-anchor="middle" dominant-baseline="middle">lease behavior</text>
</g>
<g id="node-examples">
  <rect class="card" x="1012" y="318" width="270" height="84" rx="10" fill="#EAF7EF" stroke="#58A978"/>
  <text class="cardTitle" x="1147" y="342" text-anchor="middle" dominant-baseline="middle">Example table</text>
  <text class="detail" x="1147" y="361" text-anchor="middle" dominant-baseline="middle">runtime scenario</text>
  <text class="detail" x="1147" y="380" text-anchor="middle" dominant-baseline="middle">teaching asset set</text>
</g>
<g id="node-benchmarks">
  <rect class="card" x="387" y="503" width="310" height="84" rx="10" fill="#F1ECFF" stroke="#8A72D6"/>
  <text class="cardTitle" x="542" y="527" text-anchor="middle" dominant-baseline="middle">Benchmark table</text>
  <text class="detail" x="542" y="546" text-anchor="middle" dominant-baseline="middle">throughput/latency</text>
  <text class="detail" x="542" y="565" text-anchor="middle" dominant-baseline="middle">source caveat</text>
</g>
<g id="node-assets">
  <rect class="card" x="842" y="503" width="330" height="84" rx="10" fill="#E9F7F6" stroke="#45A7A1"/>
  <text class="cardTitle" x="1007" y="527" text-anchor="middle" dominant-baseline="middle">Diagram and chart assets</text>
  <text class="detail" x="1007" y="546" text-anchor="middle" dominant-baseline="middle">PNG embeds</text>
  <text class="detail" x="1007" y="565" text-anchor="middle" dominant-baseline="middle">source-backed models</text>
</g>
</svg>
