<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc" data-source-read="examples/redisson-watchdog/README.md; RedissonWatchdogJobRunner.kt; RedissonWatchdogDemo.kt; RedissonWatchdogJobRunnerTest.kt">
  <title id="title">Redisson Watchdog Flow</title>
  <desc id="desc">Decision flow for validating inputs, attempting Redisson leadership, running a long body with auto-extension, returning skipped for contenders, and allowing reacquire after release.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c85d73"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 24px; }
      .node-sub { font-size: 13px; }
      .label { font-size: 13px; font-weight: 700; }
      .footer { font-size: 14px; }
      .node { stroke-width: 2.4; rx: 16; }
      .decision { stroke-width: 2.4; }
      .route { fill: none; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>
  <rect class="canvas" width="1500" height="980"/>
  <rect class="frame" x="42" y="34" width="1416" height="900" rx="30"/>
  <text class="title" x="86" y="92">Redisson Watchdog Decision Flow</text>
  <text class="subtitle" x="90" y="126">The runner either holds leadership for the long body or returns a visible skipped report.</text>

  <rect class="node" x="156" y="200" width="280" height="86" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="296" y="234" text-anchor="middle">runJob request</text>
  <text class="node-sub" x="296" y="260" text-anchor="middle">nodeId, lockName, options</text>

  <rect class="node" x="566" y="200" width="300" height="86" fill="#e9f7f6" stroke="#4aa7a0"/>
  <text class="node-title" x="716" y="234" text-anchor="middle">validate inputs</text>
  <text class="node-sub" x="716" y="260" text-anchor="middle">require non-blank ids</text>

  <rect class="node" x="996" y="200" width="300" height="86" fill="#fff4de" stroke="#d59c3f"/>
  <text class="node-title" x="1146" y="234" text-anchor="middle">attempt leadership</text>
  <text class="node-sub" x="1146" y="260" text-anchor="middle">RedissonLeaderElector</text>

  <path class="decision" d="M750 366 L914 444 L750 522 L586 444 Z" fill="#fff7e8" stroke="#d59c3f"/>
  <text class="node-title" x="750" y="436" text-anchor="middle">lock acquired?</text>
  <text class="node-sub" x="750" y="462" text-anchor="middle">waitTime bounded</text>

  <rect class="node" x="214" y="404" width="284" height="96" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="node-title" x="356" y="440" text-anchor="middle">return skipped</text>
  <text class="node-sub" x="356" y="468" text-anchor="middle">job body is not called</text>

  <rect class="node" x="1002" y="404" width="284" height="96" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1144" y="440" text-anchor="middle">run long body</text>
  <text class="node-sub" x="1144" y="468" text-anchor="middle">leaderStarted then waits</text>

  <rect class="node" x="1002" y="594" width="284" height="96" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="1144" y="630" text-anchor="middle">auto-extend lease</text>
  <text class="node-sub" x="1144" y="658" text-anchor="middle">until body exits</text>

  <rect class="node" x="566" y="728" width="300" height="86" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="716" y="762" text-anchor="middle">return elected</text>
  <text class="node-sub" x="716" y="788" text-anchor="middle">next node can acquire after release</text>

  <path class="route" d="M436 243 L566 243" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M866 243 L996 243" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M1146 286 L1146 340 L750 340 L750 366" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <path class="route" d="M586 444 L498 444" stroke="#c85d73" marker-end="url(#arrow-red)"/>
  <rect class="pill" x="522" y="414" width="58" height="26"/>
  <text class="label" x="551" y="432" text-anchor="middle">no</text>
  <path class="route" d="M914 444 L1002 444" stroke="#319873" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="930" y="414" width="62" height="26"/>
  <text class="label" x="961" y="432" text-anchor="middle">yes</text>
  <path class="route" d="M1144 500 L1144 594" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <path class="route" d="M1144 690 L1144 770 L866 770" stroke="#319873" marker-end="url(#arrow-green)"/>

  <text class="footer" x="750" y="886" text-anchor="middle">A held lock never runs duplicate work; a released lock allows the next contender to become leader.</text>
</svg>
