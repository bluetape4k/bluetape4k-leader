<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc" data-source-read="examples/batch-scheduler/README.md; examples/batch-scheduler/src/main/kotlin/io/bluetape4k/leader/examples/batch/BatchScheduler.kt; examples/batch-scheduler/build.gradle.kts">
<title id="title">Batch Scheduler Architecture</title>
<desc id="desc">Runtime architecture for the Lettuce Redis batch scheduler example.</desc>
<defs>
  <marker id="arrow-blue" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#3F73D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-green" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#2D8F64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-purple" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#755BC6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#B9C7D6" flood-opacity="0.24"/></filter>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:2.2;filter:url(#shadow)}.band{fill:#F1F6FB;stroke:#D6E2EC;stroke-width:1.6}.band2{fill:#F8F3EA;stroke:#E7C98E;stroke-width:1.5}.band3{fill:#EFF8F4;stroke:#9FCEB1;stroke-width:1.5}
    .title{font-family:"Architects Daughter";font-size:40px;fill:#21334A}.subtitle,.small,.label,.footer{font-family:"Comic Mono";fill:#4B6075}.subtitle{font-size:15px}.small{font-size:13px}.label{font-size:14px}.footer{font-size:13px}
    .card{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.8;filter:url(#shadow)}.core{fill:#EAF2FF;stroke:#8EB2F0}.redis{fill:#EEF7F2;stroke:#8BC6A3}.job{fill:#EEF8F8;stroke:#86C9C5}.config{fill:#FFF7E8;stroke:#E1B866}
    .cardTitle{font-family:"Architects Daughter";font-size:23px;fill:#21334A}.cardText{font-family:"Comic Mono";font-size:13px;fill:#4B6075}.route{fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:7 6}
  </style>
</defs>
<rect class="canvas" width="1280" height="760"/>
<rect class="frame" x="34" y="28" width="1212" height="704" rx="30"/>
<text class="title" x="72" y="84">Batch Scheduler Architecture</text>
<text class="subtitle" x="76" y="116">A thin example wrapper delegates leadership to LettuceLeaderElector and keeps business work outside the lock adapter.</text>

<rect class="band" x="84" y="154" width="1112" height="132" rx="20"/>
<text class="label" x="112" y="184">Trigger and replica layer</text>
<rect class="card" x="130" y="194" width="236" height="70" rx="14"/><text class="cardTitle" x="160" y="226">Scheduled trigger</text><text class="cardText" x="160" y="248">cron / @Scheduled / Quartz</text>
<rect class="card" x="440" y="194" width="292" height="70" rx="14"/><text class="cardTitle" x="470" y="226">3 application replicas</text><text class="cardText" x="470" y="248">same lockName</text>
<rect class="card config" x="796" y="196" width="340" height="66" rx="14"/><text class="cardTitle" x="824" y="224">Configuration</text><text class="cardText" x="824" y="246">lockName, waitTime, leaseTime, nodeId</text>

<rect class="band2" x="84" y="324" width="1112" height="168" rx="20"/>
<text class="label" x="112" y="354">Example module boundary</text>
<rect class="card core" x="150" y="376" width="280" height="96" rx="16"/><text class="cardTitle" x="184" y="410">BatchScheduler</text><text class="cardText" x="184" y="436">run(job): T?</text>
<rect class="card core" x="500" y="376" width="310" height="96" rx="16"/><text class="cardTitle" x="532" y="410">LettuceLeaderElector</text><text class="cardText" x="532" y="436">runIfLeader(lockName)</text>
<rect class="card job" x="870" y="376" width="284" height="96" rx="16"/><text class="cardTitle" x="904" y="410">Batch job</text><text class="cardText" x="904" y="436">settlementService</text><text class="cardText" x="904" y="456">processYesterday()</text>

<rect class="band3" x="84" y="530" width="1112" height="112" rx="20"/>
<text class="label" x="112" y="560">Infrastructure backend</text>
<rect class="card redis" x="480" y="574" width="320" height="58" rx="14"/><text class="cardTitle" x="548" y="603">Redis via Lettuce</text><text class="cardText" x="548" y="622">StatefulRedisConnection</text>

<path class="route" d="M 366 229 L 440 229" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 586 264 L 586 304 L 290 304 L 290 376" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route dash" d="M 966 262 L 966 304 L 655 304 L 655 376" stroke="#755BC6" marker-end="url(#arrow-purple)"/>
<path class="route" d="M 430 424 L 500 424" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 810 424 L 870 424" stroke="#2D8F64" marker-end="url(#arrow-green)"/>
<path class="route" d="M 655 472 L 655 574" stroke="#2D8F64" marker-end="url(#arrow-green)"/>
<path class="route dash" d="M 500 456 L 466 456 L 466 504 L 290 504 L 290 472" stroke="#755BC6" marker-end="url(#arrow-purple)"/>

<text class="label" x="444" y="408">delegates</text>
<text class="label" x="672" y="520">SET NX + TTL</text>
<text class="footer" x="640" y="710" text-anchor="middle">bluetape4k-leader/examples/batch-scheduler</text>
</svg>
