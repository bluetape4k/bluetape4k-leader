<text x="80" y="88" class="subtitle">coordination.k8s.io/v1 Lease backed leader-only example components</text>
<rect x="70" y="135" width="455" height="700" rx="20" fill="#ffffff" stroke="#2563eb" stroke-width="2.2" stroke-dasharray="12 8" opacity="0.95"/>
<text x="94" y="169" class="groupLabel">Application Runtime</text><rect x="572" y="135" width="455" height="700" rx="20" fill="#ffffff" stroke="#16a34a" stroke-width="2.2" stroke-dasharray="12 8" opacity="0.95"/>
<text x="596" y="169" class="groupLabel">Leader Coordination</text><rect x="1075" y="135" width="455" height="700" rx="20" fill="#ffffff" stroke="#dc2626" stroke-width="2.2" stroke-dasharray="12 8" opacity="0.95"/>
<text x="1099" y="169" class="groupLabel">Domain Outcome</text><rect x="120" y="205" width="355" height="120" rx="14" fill="#eef2ff" stroke="#2563eb" stroke-width="2.4" filter="url(#soft)"/>
<text x="297.5" y="236" class="cardTitle" text-anchor="middle">K8sLeaseLeaderElectionExample</text>
<text x="297.5" y="262" class="cardText" text-anchor="middle">manual Lease workflow</text><rect x="120" y="390" width="355" height="120" rx="14" fill="#f8fafc" stroke="#64748b" stroke-width="2.4" filter="url(#soft)"/>
<text x="297.5" y="421" class="cardTitle" text-anchor="middle">Fabric8 KubernetesClient</text>
<text x="297.5" y="447" class="cardText" text-anchor="middle">leases().inNamespace(...)</text><rect x="622" y="205" width="355" height="120" rx="14" fill="#ecfeff" stroke="#16a34a" stroke-width="2.4" filter="url(#soft)"/>
<text x="799.5" y="236" class="cardTitle" text-anchor="middle">Lease Object</text>
<text x="799.5" y="262" class="cardText" text-anchor="middle">holderIdentity + renewTime</text><rect x="622" y="390" width="355" height="120" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.4" filter="url(#soft)"/>
<text x="799.5" y="421" class="cardTitle" text-anchor="middle">tryAcquire()</text>
<text x="799.5" y="447" class="cardText" text-anchor="middle">create, renew, or conflict</text><rect x="1125" y="205" width="355" height="120" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2.4" filter="url(#soft)"/>
<text x="1302.5" y="236" class="cardTitle" text-anchor="middle">release()</text>
<text x="1302.5" y="262" class="cardText" text-anchor="middle">clears only current holder</text><rect x="1125" y="390" width="355" height="120" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2.4" filter="url(#soft)"/>
<text x="1302.5" y="421" class="cardTitle" text-anchor="middle">LeaseAttempt</text>
<text x="1302.5" y="447" class="cardText" text-anchor="middle">ACQUIRED or CONFLICT</text><path d="M475 265 L622 265" class="lineBlue"/><rect x="504" y="228" width="88" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="548" y="244" class="label" text-anchor="middle" fill="#334155">calls</text><path d="M800 325 L800 390" class="lineGreen"/><rect x="802" y="347" width="88" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="846" y="363" class="label" text-anchor="middle" fill="#334155">stores</text><path d="M977 265 L1125 265" class="lineGreen"/><rect x="1007" y="228" width="88" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="1051" y="244" class="label" text-anchor="middle" fill="#334155">if leader</text><path d="M1302 325 L1302 390" class="lineRed"/><rect x="1316" y="347" width="88" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="1360" y="363" class="label" text-anchor="middle" fill="#334155">report</text><path d="M298 325 L298 390" class="line"/><rect x="308" y="347" width="88" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="352" y="363" class="label" text-anchor="middle" fill="#334155">loop</text><path d="M475 450 L622 450" class="lineRed"/><rect x="504" y="414" width="88" height="23" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="548" y="430" class="label" text-anchor="middle" fill="#334155">skip/null</text><rect x="260" y="720" width="1080" height="86" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2.4" filter="url(#soft)"/>
<text x="800" y="751" class="cardTitle" text-anchor="middle">Reader contract</text>
<text x="800" y="777" class="cardText" text-anchor="middle">This example exposes raw Lease semantics: create, renew, conflict, and owner-only release are</text>
<text x="800" y="795" class="cardText" text-anchor="middle">visible.</text></svg>
