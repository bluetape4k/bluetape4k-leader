<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc" data-source-read="StrategicElectionDemo.kt; StrategicElectionDemoTest.kt">
  <title id="title">Strategic Election Flow</title>
  <desc id="desc">Flow from default profiles to candidate registration, weighted election, selected node execution, skipped nodes, and final report.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 14 7 L 0 14 Z" fill="#319873"/></marker>
    <marker id="arrow-red" markerWidth="11" markerHeight="11" refX="10" refY="5.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 11 5.5 L 0 11 Z" fill="#c65b55"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c5d5e6; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 23px; }
      .node-sub { font-size: 13px; }
      .label { font-size: 13px; font-weight: 700; }
      .footer { font-size: 14px; }
      .node { stroke-width: 2.5; rx: 16; }
      .decision { stroke-width: 2.5; }
      .route { fill: none; stroke-width: 4.4; stroke-linecap: round; stroke-linejoin: round; }
      .skip { stroke-dasharray: 10 9; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>
  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="44" y="34" width="1412" height="820" rx="30"/>
  <text class="title" x="90" y="92">Strategic Election Flow</text>
  <text class="subtitle" x="94" y="126">The score is computed before each local elector decides whether its body may run.</text>

  <rect class="node" x="100" y="290" width="214" height="104" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="207" y="328" text-anchor="middle">Profiles</text>
  <text class="node-sub" x="207" y="356" text-anchor="middle">node-a/b/c facts</text>
  <rect class="node" x="392" y="290" width="230" height="104" fill="#eef7ff" stroke="#6d9df0"/>
  <text class="node-title" x="507" y="328" text-anchor="middle">Candidates</text>
  <text class="node-sub" x="507" y="356" text-anchor="middle">registered per lock</text>
  <rect class="node" x="700" y="290" width="234" height="104" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="817" y="328" text-anchor="middle">Weighted Score</text>
  <text class="node-sub" x="817" y="356" text-anchor="middle">three scorer inputs</text>
  <polygon class="decision" points="1100,254 1270,342 1100,430 930,342" fill="#fff7e8" stroke="#d8a24d"/>
  <text class="node-title" x="1100" y="334" text-anchor="middle">node-b</text>
  <text class="node-title" x="1100" y="360" text-anchor="middle">wins?</text>

  <rect class="node" x="834" y="584" width="248" height="112" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="958" y="624" text-anchor="middle">Run Body</text>
  <text class="node-sub" x="958" y="654" text-anchor="middle">selected report</text>
  <rect class="node" x="1162" y="584" width="248" height="112" fill="#fff1ee" stroke="#db8f89"/>
  <text class="node-title" x="1286" y="624" text-anchor="middle">Skip Body</text>
  <text class="node-sub" x="1286" y="654" text-anchor="middle">two skipped reports</text>
  <rect class="node" x="504" y="584" width="248" height="112" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="node-title" x="628" y="624" text-anchor="middle">Final Report</text>
  <text class="node-sub" x="628" y="654" text-anchor="middle">selected=node-b</text>

  <path class="route" d="M314 342 L392 342" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M622 342 L700 342" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M934 342 L930 342" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M1100 430 L1100 520 L958 520 L958 584" stroke="#319873" marker-end="url(#arrow-green)"/>
  <path class="route skip" d="M1270 342 L1352 342 L1352 520 L1286 520 L1286 584" stroke="#c65b55" marker-end="url(#arrow-red)"/>
  <path class="route" d="M834 640 L752 640" stroke="#319873" marker-end="url(#arrow-green)"/>
  <path class="route skip" d="M1286 696 L1286 740 L628 740 L628 696" stroke="#c65b55" marker-end="url(#arrow-red)"/>

  <rect class="pill" x="1020" y="500" width="74" height="30"/>
  <text class="label" x="1057" y="521" text-anchor="middle">yes</text>
  <rect class="pill" x="1314" y="454" width="72" height="30"/>
  <text class="label" x="1350" y="475" text-anchor="middle">no</text>
  <text class="footer" x="750" y="810" text-anchor="middle">No backend race is shown here; the flow is score first, then run the winner and skip everyone else.</text>
</svg>
