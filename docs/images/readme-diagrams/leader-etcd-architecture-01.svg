<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 860" width="1320" height="860" role="img" aria-labelledby="title desc">
  <title id="title">leader-etcd runtime architecture</title>
  <desc id="desc">Architecture diagram for the etcd backend showing bluetape4k electors, jetcd client boundaries, Lock and Lease services, Watch publisher, keyspace layout, and cleanup behavior.</desc>
  <style>
    text { font-family: 'Architects Daughter', 'Comic Mono', 'Comic Sans MS', Arial, sans-serif; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 14px; fill: #4b5563; }
    .section { font-size: 15px; font-weight: 700; fill: #374151; }
    .card-title { font-size: 16px; font-weight: 700; fill: #111827; }
    .card-sub { font-size: 12px; fill: #4b5563; }
    .mono { font-family: 'Comic Mono', 'Architects Daughter', monospace; font-size: 12px; fill: #374151; }
    .tiny { font-size: 11px; fill: #6b7280; }
    .badge { font-size: 11px; font-weight: 700; }
    .footer { font-size: 12px; fill: #6b7280; }
    .dash { stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="blueArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="greenArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#059669"/>
    </marker>
    <marker id="purpleArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#7c3aed"/>
    </marker>
    <marker id="orangeArrow" viewBox="0 0 14 12" markerWidth="13" markerHeight="11" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="1320" height="860" fill="#f8fafc"/>
  <rect x="28" y="24" width="1264" height="788" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="52" y="66" class="title">leader-etcd runtime architecture</text>
  <text x="52" y="92" class="subtitle">jetcd Lock owns the mutex key; etcd Lease owns the TTL. bluetape4k keeps the returned ownership key as the fencing token.</text>

  <rect x="52" y="128" width="284" height="584" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="72" y="158" class="section">Application surface</text>
  <g transform="translate(80 190)">
    <rect width="228" height="92" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.4"/>
    <text x="114" y="30" text-anchor="middle" class="card-title">Caller-owned Client</text>
    <text x="20" y="57" class="card-sub">endpoints, TLS, auth</text>
    <text x="20" y="77" class="card-sub">lifecycle stays external</text>
  </g>
  <g transform="translate(80 318)">
    <rect width="228" height="122" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.4"/>
    <text x="114" y="30" text-anchor="middle" class="card-title">User action</text>
    <text x="20" y="58" class="mono">runIfLeader(lock)</text>
    <text x="20" y="80" class="mono">runIfLeader(slot)</text>
    <text x="20" y="102" class="mono">runVirtualIfLeader</text>
  </g>
  <g transform="translate(80 486)">
    <rect width="228" height="102" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.4"/>
    <text x="114" y="29" text-anchor="middle" class="card-title">Spring Boot adapter</text>
    <text x="20" y="57" class="card-sub">activated only when a jetcd</text>
    <text x="20" y="77" class="card-sub">Client bean is present</text>
  </g>

  <rect x="390" y="128" width="408" height="584" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="410" y="158" class="section">bluetape4k leader-etcd</text>
  <g transform="translate(422 190)">
    <rect width="156" height="112" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.4"/>
    <text x="78" y="30" text-anchor="middle" class="card-title">EtcdLeader</text>
    <text x="78" y="50" text-anchor="middle" class="card-title">Elector</text>
    <text x="18" y="78" class="card-sub">blocking + async</text>
    <text x="18" y="96" class="card-sub">autoExtend optional</text>
  </g>
  <g transform="translate(610 190)">
    <rect width="156" height="112" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.4"/>
    <text x="78" y="30" text-anchor="middle" class="card-title">EtcdSuspend</text>
    <text x="78" y="50" text-anchor="middle" class="card-title">Elector</text>
    <text x="18" y="78" class="card-sub">coroutine API</text>
    <text x="18" y="96" class="card-sub">awaits lock futures</text>
  </g>
  <g transform="translate(422 338)">
    <rect width="156" height="126" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.4"/>
    <text x="78" y="30" text-anchor="middle" class="card-title">EtcdLeader</text>
    <text x="78" y="50" text-anchor="middle" class="card-title">Group</text>
    <text x="18" y="80" class="card-sub">random slot start</text>
    <text x="18" y="100" class="card-sub">one Lock per slot</text>
  </g>
  <g transform="translate(610 338)">
    <rect width="156" height="126" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.4"/>
    <text x="78" y="30" text-anchor="middle" class="card-title">VirtualThread</text>
    <text x="78" y="50" text-anchor="middle" class="card-title">Adapter</text>
    <text x="18" y="80" class="card-sub">runs blocking path</text>
    <text x="18" y="100" class="card-sub">on virtual threads</text>
  </g>
  <g transform="translate(422 520)">
    <rect width="344" height="116" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
    <text x="172" y="30" text-anchor="middle" class="card-title">EtcdLeaseHandle</text>
    <text x="24" y="58" class="mono">leaseId + ownershipKey + acquiredAtNanos</text>
    <text x="24" y="82" class="card-sub">ownershipKey becomes LeaderLockHandle token</text>
  </g>

  <rect x="846" y="128" width="394" height="584" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="866" y="158" class="section">etcd cluster services</text>
  <g transform="translate(878 190)">
    <rect width="146" height="112" rx="8" fill="#ffffff" stroke="#c084fc" stroke-width="1.4"/>
    <text x="73" y="30" text-anchor="middle" class="card-title">Lock service</text>
    <text x="18" y="60" class="mono">lock(key, lease)</text>
    <text x="18" y="82" class="mono">unlock(ownerKey)</text>
  </g>
  <g transform="translate(1062 190)">
    <rect width="146" height="112" rx="8" fill="#ffffff" stroke="#c084fc" stroke-width="1.4"/>
    <text x="73" y="30" text-anchor="middle" class="card-title">Lease service</text>
    <text x="18" y="60" class="mono">grant(ttl)</text>
    <text x="18" y="82" class="mono">keepAliveOnce</text>
  </g>
  <g transform="translate(878 350)">
    <rect width="330" height="128" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.4"/>
    <text x="165" y="30" text-anchor="middle" class="card-title">Keyspace layout</text>
    <text x="22" y="60" class="mono">/prefix/single/{encodedLockName}</text>
    <text x="22" y="84" class="mono">/prefix/group/{encodedLockName}/slot-N</text>
    <text x="22" y="108" class="card-sub">raw lockName is percent-encoded per path segment</text>
  </g>
  <g transform="translate(878 536)">
    <rect width="330" height="96" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.4"/>
    <text x="165" y="30" text-anchor="middle" class="card-title">Watch service</text>
    <text x="22" y="58" class="card-sub">prefix watch emits Elected / Revoked</text>
    <text x="22" y="78" class="card-sub">publisher revalidates current owner key</text>
  </g>

  <path d="M 308 364 L 390 364 L 422 246" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>
  <text x="356" y="350" text-anchor="middle" class="tiny" fill="#1d4ed8">run action</text>
  <path d="M 798 246 L 878 246" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>
  <text x="838" y="232" text-anchor="middle" class="tiny" fill="#1d4ed8">Lock</text>
  <path d="M 798 306 L 828 306 L 828 174 L 1135 174 L 1135 190" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
  <text x="1174" y="184" text-anchor="middle" class="tiny" fill="#047857">lease TTL</text>
  <path d="M 766 580 L 878 426" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#purpleArrow)"/>
  <text x="842" y="520" text-anchor="middle" class="tiny" fill="#6d28d9">key path</text>
  <path d="M 1038 536 L 1038 478" fill="none" stroke="#ea580c" stroke-width="1.8" class="dash" marker-end="url(#orangeArrow)"/>
  <text x="1060" y="510" class="tiny" fill="#c2410c">watch prefix</text>

  <g transform="translate(80 742)">
    <line x1="0" y1="10" x2="34" y2="10" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>
    <text x="44" y="15" class="tiny">lock request</text>
    <line x1="160" y1="10" x2="194" y2="10" stroke="#059669" stroke-width="2" marker-end="url(#greenArrow)"/>
    <text x="204" y="15" class="tiny">lease TTL</text>
    <line x1="318" y1="10" x2="352" y2="10" stroke="#7c3aed" stroke-width="2" marker-end="url(#purpleArrow)"/>
    <text x="362" y="15" class="tiny">keyspace mapping</text>
    <line x1="528" y1="10" x2="562" y2="10" stroke="#ea580c" stroke-width="1.8" class="dash" marker-end="url(#orangeArrow)"/>
    <text x="572" y="15" class="tiny">watch event</text>
  </g>

  <text x="52" y="792" class="footer">github.com/bluetape4k/bluetape4k-leader / leader-etcd - jetcd Lock ownership keys, etcd leases, and prefix watch events.</text>
</svg>
