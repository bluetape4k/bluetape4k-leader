<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc" data-source-read="examples/migration-gate/README.md; examples/migration-gate/src/main/kotlin/io/bluetape4k/leader/examples/migration/MigrationGateDemo.kt; examples/migration-gate/src/test/kotlin/io/bluetape4k/leader/examples/migration/MigrationGateTest.kt">
  <title id="title">Migration Gate Rolling Deploy Scenario</title>
  <desc id="desc">Three new pods start with the same migration pending. One pod writes the schema marker, and the other pods observe the marker and return AlreadyApplied.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#329a74"/></marker>
    <marker id="arrow-amber" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#cf8428"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .card-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .card-sub, .route-label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .card-title { font-size: 28px; }
      .card-sub { font-size: 15px; }
      .route-label { font-size: 13px; }
      .footer { font-size: 14px; }
      .card { stroke-width: 2.4; rx: 18; }
      .route { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="42" y="34" width="1416" height="820" rx="30"/>
  <text class="title" x="86" y="92">Migration Gate: One Pod Applies Schema</text>
  <text class="subtitle" x="90" y="126">A rolling deploy can start many new pods at once; the gate turns that race into one migration plus confirmed marker reads.</text>

  <rect class="card" x="96" y="184" width="300" height="430" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="card-title" x="246" y="228" text-anchor="middle">3 new pods</text>
  <text class="card-sub" x="246" y="256" text-anchor="middle">same migrationId</text>
  <rect class="card" x="132" y="300" width="228" height="70" fill="#ffffff" stroke="#adc8f6"/>
  <text class="card-title" x="246" y="342" text-anchor="middle">pod-1</text>
  <rect class="card" x="132" y="404" width="228" height="70" fill="#ffffff" stroke="#adc8f6"/>
  <text class="card-title" x="246" y="446" text-anchor="middle">pod-2</text>
  <rect class="card" x="132" y="508" width="228" height="70" fill="#ffffff" stroke="#adc8f6"/>
  <text class="card-title" x="246" y="550" text-anchor="middle">pod-3</text>

  <rect class="card" x="536" y="198" width="360" height="126" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="card-title" x="716" y="242" text-anchor="middle">Exposed JDBC lock</text>
  <text class="card-sub" x="716" y="270" text-anchor="middle">lockName = prod-app-schema-v3</text>
  <text class="card-sub" x="716" y="294" text-anchor="middle">one owner token at a time</text>

  <rect class="card" x="1040" y="184" width="320" height="172" fill="#edf9f4" stroke="#63b891"/>
  <text class="card-title" x="1200" y="230" text-anchor="middle">schema migration</text>
  <text class="card-sub" x="1200" y="258" text-anchor="middle">idempotent DDL</text>
  <text class="card-sub" x="1200" y="282" text-anchor="middle">marker insert in same tx</text>
  <text class="card-sub" x="1200" y="306" text-anchor="middle">Outcome.Migrated</text>

  <rect class="card" x="536" y="466" width="360" height="126" fill="#fff4de" stroke="#d59c3f"/>
  <text class="card-title" x="716" y="512" text-anchor="middle">marker observed</text>
  <text class="card-sub" x="716" y="540" text-anchor="middle">precheck / post-skip confirms</text>
  <text class="card-sub" x="716" y="564" text-anchor="middle">Outcome.AlreadyApplied</text>

  <rect class="card" x="1040" y="466" width="320" height="126" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="card-title" x="1200" y="512" text-anchor="middle">safe to serve</text>
  <text class="card-sub" x="1200" y="540" text-anchor="middle">all pods see applied schema</text>
  <text class="card-sub" x="1200" y="564" text-anchor="middle">no duplicate DDL</text>

  <path class="route" d="M360 335 C440 312 460 260 536 260" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <rect class="pill" x="408" y="274" width="98" height="26"/>
  <text class="route-label" x="457" y="292" text-anchor="middle">acquires</text>
  <path class="route" d="M896 260 L1040 260" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="930" y="230" width="78" height="26"/>
  <text class="route-label" x="969" y="248" text-anchor="middle">runs</text>
  <path class="route" d="M1200 356 L1200 424 L716 424 L716 466" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="922" y="394" width="118" height="26"/>
  <text class="route-label" x="981" y="412" text-anchor="middle">writes marker</text>
  <path class="route dash" d="M360 439 C430 446 462 510 536 528" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <path class="route dash" d="M360 543 C432 548 462 552 536 552" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="406" y="566" width="92" height="26"/>
  <text class="route-label" x="452" y="584" text-anchor="middle">confirm</text>
  <path class="route" d="M896 529 L1040 529" stroke="#329a74" marker-end="url(#arrow-green)"/>

  <rect class="card" x="180" y="684" width="1140" height="58" fill="#f8fbff" stroke="#d2deeb"/>
  <text class="card-sub" x="750" y="720" text-anchor="middle">Expected demo result: exactly 1 Migrated, and the remaining pods return AlreadyApplied after the marker appears.</text>

  <text class="footer" x="750" y="826" text-anchor="middle">If waitTime expires before a marker exists, callers receive Skipped and should verify before serving. github.com/bluetape4k/bluetape4k-leader</text>
</svg>
