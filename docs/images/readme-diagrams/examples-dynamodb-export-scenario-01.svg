<text x="785" y="736" class="cardTitle" text-anchor="middle">Reader contract</text>
<text x="785" y="762" class="cardText" text-anchor="middle">node-a starts billing batch -&gt; DynamoDB lock table grants leadership -&gt; node-b skips same batch -&gt; Leader</text>
<text x="785" y="780" class="cardText" text-anchor="middle">writes one export row -&gt; node-b exports next batch after release</text></svg>
