<path class="route" data-from="adapter" data-to="store" data-route-tone="contention" d="M747 606 L747 728 L712 728 L712 852 L682 852" stroke="#B9851B" marker-end="url(#arrow-contention)"/>
<path class="route" data-from="adapter" data-to="result" data-route-tone="success" d="M747 606 L747 728 L1067 728 L1067 813" stroke="#3E9868" marker-end="url(#arrow-success)"/>
