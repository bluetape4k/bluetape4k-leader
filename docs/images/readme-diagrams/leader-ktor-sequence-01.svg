<svg xmlns="http://www.w3.org/2000/svg" width="1624" height="1366" viewBox="0 0 1624 1366" role="img" aria-label="leader ktor Sequence Flow">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 10 5 L 1 9" fill="none" stroke="#758297" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="inherit" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 1 L 12 6 L 0 11 Z" fill="#ffffff" stroke="#758297" stroke-width="1.8"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .title{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:43px;font-weight:400;fill:#102033}
    .subtitle{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:25px;font-weight:400;fill:#102033}
    .smallLabel{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:21px;font-weight:400;fill:#102033}
    .mono{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#536273}
    .strong{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:13px;font-weight:400;fill:#102033}
    .card{stroke-width:2.1;filter:url(#shadow)}.compartment{stroke-width:1.5;fill:none}
    .line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#openArrow)}
    .plainLine{stroke:#758297;stroke-width:2.1;fill:none}
    .dashed{stroke:#758297;stroke-width:2.1;stroke-dasharray:7 6;fill:none;marker-end:url(#openArrow)}
    .inheritLine{stroke:#758297;stroke-width:2.2;fill:none;marker-end:url(#inherit)}
    .implLine{stroke:#758297;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#inherit)}
  </style>
</defs>
<rect class="canvas" width="1624" height="1366"/>
<rect class="frame" x="32" y="28" width="1560" height="1310" rx="28"/>
<text class="title" x="66" y="82">leader ktor Sequence Flow</text>
<text class="subtitle" x="70" y="118">Sequence messages from the original Mermaid source</text>
<rect class="card" x="-10" y="166" width="300" height="72" rx="20" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="smallLabel" x="140" y="209" text-anchor="middle">Application (Ktor)</text>
<line class="lifeline" x1="140" y1="252" x2="140" y2="1306" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="438" y="166" width="300" height="72" rx="20" fill="#EAF7EF" stroke="#58A978"/>
<text class="smallLabel" x="588" y="198.5" text-anchor="middle">Leader Election</text>
<text class="smallLabel" x="588" y="219.5" text-anchor="middle">Plugin</text>
<line class="lifeline" x1="588" y1="252" x2="588" y2="1306" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="886" y="166" width="300" height="72" rx="20" fill="#FFF3D9" stroke="#D6A441"/>
<text class="smallLabel" x="1036" y="209" text-anchor="middle">leaderScheduled</text>
<line class="lifeline" x1="1036" y1="252" x2="1036" y2="1306" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="1334" y="166" width="300" height="72" rx="20" fill="#FDECEF" stroke="#DC6B82"/>
<text class="smallLabel" x="1484" y="198.5" text-anchor="middle">Suspend Leader</text>
<text class="smallLabel" x="1484" y="219.5" text-anchor="middle">Elector</text>
<line class="lifeline" x1="1484" y1="252" x2="1484" y2="1306" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect x="116" y="286" width="496" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="134" y="313" text-anchor="start">1. install(LeaderElectionPlugin) { leaderElection = ... }</text>
<path class="line" d="M140 344 L588 344"/>
<rect x="229" y="396" width="270" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="247" y="423" text-anchor="start">2. store config in attributes</text>
<path class="dashed" d="M588 454 L140 454"/>
<rect x="400.5" y="506" width="375" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="418.5" y="533" text-anchor="start">3. leaderScheduled(job, 1.minutes) { ... }</text>
<path class="line" d="M140 564 L1036 564"/>
<rect x="473" y="616" width="230" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="491" y="643" text-anchor="start">4. launch background Job</text>
<path class="dashed" d="M1036 674 L140 674"/>
<rect x="1113" y="726" width="294" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="1131" y="753" text-anchor="start">5. runIfLeader(job) { action() }</text>
<path class="line" d="M1036 784 L1484 784"/>
<rect x="1145" y="836" width="230" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="1163" y="863" text-anchor="start">6. result or null (skip)</text>
<path class="dashed" d="M1484 894 L1036 894"/>
<rect x="979" y="946" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="997" y="973" text-anchor="start">7. delay(period)</text>
<path class="line" d="M1036 1004 C1100 1004 1100 1038 1036 1038"/>
<rect x="259" y="1076" width="210" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="277" y="1103" text-anchor="start">8. ApplicationStopped</text>
<path class="line" d="M140 1134 L588 1134"/>
<rect x="237" y="1186" width="254" height="40" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="255" y="1213" text-anchor="start">9. cancel application scope</text>
<path class="dashed" d="M588 1244 L140 1244"/>
</svg>
