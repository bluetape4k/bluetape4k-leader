<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1098" viewBox="0 0 1200 1098" role="img" aria-label="leader ktor Sequence Flow">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 10 5 L 1 9" fill="none" stroke="#758297" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="inherit" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 1 L 12 6 L 0 11 Z" fill="#ffffff" stroke="#758297" stroke-width="1.8"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .title{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:43px;font-weight:400;fill:#102033}
    .subtitle{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:25px;font-weight:400;fill:#102033}
    .smallLabel{font-family:"Architects Daughter","Comic Sans MS","Comic Sans",cursive;font-size:21px;font-weight:400;fill:#102033}
    .mono{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:12px;font-weight:400;fill:#536273}
    .strong{font-family:"Comic Sans MS","Comic Sans","Comic Neue",Arial,sans-serif;font-size:13px;font-weight:400;fill:#102033}
    .card{stroke-width:2.1;filter:url(#shadow)}.compartment{stroke-width:1.5;fill:none}
    .line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#openArrow)}
    .plainLine{stroke:#758297;stroke-width:2.1;fill:none}
    .dashed{stroke:#758297;stroke-width:2.1;stroke-dasharray:7 6;fill:none;marker-end:url(#openArrow)}
    .inheritLine{stroke:#758297;stroke-width:2.2;fill:none;marker-end:url(#inherit)}
    .implLine{stroke:#758297;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#inherit)}
  </style>
</defs>
<rect class="canvas" width="1200" height="1098"/>
<rect class="frame" x="32" y="28" width="1136" height="1042" rx="28"/>
<text class="title" x="66" y="82">leader ktor Sequence Flow</text>
<text class="subtitle" x="70" y="118">Sequence messages from the original Mermaid source</text>
<rect class="card" x="35" y="166" width="210" height="72" rx="20" fill="#E8F3FF" stroke="#5B8DEF"/>
<text class="smallLabel" x="140" y="209" text-anchor="middle">Application (Ktor)</text>
<line x1="140" y1="252" x2="140" y2="1038" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="341.6666666666667" y="166" width="210" height="72" rx="20" fill="#EAF7EF" stroke="#58A978"/>
<text class="smallLabel" x="446.6666666666667" y="198.5" text-anchor="middle">Leader Election</text>
<text class="smallLabel" x="446.6666666666667" y="219.5" text-anchor="middle">Plugin</text>
<line x1="446.6666666666667" y1="252" x2="446.6666666666667" y2="1038" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="648.3333333333334" y="166" width="210" height="72" rx="20" fill="#FFF3D9" stroke="#D6A441"/>
<text class="smallLabel" x="753.3333333333334" y="209" text-anchor="middle">leaderScheduled</text>
<line x1="753.3333333333334" y1="252" x2="753.3333333333334" y2="1038" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect class="card" x="955" y="166" width="210" height="72" rx="20" fill="#FDECEF" stroke="#DC6B82"/>
<text class="smallLabel" x="1060" y="198.5" text-anchor="middle">Suspend Leader</text>
<text class="smallLabel" x="1060" y="219.5" text-anchor="middle">Elector</text>
<line x1="1060" y1="252" x2="1060" y2="1038" stroke="#b7c2d1" stroke-width="2" stroke-dasharray="10 10"/>
<rect x="158" y="270" width="270.6666666666667" height="62" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="297" text-anchor="start">1. install(LeaderElectionPlugin) {</text>
<text class="strong" x="174" y="320" text-anchor="start">leaderElection = ... }</text>
<path class="line" d="M140 310 L446.6666666666667 310"/>
<rect x="158" y="352" width="270.6666666666667" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="379" text-anchor="start">2. store config in attributes</text>
<path class="dashed" d="M446.6666666666667 392 L140 392"/>
<rect x="158" y="434" width="577.3333333333334" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="461" text-anchor="start">3. leaderScheduled(job, 1.minutes) { ... }</text>
<path class="line" d="M140 474 L753.3333333333334 474"/>
<rect x="158" y="516" width="577.3333333333334" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="543" text-anchor="start">4. launch background Job</text>
<path class="dashed" d="M753.3333333333334 556 L140 556"/>
<rect x="771.3333333333334" y="598" width="270.66666666666663" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="787.3333333333334" y="625" text-anchor="start">5. runIfLeader(job) { action() }</text>
<path class="line" d="M753.3333333333334 638 L1060 638"/>
<rect x="771.3333333333334" y="680" width="270.66666666666663" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="787.3333333333334" y="707" text-anchor="start">6. result or null (skip)</text>
<path class="dashed" d="M1060 720 L753.3333333333334 720"/>
<rect x="771.3333333333334" y="762" width="190" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="787.3333333333334" y="789" text-anchor="start">7. delay(period)</text>
<path class="line" d="M753.3333333333334 802 C809.3333333333334 802 809.3333333333334 832 753.3333333333334 832"/>
<rect x="158" y="844" width="270.6666666666667" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="871" text-anchor="start">8. ApplicationStopped</text>
<path class="line" d="M140 884 L446.6666666666667 884"/>
<rect x="158" y="926" width="270.6666666666667" height="39" rx="12" fill="#ffffff" opacity="0.97"/>
<text class="strong" x="174" y="953" text-anchor="start">9. cancel application scope</text>
<path class="dashed" d="M446.6666666666667 966 L140 966"/>
</svg>
