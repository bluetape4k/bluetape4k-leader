<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc" data-source-read="examples/batch-scheduler/README.md; examples/batch-scheduler/src/main/kotlin/io/bluetape4k/leader/examples/batch/BatchScheduler.kt; examples/batch-scheduler/src/main/kotlin/io/bluetape4k/leader/examples/batch/BatchSchedulerDemo.kt">
<title id="title">Batch Scheduler Single Execution Scenario</title>
<desc id="desc">Three scheduled application instances share one Redis-backed nightly-settlement lock; one executes the job and the others skip.</desc>
<defs>
  <marker id="arrow-blue" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#3F73D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-green" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#2D8F64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-orange" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#C96B2C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#B9C7D6" flood-opacity="0.24"/></filter>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:2.2;filter:url(#shadow)}
    .title{font-family:"Architects Daughter";font-size:40px;fill:#21334A}.subtitle,.small,.label,.footer{font-family:"Comic Mono";fill:#4B6075}.subtitle{font-size:15px}.small{font-size:13px}.label{font-size:14px}.footer{font-size:13px}
    .card{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.8;filter:url(#shadow)}.trigger{fill:#FEF7E6;stroke:#E4BD67}.redis{fill:#EEF7F2;stroke:#8BC6A3}.leader{fill:#EAF2FF;stroke:#8EB2F0}.skip{fill:#FFF1EA;stroke:#E8A47D}.job{fill:#EEF8F8;stroke:#86C9C5}.note{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.4}
    .cardTitle{font-family:"Architects Daughter";font-size:24px;fill:#21334A}.cardText{font-family:"Comic Mono";font-size:13px;fill:#4B6075}.route{fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:7 6}
  </style>
</defs>
<rect class="canvas" width="1280" height="760"/>
<rect class="frame" x="34" y="28" width="1212" height="704" rx="30"/>
<text class="title" x="72" y="84">Batch Scheduler: One Run Per Periodic Trigger</text>
<text class="subtitle" x="76" y="116">Three replicas receive the same nightly-settlement trigger; Redis elects one leader and losers return null without throwing.</text>

<rect class="card trigger" x="96" y="164" width="270" height="92" rx="16"/>
<text class="cardTitle" x="122" y="203">Periodic trigger</text>
<text class="cardText" x="122" y="230">cron / @Scheduled / Quartz</text>

<rect class="card redis" x="500" y="326" width="280" height="112" rx="18"/>
<text class="cardTitle" x="540" y="366">Redis lock</text>
<text class="cardText" x="540" y="394">key: nightly-settlement</text>
<text class="cardText" x="540" y="416">leaseTime prevents leaks</text>

<rect class="card leader" x="96" y="326" width="260" height="106" rx="18"/>
<text class="cardTitle" x="126" y="365">node-1</text>
<text class="cardText" x="126" y="393">BatchScheduler.run()</text>
<text class="cardText" x="126" y="415">result: LEADER</text>

<rect class="card skip" x="96" y="470" width="260" height="100" rx="18"/>
<text class="cardTitle" x="126" y="508">node-2</text>
<text class="cardText" x="126" y="536">lock contention</text>
<text class="cardText" x="126" y="558">result: null skip</text>

<rect class="card skip" x="96" y="604" width="260" height="92" rx="18"/>
<text class="cardTitle" x="126" y="640">node-3</text>
<text class="cardText" x="126" y="668">same lock name</text>
<text class="cardText" x="126" y="690">result: null skip</text>

<rect class="card job" x="902" y="326" width="282" height="112" rx="18"/>
<text class="cardTitle" x="936" y="366">Settlement job</text>
<text class="cardText" x="936" y="394">processYesterday()</text>
<text class="cardText" x="936" y="416">executions.incrementAndGet()</text>

<rect class="note" x="902" y="500" width="282" height="92" rx="16"/>
<text class="cardTitle" x="936" y="538">Observed outcome</text>
<text class="cardText" x="936" y="566">executions == 1</text>
<text class="cardText" x="936" y="588">successCount == 1</text>

<path class="route" d="M 366 210 C 420 210 438 344 500 360" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 356 374 L 500 374" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route dash" d="M 356 520 C 430 520 426 398 500 398" stroke="#C96B2C" marker-end="url(#arrow-orange)"/>
<path class="route dash" d="M 356 652 C 450 652 430 424 500 424" stroke="#C96B2C" marker-end="url(#arrow-orange)"/>
<path class="route" d="M 780 382 L 902 382" stroke="#2D8F64" marker-end="url(#arrow-green)"/>
<path class="route" d="M 1043 438 L 1043 500" stroke="#2D8F64" marker-end="url(#arrow-green)"/>

<text class="label" x="405" y="194">same trigger</text>
<text class="label" x="384" y="356">acquire attempt</text>
<text class="label" x="382" y="514">null skip</text>
<text class="label" x="384" y="646">null skip</text>
<text class="label" x="810" y="358">leader only</text>

<rect class="note" x="720" y="610" width="464" height="58" rx="14"/>
<text class="small" x="952" y="636" text-anchor="middle">nodeId is for logs only; Lettuce issues the lock owner token.</text>
<text class="footer" x="640" y="710" text-anchor="middle">bluetape4k-leader/examples/batch-scheduler</text>
</svg>
