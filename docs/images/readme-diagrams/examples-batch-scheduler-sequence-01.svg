<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="900" viewBox="0 0 1360 900" role="img" aria-labelledby="title desc" data-source-read="examples/batch-scheduler/README.md; examples/batch-scheduler/src/main/kotlin/io/bluetape4k/leader/examples/batch/BatchScheduler.kt; examples/batch-scheduler/src/main/kotlin/io/bluetape4k/leader/examples/batch/BatchSchedulerDemo.kt; examples/batch-scheduler/src/test/kotlin/io/bluetape4k/leader/examples/batch/BatchSchedulerTest.kt">
<title id="title">Batch Scheduler Sequence</title>
<desc id="desc">Three nodes call BatchScheduler.run with one Redis lock; only the elected leader runs the job.</desc>
<defs>
  <marker id="seq-blue" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#3F73D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="seq-green" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#2D8F64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="seq-orange" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#C96B2C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="seq-purple" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#755BC6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#B9C7D6" flood-opacity="0.24"/></filter>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:2.2;filter:url(#shadow)}
    .title{font-family:"Architects Daughter";font-size:40px;fill:#21334A}.subtitle,.msg,.small,.footer{font-family:"Comic Mono";fill:#4B6075}.subtitle{font-size:15px}.msg{font-size:13px}.small{font-size:12px}.footer{font-size:13px}
    .participant{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.8;filter:url(#shadow)}.ptext{font-family:"Architects Daughter";font-size:21px;fill:#21334A}.life{stroke:#BFD1E2;stroke-width:1.3;stroke-dasharray:8 8}.route{fill:none;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:7 6}.alt{fill:#FFF8EA;stroke:#E3BE69;stroke-width:1.6}.else{stroke:#E3BE69;stroke-width:1.4;stroke-dasharray:8 6}.pill{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1}.blueMsg{fill:#2F5FB8}.greenMsg{fill:#1E7550}.orangeMsg{fill:#A95720}.purpleMsg{fill:#5D49A8}
  </style>
</defs>
<rect class="canvas" width="1360" height="900"/>
<rect class="frame" x="34" y="28" width="1292" height="844" rx="30"/>
<text class="title" x="72" y="84">Batch Scheduler Sequence</text>
<text class="subtitle" x="76" y="116">All nodes call run() with the same lock; Redis grants one token and contenders finish as null skips.</text>

<rect class="participant" x="80" y="154" width="170" height="54" rx="14"/><text class="ptext" x="116" y="188">Trigger</text>
<rect class="participant" x="300" y="154" width="170" height="54" rx="14"/><text class="ptext" x="346" y="188">node-1</text>
<rect class="participant" x="520" y="154" width="170" height="54" rx="14"/><text class="ptext" x="566" y="188">node-2</text>
<rect class="participant" x="740" y="154" width="170" height="54" rx="14"/><text class="ptext" x="786" y="188">node-3</text>
<rect class="participant" x="960" y="154" width="170" height="54" rx="14"/><text class="ptext" x="1002" y="188">Redis</text>
<rect class="participant" x="1160" y="154" width="150" height="54" rx="14"/><text class="ptext" x="1198" y="188">Job</text>

<line class="life" x1="165" y1="208" x2="165" y2="812"/>
<line class="life" x1="385" y1="208" x2="385" y2="812"/>
<line class="life" x1="605" y1="208" x2="605" y2="812"/>
<line class="life" x1="825" y1="208" x2="825" y2="812"/>
<line class="life" x1="1045" y1="208" x2="1045" y2="812"/>
<line class="life" x1="1235" y1="208" x2="1235" y2="812"/>

<path class="route" d="M 165 250 L 385 250" stroke="#3F73D8" marker-end="url(#seq-blue)"/><rect class="pill" x="222" y="228" width="108" height="22" rx="8"/><text class="msg blueMsg" x="232" y="244">1 trigger run()</text>
<path class="route" d="M 165 298 L 605 298" stroke="#3F73D8" marker-end="url(#seq-blue)"/><rect class="pill" x="342" y="276" width="108" height="22" rx="8"/><text class="msg blueMsg" x="352" y="292">2 trigger run()</text>
<path class="route" d="M 165 346 L 825 346" stroke="#3F73D8" marker-end="url(#seq-blue)"/><rect class="pill" x="472" y="324" width="108" height="22" rx="8"/><text class="msg blueMsg" x="482" y="340">3 trigger run()</text>

<path class="route" d="M 385 404 L 1045 404" stroke="#3F73D8" marker-end="url(#seq-blue)"/><rect class="pill" x="646" y="382" width="160" height="22" rx="8"/><text class="msg blueMsg" x="656" y="398">4 SET lock NX PX</text>
<path class="route dash" d="M 1045 442 L 385 442" stroke="#2D8F64" marker-end="url(#seq-green)"/><rect class="pill" x="672" y="420" width="114" height="22" rx="8"/><text class="msg greenMsg" x="682" y="436">5 token granted</text>
<path class="route" d="M 385 500 L 1235 500" stroke="#2D8F64" marker-end="url(#seq-green)"/><rect class="pill" x="760" y="478" width="116" height="22" rx="8"/><text class="msg greenMsg" x="770" y="494">6 execute job</text>
<path class="route dash" d="M 1235 542 L 385 542" stroke="#2D8F64" marker-end="url(#seq-green)"/><rect class="pill" x="786" y="520" width="104" height="22" rx="8"/><text class="msg greenMsg" x="796" y="536">7 job result</text>

<rect class="alt" x="288" y="578" width="786" height="142" rx="16"/>
<text class="small" x="310" y="604">alt: contenders race while lock is held</text>
<line class="else" x1="288" y1="650" x2="1074" y2="650"/>
<path class="route" d="M 605 626 L 1045 626" stroke="#C96B2C" marker-end="url(#seq-orange)"/><rect class="pill" x="760" y="604" width="116" height="22" rx="8"/><text class="msg orangeMsg" x="770" y="620">8 try lock</text>
<path class="route dash" d="M 1045 674 L 605 674" stroke="#C96B2C" marker-end="url(#seq-orange)"/><rect class="pill" x="756" y="652" width="130" height="22" rx="8"/><text class="msg orangeMsg" x="766" y="668">9 null skip</text>
<path class="route" d="M 825 700 L 1045 700" stroke="#C96B2C" marker-end="url(#seq-orange)"/><rect class="pill" x="880" y="678" width="116" height="22" rx="8"/><text class="msg orangeMsg" x="890" y="694">10 try lock</text>

<path class="route" d="M 385 760 L 1045 760" stroke="#755BC6" marker-end="url(#seq-purple)"/><rect class="pill" x="648" y="738" width="176" height="22" rx="8"/><text class="msg purpleMsg" x="658" y="754">11 release if owner</text>
<path class="route dash" d="M 1045 800 L 385 800" stroke="#755BC6" marker-end="url(#seq-purple)"/><rect class="pill" x="676" y="778" width="112" height="22" rx="8"/><text class="msg purpleMsg" x="686" y="794">12 finished</text>

<text class="footer" x="680" y="850" text-anchor="middle">bluetape4k-leader/examples/batch-scheduler</text>
</svg>
