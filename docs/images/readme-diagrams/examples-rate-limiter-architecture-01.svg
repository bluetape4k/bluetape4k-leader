<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc" data-source-read="examples/rate-limiter/README.md; RateLimiterDemo.kt; LeaderDispatchScheduler.kt; RateLimitedApiWorker.kt; ExternalApiProbe.kt; RateLimiterDemoTest.kt">
  <title id="title">Rate Limiter Architecture</title>
  <desc id="desc">Architecture diagram for the rate limiter example showing demo orchestration, Redis leader election, Redis-backed Bucket4j quota, workers, and test-observable report output.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer, .tag { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 23px; }
      .node-sub { font-size: 13px; }
      .label { font-size: 13px; }
      .tag { font-size: 12px; font-weight: 700; }
      .footer { font-size: 14px; }
      .group { fill: #edf4fd; stroke: #cbd9e7; stroke-width: 2.4; }
      .group2 { fill: #fff7e8; stroke: #e3c178; stroke-width: 2.4; }
      .group3 { fill: #f7f2ff; stroke: #d3c3f7; stroke-width: 2.4; }
      .node { stroke-width: 2.4; rx: 16; }
      .route { fill: none; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="980"/>
  <rect class="frame" x="42" y="34" width="1416" height="900" rx="30"/>
  <text class="title" x="86" y="92">Rate Limiter Architecture</text>
  <text class="subtitle" x="90" y="126">The demo uses Redis for two separate contracts: leader election for dispatch and Bucket4j state for shared quota.</text>

  <rect class="group" x="92" y="178" width="650" height="570" rx="22"/>
  <text class="tag" x="126" y="214">application process</text>

  <rect class="node" x="132" y="250" width="230" height="96" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="247" y="286" text-anchor="middle">RateLimiterDemo</text>
  <text class="node-sub" x="247" y="314" text-anchor="middle">creates lockName</text>
  <text class="node-sub" x="247" y="338" text-anchor="middle">creates quotaKey</text>

  <rect class="node" x="462" y="236" width="230" height="124" fill="#fff4de" stroke="#d59c3f"/>
  <text class="node-title" x="577" y="278" text-anchor="middle">dispatch pool</text>
  <text class="node-sub" x="577" y="306" text-anchor="middle">3 LeaderDispatchScheduler</text>
  <text class="node-sub" x="577" y="330" text-anchor="middle">one report per node</text>

  <rect class="node" x="132" y="462" width="230" height="112" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="247" y="502" text-anchor="middle">worker coroutines</text>
  <text class="node-sub" x="247" y="530" text-anchor="middle">node-1..node-3</text>
  <text class="node-sub" x="247" y="554" text-anchor="middle">round-robin item calls</text>

  <rect class="node" x="462" y="452" width="230" height="146" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="577" y="502" text-anchor="middle">Distributed</text>
  <text class="node-title" x="577" y="530" text-anchor="middle">SuspendRateLimiter</text>
  <text class="node-sub" x="577" y="558" text-anchor="middle">consume(quotaKey, 1)</text>
  <text class="node-sub" x="577" y="582" text-anchor="middle">rejects without API call</text>

  <rect class="node" x="462" y="650" width="230" height="80" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="node-title" x="577" y="684" text-anchor="middle">ExternalApiProbe</text>
  <text class="node-sub" x="577" y="712" text-anchor="middle">increments consumed calls</text>

  <rect class="group2" x="854" y="178" width="574" height="246" rx="22"/>
  <text class="tag" x="888" y="214">Redis leader-election state</text>

  <rect class="node" x="904" y="256" width="210" height="92" fill="#fff4de" stroke="#d59c3f"/>
  <text class="node-title" x="1009" y="292" text-anchor="middle">Lettuce</text>
  <text class="node-title" x="1009" y="318" text-anchor="middle">LeaderElector</text>

  <rect class="node" x="1164" y="256" width="214" height="92" fill="#fff9ea" stroke="#d59c3f"/>
  <text class="node-title" x="1271" y="292" text-anchor="middle">rate-limiter:*</text>
  <text class="node-sub" x="1271" y="320" text-anchor="middle">Redis lock key</text>

  <rect class="group3" x="854" y="430" width="574" height="212" rx="22"/>
  <text class="tag" x="888" y="466">Redis Bucket4j state</text>

  <rect class="node" x="904" y="472" width="210" height="92" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="1009" y="508" text-anchor="middle">AsyncBucket</text>
  <text class="node-title" x="1009" y="534" text-anchor="middle">ProxyProvider</text>

  <rect class="node" x="1164" y="472" width="214" height="92" fill="#f7f2ff" stroke="#9b7aec"/>
  <text class="node-title" x="1271" y="508" text-anchor="middle">external-api:*</text>
  <text class="node-sub" x="1271" y="536" text-anchor="middle">10/sec, 3 sec window</text>

  <path class="route" d="M362 298 L462 298" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <rect class="pill" x="392" y="266" width="50" height="26"/>
  <text class="label" x="417" y="284" text-anchor="middle">runs</text>

  <path class="route" d="M692 298 L904 298" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="764" y="266" width="78" height="26"/>
  <text class="label" x="803" y="284" text-anchor="middle">runIfLeader</text>
  <path class="route" d="M1114 302 L1164 302" stroke="#cf8428" marker-end="url(#arrow-amber)"/>

  <path class="route" d="M247 346 L247 462" stroke="#319873" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="268" y="392" width="76" height="26"/>
  <text class="label" x="306" y="410" text-anchor="middle">scheduled</text>

  <path class="route" d="M362 518 L462 518" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <path class="route" d="M692 518 L904 518" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <rect class="pill" x="772" y="486" width="72" height="26"/>
  <text class="label" x="808" y="504" text-anchor="middle">tokens</text>
  <path class="route" d="M1114 518 L1164 518" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>

  <path class="route" d="M577 598 L577 650" stroke="#319873" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="596" y="618" width="78" height="26"/>
  <text class="label" x="635" y="636" text-anchor="middle">CONSUMED</text>

  <text class="footer" x="750" y="910" text-anchor="middle">One dispatcher creates work; all workers share the same Redis-backed quota before calling the external API.</text>
</svg>
