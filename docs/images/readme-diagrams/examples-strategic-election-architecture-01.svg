<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1040" viewBox="0 0 1680 1040" role="img" aria-labelledby="title desc">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#263238" flood-opacity="0.14"/>
    </filter>
    <style>
      .canvas { fill: #fbfcf8; }
      .frame { fill: #ffffff; stroke: #41545d; stroke-width: 2.2; }
      .title { font-family: "Architects Daughter"; font-size: 42px; fill: #263238; }
      .subtitle, .small, .labelText, .detail, .footer, .msg, .note { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 17px; }
      .footer { font-size: 13px; fill: #60727d; }
      .band { fill: #f5f9fb; stroke: #c8d7df; stroke-width: 1.6; }
      .bandAlt { fill: #fbfdf8; stroke: #d7e0d0; stroke-width: 1.6; }
      .bandTitle { font-family: "Architects Daughter"; font-size: 22px; fill: #263238; }
      .bandHint { font-family: "Comic Mono"; font-size: 12px; fill: #60727d; }
      .card { filter: url(#softShadow); stroke-width: 2; rx: 8; }
      .cardTitle { font-family: "Architects Daughter"; font-size: 24px; fill: #1f3138; }
      .detail { font-size: 13.5px; fill: #546a73; }
      .edge { fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .edgeThin { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 10 8; }
      .pill { fill: #ffffff; stroke-width: 1.5; }
      .labelText { font-size: 12.5px; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; }
      .header { fill: #ffffff; stroke: #546e7a; stroke-width: 2.2; }
      .participant { font-family: "Architects Daughter"; font-size: 20px; fill: #1f3138; }
      .role { font-family: "Comic Mono"; font-size: 13px; fill: #546a73; }
      .lifeline { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      .activation { fill: #e6f2ec; stroke: #5b7e67; stroke-width: 1.7; }
      .branch { fill: none; stroke: #78909c; stroke-width: 2.4; stroke-dasharray: 12 8; }
    </style>
    <marker id="arrow-line" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#3f7d9c" stroke="#3f7d9c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-work" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#6e8f4f" stroke="#6e8f4f" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-return" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#9b7d54" stroke="#9b7d54" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-skip" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#b86868" stroke="#b86868" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c97831" stroke="#c97831" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c5aa6" stroke="#7c5aa6" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#78909c" stroke="#78909c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
  </defs>
  <title id="title">Strategic Election Architecture</title>
  <desc id="desc">Architecture diagram for Strategic Election.</desc>
  <rect width="1680" height="1040" class="canvas"/>
  <rect x="28" y="26" width="1624" height="988" rx="8" class="frame"/>
  <text x="80" y="82" class="title">Strategic Election Architecture</text>
  <text x="82" y="114" class="subtitle">Strategy uses one elected worker while peers observe explicit skipped or failed outcomes.</text>

  <rect x="84" y="150" width="352" height="760" rx="8" class="band"/>
  <text x="112" y="184" class="bandTitle">Request Lane</text>
  <text x="112" y="207" class="bandHint">trigger and candidate context</text>
  <rect x="460" y="150" width="352" height="760" rx="8" class="bandAlt"/>
  <text x="488" y="184" class="bandTitle">Election Lane</text>
  <text x="488" y="207" class="bandHint">API contract and guard</text>
  <rect x="836" y="150" width="352" height="760" rx="8" class="band"/>
  <text x="864" y="184" class="bandTitle">Work Lane</text>
  <text x="864" y="207" class="bandHint">leader branch and state</text>
  <rect x="1212" y="150" width="384" height="760" rx="8" class="bandAlt"/>
  <text x="1240" y="184" class="bandTitle">Observer Lane</text>
  <text x="1240" y="207" class="bandHint">peers, store, metrics</text>
  <g>
    <rect x="100" y="255" width="320" height="90" rx="8" class="card" fill="#eef7fb" stroke="#3f7d9c"/>
    <text x="260" y="289" text-anchor="middle" class="cardTitle">Strategy</text>
    <text x="260" y="313" text-anchor="middle" class="detail">elector policy</text>
  </g>
  <g>
    <rect x="100" y="495" width="320" height="92" rx="8" class="card" fill="#ffffff" stroke="#78909c"/>
    <text x="260" y="529" text-anchor="middle" class="cardTitle">Candidate Context</text>
    <text x="260" y="553" text-anchor="middle" class="detail">deadline, key, tenant scope</text>
  </g>
  <g>
    <rect x="476" y="255" width="320" height="90" rx="8" class="card" fill="#f8fbef" stroke="#6e8f4f"/>
    <text x="636" y="289" text-anchor="middle" class="cardTitle">Leader API</text>
    <text x="636" y="313" text-anchor="middle" class="detail">runIfLeader / result contract</text>
  </g>
  <g>
    <rect x="476" y="495" width="320" height="92" rx="8" class="card" fill="#eef7f0" stroke="#6e8f4f"/>
    <text x="636" y="529" text-anchor="middle" class="cardTitle">Election Guard</text>
    <text x="636" y="553" text-anchor="middle" class="detail">try lock, lease, listener events</text>
  </g>
  <g>
    <rect x="852" y="495" width="320" height="92" rx="8" class="card" fill="#eef7f0" stroke="#6e8f4f"/>
    <text x="1012" y="529" text-anchor="middle" class="cardTitle">Leader Work</text>
    <text x="1012" y="553" text-anchor="middle" class="detail">one protected side effect</text>
  </g>
  <g>
    <rect x="852" y="735" width="320" height="92" rx="8" class="card" fill="#fff7e8" stroke="#9b7d54"/>
    <text x="1012" y="769" text-anchor="middle" class="cardTitle">Outcome Record</text>
    <text x="1012" y="793" text-anchor="middle" class="detail">elected, skipped, or failed</text>
  </g>
  <g>
    <rect x="1244" y="255" width="320" height="90" rx="8" class="card" fill="#fff8ed" stroke="#c97831"/>
    <text x="1404" y="289" text-anchor="middle" class="cardTitle">Peer Workers</text>
    <text x="1404" y="313" text-anchor="middle" class="detail">same lockName, same policy</text>
  </g>
  <g>
    <rect x="1244" y="495" width="320" height="92" rx="8" class="card" fill="#fdf7ff" stroke="#7c5aa6"/>
    <text x="1404" y="529" text-anchor="middle" class="cardTitle">candidate scoring</text>
    <text x="1404" y="553" text-anchor="middle" class="detail">lease or conditional ownership</text>
  </g>
  <g>
    <rect x="1244" y="735" width="320" height="92" rx="8" class="card" fill="#fff5f5" stroke="#b86868"/>
    <text x="1404" y="769" text-anchor="middle" class="cardTitle">Observers</text>
    <text x="1404" y="793" text-anchor="middle" class="detail">metrics, logs, dashboards</text>
  </g>
  <g>
    <rect x="300" y="382" width="238" height="32" rx="16" class="pill" stroke="#3f7d9c"/>
    <circle cx="322" cy="398" r="12.5" fill="#fff" stroke="#3f7d9c" stroke-width="1.6"/>
    <text x="322" y="402" text-anchor="middle" class="badgeText" fill="#3f7d9c">1</text>
    <text x="343" y="403" class="labelText" fill="#3f7d9c">candidate enters</text>
  </g>
  <path d="M 260 345 L 260 416 Q 260 440 284 440 L 636 440 Q 660 440 660 464 L 660 495" class="edge" stroke="#3f7d9c" marker-end="url(#arrow-line)"/>
  <g>
    <rect x="1170" y="350" width="200" height="32" rx="16" class="pill" stroke="#c97831"/>
    <circle cx="1192" cy="366" r="12.5" fill="#fff" stroke="#c97831" stroke-width="1.6"/>
    <text x="1192" y="370" text-anchor="middle" class="badgeText" fill="#c97831">2</text>
    <text x="1213" y="371" class="labelText" fill="#c97831">peers contend</text>
  </g>
  <path d="M 1404 345 L 1404 380 Q 1404 398 1386 398 L 775 398 Q 760 398 760 413 L 760 495" class="edge" stroke="#c97831" marker-end="url(#arrow-amber)"/>
  <g>
    <rect x="860" y="350" width="238" height="32" rx="16" class="pill" stroke="#7c5aa6"/>
    <circle cx="882" cy="366" r="12.5" fill="#fff" stroke="#7c5aa6" stroke-width="1.6"/>
    <text x="882" y="370" text-anchor="middle" class="badgeText" fill="#7c5aa6">3</text>
    <text x="903" y="371" class="labelText" fill="#7c5aa6">ownership stored</text>
  </g>
  <path d="M 796 541 L 820 541 Q 836 541 836 525 L 836 438 Q 836 416 858 416 L 1388 416 Q 1404 416 1404 432 L 1404 495" class="edge" stroke="#7c5aa6" marker-end="url(#arrow-purple)"/>
  <g>
    <rect x="690" y="604" width="228" height="32" rx="16" class="pill" stroke="#6e8f4f"/>
    <circle cx="712" cy="620" r="12.5" fill="#fff" stroke="#6e8f4f" stroke-width="1.6"/>
    <text x="712" y="624" text-anchor="middle" class="badgeText" fill="#6e8f4f">4</text>
    <text x="733" y="625" class="labelText" fill="#6e8f4f">leader branch</text>
  </g>
  <path d="M 796 541 L 852 541" class="edge" stroke="#6e8f4f" marker-end="url(#arrow-work)"/>
  <g>
    <rect x="885" y="842" width="180" height="32" rx="16" class="pill" stroke="#9b7d54"/>
    <circle cx="907" cy="858" r="12.5" fill="#fff" stroke="#9b7d54" stroke-width="1.6"/>
    <text x="907" y="862" text-anchor="middle" class="badgeText" fill="#9b7d54">5</text>
    <text x="928" y="863" class="labelText" fill="#9b7d54">state visible</text>
  </g>
  <path d="M 1012 587 L 1012 735" class="edge" stroke="#9b7d54" marker-end="url(#arrow-return)"/>
  <g>
    <rect x="1265" y="856" width="190" height="32" rx="16" class="pill" stroke="#b86868"/>
    <circle cx="1287" cy="872" r="12.5" fill="#fff" stroke="#b86868" stroke-width="1.6"/>
    <text x="1287" y="876" text-anchor="middle" class="badgeText" fill="#b86868">6</text>
    <text x="1308" y="877" class="labelText" fill="#b86868">metrics explain</text>
  </g>
  <path d="M 1172 781 L 1244 781" class="edge" stroke="#b86868" marker-end="url(#arrow-skip)"/>

</svg>
