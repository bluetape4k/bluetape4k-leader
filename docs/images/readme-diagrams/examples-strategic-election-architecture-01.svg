<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc" data-source-read="examples/strategic-election/README.md; StrategicElectionDemo.kt">
  <title id="title">Strategic Election Architecture</title>
  <desc id="desc">Static ownership map for profiles, scorer composition, scored strategy, local electors, leader body, and election report.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer, .tag { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 23px; }
      .node-sub { font-size: 13px; }
      .tag { font-size: 12px; font-weight: 700; }
      .footer { font-size: 14px; }
      .group { stroke: #cbd9e7; stroke-width: 2.4; rx: 22; }
      .node { stroke-width: 2.4; rx: 16; }
      .route { fill: none; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="42" y="34" width="1416" height="820" rx="30"/>
  <text class="title" x="86" y="92">Strategic Election Architecture</text>
  <text class="subtitle" x="90" y="126">The local backend is only the election boundary; scorer and strategy objects own the selection logic.</text>

  <rect class="group" x="92" y="190" width="394" height="520" fill="#edf4fd"/>
  <text class="tag" x="126" y="226">candidate preparation</text>
  <rect class="node" x="140" y="300" width="298" height="106" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="289" y="340" text-anchor="middle">ServiceNodeProfile</text>
  <text class="node-sub" x="289" y="368" text-anchor="middle">health, capacity, history</text>
  <rect class="node" x="140" y="500" width="298" height="106" fill="#eef7ff" stroke="#6d9df0"/>
  <text class="node-title" x="289" y="540" text-anchor="middle">CandidateInfo</text>
  <text class="node-sub" x="289" y="568" text-anchor="middle">normalized for each node</text>

  <rect class="group" x="554" y="190" width="394" height="520" fill="#f2edff"/>
  <text class="tag" x="588" y="226">selection policy</text>
  <rect class="node" x="602" y="280" width="298" height="126" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="751" y="322" text-anchor="middle">CandidateScorers</text>
  <text class="node-sub" x="751" y="352" text-anchor="middle">readiness + success</text>
  <text class="node-sub" x="751" y="376" text-anchor="middle">idle-time fairness</text>
  <rect class="node" x="602" y="500" width="298" height="126" fill="#fff7e8" stroke="#d8a24d"/>
  <text class="node-title" x="751" y="542" text-anchor="middle">Scored Strategy</text>
  <text class="node-sub" x="751" y="572" text-anchor="middle">elect(candidates)</text>
  <text class="node-sub" x="751" y="596" text-anchor="middle">winner + score map</text>

  <rect class="group" x="1016" y="190" width="394" height="520" fill="#fff7e8"/>
  <text class="tag" x="1050" y="226">local election runtime</text>
  <rect class="node" x="1064" y="280" width="298" height="126" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1213" y="322" text-anchor="middle">Local Electors</text>
  <text class="node-sub" x="1213" y="352" text-anchor="middle">one per node id</text>
  <text class="node-sub" x="1213" y="376" text-anchor="middle">run or return null</text>
  <rect class="node" x="1064" y="500" width="298" height="126" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="node-title" x="1213" y="542" text-anchor="middle">Election Report</text>
  <text class="node-sub" x="1213" y="572" text-anchor="middle">selected node</text>
  <text class="node-sub" x="1213" y="596" text-anchor="middle">scores + statuses</text>

  <path class="route" d="M289 406 L289 500" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M438 553 L602 553" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M751 406 L751 500" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <path class="route" d="M900 563 L982 563 L982 343 L1064 343" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <path class="route" d="M1213 406 L1213 500" stroke="#319873" marker-end="url(#arrow-green)"/>

  <text class="footer" x="750" y="810" text-anchor="middle">Architecture view: candidate facts and scorer policy decide the winner; local electors enforce run-or-skip.</text>
</svg>
