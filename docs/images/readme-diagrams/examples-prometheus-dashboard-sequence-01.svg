<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc" data-source-read="examples/prometheus-dashboard/README.md; examples/prometheus-dashboard/src/main/kotlin/io/bluetape4k/leader/examples/prometheus/PrometheusDashboardApp.kt; examples/prometheus-dashboard/provisioning/prometheus/prometheus.yml; examples/prometheus-dashboard/provisioning/grafana/dashboards/leader-dashboard.json">
  <title id="title">Prometheus Dashboard Sequence</title>
  <desc id="desc">Sequence from scheduled trigger through leader AOP proxy, Redis acquisition, Micrometer recording, actuator scrape, Prometheus storage, and Grafana dashboard rendering.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#329a74"/></marker>
    <marker id="arrow-amber" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#cf8428"/></marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .role { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .note, .label, .region-title, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .role { font-size: 21px; }
      .note { font-size: 12px; }
      .label { font-size: 12px; }
      .region-title { font-size: 13px; font-weight: 700; }
      .footer { font-size: 14px; }
      .participant { stroke-width: 2.2; rx: 14; }
      .lifeline { stroke: #cbd9e7; stroke-width: 2; stroke-dasharray: 8 8; }
      .call { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .return { fill: none; stroke-width: 2.4; stroke-dasharray: 8 7; stroke-linecap: round; stroke-linejoin: round; }
      .region { stroke-width: 2.2; rx: 18; }
      .divider { stroke: #d8c8ef; stroke-width: 2; stroke-dasharray: 10 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>

  <rect class="canvas" width="1600" height="1120"/>
  <rect class="frame" x="42" y="34" width="1516" height="1048" rx="30"/>
  <text class="title" x="86" y="92">Prometheus Dashboard Sequence</text>
  <text class="subtitle" x="90" y="126">The scheduled method calls a separate proxied bean so the leader AOP advice can wrap the work and metrics.</text>

  <rect class="participant" x="78" y="172" width="166" height="72" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="role" x="161" y="202" text-anchor="middle">Scheduler</text>
  <text class="note" x="161" y="224" text-anchor="middle">fixed delay</text>

  <rect class="participant" x="278" y="172" width="166" height="72" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="role" x="361" y="202" text-anchor="middle">AOP proxy</text>
  <text class="note" x="361" y="224" text-anchor="middle">@LeaderElection</text>

  <rect class="participant" x="478" y="172" width="166" height="72" fill="#fff4de" stroke="#d59c3f"/>
  <text class="role" x="561" y="202" text-anchor="middle">Redis</text>
  <text class="note" x="561" y="224" text-anchor="middle">Lettuce lock</text>

  <rect class="participant" x="678" y="172" width="166" height="72" fill="#edf9f4" stroke="#63b891"/>
  <text class="role" x="761" y="202" text-anchor="middle">Job body</text>
  <text class="note" x="761" y="224" text-anchor="middle">dispatchBatch</text>

  <rect class="participant" x="900" y="172" width="176" height="72" fill="#edf9f4" stroke="#63b891"/>
  <text class="role" x="988" y="202" text-anchor="middle">Recorder</text>
  <text class="note" x="988" y="224" text-anchor="middle">Micrometer</text>

  <rect class="participant" x="1120" y="172" width="176" height="72" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="role" x="1208" y="202" text-anchor="middle">Actuator</text>
  <text class="note" x="1208" y="224" text-anchor="middle">prometheus endpoint</text>

  <rect class="participant" x="1340" y="172" width="184" height="72" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="role" x="1432" y="202" text-anchor="middle">Prom + Grafana</text>
  <text class="note" x="1432" y="224" text-anchor="middle">scrape and panels</text>

  <path class="lifeline" d="M161 244 L161 1018"/>
  <path class="lifeline" d="M361 244 L361 1018"/>
  <path class="lifeline" d="M561 244 L561 1018"/>
  <path class="lifeline" d="M761 244 L761 1018"/>
  <path class="lifeline" d="M988 244 L988 1018"/>
  <path class="lifeline" d="M1208 244 L1208 1018"/>
  <path class="lifeline" d="M1432 244 L1432 1018"/>

  <path class="call" d="M120 292 L988 292" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <text class="label" x="520" y="276" text-anchor="middle" fill="#8b5d10">1. ApplicationReadyEvent registers dashboard-job meters</text>

  <path class="call" d="M161 350 L361 350" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="label" x="261" y="334" text-anchor="middle" fill="#234f9b">2. tick calls dispatchBatch() on proxied bean</text>

  <path class="call" d="M361 408 L561 408" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <text class="label" x="461" y="392" text-anchor="middle" fill="#8b5d10">3. acquire dashboard-job, wait 1s, lease 30s</text>

  <rect class="region" x="82" y="444" width="1376" height="376" fill="#f4eefc" fill-opacity="0.42" stroke="#bba7ec"/>
  <text class="region-title" x="110" y="470">alt Redis lock result</text>
  <path class="divider" d="M98 652 L1442 652"/>
  <text class="region-title" x="110" y="678">else lock not acquired</text>

  <path class="return" d="M561 506 L361 506" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <text class="label" x="461" y="490" text-anchor="middle" fill="#176f4e">4a. acquired</text>

  <path class="call" d="M361 548 L988 548" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <text class="label" x="674" y="532" text-anchor="middle" fill="#176f4e">5a. attempts + acquired + active gauge on</text>

  <path class="call" d="M361 594 L761 594" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <text class="label" x="561" y="578" text-anchor="middle" fill="#176f4e">6a. execute leader-only job body</text>

  <path class="return" d="M761 634 L361 634" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <text class="label" x="561" y="618" text-anchor="middle" fill="#176f4e">7a. return after visible demo latency</text>

  <path class="return" d="M561 714 L361 714" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <text class="label" x="461" y="698" text-anchor="middle" fill="#8b5d10">4b. not acquired</text>

  <path class="call" d="M361 758 L988 758" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <text class="label" x="674" y="742" text-anchor="middle" fill="#8b5d10">5b. leader_aop_lock_not_acquired_total with reason</text>

  <path class="call" d="M361 850 L988 850" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <text class="label" x="674" y="834" text-anchor="middle" fill="#176f4e">8. final duration and active gauge off when leader path completes</text>

  <path class="call" d="M1432 910 L1208 910" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <text class="label" x="1320" y="894" text-anchor="middle" fill="#4e3aa5">9. Prometheus scrapes /actuator/prometheus</text>

  <path class="return" d="M1208 950 L1432 950" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <text class="label" x="1320" y="934" text-anchor="middle" fill="#4e3aa5">10. leader_aop_* samples feed dashboard panels</text>

  <text class="footer" x="800" y="1050" text-anchor="middle">Prometheus queries use rates for counters and max by(lock_name) for the JVM-local active gauge.</text>
</svg>
