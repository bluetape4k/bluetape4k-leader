<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc" data-source-read="examples/cache-warmer/README.md; examples/cache-warmer/src/main/kotlin/io/bluetape4k/leader/examples/warmer/CachePartitionWarmer.kt; examples/cache-warmer/src/main/kotlin/io/bluetape4k/leader/examples/warmer/CachePartitionWarmerDemo.kt; examples/cache-warmer/src/test/kotlin/io/bluetape4k/leader/examples/warmer/CachePartitionWarmerTest.kt">
<title id="title">Cache Warmer Per Partition Scenario</title>
<desc id="desc">Three warmer instances attempt three independent partition locks; every partition elects exactly one warmer.</desc>
<defs>
  <marker id="arrow-blue" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#3F73D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-green" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#2D8F64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-purple" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 2 L 10 6 L 1 10" fill="none" stroke="#755BC6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#B9C7D6" flood-opacity="0.24"/></filter>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:2.2;filter:url(#shadow)}
    .title{font-family:"Architects Daughter";font-size:40px;fill:#21334A}.subtitle,.small,.label,.footer{font-family:"Comic Mono";fill:#4B6075}.subtitle{font-size:15px}.small{font-size:12.5px}.label{font-size:14px}.footer{font-size:13px}
    .card{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.8;filter:url(#shadow)}.group{fill:#EAF2FF;stroke:#8EB2F0}.node{fill:#FFFFFF;stroke:#B8CCF4}.lock{fill:#EEF7F2;stroke:#8BC6A3}.cache{fill:#EEF8F8;stroke:#86C9C5}.result{fill:#FFF7E8;stroke:#E1B866}.warn{fill:#FFF1EA;stroke:#E8A47D}
    .cardTitle{font-family:"Architects Daughter";font-size:23px;fill:#21334A}.cardText{font-family:"Comic Mono";font-size:13px;fill:#4B6075}.route{fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:7 6}
  </style>
</defs>
<rect class="canvas" width="1280" height="760"/>
<rect class="frame" x="34" y="28" width="1212" height="704" rx="30"/>
<text class="title" x="72" y="84">Cache Warmer: One Winner Per Partition</text>
<text class="subtitle" x="76" y="116">Every partition gets its own lock name, so concurrent warmer nodes do not share ambiguous group slots.</text>

<rect class="card group" x="90" y="212" width="270" height="330" rx="20"/>
<text class="cardTitle" x="124" y="252">3 warmer instances</text>
<text class="cardText" x="124" y="278">same prefix + partitions</text>
<rect class="card node" x="124" y="314" width="202" height="54" rx="12"/>
<text class="cardTitle" x="152" y="348">node-1</text>
<rect class="card node" x="124" y="386" width="202" height="54" rx="12"/>
<text class="cardTitle" x="152" y="420">node-2</text>
<rect class="card node" x="124" y="458" width="202" height="54" rx="12"/>
<text class="cardTitle" x="152" y="492">node-3</text>

<rect class="card lock" x="500" y="176" width="300" height="94" rx="18"/>
<text class="cardTitle" x="534" y="212">region-asia lock</text>
<text class="cardText" x="534" y="238">warmer:product-cache</text>
<text class="cardText" x="534" y="256">-region-asia</text>
<rect class="card lock" x="500" y="326" width="300" height="94" rx="18"/>
<text class="cardTitle" x="534" y="362">region-eu lock</text>
<text class="cardText" x="534" y="388">warmer:product-cache</text>
<text class="cardText" x="534" y="406">-region-eu</text>
<rect class="card lock" x="500" y="476" width="300" height="94" rx="18"/>
<text class="cardTitle" x="534" y="512">region-us lock</text>
<text class="cardText" x="534" y="538">warmer:product-cache</text>
<text class="cardText" x="534" y="556">-region-us</text>

<rect class="card cache" x="930" y="176" width="254" height="94" rx="18"/>
<text class="cardTitle" x="964" y="212">Asia cache</text>
<text class="cardText" x="964" y="238">preload(region-asia)</text>
<rect class="card cache" x="930" y="326" width="254" height="94" rx="18"/>
<text class="cardTitle" x="964" y="362">EU cache</text>
<text class="cardText" x="964" y="388">preload(region-eu)</text>
<rect class="card cache" x="930" y="476" width="254" height="94" rx="18"/>
<text class="cardTitle" x="964" y="512">US cache</text>
<text class="cardText" x="964" y="538">preload(region-us)</text>

<path class="route" d="M 360 310 C 410 260 438 224 500 224" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 360 378 L 500 378" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 360 446 C 410 486 438 524 500 524" stroke="#3F73D8" marker-end="url(#arrow-blue)"/>
<path class="route" d="M 800 224 L 930 224" stroke="#2D8F64" marker-end="url(#arrow-green)"/>
<path class="route" d="M 800 374 L 930 374" stroke="#2D8F64" marker-end="url(#arrow-green)"/>
<path class="route" d="M 800 524 L 930 524" stroke="#2D8F64" marker-end="url(#arrow-green)"/>
<path class="route dash" d="M 650 570 L 650 624" stroke="#755BC6" marker-end="url(#arrow-purple)"/>

<rect class="card result" x="386" y="624" width="528" height="66" rx="16"/>
<text class="cardTitle" x="420" y="662">WarmResult</text>
<text class="cardText" x="584" y="650">each node records warmed / skipped / failed</text>
<text class="cardText" x="584" y="672">cluster total warmed equals partition count</text>

<rect class="card warn" x="948" y="624" width="236" height="66" rx="16"/>
<text class="cardTitle" x="982" y="662">No group slots</text>
<text class="cardText" x="982" y="682">lock names own mapping</text>

<text class="label" x="392" y="190">attempt each partition lock</text>
<text class="label" x="832" y="206">one owner</text>
<text class="label" x="832" y="356">one owner</text>
<text class="label" x="832" y="506">one owner</text>
<text class="footer" x="640" y="710" text-anchor="middle">bluetape4k-leader/examples/cache-warmer</text>
</svg>
