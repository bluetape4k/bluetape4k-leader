<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940" role="img" aria-labelledby="title desc" data-source-read="StrategicElectionDemo.kt; StrategicElectionDemoTest.kt">
  <title id="title">Strategic Election Sequence</title>
  <desc id="desc">Sequence for building candidates, scoring, electing node-b, executing node-b, skipping non-winners, and returning a report.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c65b55"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .actor-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .actor-sub, .label, .footer, .region-label { font-family: "Comic Mono"; }
      .subtitle, .actor-sub, .footer { fill: #526276; }
      .subtitle { font-size: 17px; }
      .actor-title { font-size: 22px; }
      .actor-sub { font-size: 12px; }
      .label { font-size: 13px; font-weight: 700; }
      .region-label { font-size: 13px; font-weight: 700; fill: #6c4cb8; }
      .footer { font-size: 14px; }
      .actor { fill: #ffffff; stroke: #cbd9e7; stroke-width: 2.2; rx: 14; }
      .life { stroke: #b7c7d9; stroke-width: 2.2; stroke-dasharray: 7 8; }
      .call { fill: none; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .return { stroke-dasharray: 8 7; }
      .alt { fill: rgba(155,122,236,0.08); stroke: #9b7aec; stroke-width: 2; rx: 12; }
      .divider { stroke: #9b7aec; stroke-width: 2; stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect class="canvas" width="1600" height="940"/>
  <rect class="frame" x="42" y="34" width="1516" height="860" rx="30"/>
  <text class="title" x="86" y="92">Strategic Election Sequence</text>
  <text class="subtitle" x="90" y="126">Candidates are registered and scored before local electors decide run or skip.</text>

  <g transform="translate(116 176)">
    <rect class="actor" width="186" height="76"/>
    <text class="actor-title" x="93" y="32" text-anchor="middle">Demo</text>
    <text class="actor-sub" x="93" y="56" text-anchor="middle">runScenario</text>
  </g>
  <g transform="translate(398 176)">
    <rect class="actor" width="198" height="76"/>
    <text class="actor-title" x="99" y="32" text-anchor="middle">Profiles</text>
    <text class="actor-sub" x="99" y="56" text-anchor="middle">CandidateInfo</text>
  </g>
  <g transform="translate(696 176)">
    <rect class="actor" width="210" height="76"/>
    <text class="actor-title" x="105" y="32" text-anchor="middle">Strategy</text>
    <text class="actor-sub" x="105" y="56" text-anchor="middle">WeightedScorer</text>
  </g>
  <g transform="translate(1012 176)">
    <rect class="actor" width="210" height="76"/>
    <text class="actor-title" x="105" y="32" text-anchor="middle">Electors</text>
    <text class="actor-sub" x="105" y="56" text-anchor="middle">node-a/b/c</text>
  </g>
  <g transform="translate(1310 176)">
    <rect class="actor" width="176" height="76"/>
    <text class="actor-title" x="88" y="32" text-anchor="middle">Report</text>
    <text class="actor-sub" x="88" y="56" text-anchor="middle">result</text>
  </g>

  <path class="life" d="M209 252 L209 806"/>
  <path class="life" d="M497 252 L497 806"/>
  <path class="life" d="M801 252 L801 806"/>
  <path class="life" d="M1117 252 L1117 806"/>
  <path class="life" d="M1398 252 L1398 806"/>

  <path class="call" d="M209 314 L497 314" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="label" x="353" y="298" text-anchor="middle" fill="#2f579f">1 toCandidateInfo()</text>
  <path class="call" d="M209 382 L1117 382" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="label" x="663" y="366" text-anchor="middle" fill="#2f579f">2 register candidates for service-maintenance</text>
  <path class="call" d="M209 450 L801 450" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="label" x="505" y="434" text-anchor="middle" fill="#2f579f">3 strategy.elect(candidates)</text>
  <path class="call return" d="M801 516 L209 516" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="label" x="505" y="500" text-anchor="middle" fill="#23785a">4 score map selects node-b</text>

  <rect class="alt" x="130" y="566" width="1260" height="166"/>
  <text class="region-label" x="158" y="594">for each local elector</text>
  <path class="divider" d="M130 646 L1390 646"/>
  <path class="call" d="M209 620 L1117 620" stroke="#319873" marker-end="url(#arrow-green)"/>
  <text class="label" x="663" y="604" text-anchor="middle" fill="#23785a">5 node-b runs selected body</text>
  <path class="call return" d="M1117 696 L209 696" stroke="#c65b55" marker-end="url(#arrow-red)"/>
  <text class="label" x="663" y="680" text-anchor="middle" fill="#9d3f3b">6 node-a and node-c return null / skipped</text>

  <path class="call" d="M209 772 L1398 772" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <text class="label" x="804" y="756" text-anchor="middle" fill="#2f579f">7 StrategicElectionReport(selected=node-b, selectedCount=1, skippedCount=2)</text>
  <text class="footer" x="800" y="850" text-anchor="middle">The tests pin the contract: exactly one SELECTED report and all non-winners are SKIPPED.</text>
</svg>
