<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc" data-source-read="examples/prometheus-dashboard/README.md; examples/prometheus-dashboard/src/main/kotlin/io/bluetape4k/leader/examples/prometheus/PrometheusDashboardApp.kt; examples/prometheus-dashboard/docker-compose.yml; examples/prometheus-dashboard/provisioning/prometheus/prometheus.yml">
  <title id="title">Prometheus Dashboard Scenario</title>
  <desc id="desc">Spring Boot schedules one proxied leader job, records leader AOP metrics, exposes Prometheus scrape data, and Grafana renders the provisioned dashboard.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#329a74"/></marker>
    <marker id="arrow-amber" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#cf8428"/></marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .card-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .card-sub, .label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .card-title { font-size: 27px; }
      .card-sub { font-size: 14px; }
      .label { font-size: 13px; }
      .footer { font-size: 14px; }
      .card { stroke-width: 2.4; rx: 18; }
      .band { stroke-width: 2.2; rx: 24; }
      .route { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="42" y="34" width="1416" height="820" rx="30"/>
  <text class="title" x="86" y="92">Prometheus Dashboard: Leader Metrics Become Panels</text>
  <text class="subtitle" x="90" y="126">A scheduled Spring job runs through the leader AOP proxy, records Micrometer meters, and feeds a local Prometheus/Grafana stack.</text>

  <rect class="band" x="88" y="178" width="818" height="468" fill="#eef5ff" stroke="#c4d5e8"/>
  <text class="card-sub" x="126" y="214">Spring Boot app :8080</text>

  <rect class="card" x="132" y="260" width="250" height="104" fill="#ffffff" stroke="#6d9df0"/>
  <text class="card-title" x="257" y="302" text-anchor="middle">@Scheduled trigger</text>
  <text class="card-sub" x="257" y="328" text-anchor="middle">fixed delay 5s</text>

  <rect class="card" x="492" y="240" width="330" height="144" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="card-title" x="657" y="286" text-anchor="middle">proxied leader job</text>
  <text class="card-sub" x="657" y="316" text-anchor="middle">@LeaderElection dashboard-job</text>
  <text class="card-sub" x="657" y="340" text-anchor="middle">wait 1s, lease 30s</text>

  <rect class="card" x="492" y="458" width="330" height="126" fill="#edf9f4" stroke="#63b891"/>
  <text class="card-title" x="657" y="506" text-anchor="middle">leader_aop_* meters</text>
  <text class="card-sub" x="657" y="534" text-anchor="middle">attempts, acquired, active</text>
  <text class="card-sub" x="657" y="558" text-anchor="middle">duration and skip reasons</text>

  <rect class="card" x="984" y="228" width="272" height="112" fill="#fff4de" stroke="#d59c3f"/>
  <text class="card-title" x="1120" y="272" text-anchor="middle">Redis lock</text>
  <text class="card-sub" x="1120" y="302" text-anchor="middle">Lettuce backend</text>

  <rect class="card" x="984" y="420" width="272" height="104" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="card-title" x="1120" y="462" text-anchor="middle">Prometheus</text>
  <text class="card-sub" x="1120" y="490" text-anchor="middle">scrapes /actuator/prometheus</text>

  <rect class="card" x="984" y="592" width="272" height="104" fill="#fff0f5" stroke="#de7f9e"/>
  <text class="card-title" x="1120" y="634" text-anchor="middle">Grafana</text>
  <text class="card-sub" x="1120" y="662" text-anchor="middle">provisioned leader panels</text>

  <path class="route" d="M382 312 L492 312" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <rect class="pill" x="408" y="282" width="58" height="26"/>
  <text class="label" x="437" y="300" text-anchor="middle">calls</text>

  <path class="route" d="M822 284 L984 284" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="876" y="254" width="58" height="26"/>
  <text class="label" x="905" y="272" text-anchor="middle">locks</text>

  <path class="route" d="M657 384 L657 458" stroke="#329a74" marker-end="url(#arrow-green)"/>
  <rect class="pill" x="678" y="406" width="74" height="26"/>
  <text class="label" x="715" y="424" text-anchor="middle">records</text>

  <path class="route" d="M822 520 L984 472" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <rect class="pill" x="860" y="470" width="86" height="26"/>
  <text class="label" x="903" y="488" text-anchor="middle">exposes</text>

  <path class="route" d="M1120 524 L1120 592" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <rect class="pill" x="1140" y="548" width="82" height="26"/>
  <text class="label" x="1181" y="566" text-anchor="middle">queries</text>

  <rect class="card" x="214" y="704" width="1072" height="58" fill="#f8fbff" stroke="#d2deeb"/>
  <text class="card-sub" x="750" y="740" text-anchor="middle">The dashboard is useful immediately because ApplicationReadyEvent pre-registers dashboard-job meter series.</text>

  <text class="footer" x="750" y="826" text-anchor="middle">Use max by(lock_name) for leader_aop_active in multi-instance deployments; the gauge is JVM-local.</text>
</svg>
