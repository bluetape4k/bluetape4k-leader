<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="780" viewBox="0 0 1180 780" role="img" aria-labelledby="title desc">
  <title id="title">Redisson Group Lock Flow - minLeaseTime via updateLeaseTime</title>
  <desc id="desc">Sequence diagram showing how minLeaseTime extends a Redisson permit TTL without caller-side parking.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#64748b" flood-opacity="0.13"/>
    </filter>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb" stroke="#2563eb" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#9333ea" stroke="#9333ea" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#16a34a" stroke="#16a34a" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker viewBox="0 0 10 10" markerUnits="userSpaceOnUse" id="arrowAmber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#d97706" stroke="#d97706" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
  </defs>
  <style>
    text { font-family: "Comic Mono"; fill: #243041; }
    .title { font-family: "Architects Daughter"; font-size: 31px; fill: #172033; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .participant { font-family: "Architects Daughter"; font-size: 16px; fill: #172033; }
    .label { font-size: 12px; fill: #334155; }
    .num { font-size: 11px; fill: #ffffff; font-weight: 700; }
    .small { font-size: 10px; fill: #64748b; }
    .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; filter: url(#shadow); }
    .header { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.3; }
    .life { stroke: #94a3b8; stroke-width: 1.2; stroke-dasharray: 7 7; }
    .blue { stroke: #2563eb; stroke-width: 1.7; marker-end: url(#arrowBlue); }
    .purple { stroke: #9333ea; stroke-width: 1.7; marker-end: url(#arrowPurple); }
    .green { stroke: #16a34a; stroke-width: 1.7; marker-end: url(#arrowGreen); }
    .amber { stroke: #d97706; stroke-width: 1.7; marker-end: url(#arrowAmber); }
    .ret { stroke-dasharray: 6 5; }
    .badgeBlue { fill: #2563eb; }
    .badgePurple { fill: #9333ea; }
    .badgeGreen { fill: #16a34a; }
    .badgeAmber { fill: #d97706; }
    .pill { fill: #ffffff; stroke: #dbe4f0; stroke-width: 1; }
    .alt { fill: none; stroke: #94a3b8; stroke-width: 1.4; stroke-dasharray: 8 6; }
    .altLabel { fill: #f8fafc; stroke: #cbd5e1; }
    .footer { font-size: 11px; fill: #64748b; }
  </style>
  <rect width="1180" height="780" fill="#f6f8fb"/>
  <rect class="frame" x="34" y="30" width="1112" height="710" rx="18"/>
  <text class="title" x="590" y="76" text-anchor="middle">minLeaseTime via updateLeaseTime</text>
  <text class="subtitle" x="590" y="103" text-anchor="middle">The action returns immediately; Redisson keeps the permit alive for the remaining minimum lease.</text>

  <g transform="translate(72 134)">
    <rect class="header" x="0" y="0" width="142" height="62" rx="9"/>
    <text class="participant" x="71" y="37" text-anchor="middle">Caller</text>
  </g>
  <g transform="translate(278 134)">
    <rect class="header" x="0" y="0" width="204" height="62" rx="9"/>
    <text class="participant" x="102" y="30" text-anchor="middle">RedissonLeader</text>
    <text class="participant" x="102" y="48" text-anchor="middle">GroupElector</text>
  </g>
  <g transform="translate(548 134)">
    <rect class="header" x="0" y="0" width="168" height="62" rx="9"/>
    <text class="participant" x="84" y="30" text-anchor="middle">MinLeaseTime</text>
    <text class="small" x="84" y="48" text-anchor="middle">remainingMinLeaseTime</text>
  </g>
  <g transform="translate(778 134)">
    <rect class="header" x="0" y="0" width="230" height="62" rx="9"/>
    <text class="participant" x="115" y="30" text-anchor="middle">RPermitExpirableSemaphore</text>
    <text class="small" x="115" y="48" text-anchor="middle">permitId TTL</text>
  </g>

  <line class="life" x1="143" y1="196" x2="143" y2="658"/>
  <line class="life" x1="380" y1="196" x2="380" y2="658"/>
  <line class="life" x1="632" y1="196" x2="632" y2="658"/>
  <line class="life" x1="893" y1="196" x2="893" y2="658"/>

  <line class="blue" x1="143" y1="250" x2="374" y2="250"/>
  <rect class="pill" x="190" y="226" width="144" height="28" rx="14"/>
  <circle class="badgeBlue" cx="206" cy="240" r="11"/><text class="num" x="206" y="244" text-anchor="middle">1</text>
  <text class="label" x="226" y="244">runIfLeader()</text>

  <line class="blue" x1="380" y1="306" x2="887" y2="306"/>
  <rect class="pill" x="556" y="282" width="158" height="28" rx="14"/>
  <circle class="badgeBlue" cx="572" cy="296" r="11"/><text class="num" x="572" y="300" text-anchor="middle">2</text>
  <text class="label" x="592" y="300">tryAcquire(lease)</text>

  <line class="green ret" x1="893" y1="352" x2="386" y2="352"/>
  <rect class="pill" x="592" y="328" width="112" height="28" rx="14"/>
  <circle class="badgeGreen" cx="608" cy="342" r="11"/><text class="num" x="608" y="346" text-anchor="middle">3</text>
  <text class="label" x="628" y="346">permitId</text>

  <line class="purple" x1="380" y1="404" x2="632" y2="404"/>
  <rect class="pill" x="436" y="380" width="142" height="28" rx="14"/>
  <circle class="badgePurple" cx="452" cy="394" r="11"/><text class="num" x="452" y="398" text-anchor="middle">4</text>
  <text class="label" x="472" y="398">capture start time</text>

  <line class="blue" x1="380" y1="456" x2="143" y2="456"/>
  <rect class="pill" x="206" y="432" width="118" height="28" rx="14"/>
  <circle class="badgeBlue" cx="222" cy="446" r="11"/><text class="num" x="222" y="450" text-anchor="middle">5</text>
  <text class="label" x="242" y="450">action done</text>

  <rect class="alt" x="82" y="492" width="1016" height="142" rx="10"/>
  <rect class="altLabel" x="100" y="479" width="244" height="28" rx="6"/>
  <text class="small" x="222" y="498" text-anchor="middle">if remaining minLeaseTime &gt; 0</text>

  <line class="purple" x1="380" y1="540" x2="626" y2="540"/>
  <rect class="pill" x="430" y="516" width="156" height="28" rx="14"/>
  <circle class="badgePurple" cx="446" cy="530" r="11"/><text class="num" x="446" y="534" text-anchor="middle">6</text>
  <text class="label" x="466" y="534">remainingMs &gt; 0</text>

  <line class="amber" x1="380" y1="594" x2="887" y2="594"/>
  <rect class="pill" x="534" y="570" width="230" height="28" rx="14"/>
  <circle class="badgeAmber" cx="550" cy="584" r="11"/><text class="num" x="550" y="588" text-anchor="middle">7</text>
  <text class="label" x="570" y="588">updateLeaseTime(permitId, remainingMs)</text>

  <line class="green ret" x1="893" y1="642" x2="386" y2="642"/>
  <rect class="pill" x="548" y="618" width="198" height="28" rx="14"/>
  <circle class="badgeGreen" cx="564" cy="632" r="11"/><text class="num" x="564" y="636" text-anchor="middle">8</text>
  <text class="label" x="584" y="636">slot retained until TTL expiry</text>

  <rect fill="#f8fafc" stroke="#dbe4f0" x="84" y="686" width="1012" height="34" rx="10"/>
  <text class="footer" x="590" y="708" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader / leader-redis-redisson</text>
</svg>
