<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940" role="img" aria-labelledby="title desc" data-source-read="examples/redisson-watchdog/README.md; RedissonWatchdogJobRunner.kt; RedissonWatchdogDemo.kt; RedissonWatchdogJobRunnerTest.kt">
  <title id="title">Redisson Watchdog Architecture</title>
  <desc id="desc">Static component map for the Redisson watchdog example: demo runners, job runner facade, Redisson leader elector, RLock state, auto extension, and observable reports.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#319873"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#cf8428"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7e62d9"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .node-title { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .node-sub, .label, .footer, .tag { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .node-title { font-size: 23px; }
      .node-sub { font-size: 13px; }
      .label { font-size: 13px; font-weight: 700; }
      .tag { font-size: 12px; font-weight: 700; }
      .footer { font-size: 14px; }
      .group { fill: #edf4fd; stroke: #cbd9e7; stroke-width: 2.4; }
      .group2 { fill: #fff7e8; stroke: #e3c178; stroke-width: 2.4; }
      .node { stroke-width: 2.4; rx: 16; }
      .route { fill: none; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>
  <rect class="canvas" width="1500" height="940"/>
  <rect class="frame" x="42" y="34" width="1416" height="860" rx="30"/>
  <text class="title" x="86" y="92">Redisson Watchdog Architecture</text>
  <text class="subtitle" x="90" y="126">The example wraps RedissonLeaderElector with auto-extension options and reports elected or skipped node outcomes.</text>

  <rect class="group" x="92" y="184" width="650" height="566" rx="22"/>
  <text class="tag" x="126" y="220">application process</text>

  <rect class="node" x="134" y="274" width="236" height="94" fill="#eaf2ff" stroke="#6d9df0"/>
  <text class="node-title" x="252" y="304" text-anchor="middle">Watchdog Demo</text>
  <text class="node-sub" x="252" y="332" text-anchor="middle">starts node-1</text>
  <text class="node-sub" x="252" y="354" text-anchor="middle">and node-2</text>

  <rect class="node" x="468" y="250" width="236" height="116" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="586" y="292" text-anchor="middle">JobRunner</text>
  <text class="node-sub" x="586" y="320" text-anchor="middle">runJob { body }</text>
  <text class="node-sub" x="586" y="344" text-anchor="middle">returns node report</text>

  <rect class="node" x="468" y="466" width="236" height="116" fill="#f0ecff" stroke="#9b7aec"/>
  <text class="node-title" x="586" y="508" text-anchor="middle">watchdogOptions</text>
  <text class="node-sub" x="586" y="536" text-anchor="middle">waitTime + leaseTime</text>
  <text class="node-sub" x="586" y="560" text-anchor="middle">autoExtend = true</text>

  <rect class="node" x="134" y="594" width="236" height="94" fill="#f8fbff" stroke="#cbd9e7"/>
  <text class="node-title" x="252" y="630" text-anchor="middle">NodeReport</text>
  <text class="node-sub" x="252" y="658" text-anchor="middle">ELECTED or SKIPPED</text>

  <rect class="group2" x="842" y="184" width="558" height="566" rx="22"/>
  <text class="tag" x="876" y="220">Redisson backend</text>

  <rect class="node" x="892" y="250" width="240" height="116" fill="#fff4de" stroke="#d59c3f"/>
  <text class="node-title" x="1012" y="292" text-anchor="middle">RedissonLeaderElector</text>
  <text class="node-sub" x="1012" y="320" text-anchor="middle">runIfLeader(lockName)</text>
  <text class="node-sub" x="1012" y="344" text-anchor="middle">bounded wait</text>

  <rect class="node" x="1128" y="466" width="222" height="116" fill="#fff9ea" stroke="#d59c3f"/>
  <text class="node-title" x="1239" y="508" text-anchor="middle">RLock storage</text>
  <text class="node-sub" x="1239" y="536" text-anchor="middle">owner token</text>
  <text class="node-sub" x="1239" y="560" text-anchor="middle">release or expire</text>

  <rect class="node" x="892" y="594" width="240" height="94" fill="#edf9f4" stroke="#63b891"/>
  <text class="node-title" x="1012" y="630" text-anchor="middle">long job body</text>
  <text class="node-sub" x="1012" y="658" text-anchor="middle">runs only while leader</text>

  <path class="route" d="M370 320 L468 310" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>
  <path class="route" d="M586 366 L586 466" stroke="#7e62d9" marker-end="url(#arrow-purple)"/>
  <path class="route" d="M704 308 L892 308" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <rect class="pill" x="756" y="276" width="88" height="26"/>
  <text class="label" x="800" y="294" text-anchor="middle">runIfLeader</text>
  <path class="route" d="M1012 366 L1012 428 L1239 428 L1239 466" stroke="#cf8428" marker-end="url(#arrow-amber)"/>
  <path class="route" d="M960 366 L960 594" stroke="#319873" marker-end="url(#arrow-green)"/>
  <path class="route" d="M468 342 L416 342 L416 640 L370 640" stroke="#4f77c9" marker-end="url(#arrow-blue)"/>

  <text class="footer" x="750" y="852" text-anchor="middle">The Redisson lock owns exclusion; auto-extension keeps the lease alive only while the elected body is running.</text>
</svg>
