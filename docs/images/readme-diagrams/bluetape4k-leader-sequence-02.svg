<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">How runIfLeader Works</title>
  <desc id="desc">Source model from README.md How runIfLeader Works and leader-core LeaderElector/SuspendLeaderElector contracts. Reader question: what happens when multiple nodes call runIfLeader concurrently?</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4f77c9"/></marker>
    <marker id="arrow-green" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#329a74"/></marker>
    <marker id="arrow-amber" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#cf8428"/></marker>
    <marker id="arrow-pink" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#d65d7f"/></marker>
    <style>
      .canvas { fill: #f6f9fc; }
      .frame { fill: #ffffff; stroke: #c4d5e8; stroke-width: 3; }
      .title, .participant-text { font-family: "Architects Daughter"; fill: #263a57; }
      .title { font-size: 44px; }
      .subtitle, .label, .footer { font-family: "Comic Mono"; fill: #526276; }
      .subtitle { font-size: 17px; }
      .label { font-size: 13px; }
      .footer { font-size: 14px; }
      .participant { stroke-width: 2.4; rx: 12; }
      .lifeline { stroke: #9aacc2; stroke-width: 2; stroke-dasharray: 8 10; }
      .activation { fill: #f3eeff; stroke: #8a65d8; stroke-width: 2; rx: 7; }
      .call { fill: none; stroke: #4f77c9; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow-blue); }
      .success { fill: none; stroke: #329a74; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow-green); }
      .release { fill: none; stroke: #cf8428; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow-amber); }
      .skip { fill: none; stroke: #d65d7f; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow-pink); }
      .return { fill: none; stroke: #329a74; stroke-width: 2.6; stroke-linecap: round; stroke-dasharray: 9 8; marker-end: url(#arrow-green); }
      .skip-return { fill: none; stroke: #d65d7f; stroke-width: 2.6; stroke-linecap: round; stroke-dasharray: 9 8; marker-end: url(#arrow-pink); }
      .pill { fill: #ffffff; stroke: #cbd9e7; stroke-width: 1.5; rx: 10; }
      .num { font-family: "Comic Mono"; font-size: 12px; fill: #ffffff; }
      .alt { fill: none; stroke: #d65d7f; stroke-width: 2; stroke-dasharray: 9 8; rx: 18; }
      .alt-label { fill: #fff5f8; stroke: #d65d7f; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="900"/>
  <rect class="frame" x="42" y="34" width="1416" height="820" rx="30"/>
  <text class="title" x="86" y="92">How runIfLeader Works</text>
  <text class="subtitle" x="90" y="126">Only the elected caller runs the action. Contenders receive null or LeaderRunResult.Skipped without a normal contention exception.</text>

  <g id="participants">
    <rect class="participant" x="126" y="176" width="188" height="70" fill="#eaf2ff" stroke="#6d9df0"/>
    <text class="participant-text" x="220" y="218" text-anchor="middle" font-size="24">Node A</text>
    <rect class="participant" x="430" y="176" width="220" height="70" fill="#f1eaff" stroke="#9b7aec"/>
    <text class="participant-text" x="540" y="218" text-anchor="middle" font-size="24">LeaderElector</text>
    <rect class="participant" x="766" y="176" width="226" height="70" fill="#fff4de" stroke="#d59c3f"/>
    <text class="participant-text" x="879" y="218" text-anchor="middle" font-size="24">Backend lock</text>
    <rect class="participant" x="1100" y="176" width="180" height="70" fill="#edf9f4" stroke="#63b891"/>
    <text class="participant-text" x="1190" y="218" text-anchor="middle" font-size="24">Action</text>
    <rect class="participant" x="1300" y="176" width="110" height="70" fill="#fff0f5" stroke="#de7f9e"/>
    <text class="participant-text" x="1355" y="218" text-anchor="middle" font-size="24">Node B</text>
  </g>

  <line class="lifeline" x1="220" y1="246" x2="220" y2="736"/>
  <line class="lifeline" x1="540" y1="246" x2="540" y2="736"/>
  <line class="lifeline" x1="879" y1="246" x2="879" y2="736"/>
  <line class="lifeline" x1="1190" y1="246" x2="1190" y2="736"/>
  <line class="lifeline" x1="1355" y1="246" x2="1355" y2="736"/>
  <rect class="activation" x="532" y="314" width="16" height="340"/>
  <rect class="activation" x="871" y="362" width="16" height="220"/>
  <rect class="activation" x="1182" y="486" width="16" height="90"/>

  <path class="call" d="M220 318 L540 318"/>
  <rect class="pill" x="302" y="286" width="210" height="28"/>
  <circle cx="318" cy="300" r="13" fill="#4f77c9"/><text class="num" x="318" y="304" text-anchor="middle">1</text>
  <text class="label" x="408" y="305" text-anchor="middle">runIfLeader(lock)</text>

  <path class="call" d="M540 388 L879 388"/>
  <rect class="pill" x="620" y="356" width="190" height="28"/>
  <circle cx="636" cy="370" r="13" fill="#4f77c9"/><text class="num" x="636" y="374" text-anchor="middle">2</text>
  <text class="label" x="718" y="375" text-anchor="middle">try acquire</text>

  <path class="success" d="M879 440 L540 440"/>
  <rect class="pill" x="642" y="408" width="152" height="28"/>
  <circle cx="658" cy="422" r="13" fill="#329a74"/><text class="num" x="658" y="426" text-anchor="middle">3</text>
  <text class="label" x="724" y="427" text-anchor="middle">lock granted</text>

  <rect class="alt" x="104" y="464" width="1314" height="210"/>
  <rect class="alt-label" x="126" y="448" width="168" height="28"/>
  <text class="label" x="210" y="467" text-anchor="middle">elected branch</text>

  <path class="success" d="M540 512 L1190 512"/>
  <rect class="pill" x="760" y="480" width="208" height="28"/>
  <circle cx="776" cy="494" r="13" fill="#329a74"/><text class="num" x="776" y="498" text-anchor="middle">4</text>
  <text class="label" x="870" y="499" text-anchor="middle">execute action()</text>
  <path class="return" d="M1190 568 L540 568"/>
  <rect class="pill" x="766" y="536" width="198" height="28"/>
  <circle cx="782" cy="550" r="13" fill="#329a74"/><text class="num" x="782" y="554" text-anchor="middle">5</text>
  <text class="label" x="876" y="555" text-anchor="middle">action result</text>

  <path class="release" d="M540 638 L879 638"/>
  <rect class="pill" x="622" y="606" width="190" height="28"/>
  <circle cx="638" cy="620" r="13" fill="#cf8428"/><text class="num" x="638" y="624" text-anchor="middle">6</text>
  <text class="label" x="720" y="625" text-anchor="middle">release lock</text>

  <path class="return" d="M540 700 L220 700"/>
  <rect class="pill" x="288" y="668" width="182" height="28"/>
  <circle cx="304" cy="682" r="13" fill="#329a74"/><text class="num" x="304" y="686" text-anchor="middle">7</text>
  <text class="label" x="384" y="687" text-anchor="middle">return value</text>

  <path class="skip" d="M1355 344 L879 344"/>
  <rect class="pill" x="1070" y="312" width="186" height="28"/>
  <circle cx="1086" cy="326" r="13" fill="#d65d7f"/><text class="num" x="1086" y="330" text-anchor="middle">8</text>
  <text class="label" x="1170" y="331" text-anchor="middle">competing call</text>
  <path class="skip-return" d="M879 404 L1355 404"/>
  <rect class="pill" x="1060" y="372" width="210" height="28"/>
  <circle cx="1076" cy="386" r="13" fill="#d65d7f"/><text class="num" x="1076" y="390" text-anchor="middle">9</text>
  <text class="label" x="1166" y="391" text-anchor="middle">null / Skipped</text>

  <rect x="164" y="776" width="1172" height="42" rx="14" fill="#f8fbff" stroke="#d2deeb" stroke-width="1.6"/>
  <text class="footer" x="750" y="802" text-anchor="middle">Action exceptions propagate, cancellation is not wrapped, and contention is represented as skip/null. github.com/bluetape4k/bluetape4k-leader</text>
</svg>
