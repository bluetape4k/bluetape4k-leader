  <g>
    <rect class="header" x="405" y="160" width="270" height="70" rx="10"/>
    <text class="participant-title" x="540.0" y="191" text-anchor="middle">LeaderElector</text>
    <text class="participant-sub" x="540.0" y="215" text-anchor="middle">single leader</text>
  </g>
  <g>
    <rect class="header" x="730" y="160" width="240" height="70" rx="10"/>
    <text class="participant-title" x="850.0" y="191" text-anchor="middle">Backend Lock</text>
