  <rect class="frame" x="24" y="24" width="1552" height="1072" rx="20"/>
  <text class="title" x="800" y="78" text-anchor="middle">How runIfLeader Works</text>
  <text class="subtitle" x="800" y="112" text-anchor="middle">Only the elected caller runs the action; contenders receive null or LeaderRunResult.Skipped.</text>

