  <g>
    <rect class="label" x="551.0" y="330.0" width="250" height="34" rx="17" stroke="#a87332" fill="#ffffff"/>
    <circle cx="688.0" cy="347.0" r="13" fill="#fbfcf8" stroke="#a87332" stroke-width="1.8"/>
