      .activation { fill: #f3ecdf; stroke: #8f784e; stroke-width: 1.5; }
      .callBlue, .callGreen, .callAmber, .callRed, .callPurple { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .callBlue { stroke: #2f7fa7; marker-end: url(#arrow-blue); }
      .callGreen { stroke: #5b8f43; marker-end: url(#arrow-green); }
      .callAmber { stroke: #a87332; marker-end: url(#arrow-amber); }
      .callRed { stroke: #b86868; marker-end: url(#arrow-red); }
      .callPurple { stroke: #8b5fb3; marker-end: url(#arrow-purple); }
      .retBlue, .retGreen, .retAmber, .retRed, .retPurple { fill: none; stroke-width: 2.5; stroke-dasharray: 8 6; stroke-linecap: round; stroke-linejoin: round; }
      .retBlue { stroke: #2f7fa7; marker-end: url(#arrow-blue); }
      .retGreen { stroke: #5b8f43; marker-end: url(#arrow-green); }
      .retAmber { stroke: #a87332; marker-end: url(#arrow-amber); }
      .retRed { stroke: #b86868; marker-end: url(#arrow-red); }
      .retPurple { stroke: #8b5fb3; marker-end: url(#arrow-purple); }
      .branch { fill: none; stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 7; stroke-linecap: round; stroke-linejoin: round; }
      .branchDivider { stroke: #78909c; stroke-width: 3; stroke-dasharray: 12 8; stroke-linecap: round; }
      .label { fill: #ffffff; stroke-width: 1.5; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; fill: #36464f; }
