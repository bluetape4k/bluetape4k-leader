<svg xmlns="http://www.w3.org/2000/svg" width="1910" height="1578" viewBox="0 0 1910 1578" role="img" aria-labelledby="title desc" data-intent="Answer a reader's runtime question: what exactly happens when application code calls runIfLeader, where does contention skip execution, and which messages prove acquire, body execution, release, and result semantics?" data-evidence="README feature sections, settings module registration, SuspendLeaderElector contract, SuspendLeaderGroupElector contract" data-source-read="README.md; settings.gradle.kts; leader-core/src/main/kotlin/io/bluetape4k/leader/coroutines/SuspendLeaderElector.kt; leader-core/src/main/kotlin/io/bluetape4k/leader/coroutines/SuspendLeaderGroupElector.kt">
