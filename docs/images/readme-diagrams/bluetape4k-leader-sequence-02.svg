<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">How runIfLeader Works</title>
  <desc id="desc">Source model from README.md and leader-core LeaderElector/SuspendLeaderElector contracts.</desc>
  <defs>
