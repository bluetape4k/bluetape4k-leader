<svg xmlns="http://www.w3.org/2000/svg" width="1706" height="1032" viewBox="0 0 1706 1032" role="img" aria-labelledby="title desc" data-intent="Answer a Consul backend reader's question: how do bluetape4k single-leader and group electors turn core runIfLeader calls into Consul Session creation, KV acquire and release operations, TTL renewal, stable single and group key namespaces, and caller-owned endpoint or agent lifecycle boundaries?" data-evidence="leader-consul README behavior/contract; ConsulLeaderElector; ConsulLeaderGroupElector; ConsulSuspendLeaderElector; ConsulSuspendLeaderGroupElector; JavaHttpConsulLockClient; ConsulLeaderPaths; ConsulSessionTtl" data-source-read="leader-consul/README.md; leader-consul/src/main/kotlin/io/bluetape4k/leader/consul/ConsulLeaderElector.kt; leader-consul/src/main/kotlin/io/bluetape4k/leader/consul/ConsulLeaderGroupElector.kt; leader-consul/src/main/kotlin/io/bluetape4k/leader/consul/ConsulSuspendLeaderElector.kt; leader-consul/src/main/kotlin/io/bluetape4k/leader/consul/ConsulSuspendLeaderGroupElector.kt; leader-consul/src/main/kotlin/io/bluetape4k/leader/consul/internal/JavaHttpConsulLockClient.kt; leader-consul/src/main/kotlin/io/bluetape4k/leader/consul/internal/ConsulLeaderPaths.kt; leader-consul/src/main/kotlin/io/bluetape4k/leader/consul/internal/ConsulSessionTtl.kt">
  <title id="title">Consul Leader Session Architecture</title>
