<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="900" viewBox="0 0 1320 900" role="img" aria-labelledby="title desc">
  <title id="title">leader-consul component architecture</title>
  <desc id="desc">Component architecture for the Consul leader backend showing caller-owned endpoint configuration, public elector surfaces, internal HTTP lock client, Consul Session API, and Consul KV ownership keys.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-18%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <style>
      .canvas { fill: #f8fafc; }
      .title { font-family: "Architects Daughter", "Comic Mono", "Comic Sans MS", cursive; font-size: 34px; fill: #0f172a; font-weight: 700; }
      .subtitle { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 15px; fill: #475569; }
      .zone-title { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 14px; fill: #334155; font-weight: 700; }
      .card-title { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 15px; fill: #0f172a; font-weight: 700; }
      .card-sub { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 11.5px; fill: #475569; }
      .small { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 11px; fill: #475569; }
      .footer { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 11px; fill: #475569; }
      .tag { font-family: "Comic Mono", "Architects Daughter", monospace; font-size: 10.5px; font-weight: 700; }
      .process { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .caller-zone { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; rx: 18; }
      .module-zone { fill: #fffaf0; stroke: #f59e0b; stroke-width: 1.5; rx: 18; }
      .consul-zone { fill: #ecfdf5; stroke: #34d399; stroke-width: 1.5; rx: 18; }
      .card { stroke-width: 1.8; rx: 14; filter: url(#shadow); }
      .caller { fill: #dbeafe; stroke: #2563eb; }
      .elector { fill: #fef3c7; stroke: #d97706; }
      .options { fill: #eef2ff; stroke: #4f46e5; }
      .client { fill: #fce7f3; stroke: #db2777; }
      .session { fill: #dcfce7; stroke: #16a34a; }
      .kv { fill: #d1fae5; stroke: #059669; }
      .solid-link { fill: none; stroke: #64748b; stroke-width: 2; stroke-linecap: round; }
      .ownership { fill: none; stroke: #2563eb; stroke-width: 2; stroke-linecap: round; }
      .dependency { fill: none; stroke: #7c3aed; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 8 6; }
      .backend { fill: none; stroke: #059669; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 5 5; }
      .port { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.4; }
    </style>
  </defs>

  <rect class="canvas" width="1320" height="900"/>
  <text class="title" x="660" y="68" text-anchor="middle">leader-consul Component Architecture</text>
  <text class="subtitle" x="660" y="96" text-anchor="middle">The module owns Consul Session/KV lock mechanics; endpoint, ACL token, datacenter, and agent lifecycle stay caller-owned.</text>

  <rect class="process" x="70" y="136" width="1180" height="590"/>
  <text class="zone-title" x="100" y="166">Application process</text>

  <rect class="caller-zone" x="120" y="206" width="318" height="388"/>
  <text class="zone-title" x="148" y="236">Caller-owned surface</text>
  <rect class="card caller" x="156" y="278" width="246" height="80"/>
  <text class="card-title" x="279" y="307" text-anchor="middle">Application code</text>
  <text class="card-sub" x="279" y="331" text-anchor="middle">runIfLeader / group slot work</text>
  <rect class="card caller" x="156" y="398" width="246" height="104"/>
  <text class="card-title" x="279" y="427" text-anchor="middle">ConsulEndpoint</text>
  <text class="card-sub" x="279" y="451" text-anchor="middle">baseUrl, datacenter, ACL token</text>
  <text class="card-sub" x="279" y="473" text-anchor="middle">requestTimeout</text>

  <rect class="module-zone" x="484" y="206" width="360" height="460"/>
  <text class="zone-title" x="512" y="236">leader-consul module</text>
  <rect class="card elector" x="522" y="278" width="284" height="116"/>
  <text class="card-title" x="664" y="306" text-anchor="middle">Elector surfaces</text>
  <text class="card-sub" x="664" y="330" text-anchor="middle">blocking + CompletableFuture</text>
  <text class="card-sub" x="664" y="351" text-anchor="middle">coroutine suspend</text>
  <text class="card-sub" x="664" y="372" text-anchor="middle">single leader + group slots</text>
  <rect class="card options" x="522" y="430" width="284" height="86"/>
  <text class="card-title" x="664" y="458" text-anchor="middle">Election options</text>
  <text class="card-sub" x="664" y="482" text-anchor="middle">TTL 10s..86400s, waitTime</text>
  <text class="card-sub" x="664" y="502" text-anchor="middle">keyPrefix, session prefix, lockDelay</text>
  <rect class="card client" x="522" y="552" width="284" height="82"/>
  <text class="card-title" x="664" y="581" text-anchor="middle">JavaHttpConsulLockClient</text>
  <text class="card-sub" x="664" y="605" text-anchor="middle">narrow Session + KV HTTP boundary</text>

  <rect class="consul-zone" x="910" y="206" width="290" height="460"/>
  <text class="zone-title" x="938" y="236">Consul agent APIs</text>
  <rect class="card session" x="948" y="288" width="214" height="102"/>
  <text class="card-title" x="1055" y="317" text-anchor="middle">Session API</text>
  <text class="card-sub" x="1055" y="341" text-anchor="middle">create / renew / destroy</text>
  <text class="card-sub" x="1055" y="362" text-anchor="middle">Behavior=release</text>
  <rect class="card kv" x="948" y="452" width="214" height="128"/>
  <text class="card-title" x="1055" y="481" text-anchor="middle">KV ownership keys</text>
  <text class="card-sub" x="1055" y="505" text-anchor="middle">single/{encodedLockName}</text>
  <text class="card-sub" x="1055" y="526" text-anchor="middle">group/{encoded}/slot-N</text>
  <text class="small" x="1055" y="552" text-anchor="middle">payload records token + lease window</text>

  <!-- Static relationships: boundaries first, not runtime flow. -->
  <path class="ownership" d="M 402 318 L 522 318"/>
  <circle class="port" cx="402" cy="318" r="5"/>
  <circle class="port" cx="522" cy="318" r="5"/>
  <path class="ownership" d="M 402 450 L 462 450 L 462 593 L 522 593"/>
  <circle class="port" cx="402" cy="450" r="5"/>
  <circle class="port" cx="522" cy="593" r="5"/>

  <path class="solid-link" d="M 664 394 L 664 430"/>
  <path class="solid-link" d="M 664 516 L 664 552"/>

  <path class="backend" d="M 806 593 L 872 593 L 872 339 L 948 339"/>
  <path class="backend" d="M 872 593 L 872 516 L 948 516"/>
  <circle class="port" cx="806" cy="593" r="5"/>
  <circle class="port" cx="948" cy="339" r="5"/>
  <circle class="port" cx="948" cy="516" r="5"/>

  <path class="dependency" d="M 1055 390 L 1055 452"/>
  <circle class="port" cx="1055" cy="390" r="5"/>
  <circle class="port" cx="1055" cy="452" r="5"/>

  <g transform="translate(128 748)">
    <rect x="0" y="0" width="1064" height="82" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="tag" x="34" y="28" fill="#1d4ed8">Owned by caller</text>
    <line x1="150" y1="24" x2="204" y2="24" class="ownership"/>
    <text class="small" x="226" y="28">application code and ConsulEndpoint configuration</text>
    <text class="tag" x="34" y="56" fill="#047857">Backend boundary</text>
    <line x1="150" y1="52" x2="204" y2="52" class="backend"/>
    <text class="small" x="226" y="56">internal HTTP client wraps Consul Session and KV APIs</text>
    <text class="footer" x="812" y="56" text-anchor="middle">github.com/bluetape4k/bluetape4k-leader / leader-consul</text>
  </g>
</svg>
