<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="1496" viewBox="0 0 1840 1496" role="img" aria-labelledby="title desc" data-intent="Answer the DynamoDB Export README reader's runtime-order question: which call starts from the export request, how DynamoDbExportCoordinator delegates to DynamoDB leader elector, what lock table row returns during acquire or contention, which messages are leader-only for export batch, which messages return a skipped result, and when logical lease expiry becomes visible?" data-evidence="examples/dynamodb-export README scenario/usage sections; examples/dynamodb-export/src/main example workflow; examples/dynamodb-export/src/test behavior checks when present" data-source-read="examples/dynamodb-export/README.md; examples/dynamodb-export/README.ko.md; examples/dynamodb-export/src/main; examples/dynamodb-export/src/test">
  <title id="title">DynamoDB Export Runtime Sequence</title>
  <desc id="desc">Sequence diagram for the DynamoDB Export example showing trigger, coordinator, elector, backend ownership attempt, leader work, release, and skipped peer response.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#203040" flood-opacity="0.10"/></filter>
    <marker id="seqArrow-call" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F83BF"/></marker>
    <marker id="seqArrow-success" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#3E9868"/></marker>
    <marker id="seqArrow-skip" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#C94D68"/></marker>
    <marker id="seqArrow-contention" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#B9851B"/></marker>
    <marker id="seqArrow-release" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#755BC6"/></marker>
    <marker id="seqArrow-retry" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4F63C7"/></marker>
    <marker id="seqArrow-dependency" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#2E8F89"/></marker>
    <marker id="seqArrow-metric" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#718A35"/></marker>
    <marker id="seqArrow-neutral" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#758297"/></marker>
    <style>
      .canvas{fill:#F7FAFC}
      .frame{fill:#FFFFFF;stroke:#D7E2EC;stroke-width:2}
      .title{font-family:"Architects Daughter";font-size:44px;fill:#22344A;font-weight:400}
      .subtitle{font-family:"Comic Mono";font-size:16px;fill:#536476;font-weight:400}
      .band{fill:#F3F7FB;stroke:#D7E2EC;stroke-width:2}
      .bandTitle{font-family:"Architects Daughter";font-size:24px;fill:#22344A;font-weight:400;paint-order:stroke;stroke:#F3F7FB;stroke-width:5px;stroke-linejoin:round}
      .card{filter:url(#shadow);stroke-width:2}
      .cardTitle{font-family:"Architects Daughter";font-size:23px;fill:#22344A;font-weight:400}
      .detail{font-family:"Comic Mono";font-size:13px;fill:#42556B;font-weight:400}
      .small{font-family:"Comic Mono";font-size:12px;fill:#627184;font-weight:400}
      .route{fill:none;stroke-width:2.45;stroke-linejoin:round;stroke-linecap:round}
      .seq{fill:none;stroke-width:3;stroke-linecap:round}
      .seqReturn{fill:none;stroke-width:2.7;stroke-linecap:round;stroke-dasharray:8 7}
      .lifeline{stroke:#A7B4C3;stroke-width:1.8;stroke-dasharray:8 8}
      .pill{fill:#FFFFFF;stroke:#D6E3EF;stroke-width:1.4}
      .branchBox{fill:#FFFFFF;fill-opacity:.42;stroke:#D6A441;stroke-width:1.8;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect class="canvas" width="1840" height="1496"/>
  <rect class="frame" x="32" y="28" width="1776" height="1440" rx="28"/>
  <text class="title" x="66" y="82">DynamoDB Export Runtime Sequence</text>
  <text class="subtitle" x="70" y="116">DynamoDbExportCoordinator delegates to DynamoDB leader elector; the elected branch runs export batch and the losing branch returns skipped.</text>
<g id="participant-trigger">
  <rect class="card" x="128" y="228" width="214" height="76" rx="10" fill="#E8F3FF" stroke="#5B8DEF"/>
  <text class="cardTitle" x="235" y="273" text-anchor="middle">Export Request</text>
  <line class="lifeline" x1="235" y1="304" x2="235" y2="1372"/>
</g>
<g id="participant-coord">
  <rect class="card" x="402" y="228" width="214" height="76" rx="10" fill="#EAF7EF" stroke="#58A978"/>
  <text class="cardTitle" x="509" y="273" text-anchor="middle">DynamoDbExportCoordinator</text>
  <line class="lifeline" x1="509" y1="304" x2="509" y2="1372"/>
</g>
<g id="participant-elector">
  <rect class="card" x="676" y="228" width="214" height="76" rx="10" fill="#FFF3D9" stroke="#D6A441"/>
  <text class="cardTitle" x="783" y="260" text-anchor="middle">DynamoDB leader</text>
  <text class="cardTitle" x="783" y="283" text-anchor="middle">elector</text>
  <line class="lifeline" x1="783" y1="304" x2="783" y2="1372"/>
</g>
<g id="participant-backend">
  <rect class="card" x="950" y="228" width="214" height="76" rx="10" fill="#F1ECFF" stroke="#8A72D6"/>
  <text class="cardTitle" x="1057" y="273" text-anchor="middle">lock table row</text>
  <line class="lifeline" x1="1057" y1="304" x2="1057" y2="1372"/>
</g>
<g id="participant-work">
  <rect class="card" x="1224" y="228" width="214" height="76" rx="10" fill="#E9F7F6" stroke="#45A7A1"/>
  <text class="cardTitle" x="1331" y="273" text-anchor="middle">Export Batch</text>
  <line class="lifeline" x1="1331" y1="304" x2="1331" y2="1372"/>
</g>
<g id="participant-peer">
  <rect class="card" x="1498" y="228" width="214" height="76" rx="10" fill="#FDECEF" stroke="#DC6B82"/>
  <text class="cardTitle" x="1605" y="273" text-anchor="middle">Skipped Peer</text>
  <line class="lifeline" x1="1605" y1="304" x2="1605" y2="1372"/>
</g>
<g id="m1">
  <rect class="pill" x="249" y="343" width="246" height="28" rx="7"/>
  <circle cx="268" cy="357" r="12" fill="#4F83BF"/>
  <text class="detail" x="268" y="358" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">1</text>
  <text class="detail" x="390" y="358" text-anchor="middle" dominant-baseline="middle">start export request</text>
  <path class="seq" d="M235 388 L509 388" stroke="#4F83BF" marker-end="url(#seqArrow-call)"/>
</g>
<g id="m2">
  <rect class="pill" x="523" y="411" width="246" height="42" rx="7"/>
  <circle cx="542" cy="432" r="12" fill="#4F83BF"/>
  <text class="detail" x="542" y="433" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">2</text>
  <text class="detail" x="664" y="424" text-anchor="middle" dominant-baseline="middle">runIfLeader with source</text>
  <text class="detail" x="664" y="439" text-anchor="middle" dominant-baseline="middle">options</text>
  <path class="seq" d="M509 470 L783 470" stroke="#4F83BF" marker-end="url(#seqArrow-call)"/>
</g>
<g id="m3">
  <rect class="pill" x="797" y="507" width="246" height="28" rx="7"/>
  <circle cx="816" cy="521" r="12" fill="#B9851B"/>
  <text class="detail" x="816" y="522" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">3</text>
  <text class="detail" x="938" y="522" text-anchor="middle" dominant-baseline="middle">attempt backend ownership</text>
  <path class="seq" d="M783 552 L1057 552" stroke="#B9851B" marker-end="url(#seqArrow-contention)"/>
</g>
<g>
  <rect class="branchBox" x="128" y="599" width="1584" height="46" rx="15"/>
  <rect class="pill" x="267.5" y="593" width="209" height="30" rx="8"/>
  <text class="detail" x="372" y="609" text-anchor="middle" dominant-baseline="middle">alt ownership acquired</text>
</g>
<g id="m5">
  <rect class="pill" x="797" y="671" width="246" height="28" rx="7"/>
  <circle cx="816" cy="685" r="12" fill="#3E9868"/>
  <text class="detail" x="816" y="686" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">5</text>
  <text class="detail" x="938" y="686" text-anchor="middle" dominant-baseline="middle">owner token accepted</text>
  <path class="seqReturn" d="M1057 716 L783 716" stroke="#3E9868" marker-end="url(#seqArrow-success)"/>
</g>
<g id="m6">
  <rect class="pill" x="933" y="753" width="248" height="28" rx="7"/>
  <circle cx="952" cy="767" r="12" fill="#3E9868"/>
  <text class="detail" x="952" y="768" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">6</text>
  <text class="detail" x="1075" y="768" text-anchor="middle" dominant-baseline="middle">execute export batch</text>
  <path class="seq" d="M783 798 L1331 798" stroke="#3E9868" marker-end="url(#seqArrow-success)"/>
</g>
<g id="m7">
  <rect class="pill" x="933" y="835" width="248" height="28" rx="7"/>
  <circle cx="952" cy="849" r="12" fill="#3E9868"/>
  <text class="detail" x="952" y="850" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">7</text>
  <text class="detail" x="1075" y="850" text-anchor="middle" dominant-baseline="middle">return leader result</text>
  <path class="seqReturn" d="M1331 880 L783 880" stroke="#3E9868" marker-end="url(#seqArrow-success)"/>
</g>
<g id="m8">
  <rect class="pill" x="797" y="903" width="246" height="42" rx="7"/>
  <circle cx="816" cy="924" r="12" fill="#755BC6"/>
  <text class="detail" x="816" y="925" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">8</text>
  <text class="detail" x="938" y="916" text-anchor="middle" dominant-baseline="middle">release or renew for</text>
  <text class="detail" x="938" y="931" text-anchor="middle" dominant-baseline="middle">logical lease expiry</text>
  <path class="seq" d="M783 962 L1057 962" stroke="#755BC6" marker-end="url(#seqArrow-release)"/>
</g>
<g>
  <rect class="branchBox" x="128" y="1009" width="1584" height="46" rx="15"/>
  <rect class="pill" x="256" y="1003" width="232" height="30" rx="8"/>
  <text class="detail" x="372" y="1019" text-anchor="middle" dominant-baseline="middle">else ownership unavailable</text>
</g>
<g id="m10">
  <rect class="pill" x="803.2" y="1081" width="233.6" height="28" rx="7"/>
  <circle cx="822.2" cy="1095" r="12" fill="#C94D68"/>
  <text class="detail" x="822.2" y="1096" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">10</text>
  <text class="detail" x="938" y="1096" text-anchor="middle" dominant-baseline="middle">lock already owned</text>
  <path class="seqReturn" d="M1057 1126 L783 1126" stroke="#C94D68" marker-end="url(#seqArrow-skip)"/>
</g>
<g id="m11">
  <rect class="pill" x="1066.4" y="1163" width="255.20000000000002" height="28" rx="7"/>
  <circle cx="1085.4" cy="1177" r="12" fill="#C94D68"/>
  <text class="detail" x="1085.4" y="1178" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">11</text>
  <text class="detail" x="1212" y="1178" text-anchor="middle" dominant-baseline="middle">return skipped result</text>
  <path class="seq" d="M783 1208 L1605 1208" stroke="#C94D68" marker-end="url(#seqArrow-skip)"/>
</g>
<g id="m12">
  <rect class="pill" x="731.2" y="1245" width="377.6" height="28" rx="7"/>
  <circle cx="750.2" cy="1259" r="12" fill="#C94D68"/>
  <text class="detail" x="750.2" y="1260" text-anchor="middle" dominant-baseline="middle" style="fill:#fff;font-size:12px">12</text>
  <text class="detail" x="938" y="1260" text-anchor="middle" dominant-baseline="middle">cycle completes without duplicate work</text>
  <path class="seqReturn" d="M1605 1290 L235 1290" stroke="#C94D68" marker-end="url(#seqArrow-skip)"/>
</g>
</svg>
