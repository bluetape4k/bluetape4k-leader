<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020" role="img" aria-labelledby="title desc">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#263238" flood-opacity="0.14"/>
    </filter>
    <style>
      .canvas { fill: #fbfcf8; }
      .frame { fill: #ffffff; stroke: #41545d; stroke-width: 2.2; }
      .title { font-family: "Architects Daughter"; font-size: 42px; fill: #263238; }
      .subtitle, .small, .labelText, .detail, .footer, .msg, .note { font-family: "Comic Mono"; fill: #36464f; }
      .subtitle { font-size: 17px; }
      .footer { font-size: 13px; fill: #60727d; }
      .band { fill: #f5f9fb; stroke: #c8d7df; stroke-width: 1.6; }
      .bandAlt { fill: #fbfdf8; stroke: #d7e0d0; stroke-width: 1.6; }
      .bandTitle { font-family: "Architects Daughter"; font-size: 22px; fill: #263238; }
      .bandHint { font-family: "Comic Mono"; font-size: 12px; fill: #60727d; }
      .card { filter: url(#softShadow); stroke-width: 2; rx: 8; }
      .cardTitle { font-family: "Architects Daughter"; font-size: 24px; fill: #1f3138; }
      .detail { font-size: 13.5px; fill: #546a73; }
      .edge { fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .edgeThin { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 10 8; }
      .pill { fill: #ffffff; stroke-width: 1.5; }
      .labelText { font-size: 12.5px; }
      .badgeText { font-family: "Comic Mono"; font-size: 12px; font-weight: 700; }
      .header { fill: #ffffff; stroke: #546e7a; stroke-width: 2.2; }
      .participant { font-family: "Architects Daughter"; font-size: 20px; fill: #1f3138; }
      .role { font-family: "Comic Mono"; font-size: 13px; fill: #546a73; }
      .lifeline { stroke: #9aaab1; stroke-width: 2; stroke-dasharray: 7 8; }
      .activation { fill: #e6f2ec; stroke: #5b7e67; stroke-width: 1.7; }
      .branch { fill: none; stroke: #78909c; stroke-width: 2.4; stroke-dasharray: 12 8; }
    </style>
    <marker id="arrow-line" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#3f7d9c" stroke="#3f7d9c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-work" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#6e8f4f" stroke="#6e8f4f" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-return" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#9b7d54" stroke="#9b7d54" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-skip" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#b86868" stroke="#b86868" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#c97831" stroke="#c97831" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7c5aa6" stroke="#7c5aa6" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#78909c" stroke="#78909c" stroke-width="0" stroke-dasharray="none" style="stroke-dasharray:none!important"/></marker>
  </defs>
  <title id="title">DynamoDB Export Sequence</title>
  <desc id="desc">Sequence diagram for DynamoDB Export.</desc>
  <rect width="1600" height="1020" class="canvas"/>
  <rect x="28" y="26" width="1544" height="968" rx="8" class="frame"/>
  <text x="80" y="82" class="title">DynamoDB Export Sequence</text>
  <text x="82" y="114" class="subtitle">DynamoDB follows the leader-core sequence style with clear calls, returns, and alternate outcomes.</text>

  <rect x="70" y="150" width="170" height="68" rx="8" class="header"/><text x="155" y="179" text-anchor="middle" class="participant">Caller</text><text x="155" y="201" text-anchor="middle" class="role">export partition</text>
  <rect x="315" y="150" width="190" height="68" rx="8" class="header"/><image data-bluetape4k-icon="dynamodb" data-icon-source="testcontainers/aws/amazon-dynamodb.svg" x="325" y="158" width="18" height="18" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/><text x="410" y="179" text-anchor="middle" class="participant">Example</text><text x="410" y="201" text-anchor="middle" class="role">DynamoDB</text>
  <rect x="570" y="150" width="210" height="68" rx="8" class="header"/><text x="675" y="179" text-anchor="middle" class="participant">Leader API</text><text x="675" y="201" text-anchor="middle" class="role">runIfLeader</text>
  <rect x="845" y="150" width="210" height="68" rx="8" class="header"/><text x="950" y="179" text-anchor="middle" class="participant">Lock Store</text><text x="950" y="201" text-anchor="middle" class="role">conditional write</text>
  <rect x="1120" y="150" width="190" height="68" rx="8" class="header"/><text x="1215" y="179" text-anchor="middle" class="participant">Action</text><text x="1215" y="201" text-anchor="middle" class="role">protected work</text>
  <rect x="1365" y="150" width="170" height="68" rx="8" class="header"/><text x="1450" y="179" text-anchor="middle" class="participant">Observer</text><text x="1450" y="201" text-anchor="middle" class="role">metrics/events</text>
  <line x1="155" y1="218" x2="155" y2="938" class="lifeline"/>
  <line x1="410" y1="218" x2="410" y2="938" class="lifeline"/>
  <line x1="675" y1="218" x2="675" y2="938" class="lifeline"/>
  <line x1="950" y1="218" x2="950" y2="938" class="lifeline"/>
  <line x1="1215" y1="218" x2="1215" y2="938" class="lifeline"/>
  <line x1="1450" y1="218" x2="1450" y2="938" class="lifeline"/>
  <rect x="668" y="316" width="14" height="520" rx="6" class="activation"/>
  <rect x="943" y="392" width="14" height="216" rx="6" class="activation"/>
  <rect x="1208" y="560" width="14" height="112" rx="6" class="activation"/>
  <g>
    <rect x="175" y="266" width="480" height="32" rx="16" class="pill" stroke="#3f7d9c"/>
    <circle cx="197" cy="282" r="12.5" fill="#fff" stroke="#3f7d9c" stroke-width="1.6"/>
    <text x="197" y="286" text-anchor="middle" class="badgeText" fill="#3f7d9c">1</text>
    <text x="218" y="287" class="labelText" fill="#3f7d9c">submit leader-guarded request</text>
  </g>
  <path d="M 155 318 L 675 318" class="edge" stroke="#3f7d9c" marker-end="url(#arrow-line)"/>
  <g>
    <rect x="695" y="342" width="362" height="32" rx="16" class="pill" stroke="#6e8f4f"/>
    <circle cx="717" cy="358" r="12.5" fill="#fff" stroke="#6e8f4f" stroke-width="1.6"/>
    <text x="717" y="362" text-anchor="middle" class="badgeText" fill="#6e8f4f">2</text>
    <text x="738" y="363" class="labelText" fill="#6e8f4f">try acquire lease / conditional claim</text>
  </g>
  <path d="M 675 394 L 950 394" class="edge" stroke="#6e8f4f" marker-end="url(#arrow-work)"/>
  <g>
    <rect x="695" y="428" width="282" height="32" rx="16" class="pill" stroke="#9b7d54"/>
    <circle cx="717" cy="444" r="12.5" fill="#fff" stroke="#9b7d54" stroke-width="1.6"/>
    <text x="717" y="448" text-anchor="middle" class="badgeText" fill="#9b7d54">3</text>
    <text x="738" y="449" class="labelText" fill="#9b7d54">acquired or skipped outcome</text>
  </g>
  <path d="M 950 480 L 675 480" class="edge" stroke="#9b7d54" marker-end="url(#arrow-return)"/>
  <rect x="82" y="518" width="1420" height="270" rx="12" class="branch"/>
  <text x="112" y="548" class="note">alt acquired</text>
  <line x1="82" y1="690" x2="1502" y2="690" class="branch"/>
  <text x="112" y="720" class="note">else skipped / failed</text>
  <g>
    <rect x="695" y="538" width="500" height="32" rx="16" class="pill" stroke="#6e8f4f"/>
    <circle cx="717" cy="554" r="12.5" fill="#fff" stroke="#6e8f4f" stroke-width="1.6"/>
    <text x="717" y="558" text-anchor="middle" class="badgeText" fill="#6e8f4f">4</text>
    <text x="738" y="559" class="labelText" fill="#6e8f4f">invoke protected work once</text>
  </g>
  <path d="M 675 590 L 1215 590" class="edge" stroke="#6e8f4f" marker-end="url(#arrow-work)"/>
  <g>
    <rect x="695" y="616" width="500" height="32" rx="16" class="pill" stroke="#9b7d54"/>
    <circle cx="717" cy="632" r="12.5" fill="#fff" stroke="#9b7d54" stroke-width="1.6"/>
    <text x="717" y="636" text-anchor="middle" class="badgeText" fill="#9b7d54">5</text>
    <text x="738" y="637" class="labelText" fill="#9b7d54">return value or action failure</text>
  </g>
  <path d="M 1215 668 L 675 668" class="edge" stroke="#9b7d54" marker-end="url(#arrow-return)"/>
  <g>
    <rect x="695" y="702" width="735" height="32" rx="16" class="pill" stroke="#b86868"/>
    <circle cx="717" cy="718" r="12.5" fill="#fff" stroke="#b86868" stroke-width="1.6"/>
    <text x="717" y="722" text-anchor="middle" class="badgeText" fill="#b86868">6</text>
    <text x="738" y="723" class="labelText" fill="#b86868">publish skipped/failed event</text>
  </g>
  <path d="M 675 754 L 1450 754" class="edge" stroke="#b86868" marker-end="url(#arrow-skip)"/>
  <g>
    <rect x="695" y="786" width="250" height="32" rx="16" class="pill" stroke="#9b7d54"/>
    <circle cx="717" cy="802" r="12.5" fill="#fff" stroke="#9b7d54" stroke-width="1.6"/>
    <text x="717" y="806" text-anchor="middle" class="badgeText" fill="#9b7d54">7</text>
    <text x="738" y="807" class="labelText" fill="#9b7d54">release lease and state</text>
  </g>
  <path d="M 675 838 L 950 838" class="edge" stroke="#9b7d54" marker-end="url(#arrow-return)"/>
  <g>
    <rect x="175" y="858" width="480" height="32" rx="16" class="pill" stroke="#3f7d9c"/>
    <circle cx="197" cy="874" r="12.5" fill="#fff" stroke="#3f7d9c" stroke-width="1.6"/>
    <text x="197" y="878" text-anchor="middle" class="badgeText" fill="#3f7d9c">8</text>
    <text x="218" y="879" class="labelText" fill="#3f7d9c">return explicit result to caller</text>
  </g>
  <path d="M 675 910 L 155 910" class="edge" stroke="#3f7d9c" marker-end="url(#arrow-line)"/>

</svg>
