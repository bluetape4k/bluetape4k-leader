<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="680" viewBox="0 0 1260 680" role="img" aria-labelledby="title desc" data-source-read="README.md; README.ko.md; settings.gradle.kts" data-intent="Show the root README reader that bluetape4k-leader is a small core contract surrounded by many backend adapters and examples, so module count reflects teaching and integration surface rather than core complexity.">
