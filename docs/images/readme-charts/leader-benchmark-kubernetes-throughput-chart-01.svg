<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="460" viewBox="0 0 1360 460" role="img" aria-labelledby="title desc" data-intent="Show the realistic Kubernetes lease throughput envelope for readers choosing the Kubernetes backend." data-evidence="benchmark/README.md Kubernetes throughput table" data-source-read="benchmark/README.md; benchmark/README.ko.md">
<title id="title">Kubernetes Lease Throughput</title>
<desc id="desc">Blocking and suspend APIs measured against the Kubernetes lease backend.</desc>
<defs>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D7E2EC;stroke-width:2}
    .title{font-family:"Architects Daughter";font-size:42px;fill:#22344A;font-weight:400}
    .subtitle{font-family:"Comic Mono";font-size:15px;fill:#536476;font-weight:400}
    .label{font-family:"Architects Daughter";font-size:22px;fill:#22344A;font-weight:400}
    .value{font-family:"Comic Mono";font-size:13px;fill:#42556B;font-weight:400}
    .note{font-family:"Comic Mono";font-size:13px;fill:#536476;font-weight:400}
  </style>
</defs>
<rect class="canvas" width="1360" height="460"/>
<rect class="frame" x="32" y="28" width="1296" height="404" rx="28"/>
<text class="title" x="66" y="82">Kubernetes Lease Throughput</text>
<text class="subtitle" x="70" y="116">Blocking and suspend APIs measured against the Kubernetes lease backend.</text>
<g>
  <text class="label" x="120" y="198" dominant-baseline="middle">Blocking API</text>
  <rect x="410" y="182" width="720" height="32" rx="9" fill="#EEF4F9" stroke="#D7E2EC" stroke-width="1.4"/>
  <rect x="410" y="182" width="686.10" height="32" rx="9" fill="#5B8DEF" opacity="0.84"/>
  <text class="value" x="1114" y="198" dominant-baseline="middle">171.5 ops/s</text>
</g>
<g>
  <text class="label" x="120" y="286" dominant-baseline="middle">Suspend API</text>
  <rect x="410" y="270" width="720" height="32" rx="9" fill="#EEF4F9" stroke="#D7E2EC" stroke-width="1.4"/>
  <rect x="410" y="270" width="658.75" height="32" rx="9" fill="#D66B3D" opacity="0.84"/>
  <text class="value" x="1087" y="286" dominant-baseline="middle">164.7 ops/s</text>
</g>
<rect x="94" y="360" width="1172" height="42" rx="12" fill="#FFFFFF" stroke="#D7E2EC" stroke-width="1.4"/>
<text class="note" x="680" y="386" text-anchor="middle">Higher is better. Benchmark context: Kubernetes benchmark table.</text>
</svg>
