<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Leader election remote backend throughput</title>
  <desc id="desc">Blocking and suspend runIfLeader throughput in operations per second. Higher values are better.</desc>
  <defs><style>.canvas{fill:#f6f9fc}.frame{fill:#fff;stroke:#d7e2ec;stroke-width:2}.title{font:700 34px Arial,sans-serif;fill:#22344a}.subtitle{font:16px Arial,sans-serif;fill:#536476}.label{font:18px Arial,sans-serif;fill:#22344a}.small{font:14px Arial,sans-serif;fill:#536476}.tick{font:13px Arial,sans-serif;fill:#6d7d90}.axis{stroke:#b9c8d6;stroke-width:1}.grid{stroke:#edf3f8;stroke-width:1}.blocking{fill:#2f80ed}.suspend{fill:#21a67a}.latencyBlocking{fill:#d25b45}.latencySuspend{fill:#8d6fd1}.note{font:13px Arial,sans-serif;fill:#6d7d90}</style></defs>
  <rect class="canvas" width="1400" height="820"/>
  <rect class="frame" x="36" y="28" width="1328" height="764" rx="20"/>
  <text class="title" x="72" y="78">remote backend throughput</text>
  <text class="subtitle" x="72" y="108">runIfLeader hot-path throughput, ops/s. Higher is better. Local and H2 rows are excluded from this scale.</text>
  <rect x="958" y="64" width="18" height="18" rx="3" class="blocking"/><text class="small" x="986" y="78">Blocking API</text>
  <rect x="1090" y="64" width="18" height="18" rx="3" class="suspend"/><text class="small" x="1116" y="78">Suspend API</text>
  <line class="axis" x1="318" y1="740" x2="1192" y2="740"/>
  <line class="axis" x1="318" y1="132" x2="318" y2="740"/>
  <line class="grid" x1="536.5" y1="132" x2="536.5" y2="746"/><text class="tick" x="520.5" y="768">400</text>
  <line class="grid" x1="755.0" y1="132" x2="755.0" y2="746"/><text class="tick" x="739" y="768">800</text>
  <line class="grid" x1="973.5" y1="132" x2="973.5" y2="746"/><text class="tick" x="957.5" y="768">1,200</text>
  <line class="grid" x1="1192.0" y1="132" x2="1192.0" y2="746"/><text class="tick" x="1176" y="768">1,600</text>
  <text class="tick" x="308" y="768" text-anchor="end">0 ops/s</text>
  <text class="label" x="90" y="178">Lettuce Redis</text>
  <rect x="318" y="154" width="795.6" height="22" rx="5" class="blocking"/><text class="small" x="1123.6" y="170">1,456.5</text>
  <rect x="318" y="184" width="799.4" height="22" rx="5" class="suspend"/><text class="small" x="1127.4" y="200">1,463.4</text>
  <text class="label" x="90" y="250">Redisson Redis</text>
  <rect x="318" y="226" width="773.3" height="22" rx="5" class="blocking"/><text class="small" x="1101.3" y="242">1,415.6</text>
  <rect x="318" y="256" width="762.4" height="22" rx="5" class="suspend"/><text class="small" x="1090.4" y="272">1,395.7</text>
  <text class="label" x="90" y="322">Hazelcast</text>
  <rect x="318" y="298" width="773.1" height="22" rx="5" class="blocking"/><text class="small" x="1101.1" y="314">1,415.2</text>
  <rect x="318" y="328" width="743.3" height="22" rx="5" class="suspend"/><text class="small" x="1071.3" y="344">1,360.7</text>
  <text class="label" x="90" y="394">MongoDB</text>
  <rect x="318" y="370" width="510.1" height="22" rx="5" class="blocking"/><text class="small" x="838.1" y="386">933.8</text>
  <rect x="318" y="400" width="305.8" height="22" rx="5" class="suspend"/><text class="small" x="633.8" y="416">559.8</text>
  <text class="label" x="90" y="466">ZooKeeper</text>
  <rect x="318" y="442" width="459.8" height="22" rx="5" class="blocking"/><text class="small" x="787.8" y="458">841.8</text>
  <rect x="318" y="472" width="414.4" height="22" rx="5" class="suspend"/><text class="small" x="742.4" y="488">758.6</text>
  <text class="label" x="90" y="538">DynamoDB Local</text>
  <rect x="318" y="514" width="350.2" height="22" rx="5" class="blocking"/><text class="small" x="678.2" y="530">641.1</text>
  <rect x="318" y="544" width="306.6" height="22" rx="5" class="suspend"/><text class="small" x="634.6" y="560">561.3</text>
  <text class="label" x="90" y="610">Consul</text>
  <rect x="318" y="586" width="336.0" height="22" rx="5" class="blocking"/><text class="small" x="664.0" y="602">615.1</text>
  <rect x="318" y="616" width="321.2" height="22" rx="5" class="suspend"/><text class="small" x="649.2" y="632">587.9</text>
  <text class="label" x="90" y="682">etcd</text>
  <rect x="318" y="658" width="269.5" height="22" rx="5" class="blocking"/><text class="small" x="597.5" y="674">493.4</text>
  <rect x="318" y="688" width="251.3" height="22" rx="5" class="suspend"/><text class="small" x="579.3" y="704">460</text>
  <text class="note" x="72" y="776">Source: docs/benchmarks/2026-05-29-issue-418-preview-backend-*.json. Forks=1, threads=1, 3 measurement iterations.</text>
</svg>
