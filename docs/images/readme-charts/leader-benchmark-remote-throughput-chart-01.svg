<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="640" viewBox="0 0 1400 640" role="img" aria-labelledby="title desc">
  <title id="title">Leader election remote backend throughput</title>
  <desc id="desc">Blocking and suspend runIfLeader throughput in operations per second. Higher values are better.</desc>
  <defs>
    <style>
      .canvas{fill:#f6f9fc}.frame{fill:#fff;stroke:#d7e2ec;stroke-width:2}.title{font:700 34px Arial,sans-serif;fill:#22344a}.subtitle{font:16px Arial,sans-serif;fill:#536476}.label{font:18px Arial,sans-serif;fill:#22344a}.small{font:14px Arial,sans-serif;fill:#536476}.tick{font:13px Arial,sans-serif;fill:#6d7d90}.axis{stroke:#b9c8d6;stroke-width:1}.blocking{fill:#2f80ed}.suspend{fill:#21a67a}.note{font:13px Arial,sans-serif;fill:#6d7d90}
    </style>
  </defs>
  <rect class="canvas" width="1400" height="640"/>
  <rect class="frame" x="36" y="28" width="1328" height="584" rx="20"/>
  <text class="title" x="72" y="78">Remote backend throughput</text>
  <text class="subtitle" x="72" y="106">runIfLeader hot-path throughput, ops/s. Higher is better. Local and H2 rows are excluded from this scale.</text>
  <rect x="960" y="64" width="18" height="18" rx="3" class="blocking"/><text class="small" x="986" y="78">Blocking API</text>
  <rect x="1090" y="64" width="18" height="18" rx="3" class="suspend"/><text class="small" x="1116" y="78">Suspend API</text>
  <line class="axis" x1="328" y1="498" x2="1128" y2="498"/>
  <line class="axis" x1="328" y1="140" x2="328" y2="498"/>
  <line class="axis" x1="528" y1="140" x2="528" y2="504"/><text class="tick" x="516" y="526">400</text>
  <line class="axis" x1="728" y1="140" x2="728" y2="504"/><text class="tick" x="716" y="526">800</text>
  <line class="axis" x1="928" y1="140" x2="928" y2="504"/><text class="tick" x="912" y="526">1200</text>
  <line class="axis" x1="1128" y1="140" x2="1128" y2="504"/><text class="tick" x="1112" y="526">1600</text>
  <text class="tick" x="318" y="526">0 ops/s</text>

  <text class="label" x="100" y="165">Lettuce Redis</text>
  <rect x="328" y="143" width="527" height="24" rx="5" class="blocking"/><text class="small" x="866" y="161">1,054</text>
  <rect x="328" y="173" width="729" height="24" rx="5" class="suspend"/><text class="small" x="1068" y="191">1,458</text>

  <text class="label" x="100" y="238">Redisson Redis</text>
  <rect x="328" y="216" width="677" height="24" rx="5" class="blocking"/><text class="small" x="1016" y="234">1,355</text>
  <rect x="328" y="246" width="698" height="24" rx="5" class="suspend"/><text class="small" x="1037" y="264">1,396</text>

  <text class="label" x="100" y="311">Hazelcast</text>
  <rect x="328" y="289" width="729" height="24" rx="5" class="blocking"/><text class="small" x="1068" y="307">1,457</text>
  <rect x="328" y="319" width="697" height="24" rx="5" class="suspend"/><text class="small" x="1036" y="337">1,394</text>

  <text class="label" x="100" y="384">MongoDB</text>
  <rect x="328" y="362" width="467" height="24" rx="5" class="blocking"/><text class="small" x="806" y="380">935</text>
  <rect x="328" y="392" width="415" height="24" rx="5" class="suspend"/><text class="small" x="754" y="410">829</text>

  <text class="label" x="100" y="457">ZooKeeper</text>
  <rect x="328" y="435" width="380" height="24" rx="5" class="blocking"/><text class="small" x="719" y="453">760</text>
  <rect x="328" y="465" width="361" height="24" rx="5" class="suspend"/><text class="small" x="700" y="483">722</text>

  <text class="note" x="72" y="580">Source: docs/benchmarks/2026-05-21-leader-cross-backend-baseline.md. Forks=1, threads=1, 3 measurement iterations.</text>
</svg>
