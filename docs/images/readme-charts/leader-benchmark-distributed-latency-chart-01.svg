<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc" data-intent="Help benchmark readers see the latency tradeoff between fast in-memory cluster backends and database-backed coordination while preserving all distributed rows." data-evidence="benchmark/README.md average time tables for blocking and suspend APIs" data-source-read="benchmark/README.md; benchmark/README.ko.md">
<title id="title">Distributed Backend Latency</title>
<desc id="desc">Log scale is used because SQL and cluster backends span more than one order of magnitude.</desc>
<defs>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D7E2EC;stroke-width:2}
    .title{font-family:"Architects Daughter";font-size:44px;fill:#22344A;font-weight:400}
    .subtitle{font-family:"Comic Mono";font-size:16px;fill:#536476;font-weight:400}
    .axis{stroke:#D7E2EC;stroke-width:1.5}
    .label{font-family:"Architects Daughter";font-size:22px;fill:#22344A;font-weight:400}
    .value{font-family:"Comic Mono";font-size:13px;fill:#42556B;font-weight:400}
    .legend{font-family:"Comic Mono";font-size:13px;fill:#42556B;font-weight:400}
    .note{font-family:"Comic Mono";font-size:13px;fill:#536476;font-weight:400}
  </style>
</defs>
<rect class="canvas" width="1500" height="980"/>
