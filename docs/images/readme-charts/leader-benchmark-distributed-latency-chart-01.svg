<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1040" viewBox="0 0 1500 1040" role="img" aria-labelledby="title desc">
  <title id="title">Distributed backend latency</title>
  <desc id="desc">Blocking and suspend runIfLeader average time for distributed backends. Lower values are better.</desc>
  <defs><style>.canvas{fill:#f7fafc}.frame{fill:#fff;stroke:#d8e3ec;stroke-width:2}.title{font:700 34px 'Architects Daughter','Comic Mono','Comic Sans MS',cursive;fill:#213143}.subtitle{font:15px 'Comic Mono','SFMono-Regular',monospace;fill:#526474}.label{font:700 17px 'Architects Daughter','Comic Mono','Comic Sans MS',cursive;fill:#263848}.value{font:14px 'Comic Mono','SFMono-Regular',monospace;fill:#263848}.tick{font:13px 'Comic Mono','SFMono-Regular',monospace;fill:#6b7d8d}.axis{stroke:#aebdca;stroke-width:1.5}.grid{stroke:#edf3f8;stroke-width:1}.blocking{fill:#bc5f2e}.suspend{fill:#7b61b8}.note{font:13px 'Comic Mono','SFMono-Regular',monospace;fill:#6b7d8d}.legend{font:14px 'Comic Mono','SFMono-Regular',monospace;fill:#263848}</style></defs>
  <rect class="canvas" width="1500" height="1040"/>
  <rect class="frame" x="34" y="28" width="1432" height="988" rx="8"/>
  <text class="title" x="72" y="78">Distributed backend latency</text>
  <text class="subtitle" x="72" y="108">runIfLeader average time, us/op. Lower is better. Local and H2 rows are excluded from this scale.</text>
  <rect x="1040" y="64" width="18" height="18" rx="3" class="blocking"/><text class="legend" x="1068" y="78">Blocking API</text>
  <rect x="1190" y="64" width="18" height="18" rx="3" class="suspend"/><text class="legend" x="1218" y="78">Suspend API</text>
  <line class="axis" x1="340" y1="866" x2="1320" y2="866"/>
  <line class="axis" x1="340" y1="148" x2="340" y2="866"/>
  <line class="grid" x1="585.0" y1="148" x2="585.0" y2="866"/><text class="tick" x="585" y="898" text-anchor="middle">4,500</text>
  <line class="grid" x1="830.0" y1="148" x2="830.0" y2="866"/><text class="tick" x="830" y="898" text-anchor="middle">9,000</text>
  <line class="grid" x1="1075.0" y1="148" x2="1075.0" y2="866"/><text class="tick" x="1075" y="898" text-anchor="middle">13,500</text>
  <line class="grid" x1="1320.0" y1="148" x2="1320.0" y2="866"/><text class="tick" x="1320" y="898" text-anchor="middle">18,000</text>
  <text class="tick" x="332" y="898" text-anchor="end">0 us/op</text>
  <text class="label" x="86" y="187">Lettuce Redis</text>
  <rect x="340" y="160" width="38.1" height="20" rx="4" class="blocking"/><text class="value" x="388.1" y="175">699.4</text>
  <rect x="340" y="188" width="36.8" height="20" rx="4" class="suspend"/><text class="value" x="386.8" y="203">675.3</text>
  <text class="label" x="86" y="259">Redisson Redis</text>
  <rect x="340" y="232" width="38.1" height="20" rx="4" class="blocking"/><text class="value" x="388.1" y="247">699.7</text>
  <rect x="340" y="260" width="38.9" height="20" rx="4" class="suspend"/><text class="value" x="388.9" y="275">714.9</text>
  <text class="label" x="86" y="331">Hazelcast</text>
  <rect x="340" y="304" width="41.7" height="20" rx="4" class="blocking"/><text class="value" x="391.7" y="319">766.3</text>
  <rect x="340" y="332" width="40.8" height="20" rx="4" class="suspend"/><text class="value" x="390.8" y="347">749.0</text>
  <text class="label" x="86" y="403">MongoDB</text>
  <rect x="340" y="376" width="61.6" height="20" rx="4" class="blocking"/><text class="value" x="411.6" y="391">1,131.0</text>
  <rect x="340" y="404" width="235.9" height="20" rx="4" class="suspend"/><text class="value" x="585.9" y="419">4,333.5</text>
  <text class="label" x="86" y="475">ZooKeeper</text>
  <rect x="340" y="448" width="74.7" height="20" rx="4" class="blocking"/><text class="value" x="424.7" y="463">1,372.2</text>
  <rect x="340" y="476" width="76.1" height="20" rx="4" class="suspend"/><text class="value" x="426.1" y="491">1,397.3</text>
  <text class="label" x="86" y="547">Consul</text>
  <rect x="340" y="520" width="103.5" height="20" rx="4" class="blocking"/><text class="value" x="453.5" y="535">1,900.6</text>
  <rect x="340" y="548" width="92.7" height="20" rx="4" class="suspend"/><text class="value" x="442.7" y="563">1,701.8</text>
  <text class="label" x="86" y="619">etcd</text>
  <rect x="340" y="592" width="118.0" height="20" rx="4" class="blocking"/><text class="value" x="468.0" y="607">2,167.9</text>
  <rect x="340" y="620" width="121.9" height="20" rx="4" class="suspend"/><text class="value" x="471.9" y="635">2,239.4</text>
  <text class="label" x="86" y="691">DynamoDB Local</text>
  <rect x="340" y="664" width="95.3" height="20" rx="4" class="blocking"/><text class="value" x="445.3" y="679">1,749.7</text>
  <rect x="340" y="692" width="106.0" height="20" rx="4" class="suspend"/><text class="value" x="456.0" y="707">1,947.3</text>
  <text class="label" x="86" y="763">PostgreSQL (Exposed)</text>
  <rect x="340" y="736" width="758.2" height="20" rx="4" class="blocking"/><text class="value" x="1108.2" y="751">13,925.4</text>
  <rect x="340" y="764" width="965.7" height="20" rx="4" class="suspend"/><text class="value" x="1315.7" y="779">17,737.0</text>
  <text class="label" x="86" y="835">MySQL (Exposed)</text>
  <rect x="340" y="808" width="818.0" height="20" rx="4" class="blocking"/><text class="value" x="1168.0" y="823">15,023.7</text>
  <rect x="340" y="836" width="959.1" height="20" rx="4" class="suspend"/><text class="value" x="1309.1" y="851">17,616.1</text>
  <text class="note" x="72" y="944">Source: docs/benchmarks/2026-05-29-issue-405-rdb-backend-average-time.json. Forks=1, threads=1, warmups=2, measurement iterations=3.</text>
  <text class="note" x="72" y="966">Local and H2 shape rows are intentionally excluded from distributed backend charts.</text>
</svg>
