<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1080" viewBox="0 0 1500 1080" role="img" aria-labelledby="title desc" data-intent="Help benchmark readers compare distributed backend latency while preserving the caveat that lower is better and SQL rows require a log scale." data-evidence="benchmark/README.md average time tables for blocking and suspend APIs" data-source-read="benchmark/README.md; benchmark/README.ko.md; docs/benchmarks/2026-05-29-issue-405-rdb-backend-average-time.json">
<title id="title">Distributed Backend Latency</title>
<desc id="desc">Log scale latency chart for distributed leader election backends.</desc>
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#B9C7D6" flood-opacity="0.22"/></filter>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:2.2;filter:url(#shadow)}
    .title{font-family:"Architects Daughter";font-size:42px;fill:#22344A}.subtitle,.axis,.value,.legend,.note,.group{font-family:"Comic Mono";fill:#4B6075}.subtitle{font-size:15px}.axis{font-size:12px}.value{font-size:12px}.legend{font-size:13px}.note{font-size:13px}.group{font-size:12px;fill:#6A7A8C}
    .rowLabel{font-family:"Architects Daughter";font-size:21px;fill:#22344A}.panel{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.6}.track{fill:#EEF4F9;stroke:#D6E2EC;stroke-width:1.1}
  </style>
</defs>
<rect class="canvas" width="1500" height="1080"/>
<rect class="frame" x="34" y="28" width="1432" height="1024" rx="30"/>
<text class="title" x="72" y="84">Distributed Backend Latency</text>
<text class="subtitle" x="76" y="116">Lower is better. Axis uses log10(us/op) because SQL and cluster backends span more than one order of magnitude.</text>

<rect class="panel" x="86" y="154" width="1328" height="780" rx="18"/>
<rect x="1055" y="94" width="18" height="12" rx="4" fill="#5B8DEF"/><text class="legend" x="1082" y="105">Blocking us/op</text>
<rect x="1204" y="94" width="18" height="12" rx="4" fill="#D66B3D"/><text class="legend" x="1231" y="105">Suspend us/op</text>

<line x1="430" y1="190" x2="430" y2="870" stroke="#D6E2EC" stroke-width="1"/>
<line x1="584.1" y1="190" x2="584.1" y2="870" stroke="#E3EBF2" stroke-width="1"/>
<line x1="738.2" y1="190" x2="738.2" y2="870" stroke="#E3EBF2" stroke-width="1"/>
<line x1="941.8" y1="190" x2="941.8" y2="870" stroke="#E3EBF2" stroke-width="1"/>
<line x1="1095.9" y1="190" x2="1095.9" y2="870" stroke="#E3EBF2" stroke-width="1"/>
<line x1="1250" y1="190" x2="1250" y2="870" stroke="#E3EBF2" stroke-width="1"/>
<text class="axis" x="430" y="920" text-anchor="middle">500</text>
<text class="axis" x="584.1" y="920" text-anchor="middle">1k</text>
<text class="axis" x="738.2" y="920" text-anchor="middle">2k</text>
<text class="axis" x="941.8" y="920" text-anchor="middle">5k</text>
<text class="axis" x="1095.9" y="920" text-anchor="middle">10k</text>
<text class="axis" x="1250" y="920" text-anchor="middle">20k us/op</text>

<text class="group" x="120" y="185">fast cluster-backed group</text>
<text class="rowLabel" x="120" y="222">Hazelcast</text><rect class="track" x="430" y="202" width="820" height="38" rx="8"/><rect x="430" y="206" width="94.9" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="538" y="218">766</text><rect x="430" y="226" width="89.8" height="15" rx="5" fill="#D66B3D"/><text class="value" x="533" y="238">749</text>
<text class="rowLabel" x="120" y="286">Lettuce Redis</text><rect class="track" x="430" y="266" width="820" height="38" rx="8"/><rect x="430" y="270" width="74.6" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="518" y="282">699</text><rect x="430" y="290" width="66.8" height="15" rx="5" fill="#D66B3D"/><text class="value" x="510" y="302">675</text>
<text class="rowLabel" x="120" y="350">Redisson Redis</text><rect class="track" x="430" y="330" width="820" height="38" rx="8"/><rect x="430" y="334" width="74.7" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="518" y="346">700</text><rect x="430" y="354" width="79.5" height="15" rx="5" fill="#D66B3D"/><text class="value" x="523" y="366">715</text>

<text class="group" x="120" y="409">document, session, and lease services</text>
<text class="rowLabel" x="120" y="450">MongoDB</text><rect class="track" x="430" y="430" width="820" height="38" rx="8"/><rect x="430" y="434" width="181.4" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="625" y="446">1,131</text><rect x="430" y="454" width="480" height="15" rx="5" fill="#D66B3D"/><text class="value" x="924" y="466">4,333</text>
<text class="rowLabel" x="120" y="514">ZooKeeper</text><rect class="track" x="430" y="494" width="820" height="38" rx="8"/><rect x="430" y="498" width="224.4" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="668" y="510">1,372</text><rect x="430" y="518" width="228.4" height="15" rx="5" fill="#D66B3D"/><text class="value" x="672" y="530">1,397</text>
<text class="rowLabel" x="120" y="578">DynamoDB Local</text><rect class="track" x="430" y="558" width="820" height="38" rx="8"/><rect x="430" y="562" width="278.4" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="722" y="574">1,750</text><rect x="430" y="582" width="302.2" height="15" rx="5" fill="#D66B3D"/><text class="value" x="746" y="594">1,947</text>
<text class="rowLabel" x="120" y="642">Consul</text><rect class="track" x="430" y="622" width="820" height="38" rx="8"/><rect x="430" y="626" width="296.8" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="740" y="638">1,901</text><rect x="430" y="646" width="272.3" height="15" rx="5" fill="#D66B3D"/><text class="value" x="716" y="658">1,702</text>
<text class="rowLabel" x="120" y="706">etcd</text><rect class="track" x="430" y="686" width="820" height="38" rx="8"/><rect x="430" y="690" width="326.1" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="770" y="702">2,168</text><rect x="430" y="710" width="333.3" height="15" rx="5" fill="#D66B3D"/><text class="value" x="777" y="722">2,239</text>

<text class="group" x="120" y="765">SQL over Testcontainers in this run</text>
<text class="rowLabel" x="120" y="806">PostgreSQL</text><rect class="track" x="430" y="786" width="820" height="38" rx="8"/><rect x="430" y="790" width="739.5" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="1183" y="802">13,925</text><rect x="430" y="810" width="793.3" height="15" rx="5" fill="#D66B3D"/><text class="value" x="1237" y="822">17,737</text>
<text class="rowLabel" x="120" y="870">MySQL</text><rect class="track" x="430" y="850" width="820" height="38" rx="8"/><rect x="430" y="854" width="756.4" height="15" rx="5" fill="#5B8DEF"/><text class="value" x="1200" y="866">15,024</text><rect x="430" y="874" width="791.8" height="15" rx="5" fill="#D66B3D"/><text class="value" x="1235" y="886">17,616</text>

<rect x="86" y="966" width="1328" height="42" rx="14" fill="#FFFFFF" stroke="#D6E2EC" stroke-width="1.4"/>
<text class="note" x="750" y="992" text-anchor="middle">Benchmark data: distributed backend tables and 2026-05-29 raw JSON. Axis starts at 500 us/op to keep fast rows readable.</text>
</svg>
