<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Leader election remote backend latency</title>
  <desc id="desc">Blocking and suspend runIfLeader average time in microseconds per operation. Lower values are better.</desc>
  <defs><style>.canvas{fill:#f6f9fc}.frame{fill:#fff;stroke:#d7e2ec;stroke-width:2}.title{font:700 34px Arial,sans-serif;fill:#22344a}.subtitle{font:16px Arial,sans-serif;fill:#536476}.label{font:18px Arial,sans-serif;fill:#22344a}.small{font:14px Arial,sans-serif;fill:#536476}.tick{font:13px Arial,sans-serif;fill:#6d7d90}.axis{stroke:#b9c8d6;stroke-width:1}.grid{stroke:#edf3f8;stroke-width:1}.blocking{fill:#2f80ed}.suspend{fill:#21a67a}.latencyBlocking{fill:#d25b45}.latencySuspend{fill:#8d6fd1}.note{font:13px Arial,sans-serif;fill:#6d7d90}</style></defs>
  <rect class="canvas" width="1400" height="820"/>
  <rect class="frame" x="36" y="28" width="1328" height="764" rx="20"/>
  <text class="title" x="72" y="78">remote backend latency</text>
  <text class="subtitle" x="72" y="108">runIfLeader latency, us/op. Lower is better. Preview rows are short-run evidence and can be noisy.</text>
  <rect x="958" y="64" width="18" height="18" rx="3" class="latencyBlocking"/><text class="small" x="986" y="78">Blocking API</text>
  <rect x="1090" y="64" width="18" height="18" rx="3" class="latencySuspend"/><text class="small" x="1116" y="78">Suspend API</text>
  <line class="axis" x1="318" y1="740" x2="1192" y2="740"/>
  <line class="axis" x1="318" y1="132" x2="318" y2="740"/>
  <line class="grid" x1="536.5" y1="132" x2="536.5" y2="746"/><text class="tick" x="520.5" y="768">700</text>
  <line class="grid" x1="755.0" y1="132" x2="755.0" y2="746"/><text class="tick" x="739" y="768">1,400</text>
  <line class="grid" x1="973.5" y1="132" x2="973.5" y2="746"/><text class="tick" x="957.5" y="768">2,100</text>
  <line class="grid" x1="1192.0" y1="132" x2="1192.0" y2="746"/><text class="tick" x="1176" y="768">2,800</text>
  <text class="tick" x="308" y="768" text-anchor="end">0 us/op</text>
  <text class="label" x="90" y="178">Lettuce Redis</text>
  <rect x="318" y="154" width="217.1" height="22" rx="5" class="latencyBlocking"/><text class="small" x="545.1" y="170">695.6</text>
  <rect x="318" y="184" width="216.3" height="22" rx="5" class="latencySuspend"/><text class="small" x="544.3" y="200">693.1</text>
  <text class="label" x="90" y="250">Redisson Redis</text>
  <rect x="318" y="226" width="223.0" height="22" rx="5" class="latencyBlocking"/><text class="small" x="551.0" y="242">714.4</text>
  <rect x="318" y="256" width="222.5" height="22" rx="5" class="latencySuspend"/><text class="small" x="550.5" y="272">712.9</text>
  <text class="label" x="90" y="322">Hazelcast</text>
  <rect x="318" y="298" width="246.3" height="22" rx="5" class="latencyBlocking"/><text class="small" x="574.3" y="314">789.1</text>
  <rect x="318" y="328" width="231.4" height="22" rx="5" class="latencySuspend"/><text class="small" x="559.4" y="344">741.4</text>
  <text class="label" x="90" y="394">MongoDB</text>
  <rect x="318" y="370" width="333.1" height="22" rx="5" class="latencyBlocking"/><text class="small" x="661.1" y="386">1,067</text>
  <rect x="318" y="400" width="424.1" height="22" rx="5" class="latencySuspend"/><text class="small" x="752.1" y="416">1,358.7</text>
  <text class="label" x="90" y="466">ZooKeeper</text>
  <rect x="318" y="442" width="386.6" height="22" rx="5" class="latencyBlocking"/><text class="small" x="714.6" y="458">1,238.6</text>
  <rect x="318" y="472" width="454.9" height="22" rx="5" class="latencySuspend"/><text class="small" x="782.9" y="488">1,457.4</text>
  <text class="label" x="90" y="538">DynamoDB Local</text>
  <rect x="318" y="514" width="432.6" height="22" rx="5" class="latencyBlocking"/><text class="small" x="760.6" y="530">1,386</text>
  <rect x="318" y="544" width="634.0" height="22" rx="5" class="latencySuspend"/><text class="small" x="962.0" y="560">2,031</text>
  <text class="label" x="90" y="610">Consul</text>
  <rect x="318" y="586" width="552.0" height="22" rx="5" class="latencyBlocking"/><text class="small" x="880.0" y="602">1,768.3</text>
  <rect x="318" y="616" width="505.6" height="22" rx="5" class="latencySuspend"/><text class="small" x="833.6" y="632">1,619.9</text>
  <text class="label" x="90" y="682">etcd</text>
  <rect x="318" y="658" width="743.1" height="22" rx="5" class="latencyBlocking"/><text class="small" x="1071.1" y="674">2,380.6</text>
  <rect x="318" y="688" width="804.2" height="22" rx="5" class="latencySuspend"/><text class="small" x="1132.2" y="704">2,576.5</text>
  <text class="note" x="72" y="776">Source: docs/benchmarks/2026-05-29-issue-418-preview-backend-*.json. Forks=1, threads=1, 3 measurement iterations.</text>
</svg>
