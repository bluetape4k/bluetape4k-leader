<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc" data-intent="Help README and benchmark readers compare blocking and suspend leader election throughput across distributed backends without local or embedded database rows distorting the scale." data-evidence="benchmark/README.md distributed backend throughput tables" data-source-read="README.md; README.ko.md; benchmark/README.md; benchmark/README.ko.md">
