<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="960" viewBox="0 0 1500 960" role="img" aria-labelledby="title desc" data-source-read="README.md; README.ko.md; benchmark/README.md; docs/benchmarks/2026-05-29-issue-405-rdb-backend-throughput.json" data-intent="Help README readers compare distributed backend throughput while preserving the benchmark caveat that local and H2 rows are excluded and noisy rows should not be over-interpreted.">
<title id="title">Distributed Backend Throughput</title>
<desc id="desc">Table-backed blocking and suspend throughput chart for distributed leader election backends.</desc>
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#B9C7D6" flood-opacity="0.22"/></filter>
  <style>
    .canvas{fill:#F7FAFC}.frame{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:2.2;filter:url(#shadow)}
    .title{font-family:"Architects Daughter";font-size:42px;fill:#22344A}.subtitle,.axis,.value,.legend,.note,.group{font-family:"Comic Mono";fill:#4B6075}.subtitle{font-size:15px}.axis{font-size:12px}.value{font-size:12px}.legend{font-size:13px}.note{font-size:13px}.group{font-size:12px;fill:#6A7A8C}
    .rowLabel{font-family:"Architects Daughter";font-size:21px;fill:#22344A}.panel{fill:#FFFFFF;stroke:#D6E2EC;stroke-width:1.6}.track{fill:#EEF4F9;stroke:#D6E2EC;stroke-width:1.1}
  </style>
</defs>
<rect class="canvas" width="1500" height="960"/>
<rect class="frame" x="34" y="28" width="1432" height="904" rx="30"/>
<text class="title" x="72" y="84">Distributed Backend Throughput</text>
<text class="subtitle" x="76" y="116">Higher is better. Local and H2 rows are intentionally excluded so the chart compares distributed coordination cost.</text>

<rect class="panel" x="86" y="154" width="1328" height="670" rx="18"/>
<rect x="1055" y="94" width="18" height="12" rx="4" fill="#5B8DEF"/><text class="legend" x="1082" y="105">Blocking ops/s</text>
<rect x="1202" y="94" width="18" height="12" rx="4" fill="#D66B3D"/><text class="legend" x="1229" y="105">Suspend ops/s</text>
<line x1="420" y1="190" x2="420" y2="776" stroke="#D6E2EC" stroke-width="1"/>
<line x1="635" y1="190" x2="635" y2="776" stroke="#E3EBF2" stroke-width="1"/>
<line x1="850" y1="190" x2="850" y2="776" stroke="#E3EBF2" stroke-width="1"/>
<line x1="1065" y1="190" x2="1065" y2="776" stroke="#E3EBF2" stroke-width="1"/>
<line x1="1280" y1="190" x2="1280" y2="776" stroke="#E3EBF2" stroke-width="1"/>
<text class="axis" x="420" y="802" text-anchor="middle">0</text><text class="axis" x="635" y="802" text-anchor="middle">400</text><text class="axis" x="850" y="802" text-anchor="middle">800</text><text class="axis" x="1065" y="802" text-anchor="middle">1,200</text><text class="axis" x="1280" y="802" text-anchor="middle">1,600 ops/s</text>

<g transform="translate(0 0)">
<text class="group" x="120" y="185">fast cluster-backed group</text>
<text class="rowLabel" x="120" y="218">Hazelcast</text><rect class="track" x="420" y="198" width="860" height="16" rx="6"/><rect x="420" y="198" width="785" height="16" rx="6" fill="#5B8DEF"/><rect class="track" x="420" y="218" width="860" height="16" rx="6"/><rect x="420" y="218" width="713" height="16" rx="6" fill="#D66B3D"/><text class="value" x="1224" y="214">1460.9 / 1325.9</text>
<text class="rowLabel" x="120" y="278">Lettuce Redis</text><rect class="track" x="420" y="258" width="860" height="16" rx="6"/><rect x="420" y="258" width="782" height="16" rx="6" fill="#5B8DEF"/><rect class="track" x="420" y="278" width="860" height="16" rx="6"/><rect x="420" y="278" width="754" height="16" rx="6" fill="#D66B3D"/><text class="value" x="1224" y="274">1454.7 / 1402.6</text>
<text class="rowLabel" x="120" y="338">Redisson Redis</text><rect class="track" x="420" y="318" width="860" height="16" rx="6"/><rect x="420" y="318" width="761" height="16" rx="6" fill="#5B8DEF"/><rect class="track" x="420" y="338" width="860" height="16" rx="6"/><rect x="420" y="338" width="745" height="16" rx="6" fill="#D66B3D"/><text class="value" x="1204" y="334">1415.8 / 1386.7</text>

<text class="group" x="120" y="404">document, session, and lease services</text>
<text class="rowLabel" x="120" y="438">MongoDB</text><rect class="track" x="420" y="418" width="860" height="16" rx="6"/><rect x="420" y="418" width="453" height="16" rx="6" fill="#5B8DEF"/><rect class="track" x="420" y="438" width="860" height="16" rx="6"/><rect x="420" y="438" width="429" height="16" rx="6" fill="#D66B3D"/><text class="value" x="900" y="434">843.7 / 798.4</text>
<text class="rowLabel" x="120" y="498">ZooKeeper</text><rect class="track" x="420" y="478" width="860" height="16" rx="6"/><rect x="420" y="478" width="432" height="16" rx="6" fill="#5B8DEF"/><rect class="track" x="420" y="498" width="860" height="16" rx="6"/><rect x="420" y="498" width="360" height="16" rx="6" fill="#D66B3D"/><text class="value" x="875" y="494">804.3 / 670.6</text>
<text class="rowLabel" x="120" y="558">DynamoDB</text><rect class="track" x="420" y="538" width="860" height="16" rx="6"/><rect x="420" y="538" width="388" height="16" rx="6" fill="#5B8DEF"/><rect class="track" x="420" y="558" width="860" height="16" rx="6"/><rect x="420" y="558" width="274" height="16" rx="6" fill="#D66B3D"/><text class="value" x="830" y="554">722.2 / 510.2</text>
<text class="rowLabel" x="120" y="618">Consul</text><rect class="track" x="420" y="598" width="860" height="16" rx="6"/><rect x="420" y="598" width="319" height="16" rx="6" fill="#5B8DEF"/><rect class="track" x="420" y="618" width="860" height="16" rx="6"/><rect x="420" y="618" width="303" height="16" rx="6" fill="#D66B3D"/><text class="value" x="760" y="614">593.6 / 563.2</text>
<text class="rowLabel" x="120" y="678">etcd</text><rect class="track" x="420" y="658" width="860" height="16" rx="6"/><rect x="420" y="658" width="239" height="16" rx="6" fill="#5B8DEF"/><rect class="track" x="420" y="678" width="860" height="16" rx="6"/><rect x="420" y="678" width="251" height="16" rx="6" fill="#D66B3D"/><text class="value" x="700" y="674">443.8 / 467.5</text>

<text class="group" x="120" y="728">SQL over Testcontainers in this run</text>
<text class="rowLabel" x="120" y="758">PostgreSQL / MySQL</text><rect class="track" x="420" y="738" width="860" height="16" rx="6"/><rect x="420" y="738" width="43" height="16" rx="6" fill="#5B8DEF"/><rect class="track" x="420" y="758" width="860" height="16" rx="6"/><rect x="420" y="758" width="35" height="16" rx="6" fill="#D66B3D"/><text class="value" x="486" y="754">80.3/69.5 blocking, 53.6/65.2 suspend</text>
</g>

<rect x="86" y="852" width="1328" height="42" rx="14" fill="#FFFFFF" stroke="#D6E2EC" stroke-width="1.4"/>
<text class="note" x="750" y="878" text-anchor="middle">Benchmark data: distributed backend tables and 2026-05-29 raw JSON. Error bounds are broad; use this as same-machine comparison evidence.</text>
</svg>
